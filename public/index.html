<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH IN - Professional Football Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --p: #10b981; --bg: #05070a; --bg2: #0d1117; --cd: rgba(22, 27, 34, 0.95);
    --t: #ffffff; --t2: #a1a1aa; --red: #ef4444; --blue: #3b82f6; --orange: #f59e0b; --sh: 0 20px 40px rgba(0,0,0,0.6);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
body { background: var(--bg); color: var(--t); overflow: hidden; height: 100vh; }

/* 온보딩 스타일 */
#ob { position: fixed; inset: 0; background: var(--bg); z-index: 9999; overflow-y: auto; padding-bottom: 120px; }
.ob-header { text-align: center; padding: 60px 20px 20px; }
.ob-header h1 { font-size: 48px; font-weight: 900; color: var(--p); letter-spacing: -2px; }
.ob-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; padding: 0 20px; overflow-x: auto; scrollbar-width: none; }
.ob-tabs::-webkit-scrollbar { display: none; }
.tab-btn { background: #161b22; color: var(--t2); border: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 700; white-space: nowrap; transition: 0.2s; }
.tab-btn.on { background: var(--p); color: #000; border-color: var(--p); }

.ob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.ob-team { background: #161b22; border: 2px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.3s; }
.ob-team:hover, .ob-team.sel { border-color: var(--p); background: rgba(16, 185, 129, 0.1); transform: translateY(-5px); }
.ob-team .crest-box { width: 64px; height: 64px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; padding: 8px; }
.ob-team img { width: 100%; height: 100%; object-fit: contain; }

.ob-footer { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--bg) 80%, transparent); padding: 30px; text-align: center; }
.btn-main { background: var(--p); color: #000; padding: 18px 60px; border-radius: 100px; font-weight: 900; font-size: 18px; cursor: pointer; border: none; }

/* 메인 레이아웃 */
#app { display: none; height: 100vh; flex-direction: column; }
.hdr { height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.05); }
.hdr-logo { font-size: 26px; font-weight: 900; color: var(--p); }
.main-body { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 260px; background: #080a0f; border-right: 1px solid rgba(255,255,255,0.05); padding: 25px; }
.si { padding: 16px 20px; border-radius: 15px; cursor: pointer; color: var(--t2); font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; background: transparent; border: none; width: 100%; text-align: left; }
.si.on { background: rgba(16, 185, 129, 0.15); color: var(--p); }
.pages { flex: 1; overflow-y: auto; padding: 40px; background: #05070a; }
.page { display: none; } .page.on { display: block; }

/* 순위표 구분선 색상 */
.zone-ucl { border-left: 4px solid var(--blue) !important; }
.zone-uel { border-left: 4px solid var(--orange) !important; }
.zone-uecl { border-left: 4px solid #a855f7 !important; }
.zone-rele { border-left: 4px solid var(--red) !important; }

/* 월간 스케줄 네비게이션 */
.sched-month-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
.sched-days { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.sched-day-card { min-width: 60px; padding: 10px; background: #161b22; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid transparent; }
.sched-day-card.on { border-color: var(--p); background: rgba(16, 185, 129, 0.1); color: var(--p); }

/* 경기 카드 */
.mc { background: var(--cd); border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
.mc-header { padding: 12px 20px; font-size: 11px; color: var(--t2); display: flex; justify-content: space-between; }
.mc-content { padding: 20px; display: flex; align-items: center; justify-content: space-around; }
.mc-team { text-align: center; width: 100px; font-size: 13px; font-weight: 700; }
.mc-team img { width: 40px; height: 40px; margin-bottom: 8px; }
.mc-score { font-size: 32px; font-weight: 900; color: var(--p); }

table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th { text-align: left; padding: 12px; color: var(--t2); font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

#gt { position: fixed; inset: 0; z-index: 10000; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
.gt-box h1 { font-size: 80px; font-weight: 900; color: var(--p); }
</style>
</head>
<body>

<div id="ob">
    <div class="ob-header">
        <h1>PITCH IN</h1>
        <p>팀 엠블럼을 확인하고 응원 팀을 선택하세요.</p>
    </div>
    <div id="league-tabs" class="ob-tabs"></div>
    <div id="ob-list" class="ob-grid"></div>
    <div class="ob-footer"><button class="btn-main" onclick="startApp()">대시보드 시작</button></div>
</div>

<div id="app">
    <header class="hdr">
        <div class="hdr-logo">PITCH IN</div>
        <div id="hdr-selected" style="display:flex; gap:10px;"></div>
    </header>
    <div class="main-body">
        <aside class="sidebar">
            <button class="si on" onclick="swP('home',this)"><span>⚡</span> LIVE</button>
            <button class="si" onclick="swP('sched',this)"><span>📅</span> SCHEDULE</button>
            <button class="si" onclick="swP('std',this)"><span>📊</span> STANDINGS</button>
            <button class="si" onclick="swP('player',this)"><span>👟</span> PLAYERS</button>
        </aside>
        <main class="pages">
            <div class="page on" id="pg-home"></div>
            <div class="page" id="pg-sched">
                <div class="sched-month-nav">
                    <button class="tab-btn" onclick="changeMonth(-1)">◀</button>
                    <h2 id="current-month-display">2026.04</h2>
                    <button class="tab-btn" onclick="changeMonth(1)">▶</button>
                </div>
                <div id="sched-days-container" class="sched-days"></div>
                <div id="sched-list" style="margin-top:20px;"></div>
            </div>
            <div class="page" id="pg-std">
                <div id="std-tabs" class="ob-tabs"></div>
                <div id="std-bd"></div>
            </div>
            <div class="page" id="pg-player">
                <div id="pl-tabs" class="ob-tabs" style="justify-content:flex-start;">
                    <button class="tab-btn on" onclick="loadPlayers('PL', 'goals')">득점 순위</button>
                    <button class="tab-btn" onclick="loadPlayers('PL', 'assists')">도움 순위</button>
                </div>
                <div id="pl-bd"></div>
            </div>
        </main>
    </div>
</div>

<div id="gt"><div class="gt-box"><h1>GOAL!</h1><div id="gt-team-nm" style="font-size:32px; text-align:center;"></div></div></div>

<script>
const API = '/api/football';
// 엠블럼 URL 생성기 (예시 이미지 주소 - 실제 API 연동 시 API 제공 URL로 대체됨)
const getCrest = (name) => `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=fff&color=000&bold=true`;

const LEAGUES = [
    { n: 'Premier League', c: 'PL', teams: ['Arsenal', 'Man City', 'Liverpool', 'Tottenham', 'Chelsea', 'Man Utd'] },
    { n: 'La Liga', c: 'PD', teams: ['Real Madrid', 'Barcelona', 'Atletico Madrid', 'Girona'] },
    { n: 'K League 1', c: 'KL1', teams: ['울산', '포항', '서울', '전북', '광주', '강원'] },
    { n: 'K League 2', c: 'KL2', teams: ['화성 FC', '수원', '부산', '전남', '경남'] }
];

let SELECTED_TEAMS = [];
let currentLeague = 'PL';
let viewDate = new Date();

// 1. 온보딩 엠블럼 적용 및 초기화
function initOb() {
    const tabs = document.getElementById('league-tabs');
    tabs.innerHTML = LEAGUES.map(lg => `<button class="tab-btn ${lg.c === currentLeague ? 'on' : ''}" onclick="switchLeague('${lg.c}', this)">${lg.n}</button>`).join('');
    renderTeams();
}

function switchLeague(code, el) {
    currentLeague = code;
    document.querySelectorAll('#league-tabs .tab-btn').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
    renderTeams();
}

function renderTeams() {
    const list = document.getElementById('ob-list');
    const lg = LEAGUES.find(l => l.c === currentLeague);
    list.innerHTML = lg.teams.map(t => `
        <div class="ob-team ${SELECTED_TEAMS.includes(t) ? 'sel' : ''}" onclick="toggleTeam(this, '${t}')">
            <div class="crest-box"><img src="${getCrest(t)}" alt="${t}"></div>
            <span>${t}</span>
        </div>
    `).join('');
}

function toggleTeam(el, team) {
    if (SELECTED_TEAMS.includes(team)) {
        SELECTED_TEAMS = SELECTED_TEAMS.filter(t => t !== team);
        el.classList.remove('sel');
    } else {
        if (SELECTED_TEAMS.length >= 2) return alert('최대 2팀까지 선택 가능합니다.');
        SELECTED_TEAMS.push(team);
        el.classList.add('sel');
    }
}

// 2. 월간 일정 기능 (옆으로 넘기기)
function renderMonthDays() {
    const container = document.getElementById('sched-days-container');
    const display = document.getElementById('current-month-display');
    container.innerHTML = '';
    
    const year = viewDate.getFullYear();
    const month = viewDate.getMonth();
    display.textContent = `${year}.${String(month + 1).padStart(2, '0')}`;

    const lastDay = new Date(year, month + 1, 0).getDate();
    for (let i = 1; i <= lastDay; i++) {
        const d = new Date(year, month, i);
        const dayStr = d.toISOString().split('T')[0];
        const isToday = new Date().toISOString().split('T')[0] === dayStr;
        container.innerHTML += `
            <div class="sched-day-card ${isToday ? 'on' : ''}" onclick="loadSched('${dayStr}')">
                <div style="font-size:10px;">${['일','월','화','수','목','금','토'][d.getDay()]}</div>
                <div style="font-size:16px; font-weight:800;">${i}</div>
            </div>
        `;
    }
}

function changeMonth(val) {
    viewDate.setMonth(viewDate.getMonth() + val);
    renderMonthDays();
}

// 3. 순위표 엠블럼 및 구역 구분 (챔스/강등)
async function loadStd(code) {
    const bd = document.getElementById('std-bd');
    bd.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    const d = await fetch(`${API}?type=fd&path=/competitions/${code}/standings`).then(res => res.json());
    const table = d.standings[0].table;
    
    bd.innerHTML = `<table>
        <tr><th>순위</th><th>팀</th><th>경기</th><th>승점</th></tr>
        ${table.map(r => {
            let zoneClass = '';
            if (r.position <= 4) zoneClass = 'zone-ucl';
            else if (r.position === 5) zoneClass = 'zone-uel';
            else if (r.position === 6) zoneClass = 'zone-uecl';
            else if (r.position >= table.length - 2) zoneClass = 'zone-rele';

            return `<tr class="${zoneClass}">
                <td style="font-weight:800; text-align:center;">${r.position}</td>
                <td style="display:flex; align-items:center; gap:10px;">
                    <img src="${r.team.crest || getCrest(r.team.name)}" width="24" height="24">
                    ${r.team.name}
                </td>
                <td style="text-align:center;">${r.playedGames}</td>
                <td style="text-align:center; color:var(--p); font-weight:900;">${r.points}</td>
            </tr>`;
        }).join('')}
    </table>`;
}

// 4. 선수 탭 득점/도움 순위
async function loadPlayers(code, type = 'goals') {
    const bd = document.getElementById('pl-bd');
    bd.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    // 실제 API 연동 시 type에 따라 다른 경로 또는 필터 사용
    const d = await fetch(`${API}?type=fd&path=/competitions/${code}/scorers`).then(res => res.json());
    
    bd.innerHTML = `<table>
        <tr><th>순위</th><th>선수</th><th>팀</th><th>${type === 'goals' ? '득점' : '도움'}</th></tr>
        ${d.scorers.slice(0, 10).map((s, i) => `
            <tr>
                <td style="font-weight:800; color:var(--p);">${i+1}</td>
                <td style="font-weight:700;">${s.player.name}</td>
                <td>${s.team.name}</td>
                <td style="font-weight:900; color:var(--p);">${type === 'goals' ? s.goals : (s.assists || 0)}</td>
            </tr>
        `).join('')}
    </table>`;
}

// 메인 앱 시작
function startApp() {
    if (SELECTED_TEAMS.length === 0) return alert('팀을 선택해주세요.');
    document.getElementById('ob').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('hdr-selected').innerHTML = SELECTED_TEAMS.map(t => `<img src="${getCrest(t)}" style="width:30px; border-radius:50%;">`).join('');
    renderMonthDays();
}

function swP(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.getElementById('pg-' + id).classList.add('on');
    document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
    el.classList.add('on');
    if(id === 'std') loadStd('PL');
}

initOb();
</script>
</body>
</html>
