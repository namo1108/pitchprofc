<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>PITCH Pro — Tactical Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010406; --bg2: #060e12; --card: rgba(10, 24, 32, 0.9);
            --p-color: #00ff87; --p-glow: rgba(0, 255, 135, 0.3);
            --t: #d0ffe8; --t2: #5a8870; --t3: #1e3d2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; overflow: hidden; height: 100vh; }
        
        /* [1] 온보딩: 팀 선택 */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .ob-header { text-align: center; padding: 30px 20px 15px; flex-shrink: 0; }
        .ob-title { font-family: 'Orbitron'; font-size: 20px; font-weight: 900; color: var(--p-color); letter-spacing: 3px; text-shadow: 0 0 15px var(--p-glow); }
        .lg-nav-ob { display: flex; overflow-x: auto; padding: 10px 15px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.03); flex-shrink: 0; gap: 8px; scrollbar-width: none; }
        .lg-nav-ob::-webkit-scrollbar { display: none; }
        .ob-tab { padding: 8px 16px; background: rgba(255,255,255,0.02); border-radius: 20px; font-family: 'Orbitron'; font-size: 10px; font-weight: 700; color: var(--t3); white-space: nowrap; cursor: pointer; }
        .ob-tab.active { background: var(--p-glow); color: var(--p-color); border: 1px solid rgba(0,255,135,0.2); }
        .ob-grid-area { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .ob-grid-area.active { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; animation: fadeIn 0.4s; }
        .t-item { background: var(--bg2); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 10px 5px; text-align: center; cursor: pointer; }
        .t-item img { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; }
        .t-item div { font-size: 9px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* [2] 메인 앱 구조 */
        #main-app { display: flex; flex-direction: column; height: 100vh; }
        .topbar { height: 55px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,255,135,0.1); background: rgba(1,4,6,0.8); backdrop-filter: blur(10px); }
        .logo { font-family: 'Orbitron'; font-size: 18px; font-weight: 900; color: var(--p-color); letter-spacing: 2px; }
        
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; display: none; }
        .content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* [3] 컴포넌트 스타일 */
        .sec-ttl { font-family: 'Orbitron'; font-size: 11px; color: var(--p-color); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .sec-ttl::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--p-glow), transparent); }
        
        /* 아코디언 일정 */
        .acc { background: var(--bg2); border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .acc-h { padding: 12px 15px; display: flex; justify-content: space-between; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; font-weight: 700; }
        .acc-b { max-height: 0; overflow: hidden; transition: 0.3s; background: rgba(0,0,0,0.2); }
        .acc-b.open { max-height: 500px; padding: 10px; }
        .m-card { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .m-info { flex: 1; }
        .m-team { display: flex; align-items: center; gap: 8px; font-size: 12px; margin: 3px 0; }
        .m-score { font-family: 'Orbitron'; font-size: 14px; font-weight: 900; color: var(--p-color); margin-left: auto; }

        /* 하단 바 */
        .b-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: 75px; background: var(--bg2); display: flex; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .n-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; color: var(--t3); transition: 0.3s; }
        .n-btn.active { color: var(--p-color); text-shadow: 0 0 10px var(--p-glow); }
        .n-btn span { font-size: 8px; font-family: 'Orbitron'; font-weight: 700; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="ob-header">
            <div class="ob-title">SELECT CLUB</div>
            <p style="font-size:11px; color:var(--t2); margin-top:5px;">인터페이스 테마가 선택 팀의 컬러로 바뀝니다.</p>
        </div>
        <div class="lg-nav-ob" id="lg-nav-ob"></div>
        <div id="ob-grid-container" style="flex:1; overflow:hidden; position:relative;"></div>
    </div>

    <div id="main-app" class="hidden">
        <div class="topbar">
            <div class="logo">PITCH PRO</div>
            <div id="user-team-badge">⚽</div>
        </div>

        <div id="p-live" class="content active">
            <div class="sec-ttl">LIVE OPS</div>
            <div class="acc" style="border-color: var(--p-color);">
                <div style="padding:20px; text-align:center;">
                    <div style="font-family:'Orbitron'; font-size:10px; color:var(--p-color); margin-bottom:15px;">PREMIER LEAGUE · 72'</div>
                    <div style="display:flex; justify-content:space-around; align-items:center;">
                        <div><img id="h-logo" src="" width="45"><p style="font-size:11px; margin-top:5px;">HOME</p></div>
                        <div style="font-family:'Orbitron'; font-size:32px; font-weight:900;">2 : 1</div>
                        <div><img src="https://crests.football-data.org/65.png" width="45"><p style="font-size:11px; margin-top:5px;">MCI</p></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="p-fix" class="content">
            <div class="sec-ttl">FIXTURES</div>
            <div id="fixture-list"></div>
        </div>

        <div id="p-tab" class="content">
            <div class="sec-ttl">LEAGUE TABLE</div>
            <div id="table-list" style="background:var(--bg2); border-radius:12px; padding:15px; font-family:'Share Tech Mono'; font-size:11px;"></div>
        </div>

        <div id="p-news" class="content">
            <div class="sec-ttl">NEWS FEED</div>
            <div id="news-list"></div>
        </div>

        <div id="p-check" class="content">
            <div class="sec-ttl">STADIUM CHECK-IN</div>
            <div style="background:linear-gradient(135deg, var(--p-glow), transparent); padding:30px; border-radius:16px; text-align:center; border:1px dashed var(--p-color);">
                <div style="font-size:40px;">🎫</div>
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-top:10px;">GPS VERIFICATION</h3>
                <button style="margin-top:20px; background:var(--p-color); color:var(--bg); border:none; padding:12px 25px; border-radius:8px; font-family:'Orbitron'; font-weight:900;">CHECK ATTENDANCE</button>
            </div>
        </div>

        <div class="b-nav">
            <div class="n-btn active" onclick="sw('live', this)"><i>⚡</i><span>LIVE</span></div>
            <div class="n-btn" onclick="sw('fix', this)"><i>📅</i><span>FIXTURES</span></div>
            <div class="n-btn" onclick="sw('tab', this)"><i>📊</i><span>TABLE</span></div>
            <div class="n-btn" onclick="sw('news', this)"><i>📰</i><span>NEWS</span></div>
            <div class="n-btn" onclick="sw('check', this)"><i>🎫</i><span>CHECK-IN</span></div>
        </div>
    </div>

    <script>
        // 5대 리그 98개 팀 데이터 시뮬레이션 (핵심 팀 위주 구성, 구조 동일)
        const leagues = [
            { id: "PL", sn: "EPL", teams: [
                { id: 73, n: "Tottenham", c: "#ffffff" }, { id: 65, n: "Man City", c: "#6caddf" },
                { id: 57, n: "Arsenal", c: "#ef0107" }, { id: 64, n: "Liverpool", c: "#e31b23" },
                { id: 66, n: "Man Utd", c: "#da291c" }, { id: 61, n: "Chelsea", c: "#034694" },
                { id: 67, n: "Newcastle", c: "#ffffff" }, { id: 58, n: "Aston Villa", c: "#95bfe5" }
            ]},
            { id: "PD", sn: "LALIGA", teams: [
                { id: 86, n: "Real Madrid", c: "#ffffff" }, { id: 81, n: "Barcelona", c: "#a50044" },
                { id: 78, n: "Atletico", c: "#cb3524" }, { id: 92, n: "Real Sociedad", c: "#0067b1" },
                { id: 94, n: "Villarreal", c: "#fee300" }, { id: 558, n: "Sevilla", c: "#f43333" }
            ]},
            { id: "BL1", sn: "BUNDES", teams: [
                { id: 503, n: "FC Bayern", c: "#dc052d" }, { id: 4, n: "Dortmund", c: "#fde100" },
                { id: 3, n: "Leverkusen", c: "#e32221" }, { id: 28, n: "RB Leipzig", c: "#dd013f" }
            ]}
        ];

        // 초기화 로직
        const obNav = document.getElementById('lg-nav-ob');
        const obGrid = document.getElementById('ob-grid-container');

        leagues.forEach((lg, idx) => {
            const btn = document.createElement('div');
            btn.className = `ob-tab ${idx===0?'active':''}`;
            btn.innerText = lg.sn;
            btn.onclick = () => {
                document.querySelectorAll('.ob-tab').forEach(t=>t.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.ob-grid-area').forEach(g=>g.classList.remove('active'));
                document.getElementById(`ob-g-${idx}`).classList.add('active');
            };
            obNav.appendChild(btn);

            const grid = document.createElement('div');
            grid.id = `ob-g-${idx}`;
            grid.className = `ob-grid-area ${idx===0?'active':''}`;
            lg.teams.forEach(t => {
                const item = document.createElement('div');
                item.className = 't-item';
                item.innerHTML = `<img src="https://crests.football-data.org/${t.id}.svg"><div>${t.n}</div>`;
                item.onclick = () => select(t);
                grid.appendChild(item);
            });
            obGrid.appendChild(grid);
        });

        function select(t) {
            document.documentElement.style.setProperty('--p-color', t.c);
            document.documentElement.style.setProperty('--p-glow', t.c + '44');
            document.getElementById('h-logo').src = `https://crests.football-data.org/${t.id}.svg`;
            document.getElementById('onboarding').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('onboarding').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                loadData();
            }, 600);
        }

        function sw(p, b) {
            document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
            document.querySelectorAll('.n-btn').forEach(n=>n.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            b.classList.add('active');
        }

        function loadData() {
            // 일정 리스트 생성
            const fList = document.getElementById('fixture-list');
            leagues.forEach(lg => {
                const acc = document.createElement('div');
                acc.className = 'acc';
                acc.innerHTML = `<div class="acc-h" onclick="this.nextElementSibling.classList.toggle('open')"><span>${lg.sn}</span><span>▼</span></div>
                <div class="acc-b open">${lg.teams.slice(0,3).map(t=>`<div class="m-card"><div class="m-info"><div class="m-team"><img src="https://crests.football-data.org/${t.id}.svg" width="14">${t.n}</div><div class="m-team">vs Rival</div></div><div class="m-score">22:00</div></div>`).join('')}</div>`;
                fList.appendChild(acc);
            });

            // 순위 리스트 생성
            const tList = document.getElementById('table-list');
            tList.innerHTML = `<div style="display:flex; color:var(--t2); margin-bottom:10px;"><span style="width:30px;">#</span><span style="flex:1;">CLUB</span><span>PTS</span></div>` + 
            [1,2,3,4,5].map(i=>`<div style="display:flex; margin-bottom:8px;"><span style="width:30px; color:var(--p-color);">${i}</span><span style="flex:1;">Arsenal</span><span>${85-i*2}</span></div>`).join('');

            // 뉴스 리스트 생성
            const nList = document.getElementById('news-list');
            nList.innerHTML = [1,2].map(()=>`<div style="background:var(--bg2); padding:12px; border-radius:12px; margin-bottom:10px; display:flex; gap:12px;">
                <div style="width:60px; height:60px; background:#1a2a33; border-radius:8px;"></div>
                <div style="flex:1;"><h4 style="font-size:13px;">이적 시장 긴급 속보</h4><p style="font-size:10px; color:var(--t2); margin-top:5px;">유럽 챔피언스리그 대진표 확정 및 분석...</p></div>
            </div>`).join('');
        }
    </script>
</body>
</html>
