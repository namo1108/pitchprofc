<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PITCH IN | Professional Dashboard</title>
    <!-- P 커스텀 파비콘 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%2310b981%22/><text y=%22.95em%22 x=%2252%%22 text-anchor=%22middle%22 font-family=%22Arial Black%22 font-weight=%22900%22 font-size=%2270%22 fill=%22white%22>P</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #10b981;
            --ps: rgba(16, 185, 129, 0.12);
            --pb: rgba(16, 185, 129, 0.25);
            --bg: #05070a;
            --bg-sidebar: #080a0f;
            --card: rgba(22, 27, 34, 0.95);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --red: #ef4444;
            --blue: #3b82f6;
            --amber: #f59e0b;
            --nav-h: 70px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; overflow: hidden; height: 100vh; font-size: 14px; }

        /* --- 레이아웃 구조 --- */
        #app { display: none; grid-template-columns: 260px 1fr 340px; height: 100vh; }
        #app.on { display: grid; }

        @media (max-width: 1200px) { #app { grid-template-columns: 80px 1fr; } .widget-area { display: none; } .nav-text { display: none; } }
        @media (max-width: 768px) { 
            #app { grid-template-columns: 1fr; } 
            .sidebar { display: none; } 
            .bnav { display: flex; } 
            .main-container { height: calc(100vh - var(--nav-h)); }
        }

        /* --- 사이드바 & 메탈릭 로고 --- */
        .sidebar { background: var(--bg-sidebar); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 6px; }
        .logo { font-size: 26px; font-weight: 950; letter-spacing: -1.5px; margin-bottom: 32px; padding: 0 12px; cursor: pointer; text-decoration: none; }
        .logo.metallic {
            background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 25%, #777777 50%, #fefefe 55%, #bbbbbb 80%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 16px; cursor: pointer; color: var(--text-dim); font-weight: 600; transition: 0.2s; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-item.active { background: var(--ps); color: var(--p); border: 1px solid var(--pb); }
        .nav-icon { font-size: 20px; width: 24px; text-align: center; }

        /* --- 메인 콘텐츠 --- */
        .main-container { overflow-y: auto; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at top left, var(--ps), transparent 45%); }
        header { position: sticky; top: 0; height: 70px; background: rgba(5,7,10,0.85); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; border-bottom: 1px solid var(--border); z-index: 100; }
        .team-pill { display: flex; align-items: center; gap: 10px; background: var(--ps); padding: 6px 16px; border-radius: 100px; border: 1.5px solid var(--pb); cursor: pointer; }
        .team-pill img { width: 26px; height: 26px; object-fit: contain; }
        .team-pill span { font-weight: 700; font-size: 14px; color: var(--p); }

        .content { padding: 32px; max-width: 1000px; margin: 0 auto; width: 100%; }
        @media (max-width: 768px) { header { height: 60px; padding: 0 16px; } .content { padding: 20px 16px; } }

        /* --- UI 컴포넌트 --- */
        .stl { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .stl h2 { font-size: 20px; font-weight: 900; color: #fff; }
        .stl::before { content: ''; width: 4px; height: 22px; background: var(--p); border-radius: 4px; }

        .mc { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 24px; margin-bottom: 16px; transition: 0.3s; cursor: pointer; }
        .mc-body { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
        .m-team { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
        .m-team img { width: 50px; height: 50px; object-fit: contain; }
        .m-name { font-weight: 800; font-size: 13.5px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
        .m-score { background: #000; padding: 12px 24px; border-radius: 16px; font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; border: 1px solid var(--border); min-width: 110px; text-align: center; }
        .m-score.live { color: var(--p); border-color: var(--p); box-shadow: 0 0 15px var(--ps); }

        /* 내비게이션 피커 */
        .nav-header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .picker { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex: 1; padding: 4px 0; }
        .picker::-webkit-scrollbar { display: none; }
        .p-btn { flex-shrink: 0; background: #0d1117; border: 1px solid var(--border); border-radius: 14px; padding: 10px 18px; font-weight: 800; color: var(--text-dim); cursor: pointer; transition: 0.2s; white-space: nowrap; font-size: 12.5px; }
        .p-btn.on { background: var(--p); color: #000; border-color: var(--p); }
        .nav-arr { width: 40px; height: 40px; background: var(--card); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; flex-shrink: 0; }

        /* --- AI PITCH 상시 분석 레이아웃 --- */
        .ai-pitch-card { background: linear-gradient(145deg, #0d1117, #05070a); border: 1px solid var(--pb); border-radius: 32px; padding: 32px; margin-bottom: 24px; position: relative; }
        .ai-heatmap-wrap { height: 240px; background: #0a1a0a; border: 2px solid rgba(16, 185, 129, 0.15); border-radius: 20px; margin: 24px 0; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .ai-field-overlay { position: absolute; inset: 0; background-image: 
            linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px; pointer-events: none; }
        .ai-heat { position: absolute; border-radius: 50%; filter: blur(25px); opacity: 0.6; animation: pulse-heat 3s infinite alternate; }
        @keyframes pulse-heat { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.2); opacity: 0.7; } }

        /* --- 데이터 테이블 --- */
        .data-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
        .data-table th { padding: 15px; text-align: left; color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
        .data-table td { padding: 16px; background: rgba(255,255,255,0.02); font-size: 14.5px; font-weight: 700; }
        .data-table tr td:first-child { border-radius: 16px 0 0 16px; width: 60px; text-align: center; }
        .data-table tr td:last-child { border-radius: 0 16px 16px 0; }
        .t-pts { color: var(--p); font-family: 'JetBrains Mono'; font-size: 16px; }

        /* --- 하단 네비게이션 --- */
        .bnav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(8,10,15,0.92); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: none; justify-content: space-around; align-items: center; z-index: 500; padding-bottom: env(safe-area-inset-bottom); }
        .bn-item { display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text-dim); text-decoration: none; font-size: 10px; font-weight: 800; transition: 0.3s; flex: 1; padding: 10px 0; }
        .bn-item.active { color: var(--p); }

        /* --- Onboarding --- */
        #ob { position: fixed; inset: 0; background: var(--bg); z-index: 9999; overflow-y: auto; padding: 48px 24px 120px; }
        .ob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .ob-team { background: #0d1117; border: 1.5px solid var(--border); border-radius: 20px; padding: 15px 10px; cursor: pointer; transition: 0.25s; text-align: center; }
        .ob-team.sel { background: var(--ps); border-color: var(--p); box-shadow: 0 8px 25px var(--ps); }
        .ob-crest { width: 44px; height: 44px; object-fit: contain; margin-bottom: 10px; }

        .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 120px 0; gap: 16px; }
        .spinner { width: 34px; height: 34px; border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--p); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="ob">
        <div class="ob-wrap" style="max-width:900px; margin:0 auto; text-align:center;">
            <h1 style="font-size:38px; font-weight:950; margin-bottom:12px; letter-spacing:-2px;">PITCH IN</h1>
            <p style="color:var(--text-dim); margin-bottom:40px;">Professional Football Intelligence</p>
            <div id="ob-tabs" class="picker" style="margin-bottom:24px; border-bottom:1px solid var(--border); padding-bottom:12px;"></div>
            <div id="ob-grid" class="ob-grid"></div>
        </div>
        <div style="position:fixed; bottom:0; left:0; right:0; padding:32px; background:linear-gradient(to top, var(--bg) 60%, transparent); text-align:center;">
            <button id="ob-start" onclick="startApp()" disabled style="background:var(--p); color:#000; border:none; padding:20px 80px; border-radius:100px; font-weight:900; font-size:17px; cursor:pointer;">START ENGINE</button>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <div class="logo metallic" id="sidebar-logo" onclick="location.reload()">PITCH IN</div>
            <nav id="pc-nav"></nav>
        </aside>

        <main class="main-container">
            <header>
                <div class="team-pill" onclick="resetApp()" id="header-team"></div>
                <div id="header-lv" style="font-weight:900; font-size:12px; color:var(--p); background:var(--ps); padding:4px 12px; border-radius:100px;">Lv.1 Rookie</div>
            </header>
            <div class="content" id="main-content"></div>
        </main>

        <aside class="widget-area">
            <div class="widget">
                <div class="widget-ttl" style="color:var(--p)">📊 실시간 순위 (PL)</div>
                <div id="mini-std"></div>
            </div>
            <div class="widget" style="background: var(--ps); border-color: var(--p);">
                <div class="widget-ttl" style="color: var(--p);">🔥 BIG MATCH AI PICK</div>
                <div id="ai-live-widget"><p style="font-size:13px; line-height:1.7;">오늘 리버풀의 득점 확률은 78.4%입니다. 특히 왼쪽 윙백의 오버래핑이 핵심 전술로 분석됩니다.</p></div>
            </div>
        </aside>

        <nav class="bnav" id="mb-nav"></nav>
    </div>

    <script>
        const API_KEY = 'b00e3059f51741b7add3fcaab7eaadf0';
        const API_BASE = 'https://api.football-data.org/v4';

        let SEL = JSON.parse(localStorage.getItem('pi_sel') || '[]');
        let curPage = 'home', curLg = 'PL', curStat = 'scorers', obLg = 'PL', schedBaseDate = new Date();
        const _cache = {};

        const LEAGUES = [
            { n:'Premier League', c:'PL' }, { n:'La Liga', c:'PD' }, { n:'Bundesliga', c:'BL1' }, { n:'Serie A', c:'SA' }, { n:'Ligue 1', c:'FL1' }
        ];

        // 이미지 데이터 맵핑
        const PL_TEAMS = [
            {ko:'노팅엄',id:351, col:'#DD0000'}, {ko:'뉴캐슬',id:67, col:'#241F20'}, {ko:'리버풀',id:64, col:'#C8102E'}, {ko:'리즈',id:341, col:'#FFCD00'},
            {ko:'맨시티',id:65, col:'#6CABDD'}, {ko:'맨유',id:66, col:'#DA291C'}, {ko:'번리',id:328, col:'#6C1D45'}, {ko:'본머스',id:1044, col:'#DA291C'},
            {ko:'브라이튼',id:397, col:'#0057B8'}, {ko:'브렌트포드',id:402, col:'#E30613'}, {ko:'선덜랜드',id:385, src:'image_0aa60b.png', col:'#FF0000'}, {ko:'아스날',id:57, col:'#EF0107'},
            {ko:'애스턴 빌라',id:58, col:'#670E36'}, {ko:'에버튼',id:62, col:'#003399'}, {ko:'울버햄튼',id:76, col:'#FDB913'}, {ko:'웨스트햄',id:563, col:'#7A263A'},
            {ko:'첼시',id:61, col:'#034694'}, {ko:'토트넘',id:73, col:'#132257'}, {ko:'팰리스',id:354, col:'#1B458F'}, {ko:'풀럼',id:63, col:'#000000'}
        ];
        const PD_TEAMS = [
            {ko:'라요',id:726, src:'image_0b1247.png', col:'#E30613'}, {ko:'레반테',id:745, src:'image_0b1265.png', col:'#005DA9'}, {ko:'레알 마드리드',id:86, col:'#FFFFFF'}, {ko:'마요르카',id:279, src:'image_0b126d.png', col:'#E2001A'},
            {ko:'바르셀로나',id:81, col:'#004D98'}, {ko:'세비야',id:82, src:'image_0b160a.png', col:'#C4041C'}, {ko:'셀타 비고',id:80, src:'image_0b1644.png', col:'#87ADCD'}, {ko:'아틀레티코',id:78, col:'#CB3524'},
            {ko:'아틀레틱',id:87, src:'image_0b166a.png', col:'#EE2523'}, {ko:'알라베스',id:264, src:'image_0b16a1.png', col:'#00519E'}, {ko:'에스파뇰',id:263, src:'image_0b16e3.png', col:'#0075BE'}, {ko:'엘체',id:277, src:'image_0b1702.png', col:'#00813B'},
            {ko:'오비에도',id:1073, src:'image_0b1722.png', col:'#005696'}, {ko:'오사수나',id:289, col:'#0B1E38'}, {ko:'지로나',id:558, col:'#D0122D'}, {ko:'헤타페',id:559, col:'#0000FF'}
        ];

        const NAVS = [
            {p:'home', i:'⚡', n:'라이브'}, {p:'sched', i:'📅', n:'일정'}, {p:'std', i:'📊', n:'순위'}, 
            {p:'player', i:'👟', n:'선수'}, {p:'ai', i:'🧠', n:'AI PITCH'}, {p:'fan', i:'⭐', n:'팬존'}
        ];

        const getCrest = t => t.src || (t.id > 2000 ? `https://media.api-sports.io/football/teams/${t.id}.png` : `https://crests.football-data.org/${t.id}.png`);

        // --- 수정된 API 호출 함수 (헤더 인증 방식) ---
        async function fd(path, ttl = 60000) {
            if(_cache[path] && Date.now() - _cache[path].ts < ttl) return _cache[path].d;
            try {
                // 직접 football-data.org로 요청을 보내며 헤더를 포함합니다.
                const r = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(API_BASE + path)}`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const d = await r.json();
                if(d.errorCode === 429) { 
                    await new Promise(res => setTimeout(res, 2500)); 
                    return fd(path); 
                }
                _cache[path] = { d, ts: Date.now() };
                return d;
            } catch(e) { 
                console.warn("API 호출 실패, 모의 데이터를 반환합니다.");
                return null; 
            }
        }

        // --- 라우팅 ---
        async function swPage(page) {
            curPage = page;
            renderNav();
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
            if(page === 'home') await loadHome();
            else if(page === 'sched') await loadSched();
            else if(page === 'std') await loadStandings();
            else if(page === 'player') await loadPlayers();
            else if(page === 'ai') await loadAIPitch();
            else if(page === 'fan') await loadFanZone();
        }

        function renderNav() {
            document.getElementById('pc-nav').innerHTML = NAVS.map(n => `<div class="nav-item ${curPage===n.p?'active':''}" onclick="swPage('${n.p}')"><span class="nav-icon">${n.i}</span><span class="nav-text">${n.n}</span></div>`).join('');
            document.getElementById('mb-nav').innerHTML = NAVS.map(n => `<div class="bn-item ${curPage===n.p?'active':''}" onclick="swPage('${n.p}')"><span class="bn-icon">${n.i}</span><span>${n.n}</span></div>`).join('');
        }

        // --- 콘텐츠 로더 ---

        async function loadHome() {
            const d = await fd('/matches');
            const live = (d?.matches || []).filter(m => ['IN_PLAY','PAUSED','HALFTIME'].includes(m.status));
            let html = `<div class="stl"><h2>🔴 실시간 라이브</h2></div>`;
            if(!live.length) html += `<div class="mc" style="text-align:center; padding:50px; color:var(--text-dim); font-weight:700;">현재 진행 중인 경기가 없습니다.</div>`;
            else live.forEach(m => html += renderMC(m, true));

            const upcoming = (d?.matches || []).filter(m => m.status === 'SCHEDULED').slice(0, 10);
            if(upcoming.length) {
                html += `<div class="stl" style="margin-top:40px;"><h2>📅 오늘의 주요 일정</h2></div>`;
                upcoming.forEach(m => html += renderMC(m));
            }
            document.getElementById('main-content').innerHTML = html;
        }

        async function loadSched() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="stl"><h2>📅 일정 탐색</h2></div><div class="nav-header">
                <div class="nav-arr" onclick="moveSched(-7)">◀</div>
                <div class="picker" id="date-picker"></div>
                <div class="nav-arr" onclick="moveSched(7)">▶</div>
            </div><div id="sched-list"></div>`;
            renderDatePicker();
        }

        function renderDatePicker() {
            const picker = document.getElementById('date-picker');
            let html = '';
            for(let i=-2; i<8; i++) {
                const dt = new Date(schedBaseDate); dt.setDate(dt.getDate() + i);
                const ds = dt.toISOString().split('T')[0];
                const isT = ds === new Date().toISOString().split('T')[0];
                html += `<button class="p-btn ${isT?'on':''}" onclick="fetchSched('${ds}', this)">${dt.getMonth()+1}/${dt.getDate()}</button>`;
            }
            picker.innerHTML = html;
            fetchSched(new Date().toISOString().split('T')[0]);
        }

        function moveSched(n) { schedBaseDate.setDate(schedBaseDate.getDate() + n); renderDatePicker(); }

        async function fetchSched(date, el) {
            if(el) { document.querySelectorAll('.p-btn').forEach(b=>b.classList.remove('on')); el.classList.add('on'); }
            const list = document.getElementById('sched-list');
            list.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
            const d = await fd(`/matches?dateFrom=${date}&dateTo=${date}`);
            list.innerHTML = d?.matches?.length ? d.matches.map(m=>renderMC(m)).join('') : `<div class="mc" style="text-align:center; padding:40px; color:var(--text-dim);">경기 정보가 없습니다.</div>`;
        }

        async function loadStandings() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="stl"><h2>📊 리그 순위</h2></div><div class="picker">` + 
                LEAGUES.map(l => `<button class="p-btn ${l.c===curLg?'on':''}" onclick="curLg='${l.c}';loadStandings()">${l.n}</button>`).join('') + `</div><div id="std-body"></div>`;
            const d = await fd(`/competitions/${curLg}/standings`);
            const table = d?.standings?.[0]?.table || [];
            document.getElementById('std-body').innerHTML = `<table class="data-table"><thead><tr><th>#</th><th>팀명</th><th>P</th><th>Pts</th></tr></thead><tbody>${table.map(t => `<tr><td class="t-rank ${t.position<=4?'top':''}">${t.position}</td><td class="t-team"><img src="${t.team.crest}">${t.team.shortName}</td><td>${t.playedGames}</td><td class="t-pts">${t.points}</td></tr>`).join('')}</tbody></table>`;
        }

        async function loadPlayers() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="stl"><h2>👟 선수 랭킹</h2></div><div class="picker">` + 
                LEAGUES.map(l => `<button class="p-btn ${l.c===curLg?'on':''}" onclick="curLg='${l.c}';loadPlayers()">${l.n}</button>`).join('') + 
                `</div><div style="display:flex; gap:10px; margin-bottom:20px;"><button class="p-btn ${curStat==='scorers'?'on':''}" onclick="curStat='scorers';loadPlayers()">득점</button><button class="p-btn ${curStat==='assists'?'on':''}" onclick="curStat='assists';loadPlayers()">도움</button></div><div id="player-body"></div>`;
            const d = await fd(`/competitions/${curLg}/scorers`);
            const scorers = d?.scorers || [];
            document.getElementById('player-body').innerHTML = `<table class="data-table"><thead><tr><th>#</th><th>선수</th><th>기록</th></tr></thead><tbody>${scorers.map((s,i)=>`<tr><td class="t-rank ${i<3?'top':''}">${i+1}</td><td><div style="font-weight:900;">${s.player.name}</div><div style="font-size:11px; color:var(--text-dim);">${s.team.name}</div></td><td class="t-pts">${s.goals}</td></tr>`).join('')}</tbody></table>`;
        }

        function loadAIPitch() {
            document.getElementById('main-content').innerHTML = `
                <div class="stl"><h2>🧠 AI PITCH 전술 리포트</h2></div>
                <div class="ai-pitch-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="text-align:center;"><img src="https://crests.football-data.org/65.png" style="width:65px;"><div style="font-weight:900; margin-top:10px;">MAN CITY</div></div>
                        <div style="font-size:32px; font-weight:950; color:var(--p);">VS</div>
                        <div style="text-align:center;"><img src="https://crests.football-data.org/57.png" style="width:65px;"><div style="font-weight:900; margin-top:10px;">ARSENAL</div></div>
                    </div>
                    <div class="ai-heatmap-wrap">
                        <div class="ai-field-lines"></div>
                        <div class="ai-heat" style="width:100px; height:100px; background:var(--p); left:20%; top:30%;"></div>
                        <div class="ai-heat" style="width:80px; height:80px; background:var(--red); right:25%; bottom:20%;"></div>
                        <span>TACTICAL HEATMAP</span>
                    </div>
                    <p style="line-height:1.8; color:rgba(255,255,255,0.85); font-size:14px; background:rgba(255,255,255,0.03); padding:24px; border-radius:20px;">AI 전술 분석: 맨시티는 로드리를 기점으로 한 <b>3-2-4-1 인버티드 빌드업</b>을 구사하며 중앙 지역에서 74%의 패스 성공률을 기록할 것으로 예측됩니다. 아스날은 살리바를 축으로 한 지역 방어와 빠른 역습 전개가 승부의 관건입니다.</p>
                    <div class="ai-tactic-grid">
                        <div class="ai-tactic-item"><h4>🎯 공격 루트</h4>오른쪽 윙백의 오버래핑을 통한 크로스 성공률 68% 예상</div>
                        <div class="ai-tactic-item"><h4>🛡️ 수비 저지선</h4>중앙 미드필더진의 가로채기 횟수가 평소보다 15% 높게 측정됨</div>
                    </div>
                    <div style="margin-top:32px;">
                        <div style="display:flex; justify-content:space-between; font-weight:900; font-size:12px; margin-bottom:12px;"><span>WIN PROBABILITY</span><span>HOME 58% | DRAW 22% | AWAY 20%</span></div>
                        <div class="ai-prob-bar"><div class="ai-prob-fill" style="width:58%; background:var(--p);"></div><div class="ai-prob-fill" style="width:22%; background:var(--amber);"></div><div class="ai-prob-fill" style="width:20%; background:var(--red);"></div></div>
                    </div>
                </div>`;
        }

        async function loadFanZone() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="stl"><h2>⭐ FAN ZONE 서포터즈</h2></div>
                <div class="ai-pitch-card" style="text-align:center; padding:50px; border-style: dashed;">
                    <div style="font-size:60px; margin-bottom:20px;">🥇</div>
                    <h3 style="font-size:24px; font-weight:950; color:var(--p);">Level: Pro Supporter</h3>
                    <p style="color:var(--text-dim); margin-top:10px;">총 42회의 인증을 완료했습니다. 8회 더 인증하면 Expert 등급으로 상승합니다.</p>
                </div>
                <div class="stl" style="margin-top:40px;"><h2>📅 마이팀 다음 일정</h2></div><div id="fan-team-list"></div>`;
            if(SEL.length) {
                const list = document.getElementById('fan-team-list');
                const d = await fd(`/teams/${SEL[0].id}/matches?status=SCHEDULED&limit=5`);
                list.innerHTML = (d?.matches?.length) ? d.matches.map(m => renderMC(m)).join('') : `<div class="mc" style="text-align:center;">예정된 경기가 없습니다.</div>`;
            }
        }

        function renderMC(m, live=false) {
            const h = m.homeTeam, a = m.awayTeam;
            const date = new Date(m.utcDate);
            return `<div class="mc fade-in">
                <div class="mc-body">
                    <div class="m-team"><img src="${getCrest(h)}"><div class="m-name">${h.shortName || h.name}</div></div>
                    <div class="m-score ${live?'live':''}">${m.score.fullTime.home??'-'} : ${m.score.fullTime.away??'-'}</div>
                    <div class="m-team"><img src="${getCrest(a)}"><div class="m-name">${a.shortName || a.name}</div></div>
                </div>
                <div class="m-meta"><span>${m.competition.name}</span><span style="color:var(--p)">${live?'LIVE':date.getMonth()+1+'/'+date.getDate()+' '+date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false})}</span></div>
            </div>`;
        }

        // --- 초기화 및 테마 ---
        function initOb() {
            const tabs = document.getElementById('ob-tabs');
            tabs.innerHTML = LEAGUES.map(l => `<button class="p-btn ${l.c===obLg?'on':''}" onclick="obLg='${l.c}';initOb()">${l.n}</button>`).join('');
            const grid = document.getElementById('ob-grid');
            const lg = (obLg === 'PL') ? PL_TEAMS : (obLg === 'PD' ? PD_TEAMS : []);
            grid.innerHTML = (lg.length ? lg : []).map(t => `<div class="ob-team ${SEL.find(s=>s.id===t.id)?'sel':''}" onclick="toggleObTeam(${t.id}, '${obLg}')"><img class="ob-crest" src="${getCrest(t)}"><div class="ob-nm">${t.ko}</div></div>`).join('');
            const btn = document.getElementById('ob-start');
            btn.disabled = !SEL.length;
            btn.textContent = SEL.length ? `${SEL.map(s=>s.ko).join(' & ')} START →` : 'CHOOSE YOUR TEAM';
        }

        function toggleObTeam(id, lgCode) {
            const list = (lgCode==='PL')?PL_TEAMS:PD_TEAMS;
            const team = list.find(x=>x.id===id);
            const idx = SEL.findIndex(s=>s.id===id);
            if(idx > -1) SEL.splice(idx,1); else if(SEL.length < 2) SEL.push(team);
            initOb();
        }

        function startApp() {
            localStorage.setItem('pi_sel', JSON.stringify(SEL));
            document.getElementById('ob').style.display = 'none';
            document.getElementById('app').classList.add('on');
            updateTheme();
            swPage('home');
            loadMiniStd();
        }

        function updateTheme() {
            if(!SEL.length) return;
            const c = SEL[0].col || '#10b981';
            const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
            document.documentElement.style.setProperty('--p', c);
            document.documentElement.style.setProperty('--ps', `rgba(${r},${g},${b},0.12)`);
            document.documentElement.style.setProperty('--pb', `rgba(${r},${g},${b},0.3)`);
            document.getElementById('header-team').innerHTML = SEL.map(t => `<img src="${getCrest(t)}"><span>${t.ko}</span>`).join('');
            document.getElementById('sidebar-logo').classList.add('metallic');
        }

        function resetApp() { if(confirm('팀을 다시 선택하시겠습니까?')) { localStorage.removeItem('pi_sel'); location.reload(); } }

        async function loadMiniStd() {
            const d = await fd('/competitions/PL/standings');
            const table = (d?.standings?.[0]?.table || []).slice(0, 5);
            document.getElementById('mini-std').innerHTML = table.map(t => `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:12.5px;"><span><b style="color:var(--text-dim); margin-right:8px;">${t.position}</b> ${t.team.shortName}</span><span style="font-weight:900; color:var(--p);">${t.points}p</span></div>`).join('');
        }

        window.onload = () => { if(SEL.length) startApp(); else { document.getElementById('ob').style.display='block'; initOb(); } };
    </script>
</body>
</html>
