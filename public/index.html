<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH IN</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2305070a'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%2310b981' stroke-width='3'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='Arial Black' font-weight='900' font-size='24' fill='%2310b981'%3EP%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --p:#10b981; --p2:#059669; --ps:rgba(16,185,129,.12); --pb:rgba(16,185,129,.3);
  --bg:#05070a; --bg2:#0d1117; --bg3:#161b22; --cd:rgba(20,26,34,.97);
  --t:#f0f6fc; --t2:#8b949e; --t3:#30363d;
  --red:#ef4444; --am:#f59e0b; --blue:#3b82f6; --purp:#a855f7;
  --sh:0 16px 40px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--t);overflow:hidden;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--t3);border-radius:2px;}

/* ═══ ONBOARDING ═══ */
#ob{position:fixed;inset:0;background:var(--bg);z-index:9999;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.ob-wrap{max-width:1100px;margin:0 auto;padding:48px 20px 120px;}
.ob-hero{text-align:center;margin-bottom:36px;}
.ob-title{
  font-size:56px;font-weight:900;letter-spacing:-3px;
  background:linear-gradient(135deg,var(--p),#34d399,#3b82f6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:10px;
}
.ob-sub{font-size:15px;color:var(--t2);}
.ob-sub b{color:var(--p);}
.ob-sel-cnt{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--t3);
  border-radius:100px;padding:8px 20px;margin-top:14px;
  font-size:13px;color:var(--t2);
}
.ob-sel-cnt .n{color:var(--p);font-weight:900;font-size:16px;}

/* League tabs */
.ob-tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:24px;}
.ob-tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  flex-shrink:0;background:var(--bg3);color:var(--t2);
  border:1.5px solid var(--t3);padding:10px 22px;
  border-radius:100px;cursor:pointer;font-weight:700;
  font-size:13px;white-space:nowrap;transition:.2s;
  font-family:'Poppins',sans-serif;
  display:flex;align-items:center;gap:8px;
}
.tab-btn img{width:18px;height:18px;object-fit:contain;border-radius:3px;}
.tab-btn.on{background:var(--p);color:#000;border-color:var(--p);box-shadow:0 0 20px rgba(16,185,129,.25);}

/* Team grid */
.ob-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
@media(max-width:500px){
  .ob-grid {
    grid-template-columns: repeat(3, 1fr); /* 4열에서 3열로 변경 */
    gap: 12px;
  }
  .ob-team span {
    font-size: 12px; /* 텍스트 크기 살짝 키움 */
    white-space: normal; /* 긴 이름은 두 줄로 표시되도록 */
    line-height: 1.2;
  }
}
.ob-team:hover{border-color:rgba(16,185,129,.4);transform:translateY(-2px);}
.ob-team.sel{border-color:var(--p);background:var(--ps);transform:translateY(-4px);box-shadow:0 8px 24px rgba(16,185,129,.2);}
.ob-team.sel .ob-chk{opacity:1;transform:scale(1);}
.ob-chk{
  position:absolute;top:7px;right:7px;
  width:20px;height:20px;border-radius:50%;
  background:var(--p);color:#000;
  font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(0);transition:.2s;
}
.ob-crest{
  width:52px;height:52px;margin:0 auto 10px;
  display:flex;align-items:center;justify-content:center;
}
.ob-crest img{width:52px;height:52px;object-fit:contain;}
.ob-team span{font-size:11px;font-weight:700;color:var(--t2);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ob-team.sel span{color:var(--p);}

/* Start button */
.ob-footer{
  position:sticky;bottom:0;padding:24px 0 0;
  background:linear-gradient(to top,var(--bg) 70%,transparent);
  text-align:center;
}
.btn-start{
  background:linear-gradient(135deg,var(--p),var(--p2));
  color:#000;padding:18px 56px;border-radius:100px;
  font-weight:900;font-size:17px;cursor:pointer;border:none;
  box-shadow:0 8px 32px rgba(16,185,129,.4);
  font-family:'Poppins',sans-serif;transition:.2s;letter-spacing:.5px;
}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(16,185,129,.5);}
.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ═══ APP ═══ */
#app{display:none;height:100vh;height:100dvh;flex-direction:column;}
#app.on{display:flex;}

/* Header */
.hdr{
  height:64px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;
  background:rgba(13,17,23,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--t3);z-index:100;
}
.hdr-logo{
  font-size:22px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,var(--p),#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  cursor:pointer;
}
.hdr-r{display:flex;align-items:center;gap:10px;}
.hdr-team{display:flex;align-items:center;gap:6px;background:var(--ps);border:1px solid var(--pb);border-radius:100px;padding:5px 12px 5px 5px;}
.hdr-team img{width:22px;height:22px;object-fit:contain;border-radius:50%;}
.hdr-team span{font-size:12px;font-weight:700;color:var(--p);}
.live-pill{display:none;align-items:center;gap:6px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:100px;padding:5px 12px;}
.live-pill.on{display:flex;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.1s infinite;}
.live-pill span{font-size:11px;font-weight:800;color:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lv-badge{font-size:11px;font-weight:800;color:var(--p);background:var(--ps);border:1px solid var(--pb);border-radius:100px;padding:5px 14px;}

/* Main body */
.main-body{flex:1;display:flex;overflow:hidden;min-height:0;}

/* Sidebar */
.sidebar{
  width:240px;flex-shrink:0;
  background:#080a0f;border-right:1px solid var(--t3);
  padding:20px 12px;display:none;flex-direction:column;gap:3px;
}
@media(min-width:768px){.sidebar{display:flex;}}
.si{
  display:flex;align-items:center;gap:13px;
  padding:13px 16px;border-radius:12px;
  cursor:pointer;color:var(--t2);font-weight:700;
  font-size:14px;transition:.15s;border:1px solid transparent;
}
.si:hover{background:var(--bg3);color:var(--t);}
.si.on{background:var(--ps);color:var(--p);border-color:var(--pb);}
.si-ic{font-size:17px;width:22px;text-align:center;}

/* Pages */
.pages{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:32px;}
.page.on{display:block;animation:fu .2s ease;}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:767px){
  .page {
    padding: 20px 16px 100px; /* 세 번째 값(하단 여백)을 80px에서 100px로 늘림 */
  }
}

/* Mobile bottom nav */
display: none;
  position: fixed; /* 추가: 화면 하단에 고정 */
  bottom: 0;      /* 추가 */
  left: 0;        /* 추가 */
  right: 0;       /* 추가 */
  flex-shrink: 0;
  background: rgba(13, 17, 23, 0.97);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--t3);
  padding-bottom: env(safe-area-inset-bottom, 0);
  height: calc(65px + env(safe-area-inset-bottom, 0)); /* 높이 약간 조절 */
  z-index: 1000;  /* 추가: 다른 요소보다 위에 오도록 */
}

/* PC optimization */
@media(min-width:1200px){
  .pages{padding:0;}
  .page{padding:36px 40px;}
  .ob-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
}
@media(min-width:768px) and (max-width:1199px){
  .sidebar{width:200px;}
  .page{padding:24px;}
}
/* Tablet */
@media(max-width:900px){
  .ob-grid{grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:8px;}
  .ob-crest img{width:42px;height:42px;}
}
/* Mobile */
@media(max-width:480px){
  .ob-grid{grid-template-columns:repeat(4,1fr);gap:7px;}
  .ob-crest img{width:38px;height:38px;}
  .ob-team span{font-size:10px;}
  .mc-sc{padding:8px 12px;font-size:22px;}
  .hdr{padding:0 16px;}
  .hdr-logo{font-size:18px;}
}

/* Section title */
.stl{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.stl h2{font-size:20px;font-weight:800;color:var(--t);}
.stl::before{content:'';width:4px;height:20px;background:linear-gradient(var(--p),var(--blue));border-radius:2px;flex-shrink:0;}
.sub-badge{font-size:11px;color:var(--t2);background:var(--bg3);border:1px solid var(--t3);padding:3px 12px;border-radius:100px;margin-left:auto;}

/* Match card */
.mc{background:var(--cd);border:1px solid var(--t3);border-radius:20px;margin-bottom:14px;overflow:hidden;transition:.2s;cursor:pointer;}
.mc:hover{border-color:var(--pb);transform:translateY(-2px);box-shadow:0 20px 48px rgba(0,0,0,.7);}
.mc.live-card{border-color:rgba(239,68,68,.35);}
.mc.my-match{border-color:var(--pb);border-width:2px;}
.mc-hdr{padding:10px 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.02);border-bottom:1px solid var(--t3);}
.mc-lg{font-size:11px;font-weight:700;color:var(--t2);}
.mc-hdr-r{display:flex;align-items:center;gap:8px;}
.mc-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;padding:4px 12px;border-radius:100px;}
.mc-badge.live{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.mc-badge.fin{background:var(--bg3);color:var(--t2);}
.mc-badge.sch{background:var(--ps);color:var(--p);border:1px solid var(--pb);}
.mc-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse .9s infinite;flex-shrink:0;}
.notif-btn{padding:3px 9px;border-radius:7px;border:1px solid var(--t3);background:transparent;font-size:10px;color:var(--t2);cursor:pointer;font-family:'Poppins',sans-serif;}
.notif-btn.on{background:var(--ps);border-color:var(--pb);color:var(--p);}
.mc-body{padding:20px;}
.mc-row{display:flex;align-items:center;gap:10px;}
.mc-team{flex:1;display:flex;align-items:center;gap:9px;min-width:0;}
.mc-team.away{flex-direction:row-reverse;}
.mc-cr{width:32px;height:32px;object-fit:contain;flex-shrink:0;}
.mc-nm{font-size:14px;font-weight:800;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mc-team.away .mc-nm{text-align:right;}
.mc-sc{background:#000;padding:10px 18px;border-radius:12px;border:1px solid var(--pb);flex-shrink:0;font-size:28px;font-weight:900;color:var(--t);letter-spacing:3px;}
.mc-sc.live-sc{color:var(--p);border-color:var(--p);box-shadow:0 0 20px rgba(16,185,129,.15);}
.mc-vs{font-size:24px;font-weight:900;color:var(--t3);flex-shrink:0;}
.mc-goals{padding:7px 20px 12px;display:flex;justify-content:space-between;border-top:1px solid var(--t3);}
.goal-side{display:flex;flex-direction:column;gap:2px;flex:1;}
.goal-side.right{align-items:flex-end;}
.gi{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:4px;}
.gi .gm{font-size:10px;font-weight:800;color:var(--p);}
.mc-mom{padding:9px 20px 13px;border-top:1px solid var(--t3);}
.mom-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--t2);margin-bottom:5px;}
.mom-bar{height:5px;background:var(--t3);border-radius:3px;display:flex;overflow:hidden;gap:1px;}
.ms{height:100%;flex:1;border-radius:2px;}
.ms.h{background:var(--p);}.ms.a{background:var(--red);}.ms.n{background:var(--bg3);}
.odds-row{display:flex;gap:8px;padding:9px 20px;border-top:1px solid var(--t3);}
.obtn{flex:1;background:var(--bg3);border:1px solid var(--t3);border-radius:10px;padding:9px 4px;text-align:center;}
.olbl{font-size:10px;color:var(--t2);margin-bottom:3px;font-weight:700;}
.oval{font-size:14px;font-weight:900;color:var(--t);}
.oval.fav{color:var(--p);}

/* Schedule */
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.date-arr{background:var(--bg3);border:1px solid var(--t3);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:18px;flex-shrink:0;transition:.15s;border:none;}
.date-arr:hover{border-color:var(--pb);color:var(--p);}
.days-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:1;}
.days-strip::-webkit-scrollbar{display:none;}
.day-card{flex-shrink:0;background:var(--bg3);border:1.5px solid var(--t3);border-radius:12px;padding:7px 12px;cursor:pointer;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;color:var(--t2);line-height:1.5;text-align:center;transition:.15s;min-width:48px;}
.day-card span{display:block;font-size:13px;font-weight:800;color:var(--t);}
.day-card.on{background:var(--ps);border-color:var(--pb);color:var(--p);}
.day-card.on span{color:var(--p);}
.day-card.today{font-weight:900;}
.month-ctrl{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--t3);border-radius:12px;padding:6px 14px;}
.month-ctrl span{font-size:14px;font-weight:800;color:var(--t);white-space:nowrap;}

/* League group */
.lg-grp{margin-bottom:12px;}
.lg-hd{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--bg3);border-radius:12px;cursor:pointer;margin-bottom:6px;border:1px solid var(--t3);transition:.15s;}
.lg-hd:hover{border-color:var(--pb);}
.lg-hd img{width:18px;height:18px;object-fit:contain;}
.lg-nm{font-size:13px;font-weight:800;color:var(--t);flex:1;}
.lg-cnt{font-size:11px;color:var(--t2);background:var(--bg2);padding:2px 9px;border-radius:100px;}
.lg-arr{font-size:11px;color:var(--t2);transition:transform .2s;}
.lg-arr.cl{transform:rotate(-90deg);}
.lg-ms{display:flex;flex-direction:column;border-radius:12px;border:1px solid var(--t3);overflow:hidden;}
.sm{background:var(--bg3);padding:11px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;border-bottom:1px solid var(--t3);}
.sm:last-child{border-bottom:none;}
.sm:hover{background:var(--bg2);}
.sm-time{font-size:13px;font-weight:800;width:40px;text-align:center;flex-shrink:0;}
.sm-teams{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;}
.sm-team{display:flex;align-items:center;gap:7px;}
.sm-cr{width:14px;height:14px;object-fit:contain;}
.sm-nm{font-size:12px;font-weight:700;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.sm-nm.win{color:var(--t);font-weight:900;}
.sm-sc{font-size:13px;font-weight:900;width:16px;text-align:right;}

/* Standings */
.std-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg3);border-radius:14px;margin-bottom:14px;border:1px solid var(--t3);}
.std-hdr img{width:28px;height:28px;object-fit:contain;}
.std-hdr h3{font-size:16px;font-weight:800;color:var(--t);}
.std-hdr small{color:var(--t2);font-size:12px;margin-left:auto;}
.stt{width:100%;border-collapse:separate;border-spacing:0 5px;}
.stt th{padding:9px 10px;color:var(--t2);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.stt th:nth-child(2){text-align:left;}
.stt td{padding:13px 10px;background:var(--bg3);text-align:center;font-size:13px;font-weight:700;}
.stt td:first-child{border-radius:11px 0 0 11px;}
.stt td:last-child{border-radius:0 11px 11px 0;}
.stt td:nth-child(2){text-align:left;}
.stt tr.my td{background:rgba(16,185,129,.07);}
.nm-cell{display:flex;align-items:center;gap:9px;}
.nm-cell img{width:22px;height:22px;object-fit:contain;}
.pts{color:var(--p)!important;font-size:15px!important;font-weight:900!important;}
.sp{font-weight:900;font-size:14px;}
.sp.top{color:var(--p);}.sp.rel{color:var(--am);}.sp.bot{color:var(--red);}
.cl-r td:first-child{border-left:3px solid var(--blue);}
.el-r td:first-child{border-left:3px solid var(--am);}
.rg-r td:first-child{border-left:3px solid var(--red);}
.sform{display:flex;gap:3px;}
.sfd{width:8px;height:8px;border-radius:50%;}

/* Players */
.pc{background:var(--bg3);border:1px solid var(--t3);border-radius:15px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:.2s;}
.pc:hover{border-color:var(--pb);}
.pc.me{background:var(--ps);border-color:var(--pb);}
.pc-rk{font-size:20px;font-weight:900;color:var(--t2);width:28px;text-align:center;}
.pc-rk.top{color:var(--p);}
.pc-info{flex:1;min-width:0;}
.pc-name{font-size:14px;font-weight:800;color:var(--t);margin-bottom:2px;}
.pc-team{font-size:12px;color:var(--t2);}
.pc-val{font-size:26px;font-weight:900;color:var(--p);}
.pc-lbl{font-size:10px;color:var(--t2);font-weight:700;text-align:right;}

/* AI PITCH */
.ai-card{background:var(--cd);border:1px solid var(--pb);border-radius:20px;padding:22px;margin-bottom:14px;}
.ai-match-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ai-badge{font-size:10px;font-weight:800;color:var(--blue);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);padding:4px 12px;border-radius:100px;}
.ai-teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ai-team{flex:1;text-align:center;}
.ai-team img{width:40px;height:40px;object-fit:contain;margin-bottom:8px;}
.ai-team-nm{font-size:14px;font-weight:800;color:var(--t);}
.ai-vs{font-size:20px;font-weight:900;color:var(--t3);}
.prob-bar{height:10px;background:rgba(255,255,255,.06);border-radius:100px;margin:12px 0 8px;overflow:hidden;display:flex;gap:2px;}
.prob-h{background:var(--p);border-radius:100px 0 0 100px;}
.prob-d{background:var(--am);}
.prob-a{background:var(--red);border-radius:0 100px 100px 0;}
.prob-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);}
.ai-lineup{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--t3);}
.ai-lineup-hd{font-size:11px;font-weight:800;color:var(--t2);margin-bottom:8px;}
.ai-player{font-size:12px;color:var(--t);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.ai-player span{color:var(--t2);}
.ai-insight{margin-top:14px;padding-top:14px;border-top:1px solid var(--t3);font-size:13px;color:var(--t2);line-height:1.7;}
.ai-insight b{color:var(--p);}

/* Fan zone */
.fz-hero{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--pb);border-radius:22px;padding:26px;text-align:center;margin-bottom:20px;box-shadow:0 0 40px rgba(16,185,129,.08);}
.fz-em{font-size:50px;margin-bottom:8px;}
.fz-lv{font-size:26px;font-weight:900;color:var(--p);margin-bottom:4px;}

// Rate-limit safe request (serialized)
let _fdQ = Promise.resolve();
let _fdLast = 0;
const FD_GAP = 800; // 800ms gap

async function fd(path, ttl=90000) {
  const c = gc(path, ttl);
  if (c) return c;
  // Serialize
  const result = await (_fdQ = _fdQ.then(async () => {
    const wait = _fdLast + FD_GAP - Date.now();
    if (wait > 0) await new Promise(r=>setTimeout(r,wait));
    _fdLast = Date.now();
    try {
      const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`, {signal:AbortSignal.timeout(12000)});
      if (!r.ok) return null;
      const d = await r.json();
      if (d.errorCode === 429 || (d.message && d.message.toLowerCase().includes('limit'))) {
        console.warn('Rate limit - waiting 12s:', path);
        await new Promise(r=>setTimeout(r,12000));
        // Retry once
        const r2 = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`, {signal:AbortSignal.timeout(12000)});
        const d2 = await r2.json();
        if (!d2.errorCode) sc(path, d2);
        return d2;
      }
      if (d.errorCode || d.error) return d;
      sc(path, d);
      return d;
    } catch(e) { return null; }
  }));
  return result;
}
async function kl(path,params={}){
  const qs=new URLSearchParams(params).toString();
  const key=path+'?'+qs;const c=gc(key,120000);if(c)return c;
  try{
    const r=await fetch(`${API}?type=kl&path=${encodeURIComponent(path)}&${qs}`,{signal:AbortSignal.timeout(10000)});
    if(!r.ok)return null;
    const d=await r.json();
    if(d.errors&&Object.keys(d.errors).length)return null;
    sc(key,d);return d;
  }catch(e){return null;}
}

function pushNotif(title, body, tag='p') {
  if (Notification.permission !== 'granted') return;
  // Show via SW (works in background)
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({
      type: 'show-notification',
      title, body, tag,
      icon: '/favicon.ico',
      vibrate: [200, 100, 200]
    });
  } else {
    // fallback: direct notification
    try { new Notification(title, {body, icon:'/favicon.ico', tag, silent:false}); } catch(e) {}
  }
}
async function reqNotif(){if(!('Notification'in window))return false;if(Notification.permission==='granted')return true;if(Notification.permission==='denied')return false;return(await Notification.requestPermission())==='granted';}

function lightenColor(hex, amt) {

function playGoalSfx(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,.12],[659,.12],[784,.12],[1047,.25],[784,.08],[1047,.42]].reduce((t,[f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='triangle';
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.38,t+.03);g.gain.linearRampToValueAtTime(0,t+d-.02);
      o.start(t);o.stop(t+d);return t+d;
    },ctx.currentTime+.05);
    // cheers
    const buf=ctx.createBuffer(1,ctx.sampleRate*.7,ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.065;
    const ns=ctx.createBufferSource();ns.buffer=buf;
    const ng=ctx.createGain();ns.connect(ng);ng.connect(ctx.destination);
    ng.gain.setValueAtTime(.18,ctx.currentTime+.52);ng.gain.linearRampToValueAtTime(0,ctx.currentTime+1.4);
    ns.start(ctx.currentTime+.52);
  }catch(e){}
}

  document.getElementById('gt-scorer').textContent=scorer?`⚽ ${scorer}`:'';
  document.getElementById('gt-info').textContent=(hn&&an)?`${hn}  ${hg} : ${ag}  ${an}${min?' • '+min+"'":""}`:team||'';
  const el=document.getElementById('gt');el.classList.add('on');

// Track previous event state
const prevEvents = {};

function chkGoal(m) {
  const id = m.id;
  const hg = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? 0;
  const ag = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? 0;
  const sc2 = `${hg}:${ag}`;
  const hn = m.homeTeam?.shortName || m.homeTeam?.name || '';
  const an = m.awayTeam?.shortName || m.awayTeam?.name || '';

  // Goal detection
  if (prevSc[id] !== undefined && prevSc[id] !== sc2) {
    const isH = parseInt(hg) > parseInt((prevSc[id]||'0').split(':')[0]);
    const team = isH ? hn : an;
    const goals = m.goals || [];
    const last = goals[goals.length-1];
    const scorer = last?.scorer?.name || last?.player?.name || '';
    const min = last?.minute;
    showGoal(scorer, team, min, hn, an, hg, ag);
    // Push notification (Goal)
    sendEventNotif('goal', id, {team, hn, an, hg, ag, scorer, min});
  }
  prevSc[id] = sc2;

  // Kick-off detection
  if (!prevEvents[id]) prevEvents[id] = {};
  const pe = prevEvents[id];
  if (!pe.status) {
    pe.status = m.status;
  } else if (pe.status !== m.status) {
    if (m.status === 'IN_PLAY' && pe.status === 'SCHEDULED') sendEventNotif('kickoff', id, {hn, an});
    if (m.status === 'HALFTIME') sendEventNotif('halftime', id, {hn, an, hg, ag});
    if (m.status === 'FINISHED' || m.status === 'AWARDED') sendEventNotif('fulltime', id, {hn, an, hg, ag});
    pe.status = m.status;
  }
}

function mkMC(m,type){
  const h=m.homeTeam,a=m.awayTeam;
  const live=type==='live',fin=type==='fin';
  const hg=m.score?.fullTime?.home??m.score?.halfTime?.home;

  const hW=fin&&hg!=null&&ag!=null&&hg>ag,aW=fin&&hg!=null&&ag!=null&&ag>hg;

  if(live){if(m.status==='HALFTIME')tl='HT';else{const e=Math.floor((Date.now()-new Date(m.utcDate).getTime())/60000);tl=e>0&&e<=95?`${Math.min(e,90)}'`:'Live';}}
  const goals=m.goals||[],hG=goals.filter(g=>g.team?.id===h?.id),aG=goals.filter(g=>g.team?.id===a?.id);
  const isMe=SEL.some(t=>h?.id===t.id||a?.id===t.id);
  const isW=watchList.includes(String(m.id));

function renderMonthDays(){

  strip.innerHTML='';
  for(let i=1;i<=last;i++){
    const d=new Date(yr,mo,i);
    const ds2=`${yr}-${String(mo+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];

      <div class="prob-bar">
        <div class="prob-h" style="width:${hw}%"></div>
        <div class="prob-d" style="width:${dr}%"></div>
        <div class="prob-a" style="width:${aw}%"></div>
      </div>
      <div class="prob-lbl">
        <span>Home Win <b style="color:var(--p)">${hw}%</b></span>
        <span>Draw <b style="color:var(--am)">${dr}%</b></span>
        <span>Away Win <b style="color:var(--red)">${aw}%</b></span>
      </div>
      <div class="ai-lineup">
        <div>
          <div class="ai-lineup-hd">⚙️ ${hn} Tactic: ${fmH}</div>
          ${kpH.map(k=>`<div class="ai-player">• ${k}</div>`).join('')}
        </div>
        <div>
          <div class="ai-lineup-hd">⚙️ ${an} Tactic: ${fmA}</div>
          ${kpA.map(k=>`<div class="ai-player">• ${k}</div>`).join('')}
        </div>
      </div>
      <div class="ai-insight">
        🔍 <b>AI Analysis:</b> ${hn} recorded ${Math.round(rv(seed,6)*3)+2} consecutive home wins. ${an} typically plays ${fmA} tactics away from home. The key factor is scoring first. The team that scores first wins ${Math.round(70+rv(seed,7)*20)}% of the time.
      </div>
    </div>`;
  }).join('');
}

// ── MATCH DETAIL ──
async function opnDtl(id,hn,an,isKLMatch){
  document.getElementById('dtl-ttl').textContent=`${hn} vs ${an}`;
  document.getElementById('dtl-body').innerHTML=`<div class="ldr"><div class="spin"></div></div>`;
  document.getElementById('dtl-modal').classList.add('on');
  if(isKLMatch){await opnDtlKL(id,hn,an);return;}
  const m=await fd(`/matches/${id}`,60000);
  if(!m||m.error){document.getElementById('dtl-body').innerHTML=`<div class="empty">No data available</div>`;return;}
  const h=m.homeTeam,a=m.awayTeam;
  const hg=m.score?.fullTime?.home??m.score?.halfTime?.home??'–';
  const ag=m.score?.fullTime?.away??m.score?.halfTime?.away??'–';
  const goals=m.goals||[],hG=goals.filter(g=>g.team?.id===h?.id),aG=goals.filter(g=>g.team?.id===a?.id);
  const od=ods(m);
  document.getElementById('dtl-body').innerHTML=`
    <div style="text-align:center;padding:14px 0;border-bottom:1px solid var(--t3);margin-bottom:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="flex:1;text-align:center;"><img src="${h?.crest||crestUrl(h)}" style="width:44px;height:44px;object-fit:contain;" onerror="this.style.opacity='.2'"><br><span style="font-size:12px;font-weight:800;">${h?.name||''}</span></div>
        <div style="font-size:34px;font-weight:900;">${hg} : ${ag}</div>
        <div style="flex:1;text-align:center;"><img src="${a?.crest||crestUrl(a)}" style="width:44px;height:44px;object-fit:contain;" onerror="this.style.opacity='.2'"><br><span style="font-size:12px;font-weight:800;">${a?.name||''}</span></div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;">
        ${m.utcDate?`<span style="font-size:11px;background:var(--bg2);border:1px solid var(--t3);padding:3px 10px;border-radius:100px;color:var(--t2);">📅 ${kd(m.utcDate)} ${kt(m.utcDate)} KST</span>`:''}
        ${m.venue?`<span style="font-size:11px;background:var(--bg2);border:1px solid var(--t3);padding:3px 10px;border-radius:100px;color:var(--t2);">🏟️ ${m.venue}</span>`:''}
        ${m.referees?.[0]?`<span style="font-size:11px;background:var(--bg2);border:1px solid var(--t3);padding:3px 10px;border-radius:100px;color:var(--t2);">👔 ${m.referees[0].name}</span>`:''}
      </div>
    </div>
    ${goals.length?`<div style="margin-bottom:16px;"><div style="font-size:11px;font-weight:800;color:var(--t2);margin-bottom:9px;">⚽ Goals</div>
      <div style="display:flex;gap:10px;"><div style="flex:1;">${hG.map(g=>`<div style="font-size:12px;color:var(--t2);margin-bottom:4px;"><span style="font-weight:800;color:var(--p);">${g.minute}'</span> ${(g.scorer?.name||g.player?.name||'').split(' ').pop()}</div>`).join('')}</div>
      <div style="flex:1;text-align:right;">${aG.map(g=>`<div style="font-size:12px;color:var(--t2);margin-bottom:4px;">${(g.scorer?.name||g.player?.name||'').split(' ').pop()} <span style="font-weight:800;color:var(--p);">${g.minute}'</span></div>`).join('')}</div></div></div>`:''}
    <div><div style="font-size:11px;font-weight:800;color:var(--t2);margin-bottom:9px;">📊 Odds</div>
      <div class="odds-row" style="padding:0;border:none;">
        <div class="obtn"><div class="olbl">${hn}</div><div class="oval ${parseFloat(od.hw)<2.5?'fav':''}">${od.hw}</div></div>
        <div class="obtn"><div class="olbl">Draw</div><div class="oval">${od.dr}</div></div>
        <div class="obtn"><div class="olbl">${an}</div><div class="oval ${parseFloat(od.aw)<2.5?'fav':''}">${od.aw}</div></div>
      </div>
    </div>`;
}
async function opnDtlKL(id,hn,an){
  const d=await kl('/fixtures',{id});
  const f=d?.response?.[0];
  if(!f){document.getElementById('dtl-body').innerHTML=`<div class="empty">No data available</div>`;return;}
  const h=f.teams.home,a=f.teams.away,hg=f.goals.home??'–',ag=f.goals.away??'–';
  const goals=(f.events||[]).filter(e=>e.type==='Goal');
  const hG=goals.filter(g=>g.team.id===h.id),aG=goals.filter(g=>g.team.id===a.id);
  const stats=f.statistics||[],hS=stats[0]?.statistics||[],aS=stats[1]?.statistics||[];
  const sk=[['Shots on Goal','Shots on Target'],['Ball Possession','Possession'],['Total passes','Passes'],['Fouls','Fouls'],['Yellow Cards','Yellow Cards']];
  document.getElementById('dtl-body').innerHTML=`
    <div style="text-align:center;padding:14px 0;border-bottom:1px solid var(--t3);margin-bottom:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="flex:1;text-align:center;"><img src="${h.logo}" style="width:44px;height:44px;object-fit:contain;" onerror="this.style.opacity='.2'"><br><span style="font-size:12px;font-weight:800;">${h.name}</span></div>
        <div style="font-size:34px;font-weight:900;">${hg} : ${ag}</div>
        <div style="flex:1;text-align:center;"><img src="${a.logo}" style="width:44px;height:44px;object-fit:contain;" onerror="this.style.opacity='.2'"><br><span style="font-size:12px;font-weight:800;">${a.name}</span></div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;">
        ${f.fixture.venue?.name?`<span style="font-size:11px;background:var(--bg2);border:1px solid var(--t3);padding:3px 10px;border-radius:100px;color:var(--t2);">🏟️ ${f.fixture.venue.name}</span>`:''}
        ${f.fixture.referee?`<span style="font-size:11px;background:var(--bg2);border:1px solid var(--t3);padding:3px 10px;border-radius:100px;color:var(--t2);">👔 ${f.fixture.referee}</span>`:''}
        <span style="font-size:11px;background:var(--bg2);border:1px solid var(--t3);padding:3px 10px;border-radius:100px;color:var(--t2);">⏰ ${kt(f.fixture.date)} KST</span>
      </div>
    </div>
    ${goals.length?`<div style="margin-bottom:16px;"><div style="font-size:11px;font-weight:800;color:var(--t2);margin-bottom:9px;">⚽ Goals</div>
      <div style="display:flex;gap:10px;"><div style="flex:1;">${hG.map(g=>`<div style="font-size:12px;color:var(--t2);margin-bottom:4px;"><span style="font-weight:800;color:var(--p);">${g.time.elapsed}'</span> ${g.player.name.split(' ').pop()}</div>`).join('')}</div>
      <div style="flex:1;text-align:right;">${aG.map(g=>`<div style="font-size:12px;color:var(--t2);margin-bottom:4px;">${g.player.name.split(' ').pop()} <span style="font-weight:800;color:var(--p);">${g.time.elapsed}'</span></div>`).join('')}</div></div></div>`:''}
    ${hS.length?`<div><div style="font-size:11px;font-weight:800;color:var(--t2);margin-bottom:10px;">📊 Match Stats</div>
      ${sk.map(([key,lbl])=>{const hv=hS.find(s=>s.type===key)?.value??0,av=aS.find(s=>s.type===key)?.value??0;const tot=(typeof hv==='number'&&typeof av==='number')?hv+av||100:100;const hp=Math.round((typeof hv==='string'?parseInt(hv):hv)/tot*100);return`<div style="margin-bottom:9px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="font-weight:800;">${hv}</span><span style="color:var(--t2);">${lbl}</span><span style="font-weight:800;">${av}</span></div><div style="height:5px;background:var(--t3);border-radius:3px;display:flex;overflow:hidden;"><div style="width:${hp}%;background:var(--p);"></div><div style="width:${100-hp}%;background:var(--red);"></div></div></div>`;}).join('')}
    </div>`:''}`;
}
function cm(id){document.getElementById(id).classList.remove('on');}

// ── FAN ZONE ──
const getLv=n=>LEVELS.find(l=>n>=l.min&&n<=l.max)||LEVELS[0];
const saveFan=()=>localStorage.setItem('pi_fan',JSON.stringify(fanData));
const isMT=m=>{if(!m.utcDate)return false;const s=new Date(m.utcDate).getTime(),n=Date.now();return n>=s-30*60000&&n<=s+120*60000;};

function updateFan(){
  const lv=getLv(fanData.total),nxt=LEVELS.find(l=>l.lv===lv.lv+1);
  const prog=nxt?Math.round((fanData.total-lv.min)/(nxt.min-lv.min)*100):100;
  document.getElementById('lv-badge').textContent=`Lv.${lv.lv}`;
  document.getElementById('fan-bd').innerHTML=`
    <div class="fz-hero">
      <div class="fz-em">${lv.em}</div>
      <div class="fz-lv">Lv.${lv.lv} · ${lv.n}</div>
      <div class="fz-sub">Watched: ${fanData.total} watched${SEL.length?' · '+SEL.map(t=>t.name).join(' & '):''}</div>
      <div class="fz-pw"><div class="fz-pb" style="width:${prog}%"></div></div>
      <div class="fz-pl"><span>${lv.min}matches</span><span>${prog}%</span><span>${nxt?nxt.min+'matches':'MAX'}</span></div>
      <div class="fz-stats">
        <div class="fzs"><div class="fzs-v">${fanData.total}</div><div class="fzs-l">Total Watched</div></div>
        <div class="fzs"><div class="fzs-v">${lv.lv}</div><div class="fzs-l">Level</div></div>
        <div class="fzs"><div class="fzs-v">${fanData.checkins.length}</div><div class="fzs-l">Check-ins</div></div>
      </div>
    </div>
    <div class="lv-guide"><div style="font-size:13px;font-weight:800;color:var(--t2);margin-bottom:12px;">🏅 Level Guide</div>
      ${LEVELS.map(l=>`<div class="lv-row ${l.lv===lv.lv?'cur':''}"><span class="lv-em">${l.em}</span><span class="lv-nm">Lv.${l.lv} ${l.n}</span><span class="lv-req">${l.min}${l.max===Infinity?'+':'-'+l.max}matches</span></div>`).join('')}
    </div>
    <div class="stl" style="margin-bottom:14px;"><h2>Fan Check-in</h2><span class="sub-badge">Available 30 min before kickoff</span></div>
    <div id="fz-ms"><div class="ldr" style="padding:20px;"><div class="spin"></div></div></div>
    <div class="stl" style="margin-top:20px;margin-bottom:12px;"><h2>Check-in History</h2></div>
    ${fanData.checkins.length?fanData.checkins.slice(0,10).map(ci=>`<div class="ci"><div><div style="font-size:13px;font-weight:800;">${ci.teams}</div><div style="font-size:11px;color:var(--t2);margin-top:2px;">${ci.date}</div></div><div class="ci-badge">✓ Checked</div></div>`).join(''):`<div class="empty" style="padding:20px;">No check-ins yet<br><span style="font-size:12px;">Check in during match time!</span></div>`}`;
  loadFzMs();
}

async function loadFzMs(){
  const c=document.getElementById('fz-ms');if(!c||!SEL.length)return;
  const main=SEL[0];
  const d=isKL(main)?await kl('/fixtures',{team:main.id,league:main.league==='KL1'?KL_LEAGUE:293,season:KL_SEASON,next:5}):await fd(`/teams/${main.id}/matches?status=SCHEDULED&limit=5`);
  const matches=isKL(main)?(d?.response||[]):(d?.matches||[]);
  if(!matches.length){c.innerHTML=`<div class="empty" style="padding:12px;">No upcoming fixtures</div>`;return;}
  c.innerHTML=matches.map(m=>{
    const kl2=isKL(main);
    const h=kl2?m.teams.home:m.homeTeam,a=kl2?m.teams.away:m.awayTeam;
    const date=kl2?m.fixture?.date:m.utcDate;
    const mid=String(kl2?m.fixture.id:m.id);
    const teams=`${elv(h.shortName||h.name||h.name)} vs ${elv(a.shortName||a.name||a.name)}`;
    const done=fanData.checkins.find(ci=>ci.matchId===mid);
    const can=isMT({utcDate:date});
    return`<div class="fz-match">
      <div class="fz-info"><div class="fz-teams">${teams}</div><div class="fz-time">📅 ${kd(date)} ${kt(date)} KST</div></div>
      <button class="fz-btn" ${done||!can?'disabled':''} onclick="doCI(this,'${teams}','${kd(date)} ${kt(date)}','${mid}')">${done?'✓ Done':can?'🔥 Check In Now':'⏰ Match time only'}</button>
    </div>`;
  }).join('');
}

function doCI(btn,teams,ts,mid){
  if(fanData.checkins.find(c=>c.matchId===mid))return;
  btn.disabled=true;btn.textContent='✓ Done';
  const pLv=getLv(fanData.total).lv;
  fanData.total++;fanData.checkins.unshift({teams,date:ts,matchId:mid});saveFan();
  const nLv=getLv(fanData.total);
  if(nLv.lv>pLv){document.getElementById('lu-em').textContent=nLv.em;document.getElementById('lu-sub').textContent=`Lv.${nLv.lv} · ${nLv.n}`;const el=document.getElementById('lvup');el.classList.add('on');setTimeout(()=>el.classList.remove('on'),4200);}
  updateFan();
}

// ── INIT ──
const saved=localStorage.getItem('pi_sel');
if(saved){SEL=JSON.parse(saved);applyTheme(SEL[0]?.col);startApp();}
else initOb();
</script>
