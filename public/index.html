<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>PitchPro Test</title>
</head>
<body style="background:#0b0f14; color:white; font-family:sans-serif;">

  <h1 style="color:#00ff9f;">PITCH PRO</h1>
  
  <p id="status">상태: 확인중...</p>
  <button onclick="testAPI()">API 테스트</button>

  <pre id="result" style="margin-top:20px; font-size:12px;"></pre>

  <script>
    console.log("스크립트 실행됨");

    async function testAPI() {
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");

      statusEl.innerText = "상태: 요청중...";

      try {
        const res = await fetch("https://v3.football.api-sports.io/fixtures?live=all", {
          method: "GET",
          headers: {
            "x-apisports-key": "여기에_API_KEY"
          }
        });

        console.log("응답:", res);

        if (!res.ok) {
          throw new Error("응답 실패: " + res.status);
        }

        const data = await res.json();

        statusEl.innerText = "✅ 연결 성공!";
        resultEl.innerText = JSON.stringify(data, null, 2);

      } catch (e) {
        console.error(e);
        statusEl.innerText = "❌ 실패: " + e.message;
      }
    }
  </script>

</body>
</html>
