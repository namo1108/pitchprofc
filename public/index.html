<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080f14">
<title>PITCH Pro</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23080f14'/%3E%3Ccircle cx='32' cy='32' r='20' fill='%23111f2c' stroke='%2322c55e' stroke-width='1.5'/%3E%3Cpath d='M32 14 L38 24 L50 24 L41 31 L44 43 L32 36 L20 43 L23 31 L14 24 L26 24 Z' fill='%2322c55e' opacity='.8'/%3E%3Ctext x='32' y='37' text-anchor='middle' font-family='Arial Black' font-weight='900' font-size='16' fill='%23080f14'%3EP%3C/text%3E%3C/svg%3E">
<link rel="shortcut icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23080f14'/%3E%3Ccircle cx='32' cy='32' r='20' fill='%23111f2c' stroke='%2322c55e' stroke-width='1.5'/%3E%3Cpath d='M32 14 L38 24 L50 24 L41 31 L44 43 L32 36 L20 43 L23 31 L14 24 L26 24 Z' fill='%2322c55e' opacity='.8'/%3E%3Ctext x='32' y='37' text-anchor='middle' font-family='Arial Black' font-weight='900' font-size='16' fill='%23080f14'%3EP%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #080f14;
  --bg2: #0d1820;
  --bg3: #111f2c;
  --card: #111f2c;
  --card2: #162535;
  --p: #22c55e;        /* 초록 - 깔끔한 emerald */
  --p2: #16a34a;
  --pg: rgba(34,197,94,.15);
  --ps: rgba(34,197,94,.08);
  --amber: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
  --t: #f1f5f9;        /* 거의 흰색 - 가독성 최우선 */
  --t2: #94a3b8;       /* 중간 회색 */
  --t3: #475569;       /* 어두운 회색 */
  --b: rgba(255,255,255,.08);
  --b2: rgba(34,197,94,.3);
  --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  height: 100dvh;
  overflow: hidden;
}
body {
  background: var(--bg);
  color: var(--t);
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ── ONBOARDING ── */
#ob {
  position: fixed;
  top: 0; left: 50%; right: auto; bottom: 0;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--bg);
  z-index: 9000;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.ob-hero {
  padding: 36px 20px 24px;
  text-align: center;
}
.ob-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 4px;
  color: var(--p);
  margin-bottom: 4px;
}
.ob-sub {
  font-size: 10px;
  color: var(--t3);
  letter-spacing: 3px;
  font-family: 'Share Tech Mono';
  margin-bottom: 12px;
}
.ob-hint {
  font-size: 14px;
  color: var(--t2);
  line-height: 1.7;
}
.ob-section { padding: 0 16px 8px; }
.ob-lg-ttl {
  font-size: 11px;
  font-weight: 700;
  color: var(--p);
  letter-spacing: 1px;
  padding: 12px 2px 8px;
  border-bottom: 1px solid var(--b);
  margin-bottom: 10px;
  text-transform: uppercase;
}
.ob-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.ob-team {
  background: var(--card);
  border: 1.5px solid var(--b);
  border-radius: 12px;
  padding: 14px 6px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
}
.ob-team:active { transform: scale(.94); }
.ob-team.sel {
  border-color: var(--p);
  background: var(--ps);
  box-shadow: 0 0 0 1px var(--p);
}
.ob-team img { width: 36px; height: 36px; object-fit: contain; margin-bottom: 6px; display: block; margin-left: auto; margin-right: auto; }
.ob-team-nm { font-size: 11px; color: var(--t2); font-weight: 500; }
.ob-team.sel .ob-team-nm { color: var(--p); font-weight: 700; }

/* 리그 헤더 */
.ob-lg-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 10px; margin-top: 4px;
}
.ob-lg-hdr img { width: 28px; height: 28px; object-fit: contain; flex-shrink: 0; }
.ob-lg-hdr span { font-size: 15px; font-weight: 700; color: #fff; }
.ob-lg-season { font-size: 10px !important; font-weight: 400 !important; opacity: .75; margin-left: auto; }
.ob-start {
  display: block;
  margin: 8px 16px 36px;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: var(--card);
  color: var(--t3);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  width: calc(100% - 32px);
  font-family: 'Noto Sans KR';
}
.ob-start.ready {
  background: var(--p);
  color: #fff;
  box-shadow: 0 4px 20px rgba(34,197,94,.3);
}

/* ── HEADER ── */
#app {
  display: none;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  overflow: hidden;
}
#app.show { display: flex; }
.hdr {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  /* 노치/다이나믹 아일랜드 대응 */
  padding-top: env(safe-area-inset-top, 0px);
  height: calc(56px + env(safe-area-inset-top, 0px));
  background: var(--bg);
  border-bottom: 1px solid var(--b);
  flex-shrink: 0;
}
.hdr-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 3px;
  color: var(--p);
  cursor: pointer;
}
.hdr-r { display: flex; align-items: center; gap: 8px; }
.hdr-cr { width: 28px; height: 28px; object-fit: contain; border-radius: 6px; }
.hdr-lv {
  font-size: 11px;
  font-weight: 700;
  color: var(--p);
  background: var(--ps);
  border: 1px solid var(--b2);
  padding: 3px 10px;
  border-radius: 20px;
}
.lpill {
  display: none;
  align-items: center;
  gap: 5px;
  background: rgba(239,68,68,.1);
  border: 1px solid rgba(239,68,68,.3);
  border-radius: 20px;
  padding: 4px 10px;
}
.lpill.show { display: flex; }
.lpdot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse 1.2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
.lpill span { font-size: 11px; font-weight: 700; color: var(--red); }

/* ── PAGES ── */
.pages { flex: 1; overflow: hidden; position: relative; min-height: 0; }
.page {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 16px 14px 100px;
  display: none;
}
.page.on { display: block; animation: fadeUp .2s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }

/* ── BOTTOM NAV ── */
.bnav {
  display: flex;
  flex-shrink: 0;
  background: var(--bg);
  border-top: 1px solid var(--b);
  /* 아이폰 홈 바 포함한 높이 */
  padding-bottom: env(safe-area-inset-bottom, 0px);
  height: calc(64px + env(safe-area-inset-bottom, 0px));
  /* 안전 영역 항상 확보 */
  position: sticky;
  bottom: 0;
  z-index: 100;
}
.nbi {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  cursor: pointer; transition: all .15s;
  border: none; background: none;
}
.nbi:active { opacity: .7; transform: scale(.9); }
.nbi svg { width: 22px; height: 22px; color: var(--t3); transition: color .15s; }
.nbi.on svg { color: var(--p); }
.nbi-lb { font-size: 10px; font-weight: 600; color: var(--t3); }
.nbi.on .nbi-lb { color: var(--p); }

/* ── SECTION HEADER ── */
.sec {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 12px; margin-top: 8px;
}
.stl {
  font-size: 13px; font-weight: 700; color: var(--t);
  display: flex; align-items: center; gap: 8px;
}
.stl::before {
  content: '';
  width: 3px; height: 16px;
  background: var(--p);
  border-radius: 2px;
}
.sbd {
  font-size: 11px; color: var(--t3);
  background: var(--card);
  border: 1px solid var(--b);
  padding: 3px 10px; border-radius: 20px;
}

/* ── MATCH CARD ── */
.mc {
  background: var(--card);
  border: 1px solid var(--b);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.mc:active { background: var(--card2); }
.mc.live { border-color: rgba(239,68,68,.3); }
.mc.mymatch { border-color: var(--p2); border-width: 1.5px; }
.mc-hd {
  padding: 8px 14px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,.03);
  border-bottom: 1px solid var(--b);
}
.mc-lg { font-size: 11px; color: var(--t3); font-weight: 500; }
.mc-st {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
}
.mc-st.live { background: rgba(239,68,68,.12); color: var(--red); }
.mc-st.fin { background: rgba(255,255,255,.05); color: var(--t3); }
.mc-st.sch { background: var(--ps); color: var(--p); }
.mc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse .9s infinite; }
.mc-body { padding: 14px; }
.mc-row { display: flex; align-items: center; gap: 10px; }
.mc-tm { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
.mc-tm.aw { flex-direction: row-reverse; }
.mc-cr { width: 30px; height: 30px; object-fit: contain; flex-shrink: 0; }
.mc-nm { font-size: 14px; font-weight: 600; color: var(--t); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mc-tm.aw .mc-nm { text-align: right; }
.mc-sc {
  font-family: 'Orbitron', sans-serif;
  font-size: 28px; font-weight: 900;
  color: var(--t); display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.mc-sep { font-size: 18px; color: var(--t3); font-weight: 400; }
.mc-sc.live-score .mc-sn { color: var(--p); }
.mc-goals {
  padding: 8px 14px 10px;
  display: flex; justify-content: space-between;
  border-top: 1px solid var(--b);
}
.mc-gside { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.mc-gside.aw { align-items: flex-end; }
.mc-gi { font-size: 12px; color: var(--t2); display: flex; align-items: center; gap: 4px; }
.mc-gi .gmin { font-size: 11px; color: var(--p); font-weight: 700; }
  /* MOMENTUM */
.mom { padding: 8px 14px 12px; border-top: 1px solid var(--b); }
.mom-lbl { display: flex; justify-content: space-between; font-size: 11px; color: var(--t3); margin-bottom: 5px; }
.mom-bar { height: 5px; background: var(--b); border-radius: 3px; display: flex; overflow: hidden; gap: 1px; }
.ms { height: 100%; flex: 1; border-radius: 2px; }
.ms.h { background: var(--p); }
.ms.a { background: var(--red); }
.ms.n { background: rgba(255,255,255,.12); }

/* ODDS */
.odds-row { display: flex; gap: 6px; padding: 10px 14px; border-top: 1px solid var(--b); }
.obtn {
  flex: 1; background: var(--bg3); border: 1px solid var(--b);
  border-radius: 10px; padding: 8px 4px; text-align: center;
}
.olbl { font-size: 10px; color: var(--t3); margin-bottom: 4px; }
.oval { font-size: 16px; font-weight: 700; color: var(--t); font-family: 'Orbitron', sans-serif; }
.oval.fav { color: var(--p); }

/* PILLS */
.pills { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; margin-bottom: 12px; }
.pills::-webkit-scrollbar { display: none; }
.pill {
  font-size: 12px; font-weight: 600;
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--b); background: transparent;
  color: var(--t3); cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: all .15s;
}
.pill.on { background: var(--ps); color: var(--p); border-color: var(--b2); }

/* STANDING */
.std-scroll { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--b); }
.stt { width: 100%; border-collapse: collapse; font-size: 13px; }
.stt th {
  font-size: 10px; font-weight: 700; color: var(--t3);
  padding: 10px 8px; text-align: center;
  background: var(--card2); border-bottom: 1px solid var(--b);
  white-space: nowrap;
}
.stt th:nth-child(2) { text-align: left; }
.stt td { padding: 10px 8px; border-bottom: 1px solid var(--b); text-align: center; color: var(--t2); }
.stt td:nth-child(2) { text-align: left; color: var(--t); }
.nm-cell { display: flex; align-items: center; gap: 7px; }
.nm-cell img { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
.pts { font-weight: 700 !important; color: var(--t) !important; font-size: 14px !important; }
.stt tr.my td { background: var(--ps); color: var(--t) !important; }
.stt tr.my .pts { color: var(--p) !important; }
.sp { font-weight: 700; font-size: 13px; }
.sp.top { color: var(--p); }
.sp.rel { color: var(--amber); }
.sp.bot { color: var(--red); }
.sform { display: flex; gap: 3px; }
.sfd { width: 9px; height: 9px; border-radius: 50%; }
.cl-bar { border-left: 3px solid var(--p) !important; }
.el-bar { border-left: 3px solid var(--amber) !important; }
.drop-bar { border-left: 3px solid var(--red) !important; }

/* SCHEDULE */
.lg-grp { margin-bottom: 12px; }
.lg-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--card); border: 1px solid var(--b);
  border-radius: 12px; cursor: pointer; margin-bottom: 6px;
}
.lg-hdr img { width: 20px; height: 20px; object-fit: contain; }
.lg-hdr-nm { font-size: 13px; font-weight: 700; color: var(--t); flex: 1; }
.lg-hdr-cnt { font-size: 11px; color: var(--t3); background: var(--bg3); padding: 2px 8px; border-radius: 20px; }
.lg-arr { font-size: 12px; color: var(--t3); transition: transform .2s; }
.lg-arr.closed { transform: rotate(-90deg); }
.lg-matches { display: flex; flex-direction: column; overflow: hidden; transition: max-height .3s; border-radius: 10px; border: 1px solid var(--b); overflow: hidden; }
.sm {
  background: var(--card); padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; border-bottom: 1px solid var(--b);
  transition: background .15s;
}
.sm:last-child { border-bottom: none; }
.sm:active { background: var(--card2); }
.sm-time { font-size: 13px; font-weight: 700; width: 38px; text-align: center; flex-shrink: 0; }
.sm-teams { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.sm-team { display: flex; align-items: center; gap: 7px; }
.sm-cr { width: 16px; height: 16px; object-fit: contain; flex-shrink: 0; }
.sm-nm { font-size: 13px; font-weight: 500; color: var(--t2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.sm-nm.win { color: var(--t); font-weight: 700; }
.sm-sc { font-size: 14px; font-weight: 700; width: 16px; text-align: right; flex-shrink: 0; }

/* MY FIXTURE */
.myfix {
  background: var(--card); border: 1.5px solid var(--p2);
  border-radius: var(--radius); padding: 16px; margin-bottom: 14px;
}
.myfix-tag { font-size: 11px; font-weight: 700; color: var(--p); margin-bottom: 12px; }
.myfix-teams { display: flex; align-items: center; justify-content: space-between; }
.myfix-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.myfix-team img { width: 40px; height: 40px; object-fit: contain; }
.myfix-nm { font-size: 13px; font-weight: 600; color: var(--t); text-align: center; }
.myfix-vs { font-family: 'Orbitron'; font-size: 18px; font-weight: 900; color: var(--p); }
.myfix-meta { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
.myfix-meta span { font-size: 11px; background: var(--bg3); border: 1px solid var(--b); padding: 4px 10px; border-radius: 20px; color: var(--t2); }

/* PLAYER */
.pc {
  background: var(--card); border: 1px solid var(--b);
  border-radius: 12px; padding: 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.pc.me { border-color: var(--p2); background: var(--ps); }
.pc-rank { font-family: 'Orbitron'; font-size: 18px; font-weight: 900; color: var(--t3); width: 28px; text-align: center; flex-shrink: 0; }
.pc-rank.top { color: var(--p); }
.pc-info { flex: 1; min-width: 0; }
.pc-name { font-size: 15px; font-weight: 700; color: var(--t); margin-bottom: 3px; }
.pc-team { font-size: 12px; color: var(--t2); }
.pc-val { font-family: 'Orbitron'; font-size: 24px; font-weight: 900; color: var(--p); text-align: right; }
.pc-lbl { font-size: 10px; color: var(--t3); text-align: right; }

/* FANZONE */
.lv-card {
  background: var(--card); border: 1.5px solid var(--b2);
  border-radius: var(--radius); padding: 20px; margin-bottom: 14px;
}
.lv-em { font-size: 40px; text-align: center; margin-bottom: 10px; }
.lv-name { font-size: 18px; font-weight: 700; color: var(--t); text-align: center; margin-bottom: 4px; }
.lv-sub { font-size: 13px; color: var(--t2); text-align: center; margin-bottom: 14px; }
.lv-pw { height: 6px; background: var(--b); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
.lv-pb { height: 100%; border-radius: 3px; background: var(--p); transition: width .8s; }
.lv-pl { display: flex; justify-content: space-between; font-size: 11px; color: var(--t3); }
.lv-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 14px; }
.lvs { background: var(--bg3); border: 1px solid var(--b); border-radius: 10px; padding: 12px; text-align: center; }
.lvs-v { font-size: 20px; font-weight: 700; color: var(--t); font-family: 'Orbitron'; }
.lvs-l { font-size: 11px; color: var(--t3); margin-top: 3px; }
.fz-match { background: var(--card); border: 1px solid var(--b); border-radius: 12px; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.fz-info { flex: 1; }
.fz-teams { font-size: 14px; font-weight: 600; color: var(--t); margin-bottom: 3px; }
.fz-time { font-size: 12px; color: var(--t2); }
.fz-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--b2); background: var(--ps); color: var(--p); font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.fz-btn.done { background: rgba(34,197,94,.2); }
.ci { background: var(--card); border: 1px solid var(--b); border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
.ci-teams { font-size: 13px; font-weight: 600; color: var(--t); }
.ci-dt { font-size: 11px; color: var(--t3); margin-top: 2px; }
.ci-badge { font-size: 11px; font-weight: 700; color: var(--p); background: var(--ps); border: 1px solid var(--b2); padding: 4px 10px; border-radius: 20px; }

/* MODAL */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 500; overflow-y: auto; padding: 16px; display: none; }
.modal.show { display: block; }
.modal-in { background: var(--card); border-radius: 18px; max-width: 440px; margin: 0 auto; border: 1px solid var(--b); overflow: hidden; }
.modal-hd { padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--b); }
.modal-ttl { font-size: 15px; font-weight: 700; color: var(--t); }
.modal-x { background: none; border: none; color: var(--t3); font-size: 24px; cursor: pointer; line-height: 1; }
.modal-body { padding: 16px; }

/* GOAL TOAST */
#gt { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 9999; text-align: center; pointer-events: none; display: none; }
.gt-in { animation: gta 3.5s ease forwards; }
@keyframes gta { 0%{opacity:0;transform:scale(.3)} 15%{opacity:1;transform:scale(1.08)} 25%{transform:scale(1)} 80%{opacity:1} 100%{opacity:0} }
.gt-ball { font-size: 56px; display: block; animation: gspin .5s ease; }
@keyframes gspin { from{transform:rotate(0)} to{transform:rotate(720deg)} }
.gt-word { font-family: 'Orbitron'; font-size: 34px; font-weight: 900; color: var(--t); display: block; letter-spacing: 4px; margin-top: 4px; }
.gt-scorer { font-size: 16px; color: var(--p); display: block; margin-top: 6px; font-weight: 700; }
.gt-min { font-size: 13px; color: var(--t2); display: block; margin-top: 2px; }

/* LOADER / EMPTY */
.ldr { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 14px; }
.spin { width: 28px; height: 28px; border: 2.5px solid var(--b); border-top-color: var(--p); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg) } }
.spin-t { font-size: 12px; color: var(--t3); }
.empty { text-align: center; padding: 48px 20px; font-size: 13px; color: var(--t3); line-height: 1.8; }

/* LEVEL UP OVERLAY */
#lvup { position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 9998; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
#lvup.show { display: flex; animation: gta 4s ease forwards; }
.lvup-em { font-size: 72px; }
.lvup-txt { font-family: 'Orbitron'; font-size: 26px; font-weight: 900; color: var(--p); letter-spacing: 3px; }
.lvup-sub { font-size: 16px; color: var(--t2); }
</style>
