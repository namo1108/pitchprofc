<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH IN · Football Intelligence</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2303050a'/%3E%3Ccircle cx='32' cy='32' r='24' fill='none' stroke='%2310b981' stroke-width='2.5'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial Black' font-weight='900' font-size='22' fill='%2310b981'%3EP%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
<style>:root{
  --p:#10b981;--p2:#059669;--ps:rgba(16,185,129,.09);--pb:rgba(16,185,129,.24);
  --bg:#03050a;--bg2:#070a12;--bg3:#0c1020;--card:rgba(255,255,255,.032);--card2:rgba(255,255,255,.058);
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);
  --t:#f1f5f9;--t2:#94a3b8;--t3:#475569;
  --red:#f43f5e;--am:#f59e0b;--blue:#3b82f6;--purp:#a78bfa;
  --r:16px;--r2:22px;--r3:28px;--nav:66px;
  --F:'Syne',sans-serif;--B:'DM Sans',sans-serif;--M:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--B);overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ══ ONBOARDING ══ */
#ob{position:fixed;inset:0;background:var(--bg);z-index:9999;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background-image:radial-gradient(ellipse 90% 50% at 50% -5%,rgba(16,185,129,.13),transparent 70%),
    radial-gradient(ellipse 50% 35% at 95% 95%,rgba(59,130,246,.08),transparent)}
.ob-wrap{max-width:1120px;margin:0 auto;padding:60px 24px 140px}
.ob-hero{text-align:center;margin-bottom:48px}
.ob-logo-ring{width:72px;height:72px;border:2px solid rgba(16,185,129,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;position:relative;animation:ringPulse 4s ease infinite}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.3)}50%{box-shadow:0 0 0 12px rgba(16,185,129,.0)}}
.ob-logo-ring::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(16,185,129,.15)}
.ob-logo-p{font-family:var(--F);font-size:32px;font-weight:800;color:var(--p)}
.ob-title{font-family:var(--F);font-size:60px;font-weight:800;letter-spacing:-3px;line-height:.95;
  background:linear-gradient(150deg,#fff 30%,rgba(255,255,255,.4) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.ob-kicker{font-size:11px;font-weight:700;letter-spacing:5px;color:var(--p);text-transform:uppercase;margin-bottom:14px}
.ob-sub{font-size:15px;color:var(--t2);font-weight:500;line-height:1.65;max-width:440px;margin:0 auto 22px}
.ob-sel-row{display:inline-flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--bd2);border-radius:100px;padding:9px 20px}
.ob-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--bd2);transition:.3s}
.ob-dot.on{background:var(--p);border-color:var(--p);box-shadow:0 0 10px rgba(16,185,129,.6)}
.ob-count{font-size:13px;font-weight:800;color:var(--p);min-width:28px;text-align:center}
.ob-tabs{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.ob-tabs::-webkit-scrollbar{display:none}
.ob-tab{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:100px;border:1.5px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--B);font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:.2s;flex-shrink:0}
.ob-tab img{width:17px;height:17px;object-fit:contain}
.ob-tab:hover{border-color:var(--bd2);color:var(--t)}
.ob-tab.on{background:rgba(255,255,255,.08);color:var(--t);border-color:var(--bd2)}
.ob-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:9px}
@media(min-width:640px){.ob-grid{grid-template-columns:repeat(auto-fill,minmax(118px,1fr))}}
@media(max-width:420px){.ob-grid{grid-template-columns:repeat(4,1fr)}}
.ob-card{position:relative;border-radius:var(--r2);border:1.5px solid var(--bd);background:var(--card);padding:20px 8px 14px;text-align:center;cursor:pointer;transition:all .22s;overflow:hidden;--tc:var(--p)}
.ob-card::before{content:'';position:absolute;inset:0;background:var(--tc);opacity:0;transition:opacity .22s}
.ob-card:hover{border-color:rgba(255,255,255,.18);transform:translateY(-3px)}
.ob-card:hover::before{opacity:.06}
.ob-card.sel{border-color:var(--tc);transform:translateY(-5px);box-shadow:0 14px 30px rgba(0,0,0,.45),0 0 0 1px var(--tc)}
.ob-card.sel::before{opacity:.1}
.ob-card.sel .ob-tick{opacity:1;transform:scale(1)}
.ob-tick{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;background:var(--tc);display:flex;align-items:center;justify-content:center;font-size:10px;color:#000;font-weight:900;opacity:0;transform:scale(0);transition:.22s;z-index:2}
.ob-crest{width:50px;height:50px;margin:0 auto 11px;position:relative;z-index:1}
.ob-crest img{width:100%;height:100%;object-fit:contain}
.ob-nm{font-size:11px;font-weight:700;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;position:relative;z-index:1}
.ob-card.sel .ob-nm{color:var(--t);font-weight:800}
.ob-footer{position:fixed;bottom:0;left:0;right:0;padding:20px 24px max(20px,env(safe-area-inset-bottom));
  background:linear-gradient(to top,var(--bg) 72%,transparent);text-align:center;z-index:10}
.ob-start{display:inline-flex;align-items:center;justify-content:center;padding:17px 48px;border-radius:100px;border:none;
  background:linear-gradient(135deg,var(--p),var(--p2));color:#000;font-family:var(--F);font-weight:800;font-size:16px;letter-spacing:.5px;cursor:pointer;
  box-shadow:0 6px 28px rgba(16,185,129,.38);transition:all .22s;max-width:480px;width:100%}
.ob-start:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(16,185,129,.48)}
.ob-start:disabled{opacity:.32;cursor:not-allowed;transform:none;box-shadow:none}

/* ══ APP ══ */
#app{display:none;height:100vh;height:100dvh}
#app.on{display:flex}
.sidebar{width:250px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);padding:24px 12px;display:flex;flex-direction:column;overflow-y:auto;transition:width .2s}
@media(max-width:1280px){.sidebar{width:68px}.nav-lbl,.sl-full,.nav-sect{display:none!important}.sl-sm{display:flex!important}}
@media(max-width:768px){.sidebar{display:none!important}.bnav{display:flex!important}}
.sl-full{font-family:var(--F);font-size:19px;font-weight:800;color:var(--t);padding:0 8px;margin-bottom:36px;cursor:pointer;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sl-dot{width:8px;height:8px;border-radius:50%;background:var(--p);box-shadow:0 0 8px var(--p);flex-shrink:0}
.sl-sm{font-family:var(--F);font-size:20px;font-weight:800;color:var(--p);padding:0 8px;margin-bottom:32px;cursor:pointer;display:none;align-items:center;justify-content:center}
.nav-sect{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:2.5px;text-transform:uppercase;padding:0 10px;margin:16px 0 5px}
.nav-it{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:14px;cursor:pointer;color:var(--t2);font-weight:600;font-size:14px;transition:.18s;margin-bottom:2px;border:1px solid transparent}
.nav-it:hover{color:var(--t);background:rgba(255,255,255,.04)}
.nav-it.on{background:var(--ps);color:var(--p);border-color:var(--pb)}
.nav-it.on .nav-ico svg{stroke:var(--p)}
.nav-ico{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nav-ico svg{transition:.15s}
.nav-live-pip{width:6px;height:6px;border-radius:50%;background:var(--red);margin-left:auto;animation:pip 1s infinite;display:none}
.nav-live-pip.show{display:block}
@keyframes pip{0%,100%{opacity:1}50%{opacity:.2}}
/* Language toggle in sidebar */
.lang-toggle{margin-top:auto;padding:12px 8px 0;border-top:1px solid var(--bd)}
.lang-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:12px;cursor:pointer;background:transparent;border:1px solid var(--bd);width:100%;font-family:var(--B);font-size:13px;font-weight:700;color:var(--t2);transition:.15s}
.lang-btn:hover{border-color:var(--bd2);color:var(--t)}
.lang-flag{font-size:16px}
.sb-team-area{padding-top:14px;border-top:1px solid var(--bd)}
.sb-team-row{display:flex;align-items:center;gap:9px;padding:9px 4px;cursor:pointer;border-radius:11px;transition:.15s}
.sb-team-row:hover{background:rgba(255,255,255,.04)}
.sb-team-row img{width:26px;height:26px;object-fit:contain}
.sb-tn{font-size:13px;font-weight:800;color:var(--t)}
.sb-tl{font-size:11px;color:var(--t2)}
.sb-change{width:100%;margin-top:8px;padding:8px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--B);transition:.15s;text-align:center}
.sb-change:hover{border-color:var(--bd2);color:var(--t)}

/* Main col */
.main-col{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;
  background:radial-gradient(ellipse 80% 40% at 0% -10%,rgba(16,185,129,.07),transparent 60%)}
.hdr{height:62px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;background:rgba(3,5,10,.88);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bd);z-index:100}
@media(max-width:768px){.hdr{padding:0 16px;height:56px}}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-logo{font-family:var(--F);font-size:18px;font-weight:800;color:var(--t);display:none}
@media(max-width:768px){.hdr-logo{display:block}}
.live-pill{display:none;align-items:center;gap:5px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);border-radius:100px;padding:5px 11px}
.live-pill.on{display:flex}
.l-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pip 1s infinite}
.live-pill span{font-size:11px;font-weight:800;color:var(--red);letter-spacing:.5px}
.hdr-r{display:flex;align-items:center;gap:8px}
.hdr-teams{display:flex;gap:6px}
.hdr-tp{display:flex;align-items:center;gap:6px;background:var(--ps);border:1.5px solid var(--pb);border-radius:100px;padding:5px 12px 5px 6px;cursor:pointer;transition:.15s}
.hdr-tp:hover{background:var(--pb)}
.hdr-tp img{width:20px;height:20px;object-fit:contain}
.hdr-tp span{font-size:12px;font-weight:800;color:var(--p)}
.hdr-pro{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--p);background:var(--ps);border:1px solid var(--pb);border-radius:100px;padding:5px 11px}
/* Lang in header for mobile */
.hdr-lang{padding:6px 10px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--B);transition:.15s}
.hdr-lang:hover{border-color:var(--bd2);color:var(--t)}
.pg-wrap{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pg{padding:26px 30px;max-width:980px;margin:0 auto;animation:pgIn .2s ease;will-change:opacity,transform}
@keyframes pgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.pg{padding:16px 14px 88px}}
@media(min-width:1500px){.pg{max-width:1100px}}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(3,5,10,.97);
  backdrop-filter:blur(24px);border-top:1px solid var(--bd);
  display:none;justify-content:space-around;align-items:center;z-index:1000;
  padding:8px 0 max(8px,env(safe-area-inset-bottom,8px))}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  border:none;background:none;cursor:pointer;font-family:var(--B);padding:6px 4px}
.bn-i{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.bn-i svg{transition:transform .15s}
.bn-l{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.3px}
.bn.on .bn-l{color:var(--p)}
.bn.on .bn-i svg{stroke:var(--p);transform:scale(1.12)}

/* ══ SECTION HEADER ══ */
.sh{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.sh::before{content:'';width:3px;height:22px;background:linear-gradient(var(--p),rgba(16,185,129,.3));border-radius:2px;flex-shrink:0}
.sh h2{font-family:var(--F);font-size:20px;font-weight:800;letter-spacing:-.4px}
.sh-badge{font-size:11px;font-weight:700;color:var(--t2);background:rgba(255,255,255,.05);border:1px solid var(--bd);padding:4px 12px;border-radius:100px;margin-left:auto;white-space:nowrap}

/* ══ TABS ══ */
.ptabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:18px;padding:2px 0}
.ptabs::-webkit-scrollbar{display:none}
.ptab{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--B);font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:.18s}
.ptab img{width:15px;height:15px;object-fit:contain}
.ptab:hover{border-color:var(--bd2);color:var(--t)}
.ptab.on{background:rgba(255,255,255,.07);color:var(--t);border-color:var(--bd2)}
.ptab.on-p{background:var(--p);color:#000;border-color:var(--p)}

/* ══ DATE NAV ══ */
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.date-arr{width:34px;height:34px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-size:16px;transition:.15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--B)}
.date-arr:hover{border-color:var(--bd2);color:var(--t)}
.date-strip{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1}
.date-strip::-webkit-scrollbar{display:none}
.date-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 11px;border-radius:11px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--B);transition:.15s;min-width:50px}
.date-btn .db-dow{font-size:10px;font-weight:700;letter-spacing:.3px}
.date-btn .db-d{font-family:var(--M);font-size:14px;font-weight:800;color:var(--t)}
.date-btn:hover{border-color:var(--bd2)}
.date-btn.on{background:var(--ps);border-color:var(--pb);color:var(--p)}
.date-btn.on .db-d{color:var(--p)}
.date-btn.today .db-dow{color:var(--p);font-weight:800}

/* ══ MATCH CARDS ══ */
.mg{background:var(--card2);border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden;margin-bottom:14px}
.mg-head{display:flex;align-items:center;gap:9px;padding:10px 18px;border-bottom:1px solid var(--bd);background:rgba(255,255,255,.02)}
.mg-head img{width:16px;height:16px;object-fit:contain;opacity:.75}
.mg-head .lgn{font-size:11px;font-weight:800;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;flex:1}
.mg-head .livc{font-size:10px;font-weight:900;color:var(--red);background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.2);padding:2px 8px;border-radius:100px}
.mr{display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s;gap:10px}
.mr:last-child{border-bottom:none}
.mr:hover{background:rgba(255,255,255,.024)}
.mr.my{border-left:2.5px solid var(--p);padding-left:15.5px}
.mr.live-r{background:rgba(244,63,94,.025)}
.mt{width:42px;flex-shrink:0}
.mt-t{font-size:12px;font-weight:800;color:var(--t2);line-height:1.3}
.mt-t.lv{color:var(--p)}
.mt-t.ft{color:var(--t3)}
.mb2{flex:1;min-width:0}
.ml{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ml:last-child{margin-bottom:0}
.mc{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.mc img{width:18px;height:18px;object-fit:contain;flex-shrink:0}
.mn2{font-size:14px;font-weight:700;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mn2.d{color:var(--t2)}
.msv{font-family:var(--M);font-weight:800;font-size:15px;color:var(--t);flex-shrink:0;margin-left:8px}
.msv.w{color:var(--p)}
.ma{flex-shrink:0;display:flex;align-items:center;gap:6px;margin-left:5px}
.nb{padding:5px 8px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:11px;cursor:pointer;font-family:var(--B);font-weight:700;transition:.15s}
.nb.on{background:var(--ps);border-color:var(--pb);color:var(--p)}

/* Match events preview (goals) */
.mr-events{padding:7px 18px 10px;border-top:1px solid rgba(255,255,255,.04);display:flex;gap:16px}
.ev-side{flex:1;display:flex;flex-direction:column;gap:3px}
.ev-side.r{align-items:flex-end}
.ev-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2)}
.ev-min{font-family:var(--M);font-size:10px;color:var(--p);font-weight:800}
.ev-ico{font-size:11px}

/* Odds mini */
.odds-bar{display:flex;gap:4px;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.04)}
.ob2{flex:1;text-align:center;background:rgba(255,255,255,.03);border-radius:8px;padding:5px 3px}
.ob-l{font-size:9px;color:var(--t3);font-weight:700;margin-bottom:2px}
.ob-v{font-family:var(--M);font-size:13px;font-weight:800;color:var(--t)}
.ob-v.fav{color:var(--p)}

/* ══ STANDINGS ══ */
.std-scroll{overflow-x:auto}
.std-tbl{width:100%;border-collapse:separate;border-spacing:0 5px;min-width:560px}
.std-tbl th{padding:9px 13px;text-align:center;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;font-weight:800}
.std-tbl th:nth-child(2){text-align:left;min-width:150px}
.std-tbl td{padding:12px 13px;background:rgba(255,255,255,.025);text-align:center;font-size:13.5px;font-weight:700}
.std-tbl td:nth-child(2){text-align:left}
.std-tbl td:first-child{border-radius:13px 0 0 13px}
.std-tbl td:last-child{border-radius:0 13px 13px 0}
.std-tbl tr:hover td{background:rgba(255,255,255,.04)}
.std-tbl tr.my td{background:rgba(16,185,129,.06)!important}
.zone-cl td:first-child{border-left:2.5px solid var(--blue)!important}
.zone-el td:first-child{border-left:2.5px solid var(--am)!important}
.zone-ecl td:first-child{border-left:2.5px solid var(--purp)!important}
.zone-rel td:first-child{border-left:2.5px solid var(--red)!important}
.pos{font-weight:900;font-size:14px}
.pos.cl{color:var(--blue)}.pos.el{color:var(--am)}.pos.rel{color:var(--red)}
.cc{display:flex;align-items:center;gap:9px}
.cc img{width:22px;height:22px;object-fit:contain}
.pts{font-family:var(--M);font-size:16px;font-weight:900;color:var(--p)}
.gd{color:var(--t2);font-size:13px}
.frm{display:flex;gap:3px;justify-content:center}
.fd{width:7px;height:7px;border-radius:50%}
.std-legend{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);font-weight:600}
.leg-dot{width:3px;height:14px;border-radius:2px}

/* ══ PLAYERS ══ */
.pr{display:flex;align-items:center;gap:13px;padding:14px 18px;background:var(--card2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:8px;transition:.15s}
.pr:hover{border-color:var(--bd2)}
.pr.my{border-color:var(--pb);background:var(--ps)}
.prk{font-family:var(--F);font-size:19px;font-weight:800;color:var(--t3);width:30px;text-align:center}
.prk.g{color:#fbbf24}.prk.s{color:#94a3b8}.prk.b{color:#cd7c3e}
.pr-ci{width:34px;height:34px;object-fit:contain;border-radius:8px}
.pr-info{flex:1;min-width:0}
.pr-name{font-size:15px;font-weight:800;margin-bottom:2px}
.pr-club{font-size:12px;color:var(--t2)}
.pr-val{font-family:var(--M);font-size:28px;font-weight:900;color:var(--p)}
.pr-lbl{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:1px;text-align:right;margin-top:2px}

/* ══ AI PITCH — MAGAZINE ══ */
.ai-hero{position:relative;border-radius:32px;overflow:hidden;margin-bottom:22px;background:#000;cursor:pointer}
.ai-hero-bg{position:absolute;inset:0;background:
  radial-gradient(ellipse 140% 80% at 50% 110%,rgba(16,185,129,.35),transparent 60%),
  radial-gradient(ellipse 60% 60% at 10% 0%,rgba(59,130,246,.2),transparent 50%),
  radial-gradient(ellipse 60% 60% at 90% 0%,rgba(244,63,94,.15),transparent 50%);
  animation:aiBgPulse 8s ease infinite alternate}
@keyframes aiBgPulse{from{opacity:.8}to{opacity:1}}
.ai-hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%)}
.ai-hero-content{position:relative;z-index:2;padding:40px 36px}
.ai-chip{display:inline-flex;align-items:center;gap:7px;background:var(--p);color:#000;padding:6px 16px;border-radius:100px;font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
.ai-match-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:32px}
.ai-club{text-align:center;flex:1}
.ai-club img{width:72px;height:72px;object-fit:contain;margin-bottom:12px;filter:drop-shadow(0 8px 24px rgba(0,0,0,.5));transition:transform .3s}
.ai-hero:hover .ai-club img{transform:scale(1.05)}
.ai-club h4{font-family:var(--F);font-size:14px;font-weight:800;letter-spacing:-.2px;color:#fff}
.ai-vs{text-align:center;flex-shrink:0}
.ai-vs-txt{font-family:var(--F);font-size:52px;font-weight:800;color:rgba(255,255,255,.1);line-height:1;letter-spacing:-3px}
.ai-vs-date{font-size:11px;color:rgba(255,255,255,.5);font-weight:600;margin-top:8px;line-height:1.5}
.prob-track{height:10px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden;display:flex;gap:2px;margin:16px 0 9px}
.ph{background:var(--p)}.pd2{background:var(--am)}.pa{background:var(--red)}
.prob-lbls{display:flex;justify-content:space-between;font-size:11px;margin-top:7px}
.pl-txt{font-weight:700;color:rgba(255,255,255,.7)}
.pl-txt span{font-family:var(--M);font-weight:900;color:#fff}
.ai-insight{background:rgba(0,0,0,.3);border-left:3px solid var(--p);border-radius:0 12px 12px 0;padding:16px 18px;margin-top:18px;font-size:14px;line-height:1.8;color:rgba(255,255,255,.85);backdrop-filter:blur(4px)}
.ai-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:18px 0}
.as{background:rgba(0,0,0,.3);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 10px;text-align:center}
.as span{font-family:var(--M);font-size:22px;font-weight:900;color:var(--p);display:block;margin-bottom:5px}
.as label{font-size:10px;color:rgba(255,255,255,.5);font-weight:800;text-transform:uppercase;letter-spacing:1px}
.tac-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0}
.tc{background:rgba(0,0,0,.3);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px}
.tc-lbl{font-size:10px;color:rgba(255,255,255,.4);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.tc-val{font-size:14px;font-weight:800;color:#fff;margin-bottom:4px}
.tc-note{font-size:12px;color:rgba(255,255,255,.5);line-height:1.5}

/* ══ FAN ZONE ══ */
.fz-hero{background:linear-gradient(145deg,rgba(16,185,129,.08),rgba(3,5,10,0));border:1px solid var(--pb);border-radius:var(--r3);padding:36px 28px;text-align:center;margin-bottom:22px;position:relative;overflow:hidden}
.fz-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:radial-gradient(var(--p),transparent 70%);opacity:.07}
.fz-em{font-size:56px;display:block;margin-bottom:10px}
.fz-lv{font-family:var(--F);font-size:26px;font-weight:800;color:var(--p);margin-bottom:5px}
.fz-desc{font-size:14px;color:var(--t2);font-weight:600;margin-bottom:22px}
.fz-prog{max-width:320px;margin:0 auto}
.fz-bar-bg{height:7px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden;margin-bottom:6px}
.fz-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--p),#34d399);transition:width .9s cubic-bezier(.4,0,.2,1)}
.fz-bar-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);font-weight:700}
.fz-sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:22px}
.fzs{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:16px;padding:16px 10px;text-align:center}
.fzs-v{font-family:var(--M);font-size:22px;font-weight:900;color:var(--t)}
.fzs-l{font-size:10px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:5px}
.ci{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--card2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:8px}
.ci-main{flex:1;min-width:0}
.ci-teams{font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.ci-meta{font-size:12px;color:var(--t2);font-weight:600}
.ci-btn{flex-shrink:0;padding:9px 15px;border-radius:10px;border:1px solid var(--pb);background:var(--ps);color:var(--p);font-size:12px;font-weight:800;cursor:pointer;font-family:var(--B);transition:.18s;white-space:nowrap}
.ci-btn:hover{background:var(--p);color:#000}
.ci-btn:disabled{opacity:.38;cursor:not-allowed;border-color:var(--bd);background:transparent;color:var(--t3)}
.ci-done{font-size:11px;font-weight:800;color:var(--p);background:var(--ps);border:1px solid var(--pb);padding:5px 12px;border-radius:100px;flex-shrink:0}
.lv-guide{background:var(--card2);border:1px solid var(--bd);border-radius:var(--r2);padding:18px;margin-bottom:18px}
.lv-it{display:flex;align-items:center;gap:11px;padding:9px 4px;border-bottom:1px solid rgba(255,255,255,.04)}
.lv-it:last-child{border-bottom:none}
.lv-it:not(.cur){opacity:.4}
.lv-ico{font-size:22px;width:28px}
.lv-nm{font-size:14px;font-weight:800;flex:1}
.lv-req{font-size:11px;color:var(--t2);font-weight:700}

/* ══ MATCH DETAIL MODAL ══ */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);z-index:500;display:none;overflow-y:auto;padding:20px}
.modal-ov.show{display:block}
.modal-box{background:#0c1020;border:1px solid var(--bd2);border-radius:var(--r3);max-width:520px;margin:0 auto;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.85)}
.modal-hd{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.modal-hd h3{font-family:var(--F);font-size:17px;font-weight:800}
.modal-x{background:none;border:none;color:var(--t2);font-size:28px;cursor:pointer;line-height:1;padding:0;transition:color .15s}
.modal-x:hover{color:var(--t)}
.modal-bd{padding:22px}
.dtl-score-blk{text-align:center;padding:14px 0;border-bottom:1px solid var(--bd);margin-bottom:18px}
.dtl-clubs{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dtl-club{flex:1;text-align:center}
.dtl-club img{width:52px;height:52px;object-fit:contain;margin-bottom:8px}
.dtl-club h4{font-size:13px;font-weight:800}
.dtl-score{font-family:var(--M);font-size:44px;font-weight:900;flex-shrink:0}
.dtl-chips{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.dtl-chip{font-size:11px;background:rgba(255,255,255,.05);border:1px solid var(--bd);padding:4px 11px;border-radius:100px;color:var(--t2)}
.sec-mini{font-size:10px;font-weight:800;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin:18px 0 10px}
.goal-row2{display:flex;gap:10px;margin-bottom:4px}
.gs{flex:1;display:flex;flex-direction:column;gap:4px}
.gs.r{align-items:flex-end}
.gev{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:4px}
.gev .gm{font-family:var(--M);color:var(--p);font-weight:800}
.sbar2{margin-bottom:10px}
.sbar-hd{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.sbar-hd .sv{font-weight:800}.sbar-hd .sl{color:var(--t2)}
.sbar-tr{height:5px;background:rgba(255,255,255,.06);border-radius:3px;display:flex;overflow:hidden}
.sh2{background:var(--p)}.sa2{background:var(--red)}

/* ══ LOADERS ══ */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:14px}
.spin{width:28px;height:28px;border:2px solid rgba(255,255,255,.05);border-top-color:var(--p);border-right-color:rgba(16,185,129,.4);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-t{font-family:var(--F);font-size:10px;font-weight:700;color:var(--t3);letter-spacing:3px}
.sk{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:12px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-match{height:82px;margin-bottom:6px}
.sk-row{height:16px;margin-bottom:8px;border-radius:5px}
.empty{text-align:center;padding:60px 20px}
.empty .ei{font-size:44px;margin-bottom:14px}
.empty h3{font-size:18px;font-weight:800;margin-bottom:8px}
.empty p{font-size:14px;color:var(--t2);line-height:1.6}
.retry{margin-top:14px;padding:10px 24px;border-radius:100px;border:1px solid var(--pb);background:var(--ps);color:var(--p);font-size:13px;font-weight:800;cursor:pointer;font-family:var(--B);transition:.15s}
.retry:hover{background:var(--p);color:#000}

/* ══ TOAST ══ */
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--pb);border-radius:100px;padding:11px 22px;font-size:13px;font-weight:700;z-index:8000;display:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:none}

/* ══ GOAL FLASH ══ */
#gf{position:fixed;inset:0;background:rgba(0,0,0,.93);backdrop-filter:blur(28px);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;cursor:pointer}
#gf.show{display:flex;animation:pop .55s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
.gf-net{animation:nw .5s ease .25s 4}
@keyframes nw{0%,100%{transform:scaleY(1)}40%{transform:scaleY(1.12)}70%{transform:scaleY(.95)}}
.gf-word{font-family:var(--F);font-size:86px;font-weight:800;color:#fff;letter-spacing:10px;animation:gg 1.2s ease infinite alternate}
@keyframes gg{from{text-shadow:0 0 30px var(--p),0 0 60px rgba(16,185,129,.3)}to{text-shadow:0 0 60px var(--p),0 0 120px rgba(16,185,129,.5)}}
.gf-scorer{font-size:22px;font-weight:800;color:var(--p)}
.gf-info{font-size:13px;color:rgba(255,255,255,.4)}

/* ══ LEVEL UP ══ */
#lvup{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;cursor:pointer}
#lvup.show{display:flex;animation:pop .5s ease}
.lu-em{font-size:88px}.lu-t{font-family:var(--F);font-size:38px;font-weight:800;color:var(--p)}.lu-s{font-size:15px;color:var(--t2)}

/* ══ ERROR BANNER ══ */
.api-err{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);border-radius:14px;padding:14px 18px;font-size:13px;color:rgba(244,63,94,.9);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.api-err button{background:transparent;border:1px solid rgba(244,63,94,.3);color:rgba(244,63,94,.9);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--B);margin-left:auto;white-space:nowrap}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="ob">
  <div class="ob-wrap">
    <div class="ob-hero">
      <div class="ob-logo-ring"><span class="ob-logo-p">P</span></div>

  <svg class="gf-net" width="230" height="94" viewBox="0 0 230 94">

      <line x1="141" y1="11" x2="138" y2="85"/><line x1="183" y1="11" x2="180" y2="85"/>
      <line x1="15" y1="34" x2="215" y2="34"/><line x1="15" y1="57" x2="215" y2="57"/><line x1="15" y1="76" x2="215" y2="76"/>
    </g>

</div>

<script>
'use strict';
const API='/api/football';
const KL_LEAGUE=292,KL2_LEAGUE=293,KL_SEASON=2026;

// ── i18n ──
const T={
  en:{
    live:'Live',sched:'Schedule',std:'Standings',player:'Players',ai:'AI PITCH',fan:'Fan Zone',

    goals:'골',assists:'도움',changeClub:'⟳ 팀 변경',
    fanZone:'팬존',checkIn:'집관 인증',done:'✓ 완료',notYet:'⏰ 아직',
    noFixtures:'예정 경기 없음',matchTime:'경기 시간에만',
    lvGuide:'레벨 가이드',history:'인증 기록',noHistory:'인증 기록 없음',

    matchPreview:'AI 경기 분석',homeWin:'홈 승',draw:'무',awayWin:'원정 승',
    aiAnalysis:'AI 분석',alertsOn:'알림 ON',alertsOff:'알림 OFF',
    matchTime30:'경기 30분 전부터 인증 가능',
    retrying:'자동 재시도',rateLimited:'요청 한도 — 자동 재시도',

};
let lang=localStorage.getItem('pi_lang')||'en';
const t=k=>T[lang]?.[k]||T.en[k]||k;

// ── League registry ──
const LEAGUES=[
  {c:'PL', n:'Premier League',logo:'https://crests.football-data.org/PL.png'},
  {c:'PD', n:'La Liga',       logo:'https://crests.football-data.org/PD.png'},
  {c:'BL1',n:'Bundesliga',    logo:'https://crests.football-data.org/BL1.png'},
  {c:'SA', n:'Serie A',       logo:'https://crests.football-data.org/SA.png'},

// ── API (parallel, no queue) ──
async function fd(path,ttl=90000){
  const cached=gc(path,ttl);if(cached)return cached;
  try{
    const r=await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`,{signal:AbortSignal.timeout(12000)});
    if(!r.ok){console.warn('fd error',r.status,path);return null;}
    const d=await r.json();
    // Success: cache and return
    if(!d.errorCode||d.errorCode===200){sc(path,d);return d;}
    // Rate limit
    console.warn('fd API error',d.errorCode,d.message,path);
    return d;
  }catch(e){console.error('fd fetch error',e.message,path);return null;}
}
async function fdAll(paths,ttl=90000){return Promise.all(paths.map(p=>fd(p,ttl)));}
async function klAPI(path,params={}){
  const qs=new URLSearchParams(params).toString();
  const key=path+'?'+qs;const c=gc(key,120000);if(c)return c;
  try{
    const r=await fetch(`${API}?type=kl&path=${encodeURIComponent(path)}&${qs}`,{signal:AbortSignal.timeout(12000)});
    if(!r.ok)return null;const d=await r.json();
    if(d.errors&&Object.keys(d.errors).length)return null;
    sc(key,d);return d;
  }catch{return null;}
}
function klToFd(f){return{_kl:true,id:f.fixture.id,status:mapKL(f.fixture.status.short),utcDate:f.fixture.date,competition:{name:'K League 1'},matchday:f.league.round?.replace('Regular Season - ',''),homeTeam:{id:f.teams.home.id,name:f.teams.home.name,shortName:f.teams.home.name,crest:f.teams.home.logo},awayTeam:{id:f.teams.away.id,name:f.teams.away.name,shortName:f.teams.away.name,crest:f.teams.away.logo},score:{fullTime:{home:f.goals.home,away:f.goals.away}},goals:(f.events||[]).filter(e=>e.type==='Goal').map(e=>({minute:e.time.elapsed,team:{id:e.team.id},scorer:{name:e.player.name}})),events:(f.events||[])};}

async function reqNotif(){if(!('Notification'in window))return false;if(Notification.permission==='granted')return true;if(Notification.permission==='denied')return false;return(await Notification.requestPermission())==='granted';}
function pushNotif(title,body,tag='pi'){if(Notification.permission!=='granted')return;try{if(navigator.serviceWorker.controller){navigator.serviceWorker.controller.postMessage({type:'show-notification',title,body,tag,icon:'/favicon.ico',vibrate:[200,100,200]});}else{new Notification(title,{body,icon:'/favicon.ico',tag});}}catch{}}
function toggleWatch(id,hn,an,btn){const sid=String(id),idx=watchList.indexOf(sid);if(idx===-1){reqNotif().then(ok=>{if(!ok){toast('🔔 Allow notifications in browser');return;}watchList.push(sid);localStorage.setItem('pi_watch',JSON.stringify(watchList));btn.classList.add('on');btn.textContent='🔔';toast(`🔔 ${hn} vs ${an} — ${t('alertsOn')}`,`var(--p)`);});}else{watchList.splice(idx,1);localStorage.setItem('pi_watch',JSON.stringify(watchList));btn.classList.remove('on');btn.textContent='🔕';toast(t('alertsOff'));}}

// ── Goal SFX ──
function playGoalSfx(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[[523,.12],[659,.12],[784,.12],[1047,.26],[784,.09],[1047,.44]].reduce((time,[f,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='triangle';g.gain.setValueAtTime(0,time);g.gain.linearRampToValueAtTime(.38,time+.04);g.gain.linearRampToValueAtTime(0,time+d-.02);o.start(time);o.stop(time+d);return time+d;},ctx.currentTime+.05);const buf=ctx.createBuffer(1,ctx.sampleRate*.75,ctx.sampleRate);const da=buf.getChannelData(0);for(let i=0;i<da.length;i++)da[i]=(Math.random()*2-1)*.07;const ns=ctx.createBufferSource();ns.buffer=buf;const ng=ctx.createGain();ns.connect(ng);ng.connect(ctx.destination);ng.gain.setValueAtTime(.18,ctx.currentTime+.55);ng.gain.linearRampToValueAtTime(0,ctx.currentTime+1.5);ns.start(ctx.currentTime+.55);}catch{}}

function showGoal(scorer,team,min,hn,an,hg,ag){
  document.getElementById('g-scorer').textContent=scorer?`⚽ ${scorer}`:team||'';
  document.getElementById('g-detail').textContent=(hn&&an)?`${hn} ${hg}:${ag} ${an}${min?' · '+min+"'":''}`: '';
  const el=document.getElementById('gf');el.classList.add('show');playGoalSfx();
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),5500);
}

function chkGoal(m){
  const id=m.id;
  const hg=m.score?.fullTime?.home??m.score?.halfTime?.home??0;
  const ag=m.score?.fullTime?.away??m.score?.halfTime?.away??0;
  const sc2=`${hg}:${ag}`;
  if(prevSc[id]!==undefined&&prevSc[id]!==sc2){
    const isH=parseInt(hg)>parseInt((prevSc[id]||'0').split(':')[0]);
    const team=isH?(m.homeTeam?.shortName||m.homeTeam?.name):(m.awayTeam?.shortName||m.awayTeam?.name);
    const goals=m.goals||[];const last=goals[goals.length-1];
    showGoal(last?.scorer?.name||last?.player?.name||'',team,last?.minute,m.homeTeam?.shortName,m.awayTeam?.shortName,hg,ag);
    if(watchList.includes(String(id)))pushNotif(`⚽ GOAL! ${team}`,`${m.homeTeam?.shortName} ${hg}:${ag} ${m.awayTeam?.shortName}${last?.scorer?.name?' · '+last.scorer.name:''}`,'g'+id);
  }
  if(!prevSt[id])prevSt[id]=m.status;
  else if(prevSt[id]!==m.status){
    if(watchList.includes(String(id))){const hn=m.homeTeam?.shortName||m.homeTeam?.name,an=m.awayTeam?.shortName||m.awayTeam?.name;if(m.status==='IN_PLAY'&&prevSt[id]==='SCHEDULED')pushNotif(`🏁 Kick-off!`,`${hn} vs ${an}`,'ko'+id);if(m.status==='HALFTIME')pushNotif(`⏸ Half-time`,`${hn} ${hg}:${ag} ${an}`,'ht'+id);if(m.status==='FINISHED'||m.status==='AWARDED')pushNotif(`🏆 Full-time`,`${hn} ${hg}:${ag} ${an}`,'ft'+id);}
    prevSt[id]=m.status;
  }
  prevSc[id]=sc2;
}

async function loadLive(silent=false){
  const c=document.getElementById('content');
  if(!c)return;
  if(!silent)c.innerHTML=skeleton(4);
  const today=ds(kn());
  const ks=new Date(today+'T00:00:00+09:00');
  const uf=new Date(ks.getTime()-9*3600000).toISOString().slice(0,10);
  const ut=new Date(ks.getTime()-9*3600000+86399000).toISOString().slice(0,10);
  const results=await fdAll([
    `/competitions/PL/matches?dateFrom=${uf}&dateTo=${ut}`,
    `/competitions/PD/matches?dateFrom=${uf}&dateTo=${ut}`,
    `/competitions/BL1/matches?dateFrom=${uf}&dateTo=${ut}`,
    `/competitions/SA/matches?dateFrom=${uf}&dateTo=${ut}`,
    `/competitions/FL1/matches?dateFrom=${uf}&dateTo=${ut}`,
  ]);
  let all=[];
  results.forEach(d=>{if(d?.matches)all.push(...d.matches);});
  if(SEL.some(t=>t.league==='KL1'||t.league==='KL2')){
    const klD=await klAPI('/fixtures',{league:KL_LEAGUE,season:KL_SEASON,date:uf});
    (klD?.response||[]).forEach(f=>all.push(klToFd(f)));
  }
  all.forEach(m=>{if(isLive(m))chkGoal(m);});
  const live=all.filter(m=>isLive(m)&&isKstToday(m.utcDate));
  const sched=all.filter(m=>isSch(m)&&isKstToday(m.utcDate));
  const fin=all.filter(m=>isFin(m)&&isKstToday(m.utcDate));
  document.getElementById('live-badge')?.classList.toggle('on',live.length>0);
  if(!live.length&&!sched.length&&!fin.length){c.innerHTML=`<div class="empty"><div class="ei">📅</div><h3>${t('noMatches')}</h3><p>${t('checkSched')}</p></div>`;return;}
  let html='';
  if(live.length){html+=`<div class="sh"><h2 style="color:var(--red)">🔴 LIVE</h2><span class="sh-badge">${live.length} matches</span></div>${buildGrouped(live)}<div style="height:18px"></div>`;}
  if(sched.length){html+=`<div class="sh"><h2>${t('sched')}</h2><span class="sh-badge">${today} KST</span></div>${buildGrouped(sched)}<div style="height:18px"></div>`;}
  if(fin.length){html+=`<div class="sh"><h2>Final Scores</h2><span class="sh-badge">${fin.length} played</span></div>${buildGrouped(fin)}</div>`;}
  c.innerHTML=html;
}
function buildGrouped(matches){
  const groups={};
  matches.forEach(m=>{const k=m.competition?.name||'Other';if(!groups[k])groups[k]={matches:[],logo:''};groups[k].matches.push(m);const lg=LEAGUES.find(l=>l.n===k||k.includes(l.n.slice(0,5)));if(lg)groups[k].logo=lg.logo;});
  return Object.entries(groups).map(([lgName,{matches:ms,logo}])=>{
    const lvc=ms.filter(m=>isLive(m)).length;
    return`<div class="mg"><div class="mg-head">${logo?`<img src="${logo}" onerror="this.style.opacity='.2'">`:''}
      <span class="lgn">${lgName}</span>
      ${lvc?`<span class="livc">● LIVE ${lvc}</span>`:`<span style="font-size:11px;color:var(--t3);font-weight:700;">${ms.length}</span>`}
    </div>${ms.map(m=>buildMatchRow(m)).join('')}</div>`;
  }).join('');
}

function buildMatchRow(m){
  const h=m.homeTeam,a=m.awayTeam;
  const live=isLive(m),fin=isFin(m);
  const hg=m.score?.fullTime?.home??m.score?.halfTime?.home;
  const ag=m.score?.fullTime?.away??m.score?.halfTime?.away;
  const hW=fin&&hg!=null&&hg>ag,aW=fin&&ag!=null&&ag>hg;
  const hcr=crestOf(h),acr=crestOf(a);
  const hn=elv(h?.shortName||h?.name||''),an=elv(a?.shortName||a?.name||'');
  const my=isMyMatch(m);
  const isW=watchList.includes(String(m.id));
  let timeStr=kt(m.utcDate);
  if(live){const e=Math.floor((Date.now()-new Date(m.utcDate).getTime())/60000);timeStr=m.status==='HALFTIME'?'HT':`${Math.min(e,90)}'`;}
  if(fin)timeStr='FT';
  const od=ods(m);
  const showOdds=!fin&&!live;
  // Goals/events preview for finished matches
  const goals=m.goals||[];
  const hG=goals.filter(g=>g.team?.id===h?.id);
  const aG=goals.filter(g=>g.team?.id===a?.id);
  const showGoals=fin&&goals.length>0;
  return`<div class="mr ${my?'my':''} ${live?'live-r':''}" onclick="openMatch(${m.id},'${hn}','${an}',${!!m._kl})">
    <div class="mt"><div class="mt-t ${live?'lv':fin?'ft':''}">${live?`<span style="color:var(--red);font-size:10px">●</span> ${timeStr}`:timeStr}</div></div>
    <div class="mb2">
      <div class="ml"><div class="mc"><img src="${hcr}" alt="${hn}" data-id="${h?.id||0}" onerror="imgErr(this)" width="18" height="18"><span class="mn2 ${hW?'':'d'}" style="${hW?'color:var(--t);font-weight:800;':''}">${h?.shortName||h?.name||''}</span></div><span class="msv ${hW?'w':''}">${hg??'–'}</span></div>
      <div class="ml"><div class="mc"><img src="${acr}" alt="${an}" data-id="${a?.id||0}" onerror="imgErr(this)" width="18" height="18"><span class="mn2 ${aW?'':'d'}" style="${aW?'color:var(--t);font-weight:800;':''}">${a?.shortName||a?.name||''}</span></div><span class="msv ${aW?'w':''}">${ag??'–'}</span></div>
      ${showOdds?`<div class="odds-bar"><div class="ob2"><div class="ob-l">${hn.slice(0,7)}</div><div class="ob-v ${parseFloat(od.hw)<2?'fav':''}">${od.hw}</div></div><div class="ob2"><div class="ob-l">Draw</div><div class="ob-v">${od.dr}</div></div><div class="ob2"><div class="ob-l">${an.slice(0,7)}</div><div class="ob-v ${parseFloat(od.aw)<2?'fav':''}">${od.aw}</div></div></div>`:''}
    </div>
    <div class="ma"><button class="nb ${isW?'on':''}" onclick="event.stopPropagation();toggleWatch(${m.id},'${hn}','${an}',this)">${isW?'🔔':'🔕'}</button></div>
  </div>${showGoals?`<div class="mr-events">
    <div class="ev-side">${hG.map(g=>`<div class="ev-item"><span class="ev-ico">⚽</span><span class="ev-min">${g.minute}'</span><span>${(g.scorer?.name||g.player?.name||'').split(' ').pop()}</span></div>`).join('')}</div>
    <div class="ev-side r">${aG.map(g=>`<div class="ev-item"><span>${(g.scorer?.name||g.player?.name||'').split(' ').pop()}</span><span class="ev-min">${g.minute}'</span><span class="ev-ico">⚽</span></div>`).join('')}</div>
  </div>`:''}`;
}

    return`<button class="date-btn ${isSel?'on':''} ${isT?'today':''}" onclick="schedGo('${d}',this)"><span class="db-dow">${isT?t('today'):dow}</span><span class="db-d">${dt.getUTCDate()}</span></button>`;

async function renderStd(){
  const body=document.getElementById('std-body');
  if(!body)return;
  body.innerHTML=skeleton(8);
  if(curLg==='KL1'||curLg==='KL2'){
    await renderKLStd(body,curLg==='KL1'?KL_LEAGUE:KL2_LEAGUE);
    return;
  }

  let d=null;
  try {
    const url=`${API}?type=fd&path=${encodeURIComponent('/competitions/'+curLg+'/standings')}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(12000)});
    if(r.ok) d=await r.json();
  } catch(e){
    body.innerHTML=`<div class="api-err">⚠ Network error: ${e.message}<button onclick="renderStd()">Retry</button></div>`;
    return;
  }

  // Check for valid standings data
  const table=d?.standings?.[0]?.table;
  if(!table?.length){
    const code=d?.errorCode, msg=d?.message||d?.error||'No data';
    const isRL=code===429||(msg+'').toLowerCase().includes('limit')||(msg+'').toLowerCase().includes('rate');
    const isFree=code===404||(msg+'').toLowerCase().includes('tier')||(msg+'').toLowerCase().includes('permission');
    const errMsg=isRL?'API rate limit reached — retrying automatically'
                :isFree?'Free tier plan may not support this league'
                :code?`API error ${code}: ${msg}`
                :`Standings unavailable (${msg})`;
    body.innerHTML=`<div class="api-err">⚠ ${errMsg}<button onclick="renderStd()">Retry</button></div>`;
    if(isRL){
      let n=13;
      const ti=setInterval(()=>{
        n--;
        const b=body.querySelector('button');
        if(b)b.textContent=`Retry (${n}s)`;
        if(n<=0){clearInterval(ti);renderStd();}
      },1000);

  sc('/competitions/'+curLg+'/standings', d);

  body.innerHTML=`
    ${lg?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:13px 17px;background:var(--card2);border:1px solid var(--bd);border-radius:16px;">
      <img src="${lg.logo}" style="width:24px;height:24px;object-fit:contain;" onerror="this.style.opacity='.3'">
      <span style="font-family:var(--F);font-size:15px;font-weight:800;">${lg.n}</span>
      <span style="margin-left:auto;font-size:12px;color:var(--t2);">2025–26</span>
    </div>`:''}
    <div class="std-scroll">
    <table class="std-tbl">
      <thead><tr><th>#</th><th>Club</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th><th>Form</th></tr></thead>
      <tbody>${rows.map(row=>{
        const my=SEL.some(s=>s.id===row.team.id);
        const gd=row.goalsDiff>=0?'+'+row.goalsDiff:row.goalsDiff;
        const fm=(row.form||'').split('').slice(-5);
        return `<tr class="${my?'my':''} ${zc(row.position)}">
          <td><span class="pos ${pc(row.position)}">${row.position}</span></td>
          <td><div class="cc">
            <img src="${row.team.crest||`https://crests.football-data.org/${row.team.id}.png`}"
              data-id="${row.team.id}" onerror="imgErr(this)" width="22" height="22" style="object-fit:contain">
            ${row.team.shortName||row.team.name}
          </div></td>
          <td>${row.all.played}</td>
          <td>${row.all.win}</td>
          <td>${row.all.draw}</td>
          <td>${row.all.lose}</td>
          <td><span class="gd">${gd}</span></td>
          <td><span class="pts">${row.points}</span></td>
          <td><div class="frm">${fm.map(f=>`<div class="fd" style="background:${fc[f]||'rgba(255,255,255,.1)'}"></div>`).join('')}</div></td>
        </tr>`;
      }).join('')}</tbody>
    </table>
    </div>
    <div class="std-legend">
      ${zMap.cl?.length?`<div class="leg-item"><div class="leg-dot" style="background:var(--blue)"></div>Champions League</div>`:''}
      ${zMap.el?.length?`<div class="leg-item"><div class="leg-dot" style="background:var(--am)"></div>Europa League</div>`:''}
      ${zMap.ecl?.length?`<div class="leg-item"><div class="leg-dot" style="background:var(--purp)"></div>Conference</div>`:''}
      ${zMap.rel?.length?`<div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Relegation</div>`:''}
    </div>`;
}

  lang=localStorage.getItem('pi_lang')||'en';
  // Init lang buttons
  document.querySelectorAll('.lang-btn,.hdr-lang').forEach(btn=>{btn.textContent=lang==='en'?'🇰🇷 한국어':'🇬🇧 English';});
  if(SEL.length){
    applyTheme(SEL[0].col);
    document.getElementById('ob').style.display='none';
    document.getElementById('app').classList.add('on');
    updateHdr();updateSidebarTeam();renderNav();swPage('home');
    liveTimer=setInterval(()=>{if(curPage==='home')loadLive(true);},60000);
  }else{document.getElementById('ob').style.display='block';initOb();}
});

</script>
</body>
</html>
