<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH Pro: Ultimate Master</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2310b981'/%3E%3Cstop offset='100%25' stop-color='%233b82f6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M20 10h16a12 12 0 0 1 0 24H20v18h-6V10zm6 6v12h10a6 6 0 1 0 0-12H26z' fill='url(%23g)'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── [1. 시네마틱 디자인 시스템] ── */
:root{
  --f-h:'Poppins', sans-serif; --f-b:'Noto Sans KR', sans-serif;
  --bg:#05070a; --bg2:#0d1117; --cd:rgba(20, 24, 31, 0.9);
  --p:#10b981; --ps:rgba(16, 185, 129, 0.15); --pb:rgba(16, 185, 129, 0.3);
  --s:#3b82f6; --ss:rgba(59, 130, 246, 0.15);
  --t:#ffffff; --t2:#a1a1aa; --t3:#3f3f46;
  --red:#ef4444; --br:24px; --sh:0 20px 40px rgba(0,0,0,0.6);
}
*,*::before,*::after{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{background:var(--bg); color:var(--t); font-family:var(--f-b); overflow:hidden; height:100vh;}

/* ── [2. 레이아웃] ── */
#app{display:flex; height:100vh; flex-direction:column;}
.hdr{height:72px; display:flex; align-items:center; justify-content:space-between; padding:0 32px; background:rgba(13, 17, 23, 0.85); backdrop-filter:blur(25px); border-bottom:1px solid rgba(255,255,255,0.04); z-index:1000;}
.hdr-logo{font-family:var(--f-h); font-size:22px; font-weight:900; background: linear-gradient(135deg, var(--p) 0%, var(--s) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
.main-body{flex:1; display:flex; overflow:hidden;}
.sidebar{width:260px; background:var(--bg2); padding:30px 16px; border-right:1px solid rgba(255,255,255,0.03); display:flex; flex-direction:column;}
.si{display:flex; align-items:center; gap:14px; padding:16px 20px; border-radius:16px; cursor:pointer; color:var(--t2); font-weight:700; transition:0.3s; margin-bottom:8px;}
.si.on{background:var(--ps); color:var(--p); border:1px solid rgba(16, 185, 129, 0.1);}
.pages{flex:1; overflow-y:auto; padding:40px; scroll-behavior: smooth;}
.page{display:none;} .page.on{display:block;}

/* ── [3. 컴포넌트] ── */
.mc{background:var(--cd); border:1px solid rgba(255,255,255,0.05); border-radius:var(--br); margin-bottom:20px; overflow:hidden; transition:0.3s; box-shadow:var(--sh);}
.mc:hover{border-color:var(--p); transform:translateY(-4px);}
.mc-top{padding:12px 20px; background:rgba(255,255,255,0.02); display:flex; justify-content:space-between; font-size:11px; font-weight:800; color:var(--t3); letter-spacing:1px;}
.mc-body{padding:25px 20px; display:flex; align-items:center; justify-content:center; gap:15px;}
.mc-tm{flex:1; text-align:center; font-family:var(--f-h); font-weight:900; font-size:18px;}
.mc-sc-box{background:rgba(0,0,0,0.6); padding:8px 16px; border-radius:12px; border:1px solid var(--pb); font-family:var(--f-h); font-size:28px; font-weight:900;}

.lg-hd{display:flex; align-items:center; gap:12px; padding:18px 24px; background:var(--bg2); border-radius:18px; cursor:pointer; margin-top:15px; border:1px solid rgba(255,255,255,0.03); font-weight:800;}
.lg-ms{display:flex; flex-direction:column; padding:10px 0;}

/* ── [4. 순위 & 선수] ── */
.stt{width:100%; border-collapse:separate; border-spacing:0 8px;}
.stt th{padding:12px; color:var(--t3); font-size:11px; font-weight:800; text-align:center;}
.stt td{padding:16px 12px; background:rgba(255,255,255,0.02); text-align:center; font-weight:600;}
.nm-cell{display:flex; align-items:center; gap:12px; text-align:left;}
.nm-cell img{width:28px; height:28px; object-fit:contain;}

.pills{display:flex; gap:10px; overflow-x:auto; padding-bottom:15px; margin-bottom:20px; scrollbar-width: none;}
.pills::-webkit-scrollbar {display: none;}
.pill{padding:10px 20px; border-radius:100px; border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.02); color:var(--t2); cursor:pointer; font-weight:700; white-space:nowrap; transition:0.2s;}
.pill.on{background:var(--p); color:var(--bg); border-color:var(--p); box-shadow:0 0 15px var(--p);}

/* ── [5. AI & 팬존] ── */
.ai-card{background:linear-gradient(165deg, #0d1117 0%, #05070a 100%); border:1px solid var(--pb); border-radius:25px; padding:30px; margin-bottom:24px; position:relative;}
.prob-bar-wrap{height:14px; background:rgba(255,255,255,0.04); border-radius:100px; margin:20px 0; overflow:hidden; display:flex;}
.prob-h{background:linear-gradient(90deg, #059669, var(--p)); box-shadow:0 0 20px var(--p);}
.prob-a{background:linear-gradient(90deg, #dc2626, var(--red)); box-shadow:0 0 20px var(--red);}

.fan-card{background:var(--bg2); border:1px solid rgba(255,255,255,0.05); border-radius:20px; padding:24px; margin-bottom:20px;}
.toggle-wrap{display:flex; justify-content:space-between; align-items:center; margin-top:15px; padding:12px; background:rgba(255,255,255,0.02); border-radius:12px;}
.toggle{width:44px; height:24px; background:var(--t3); border-radius:100px; position:relative; cursor:pointer; transition:0.3s;}
.toggle.on{background:var(--p);}
.toggle::after{content:''; position:absolute; width:18px; height:18px; background:#fff; border-radius:50%; top:3px; left:3px; transition:0.3s;}
.toggle.on::after{left:23px;}

/* ── [6. 시네마틱 애니메이션 레이어] ── */
#gt{position:fixed; inset:0; z-index:9999; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); backdrop-filter:blur(20px); pointer-events:none;}
.gt-box{text-align:center;}
.gt-word{font-family:var(--f-h); font-size:100px; font-weight:900; color:var(--p); filter:drop-shadow(0 0 30px var(--p)); animation: gtCinema 0.8s cubic-bezier(0.17,0.89,0.32,1.2) forwards;}
@keyframes gtCinema{0%{transform:scale(2); opacity:0} 100%{transform:scale(1); opacity:1}}

/* 상세 모달 */
#modal{display:none; position:fixed; inset:0; z-index:2000; align-items:center; justify-content:center; padding:24px; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px);}
.modal-content{background:var(--bg2); width:100%; max-width:550px; border-radius:30px; border:1px solid var(--pb); padding:40px; position:relative;}
</style>
</head>
<body>

<div id="app">
  <header class="hdr">
    <div class="hdr-logo">PITCH PRO</div>
    <div class="hdr-r" style="display:flex; align-items:center; gap:15px;">
      <div id="lpill" style="display:none; color:var(--red); font-weight:900; font-size:12px;">● LIVE</div>
      <div id="hdr-lv" style="font-family:var(--f-h); font-size:11px; background:var(--ps); color:var(--p); padding:6px 16px; border-radius:100px; font-weight:800; border:1px solid var(--pb);">LV.3 MASTER</div>
    </div>
  </header>

  <div class="main-body">
    <aside class="sidebar">
      <div class="si on" onclick="swP('home',this)">⚡ LIVE MATCH</div>
      <div class="si" onclick="swP('sched',this)">📅 SCHEDULE</div>
      <div class="si" onclick="swP('ai',this)">🤖 AI PITCH</div>
      <div class="si" onclick="swP('std',this)">📊 STANDINGS</div>
      <div class="si" onclick="swP('player',this)">👟 TOP STATS</div>
      <div class="si" onclick="swP('fan',this)">⭐ FAN ZONE</div>
      <div style="margin-top:auto; padding:15px; background:rgba(255,255,255,0.02); border-radius:15px;">
          <button onclick="testGoal()" style="width:100%; padding:10px; border:none; background:var(--p); color:var(--bg); border-radius:10px; font-weight:800; cursor:pointer;">⚽ GOAL TEST</button>
      </div>
    </aside>

    <main class="pages">
      <div class="page on" id="pg-home">
        <h1 style="font-family:var(--f-h); font-weight:900; font-size:32px; margin-bottom:30px;">⚡ 실시간 매치</h1>
        <div id="home-bd"></div>
      </div>
      <div class="page" id="pg-sched">
        <h1 style="font-family:var(--f-h); font-weight:900; font-size:28px; margin-bottom:10px;">APRIL SCHEDULE</h1>
        <div id="date-nav" class="pills"></div>
        <div id="sched-bd"></div>
      </div>
      <div class="page" id="pg-ai">
        <h1 style="font-family:var(--f-h); font-weight:900; font-size:32px; margin-bottom:30px;">🤖 AI 슈퍼컴퓨터 분석</h1>
        <div id="ai-bd"></div>
      </div>
      <div class="page" id="pg-std">
        <div id="std-pills" class="pills"></div>
        <div id="std-bd"></div>
      </div>
      <div class="page" id="pg-player">
        <div id="pl-pills" class="pills"></div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
          <button class="pill on" id="btn-scorers" onclick="swPt('scorers')">GOALS</button>
          <button class="pill" id="btn-assists" onclick="swPt('assists')">ASSISTS</button>
        </div>
        <div id="pl-bd"></div>
      </div>
      <div class="page" id="pg-fan">
        <div class="fan-card">
          <h3 style="margin-bottom:15px; display:flex; align-items:center; gap:10px;">
             화성 FC 알림 설정
          </h3>
          <div class="toggle-wrap">
            <span>경기 시작 30분 전 알림</span>
            <div class="toggle on" onclick="this.classList.toggle('on')"></div>
          </div>
          <div class="toggle-wrap">
            <span>실시간 골 소식 (Push)</span>
            <div class="toggle on" onclick="this.classList.toggle('on')"></div>
          </div>
        </div>
        <h2 style="font-size:18px; margin-bottom:15px; font-weight:800;">내 팀 다음 일정</h2>
        <div id="fan-bd"></div>
      </div>
    </main>
  </div>
</div>

<div id="gt"><div class="gt-box"><div class="gt-word">GOAL!</div><div id="gt-team" style="font-size:24px; font-weight:800; color:#fff; text-align:center; margin-top:20px;"></div></div></div>

<div id="modal">
  <div class="modal-content">
    <button onclick="closeModal()" style="position:absolute; top:25px; right:25px; background:none; border:none; color:var(--t2); font-size:32px; cursor:pointer;">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── [JS ENGINE: FULL INTEGRATION] ──

const IS_TEST_MODE = true; // 실제 서비스 시 false
const API = '/api/football';
const LGS = [
  {code:'PL', name:'EPL', emblem:'https://crests.football-data.org/PL.png'},
  {code:'LA', name:'라리가', emblem:'https://crests.football-data.org/LA.png'},
  {code:'BL1',name:'분데스', emblem:'https://crests.football-data.org/BL1.png'},
  {code:'SA', name:'세리에', emblem:'https://crests.football-data.org/SA.png'},
  {code:'FL1',name:'리그앙', emblem:'https://crests.football-data.org/FL1.png'}
];

const cache = {};
let prevScores = {};
let curPLg = 'PL';
let curPt = 'scorers';

// [1] 스마트 캐시 & 데이터 로드
async function fetchData(path, isStatic = false) {
  if(IS_TEST_MODE) return getMockData(path);
  const ttl = isStatic ? 1800000 : 90000;
  if(cache[path] && (Date.now() - cache[path].ts < ttl)) return cache[path].data;
  try {
    const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if(d.errorCode === 429) return cache[path]?.data || d;
    cache[path] = { data: d, ts: Date.now() };
    return d;
  } catch(e) { return null; }
}

// [2] 홈 & 라이브 & 골 감지
async function loadHome() {
  const c = document.getElementById('home-bd');
  const d = await fetchData('/matches');
  if(!d?.matches) return;

  const live = d.matches.filter(m => ['IN_PLAY','HALFTIME'].includes(m.status));
  document.getElementById('lpill').style.display = live.length ? 'block' : 'none';

  live.forEach(m => {
    const sc = `${m.score.fullTime.home}-${m.score.fullTime.away}`;
    if(prevScores[m.id] && prevScores[m.id] !== sc) {
        const team = m.score.fullTime.home > prevScores[m.id].split('-')[0] ? m.homeTeam.shortName : m.awayTeam.shortName;
        triggerGoal(team);
    }
    prevScores[m.id] = sc;
  });

  c.innerHTML = live.map(m => `
    <div class="mc" onclick="showDtl(${m.id})">
      <div class="mc-top"><span>${m.competition.name}</span><span style="color:var(--red);">● LIVE</span></div>
      <div class="mc-body">
        <div class="mc-tm"><span>${m.homeTeam.shortName}</span></div>
        <div class="mc-sc-box">${m.score.fullTime.home} : ${m.score.fullTime.away}</div>
        <div class="mc-tm"><span>${m.awayTeam.shortName}</span></div>
      </div>
    </div>`).join('') || '<div style="padding:100px; text-align:center; color:var(--t3);">현재 진행 중인 경기가 없습니다.</div>';
}

function triggerGoal(team) {
  const gt = document.getElementById('gt');
  document.getElementById('gt-team').textContent = `${team} GOAL!`;
  gt.style.display = 'flex';
  const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
  audio.play().catch(()=>{});
  setTimeout(() => gt.style.display = 'none', 4000);
}

// [3] 4월 전체 일정 & 아코디언 토글
async function loadSched(date = new Date().toISOString().split('T')[0]) {
  const c = document.getElementById('sched-bd');
  const d = await fetchData(`/matches?dateFrom=${date}&dateTo=${date}`);
  if(!d.matches?.length) { c.innerHTML = '<div style="padding:100px; text-align:center;">경기가 없습니다.</div>'; return; }

  const groups = d.matches.reduce((acc, m) => {
    acc[m.competition.name] = acc[m.competition.name] || [];
    acc[m.competition.name].push(m);
    return acc;
  }, {});

  c.innerHTML = Object.entries(groups).map(([name, ms], i) => `
    <div class="lg-hd" onclick="toggleLg('lg-${i}')">
      <span style="flex:1;">${name}</span>
      <span style="font-size:12px; color:var(--t2);">${ms.length} 경기 ▾</span>
    </div>
    <div class="lg-ms" id="lg-${i}">
      ${ms.map(m => `
        <div class="mc" style="margin-top:10px;" onclick="showDtl(${m.id})">
          <div style="display:flex; justify-content:space-between; align-items:center; padding:15px 25px;">
            <span style="font-size:12px; color:var(--t3);">${m.utcDate.slice(11,16)}</span>
            <span style="flex:1; text-align:center; font-weight:700;">${m.homeTeam.shortName} vs ${m.awayTeam.shortName}</span>
            <span style="font-weight:900; color:var(--p);">${m.score.fullTime.home??'-'} : ${m.score.fullTime.away??'-'}</span>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function toggleLg(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

function initDateNav() {
  const nav = document.getElementById('date-nav');
  if(nav.innerHTML) return;
  for(let i=1; i<=30; i++) {
    const date = `2026-04-${String(i).padStart(2,'0')}`;
    const btn = document.createElement('button');
    btn.className = `pill ${i === 12 ? 'on' : ''}`;
    btn.textContent = `4/${i}`;
    btn.onclick = () => {
      document.querySelectorAll('#date-nav .pill').forEach(p => p.classList.remove('on'));
      btn.classList.add('on');
      loadSched(date);
    };
    nav.appendChild(btn);
  }
}

// [4] AI PITCH (오늘/내일 싹다 추가)
async function loadAI() {
  const c = document.getElementById('ai-bd');
  const d = await fetchData('/matches');
  c.innerHTML = d.matches?.slice(0, 10).map(m => {
    const h = 40 + (m.id % 25); const a = 100 - h - 10;
    return `
      <div class="ai-card">
        <div style="font-size:11px; font-weight:800; color:var(--s); margin-bottom:15px;">AI PREDICTION ANALYSIS</div>
        <div style="display:flex; justify-content:space-between; font-weight:900; font-size:20px;">
          <span>${m.homeTeam.shortName}</span><span>${m.awayTeam.shortName}</span>
        </div>
        <div class="prob-bar-wrap"><div class="prob-h" style="width:${h}%"></div><div class="prob-a" style="width:${a}%"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:13px; color:var(--t2);">
          <span>승리 ${h}%</span><span>승리 ${a}%</span>
        </div>
      </div>`;
  }).join('') || '<div class="empty">분석할 경기가 없습니다.</div>';
}

// [5] 순위 & 선수 (5대 리그 선택 클릭)
async function loadStd(code) {
  curPLg = code; renderPills('std');
  const c = document.getElementById('std-bd');
  const d = await fetchData(`/competitions/${code}/standings`, true);
  if(!d.standings) return;
  const rows = d.standings[0].table;
  c.innerHTML = `<table class="stt"><tr><th>#</th><th>TEAM</th><th>P</th><th>W</th><th>D</th><th>L</th><th>PTS</th></tr>` + 
    rows.map(r => `<tr><td>${r.position}</td><td class="nm-cell"><img src="${r.team.crest}">${r.team.shortName}</td><td>${r.playedGames}</td><td>${r.won}</td><td>${r.draw}</td><td>${r.lost}</td><td style="font-weight:900; color:var(--p);">${r.points}</td></tr>`).join('') + `</table>`;
}

async function loadPlayers(lg) {
  curPLg = lg; renderPills('pl');
  const c = document.getElementById('pl-bd');
  const d = await fetchData(`/competitions/${lg}/scorers`, true);
  if(!d.scorers) return;
  c.innerHTML = d.scorers.slice(0, 10).map((s, i) => `
    <div style="display:flex; align-items:center; gap:20px; padding:20px; background:var(--bg2); border-radius:18px; margin-bottom:10px;">
      <span style="font-size:22px; font-weight:900; color:var(--p); opacity:0.4;">${i+1}</span>
      <div style="flex:1;"><div style="font-weight:700;">${s.player.name}</div><div style="font-size:12px; color:var(--t3);">${s.team.name}</div></div>
      <div style="font-size:20px; font-weight:900; color:var(--p);">${s.goals} G</div>
    </div>`).join('');
}

function renderPills(type) {
  const target = document.getElementById(type === 'std' ? 'std-pills' : 'pl-pills');
  target.innerHTML = LGS.map(l => `<button class="pill ${l.code === curPLg ? 'on' : ''}" onclick="${type === 'std' ? 'loadStd' : 'loadPlayers'}('${l.code}')">${l.name}</button>`).join('');
}

function swPt(type) {
  curPt = type;
  document.getElementById('btn-scorers').classList.toggle('on', type==='scorers');
  document.getElementById('btn-assists').classList.toggle('on', type==='assists');
  loadPlayers(curPLg);
}

// [6] 상세 모달
async function showDtl(id) {
  const m = await fetchData(`/matches/${id}`);
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div style="text-align:center;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div style="flex:1;"><img src="${m.homeTeam.crest}" style="width:70px;"><br><b>${m.homeTeam.name}</b></div>
        <div style="font-size:42px; font-weight:900;">${m.score.fullTime.home??0}:${m.score.fullTime.away??0}</div>
        <div style="flex:1;"><img src="${m.awayTeam.crest}" style="width:70px;"><br><b>${m.awayTeam.name}</b></div>
      </div>
      <div style="background:rgba(255,255,255,0.02); padding:20px; border-radius:18px; font-size:14px; color:var(--t2); line-height:2;">
        🏆 ${m.competition.name}<br>🏟️ ${m.venue || 'National Stadium'}<br>📅 ${new Date(m.utcDate).toLocaleString('ko-KR')}
      </div>
    </div>`;
  document.getElementById('modal').style.display = 'flex';
}

// [7] 팬존
function loadFan() {
  const c = document.getElementById('fan-bd');
  c.innerHTML = `
    <div class="mc" style="padding:20px; border-left:4px solid var(--s);">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
           <div style="font-size:12px; color:var(--s); font-weight:800; margin-bottom:5px;">NEXT MATCH</div>
           <div style="font-size:18px; font-weight:800;">화성 FC vs 파주시민축구단</div>
           <div style="font-size:13px; color:var(--t2); margin-top:3px;">2026.04.18 14:00 KST</div>
        </div>
        <button class="pill" style="border-color:var(--s); color:var(--s);">알림 설정됨</button>
      </div>
    </div>
  `;
}

// [공통 전환]
function swP(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pg-' + name).classList.add('on');
  document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
  if(el) el.classList.add('on');
  if(name === 'home') loadHome();
  if(name === 'sched') { initDateNav(); loadSched('2026-04-12'); }
  if(name === 'ai') loadAI();
  if(name === 'std') loadStd('PL');
  if(name === 'player') loadPlayers('PL');
  if(name === 'fan') loadFan();
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
function testGoal() { triggerGoal('Arsenal'); }

// [Mock Data]
function getMockData(path) {
  if(path.includes('standings')) return {standings:[{table:Array.from({length:20},(_,i)=>({position:i+1, team:{shortName:'Team '+i, crest:''}, playedGames:30, won:15, draw:5, lost:10, points:60-i}))}]};
  if(path.includes('scorers')) return {scorers:Array.from({length:10},(_,i)=>({player:{name:'Star Player '+i}, team:{name:'FC Football'}, goals:25-i}))};
  return { matches: [
    {id:1, competition:{name:'Premier League'}, homeTeam:{shortName:'ARS', crest:''}, awayTeam:{shortName:'MCI', crest:''}, score:{fullTime:{home:2, away:1}}, status:'IN_PLAY', utcDate:new Date().toISOString()},
    {id:2, competition:{name:'K League 1'}, homeTeam:{shortName:'HWA', crest:''}, awayTeam:{shortName:'PAJ', crest:''}, score:{fullTime:{home:0, away:0}}, status:'SCHEDULED', utcDate:new Date().toISOString()}
  ]};
}

window.onload = () => { swP('home'); setInterval(loadHome, 30000); };
