<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>PITCH Pro | Live Connection</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --card: #11151c; --p: #00ff87; --t: #e1e1e1; --t3: #485058; --border: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; }
        
        .hdr { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); }
        .hdr-logo { font-family: 'Orbitron'; font-weight: 900; color: var(--p); letter-spacing: 2px; }
        
        .status-bar { padding: 10px 20px; font-size: 11px; background: rgba(0,255,135,0.05); color: var(--p); display: flex; justify-content: space-between; }
        
        .page { padding: 15px; min-height: 100vh; }
        .mc { background: var(--card); border-radius: 15px; border: 1px solid var(--border); margin-bottom: 12px; padding: 15px; }
        .match-row { display: flex; align-items: center; justify-content: space-between; text-align: center; }
        .team { flex: 1; font-size: 13px; font-weight: 700; }
        .score-box { flex: 1; font-family: 'Orbitron'; font-size: 20px; font-weight: 900; color: var(--p); }
        
        .bnav { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: 70px; background: #0a0e14; border-top: 1px solid var(--border); display: flex; }
        .nbi { flex: 1; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 10px; color: var(--t3); cursor: pointer; }
        .nbi.active { color: var(--p); }

        /* 설정 모달 */
        #set-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; padding: 20px; z-index: 1000; }
        .modal-in { background: #161b22; width: 100%; border-radius: 20px; padding: 25px; border: 1px solid var(--p); }
        input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; margin: 15px 0; outline: none; }
        .btn { width: 100%; background: var(--p); border: none; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <header class="hdr">
        <div class="hdr-logo">PITCH PRO</div>
        <div onclick="document.getElementById('set-modal').style.display='flex'" style="cursor:pointer;">⚙️</div>
    </header>

    <div class="status-bar">
        <span id="conn-status">📡 API 연결 대기 중...</span>
        <span id="api-indicator">OFFLINE</span>
    </div>

    <main class="page">
        <div id="live-list">
            <div class="mc">
                <div style="font-size:10px; color:var(--t3); margin-bottom:8px;">Premier League · Matchday 32</div>
                <div class="match-row">
                    <div class="team">Arsenal</div>
                    <div class="score-box">VS</div>
                    <div class="team">Liverpool</div>
                </div>
                <p style="text-align:center; font-size:10px; margin-top:10px; color:var(--t3);">API 키 입력 시 실시간 정보로 전환됩니다.</p>
            </div>
        </div>
    </main>

    <div id="set-modal">
        <div class="modal-in">
            <h2 style="font-family:'Orbitron'; color:var(--p); font-size:18px;">API KEY SETTING</h2>
            <input type="password" id="api-key-input" placeholder="Football-Data.org API 토큰 입력">
            <button class="btn" onclick="saveApiKey()">적용 및 동기화</button>
        </div>
    </div>

    <nav class="bnav">
        <div class="nbi active">LIVE</div>
        <div class="nbi" onclick="alert('API 연동 후 활성화됩니다.')">SCHED</div>
        <div class="nbi" onclick="alert('API 연동 후 활성화됩니다.')">RANK</div>
    </nav>

    <script>
        let API_KEY = localStorage.getItem('pitch_pro_token') || '';

        // API 연동 최우선 로직
        async function syncFootballData() {
            if (!API_KEY) return;

            const indicator = document.getElementById('api-indicator');
            const statusText = document.getElementById('conn-status');
            
            // 브라우저 CORS 우회를 위한 프록시 서비스 활용 (allorigins)
            const target = "https://api.football-data.org/v4/competitions/PL/matches?status=SCHEDULED&limit=5";
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

            try {
                statusText.innerText = "📡 데이터 동기화 중...";
                const response = await fetch(proxyUrl, {
                    headers: {
                        // AllOrigins 사용 시 헤더 전달 방식 유의
                    }
                });
                
                const wrappedData = await response.json();
                // AllOrigins는 결과를 strings 형태로 감싸서 보낼 수 있으므로 파싱 확인
                const data = JSON.parse(wrappedData.contents);

                if (data && data.matches) {
                    renderMatches(data.matches);
                    indicator.innerText = "ONLINE";
                    indicator.style.color = "var(--p)";
                    statusText.innerText = "✅ 실시간 데이터 수신 중";
                }
            } catch (err) {
                console.error("API Error:", err);
                statusText.innerText = "❌ 연결 실패 (키 또는 권한 확인)";
            }
        }

        function renderMatches(matches) {
            const list = document.getElementById('live-list');
            list.innerHTML = matches.map(m => `
                <div class="mc">
                    <div style="font-size:10px; color:var(--t3); margin-bottom:8px;">
                        ${new Date(m.utcDate).toLocaleString('ko-KR')}
                    </div>
                    <div class="match-row">
                        <div class="team">${m.homeTeam.shortName || m.homeTeam.name}</div>
                        <div class="score-box">
                            ${m.score.fullTime.home !== null ? m.score.fullTime.home + ' : ' + m.score.fullTime.away : 'VS'}
                        </div>
                        <div class="team">${m.awayTeam.shortName || m.awayTeam.name}</div>
                    </div>
                </div>
            `).join('');
        }

        function saveApiKey() {
            const val = document.getElementById('api-key-input').value.trim();
            if (val) {
                localStorage.setItem('pitch_pro_token', val);
                API_KEY = val;
                document.getElementById('set-modal').style.display = 'none';
                syncFootballData();
            }
        }

        // 초기 실행
        if (API_KEY) {
            syncFootballData();
        } else {
            document.getElementById('set-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
