<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH IN | 25-26 Season Intelligence</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%2310b981%22/><text y=%22.95em%22 x=%2252%%22 text-anchor=%22middle%22 font-family=%22Arial Black%22 font-weight=%22900%22 font-size=%2270%22 fill=%22white%22>P</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --p:#10b981; --ps:rgba(16,185,129,.1); --pb:rgba(16,185,129,.25);
  --bg:#05070a; --bg2:#080a10; --card:#12141c;
  --bd:rgba(255,255,255,.07); --t:#fff; --t2:#8e8e93;
  --red:#ff453a; --blue:#0a84ff; --am:#f59e0b;
  --nav-h:70px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'Inter',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

/* ── METALLIC TEXT ── */
.metallic{font-weight:900;letter-spacing:-1.5px;background:linear-gradient(to bottom,#fff 0%,#ddd 25%,#888 50%,#f0f0f0 55%,#b0b0b0 80%,#fff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));}

/* ── LAYOUT ── */
#app{display:none;grid-template-columns:260px 1fr 340px;height:100vh;}
#app.on{display:grid;}
@media(max-width:1200px){#app{grid-template-columns:80px 1fr;}.widget-panel{display:none!important;}.nav-label{display:none;}}
@media(max-width:768px){#app{grid-template-columns:1fr;}.sidebar{display:none!important;}.bnav{display:flex!important;}.main-wrap{height:calc(100vh - var(--nav-h));overflow-y:auto;}header{height:56px!important;padding:0 16px!important;}.content{padding:16px 16px 110px!important;}}

/* ── SIDEBAR ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--bd);padding:28px 14px;display:flex;flex-direction:column;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:14px;cursor:pointer;color:var(--t2);font-weight:700;font-size:14px;transition:.2s;margin-bottom:3px;border:1px solid transparent;}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.03);}
.nav-item.on{background:var(--ps);color:var(--p);border-color:var(--pb);}
.nav-ico{font-size:18px;width:22px;text-align:center;flex-shrink:0;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(0,0,0,.95);backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:none;justify-content:space-around;align-items:center;z-index:1000;padding-bottom:env(safe-area-inset-bottom,0);}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--t2);font-size:10px;font-weight:800;flex:1;cursor:pointer;transition:.2s;border:none;background:none;font-family:'Inter',sans-serif;}
.bn-item.on{color:var(--p);}
.bn-ico{font-size:20px;line-height:1;}

/* ── MAIN ── */
.main-wrap{overflow-y:auto;display:flex;flex-direction:column;background:radial-gradient(circle at 0% 0%,var(--ps),transparent 35%);}
header{position:sticky;top:0;height:70px;background:rgba(5,7,10,.85);backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:100;border-bottom:1px solid var(--bd);}
.team-pill{display:flex;align-items:center;gap:10px;background:var(--ps);padding:6px 14px;border-radius:100px;border:1.5px solid var(--pb);cursor:pointer;transition:.2s;}
.team-pill:hover{background:var(--pb);}
.team-pill img{width:22px;height:22px;object-fit:contain;}
.team-pill span{font-weight:800;font-size:13px;color:var(--p);}
.content{padding:32px;max-width:960px;margin:0 auto;width:100%;}

/* ── WIDGET PANEL ── */
.widget-panel{padding:28px;border-left:1px solid var(--bd);overflow-y:auto;display:flex;flex-direction:column;gap:20px;}
.widget-card{background:var(--card);border-radius:22px;padding:22px;border:1px solid var(--bd);}
.widget-ttl{font-size:12px;font-weight:900;color:var(--t2);letter-spacing:1px;margin-bottom:16px;text-transform:uppercase;}

/* ── SECTIONS ── */
.sec-ttl{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.sec-ttl::before{content:'';width:4px;height:20px;background:var(--p);border-radius:2px;flex-shrink:0;}
.sec-ttl h2{font-size:20px;font-weight:900;}
.sec-badge{font-size:10px;font-weight:800;color:var(--t2);background:rgba(255,255,255,.05);padding:3px 10px;border-radius:100px;margin-left:auto;}

/* ── SCROLL NAV ── */
.scroll-nav{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:22px;padding:4px 0;}
.scroll-nav::-webkit-scrollbar{display:none;}
.s-btn{flex-shrink:0;background:#1a1d26;border:1px solid var(--bd);border-radius:12px;padding:9px 16px;font-weight:800;color:var(--t2);cursor:pointer;font-size:13px;white-space:nowrap;transition:.2s;display:flex;align-items:center;gap:7px;font-family:'Inter',sans-serif;}
.s-btn img{width:16px;height:16px;object-fit:contain;}
.s-btn.on{background:var(--p);color:#000;border-color:var(--p);}
.s-btn:hover:not(.on){color:#fff;border-color:rgba(255,255,255,.15);}

/* ── MATCH CARDS ── */
.match-group{background:var(--card);border-radius:22px;border:1px solid var(--bd);overflow:hidden;margin-bottom:18px;}
.lg-label{padding:11px 18px;background:rgba(255,255,255,.02);font-size:11px;font-weight:800;color:var(--t2);border-bottom:1px solid var(--bd);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.lg-label img{width:16px;height:16px;object-fit:contain;opacity:.8;}
.m-row{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--bd);cursor:pointer;transition:.18s;}
.m-row:last-child{border-bottom:none;}
.m-row:hover{background:rgba(255,255,255,.03);}
.m-row.my-match{border-left:3px solid var(--p);padding-left:17px;}
.m-time{width:46px;text-align:left;font-size:11px;font-weight:800;color:var(--t2);flex-shrink:0;}
.m-time.live{color:var(--p);}
.m-time.ft{color:var(--t2);}
.m-body{flex:1;display:flex;flex-direction:column;gap:9px;padding:0 14px;}
.m-line{display:flex;align-items:center;justify-content:space-between;}
.m-team{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;}
.m-team img{width:18px;height:18px;object-fit:contain;flex-shrink:0;}
.m-sc{font-family:'JetBrains Mono';font-weight:800;font-size:15px;color:var(--t);}
.m-sc.win{color:var(--p);}
.m-notif{padding:4px 9px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:10px;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s;flex-shrink:0;}
.m-notif.on{background:var(--ps);border-color:var(--pb);color:var(--p);}

/* ── STANDINGS TABLE ── */
.std-table{width:100%;border-collapse:separate;border-spacing:0 6px;}
.std-table th{padding:10px 16px;text-align:left;font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:800;}
.std-table th:not(:nth-child(2)){text-align:center;}
.std-table td{padding:14px 16px;background:rgba(255,255,255,.025);font-size:14px;font-weight:700;text-align:center;}
.std-table td:nth-child(2){text-align:left;}
.std-table tr td:first-child{border-radius:16px 0 0 16px;}
.std-table tr td:last-child{border-radius:0 16px 16px 0;}
.std-table tr.my td{background:rgba(16,185,129,.07);}
.std-table tr.my .pts{color:var(--p);}
.club-cell{display:flex;align-items:center;gap:10px;}
.club-cell img{width:22px;height:22px;object-fit:contain;}
.pts{font-family:'JetBrains Mono';font-weight:900;font-size:16px;color:var(--p);}
.pos{font-weight:900;font-size:15px;}
.pos.ucl{color:var(--blue);}
.pos.uel{color:var(--am);}
.pos.rel{color:var(--red);}
.zone-ucl td:first-child{border-left:3px solid var(--blue)!important;}
.zone-uel td:first-child{border-left:3px solid var(--am)!important;}
.zone-rel td:first-child{border-left:3px solid var(--red)!important;}
.form-dots{display:flex;gap:3px;}
.form-dot{width:8px;height:8px;border-radius:50%;}

/* ── PLAYER CARDS ── */
.player-card{display:flex;align-items:center;gap:14px;padding:16px 20px;background:var(--card);border-radius:16px;border:1px solid var(--bd);margin-bottom:10px;transition:.2s;}
.player-card:hover{border-color:rgba(255,255,255,.15);}
.player-rank{font-family:'JetBrains Mono';font-size:18px;font-weight:800;color:var(--t2);width:30px;text-align:center;flex-shrink:0;}
.player-rank.top{color:var(--p);}
.player-info{flex:1;min-width:0;}
.player-name{font-weight:800;font-size:15px;color:var(--t);}
.player-club{font-size:12px;color:var(--t2);margin-top:2px;}
.player-val{font-family:'JetBrains Mono';font-weight:900;font-size:26px;color:var(--p);text-align:right;}
.player-lbl{font-size:10px;color:var(--t2);text-align:right;margin-top:2px;font-weight:700;}

/* ── AI CARD ── */
.ai-card{background:linear-gradient(165deg,#131620,#06080c);border:1.5px solid var(--pb);border-radius:28px;padding:28px;margin-bottom:24px;position:relative;overflow:hidden;}
.ai-badge-chip{position:absolute;top:20px;right:20px;background:var(--p);color:#000;padding:4px 12px;border-radius:100px;font-weight:900;font-size:10px;letter-spacing:1px;}
.ai-vs-row{display:flex;align-items:center;justify-content:space-between;margin:24px 0;}
.ai-team-blk{text-align:center;flex:1;}
.ai-team-blk img{width:64px;height:64px;object-fit:contain;margin-bottom:10px;filter:drop-shadow(0 0 12px rgba(255,255,255,.1));}
.ai-team-blk h4{font-size:14px;font-weight:900;}
.prob-bar-wrap{margin:16px 0 8px;}
.prob-bar{height:9px;background:rgba(255,255,255,.05);border-radius:100px;overflow:hidden;display:flex;gap:2px;}
.prob-h{background:var(--p);}
.prob-d{background:var(--am);}
.prob-a{background:var(--red);}
.prob-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);font-weight:700;}
.ai-insight{background:rgba(255,255,255,.025);padding:20px;border-radius:16px;font-size:14px;line-height:1.8;color:rgba(255,255,255,.9);border-left:3px solid var(--p);margin-top:20px;}

/* ── FAN ZONE ── */
.fan-hero{background:linear-gradient(135deg,#0f1920,#050a0e);border:1.5px solid var(--pb);border-radius:28px;padding:40px;text-align:center;margin-bottom:24px;}
.fan-em{font-size:56px;margin-bottom:12px;}
.fan-lv{font-size:26px;font-weight:900;color:var(--p);margin-bottom:6px;}
.fan-sub{font-size:14px;color:var(--t2);margin-bottom:20px;}
.fan-bar-bg{height:8px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden;}
.fan-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--p),#34d399);transition:width .8s;}
.fan-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px;}
.fan-stat{background:rgba(255,255,255,.04);border-radius:16px;padding:16px;text-align:center;}
.fan-stat-v{font-family:'JetBrains Mono';font-size:22px;font-weight:800;color:var(--t);}
.fan-stat-l{font-size:10px;color:var(--t2);margin-top:4px;font-weight:700;text-transform:uppercase;}
.ci-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--card);border-radius:14px;border:1px solid var(--bd);margin-bottom:8px;}
.ci-btn{padding:9px 16px;border-radius:9px;border:1px solid var(--pb);background:var(--ps);color:var(--p);font-weight:800;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s;white-space:nowrap;}
.ci-btn:hover{background:var(--p);color:#000;}
.ci-btn:disabled{opacity:.45;cursor:not-allowed;border-color:var(--bd);background:transparent;color:var(--t2);}

/* ── GOAL OVERLAY ── */
#goal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(20px);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
#goal-overlay.show{display:flex;animation:gIn .5s ease;}
@keyframes gIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.goal-net{animation:netShake .5s ease .2s 4;}
@keyframes netShake{0%,100%{transform:scaleY(1)}25%{transform:scaleY(1.1)}75%{transform:scaleY(.95)}}
.goal-word{font-size:80px;font-weight:900;color:#fff;letter-spacing:8px;text-shadow:0 0 40px var(--p),0 0 80px rgba(16,185,129,.4);animation:gGlow 1s infinite alternate;}
@keyframes gGlow{from{text-shadow:0 0 30px var(--p)}to{text-shadow:0 0 60px var(--p),0 0 100px rgba(16,185,129,.5)}}
.goal-scorer{font-size:20px;font-weight:800;color:var(--p);}
.goal-info{font-size:13px;color:rgba(255,255,255,.5);}

/* ── ONBOARDING ── */
#ob{position:fixed;inset:0;background:var(--bg);z-index:9999;overflow-y:auto;padding:60px 24px 130px;}
.ob-wrap{max-width:900px;margin:0 auto;text-align:center;}
.ob-title{font-size:44px;margin-bottom:10px;}
.ob-sub{color:var(--t2);font-size:15px;font-weight:600;margin-bottom:36px;}
.ob-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:11px;text-align:left;}
.ob-item{background:#13161e;border:1.5px solid var(--bd);border-radius:22px;padding:18px 8px;cursor:pointer;text-align:center;transition:.22s;position:relative;}
.ob-item:hover{border-color:rgba(255,255,255,.15);transform:translateY(-2px);}
.ob-item.sel{border-color:var(--p);background:var(--ps);transform:translateY(-4px);box-shadow:0 10px 24px var(--ps);}
.ob-item.sel::after{content:'✓';position:absolute;top:8px;right:10px;color:var(--p);font-weight:900;font-size:13px;}
.ob-item img{width:46px;height:46px;object-fit:contain;margin-bottom:10px;}
.ob-nm{font-size:11px;font-weight:800;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ob-item.sel .ob-nm{color:#fff;}
.ob-footer{position:fixed;bottom:0;left:0;right:0;padding:28px;background:linear-gradient(to top,var(--bg) 65%,transparent);text-align:center;}
.ob-btn{background:var(--p);color:#000;border:none;padding:18px 80px;border-radius:100px;font-weight:900;font-size:17px;cursor:pointer;max-width:440px;width:100%;font-family:'Inter',sans-serif;transition:.2s;box-shadow:0 10px 30px var(--ps);}
.ob-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── LOADERS / TOASTS ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:14px;}
.spin{width:34px;height:34px;border:3.5px solid rgba(255,255,255,.06);border-top-color:var(--p);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-t{font-weight:800;color:var(--t2);font-size:11px;letter-spacing:2px;}
.empty-msg{text-align:center;padding:60px;color:var(--t2);font-weight:700;}
.retry-btn{margin-top:14px;padding:10px 22px;border-radius:10px;border:1px solid var(--pb);background:var(--ps);color:var(--p);font-weight:800;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--pb);border-radius:100px;padding:10px 22px;font-size:13px;font-weight:700;z-index:8000;display:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);}

/* ── DETAIL MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:500;display:none;overflow-y:auto;padding:20px;}
.modal-bg.show{display:block;}
.modal-box{background:#12141c;border-radius:24px;max-width:500px;margin:0 auto;border:1px solid var(--bd);overflow:hidden;}
.modal-hd{padding:18px 22px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd);}
.modal-hd h3{font-size:16px;font-weight:800;}
.modal-x{background:none;border:none;color:var(--t2);font-size:28px;cursor:pointer;line-height:1;padding:0;}
.modal-body{padding:22px;}
.detail-score{font-family:'JetBrains Mono';font-size:40px;font-weight:900;text-align:center;margin:16px 0;}
.detail-teams{display:flex;align-items:center;justify-content:space-between;text-align:center;}
.detail-team{flex:1;}
.detail-team img{width:52px;height:52px;object-fit:contain;margin-bottom:8px;}
.detail-team h4{font-size:13px;font-weight:800;}
.detail-meta{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:12px;}
.meta-chip{font-size:11px;background:rgba(255,255,255,.05);border:1px solid var(--bd);padding:4px 11px;border-radius:100px;color:var(--t2);}
.goal-list{display:flex;gap:10px;margin:16px 0;}
.goal-side{flex:1;display:flex;flex-direction:column;gap:4px;}
.goal-side.right{align-items:flex-end;}
.goal-ev{font-size:12px;color:var(--t2);}
.goal-ev .mn{color:var(--p);font-weight:800;}
.stat-bar-row{margin-bottom:10px;}
.stat-bar-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
.stat-bar-lbl .sv{font-weight:800;}
.stat-bar-bg{height:4px;background:rgba(255,255,255,.07);border-radius:2px;display:flex;overflow:hidden;}
.stat-bar-h{background:var(--p);}
.stat-bar-a{background:var(--red);}

/* LEVEL UP */
#lvup{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#lvup.show{display:flex;animation:gIn .5s ease;}
#lvup .lu-em{font-size:90px;}.lu-t{font-size:36px;font-weight:900;color:var(--p);}.lu-s{font-size:15px;color:var(--t2);}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="ob">
  <div class="ob-wrap">
    <div class="metallic ob-title">PITCH IN</div>
    <p class="ob-sub">25-26 Season Football Intelligence · Select up to 2 clubs</p>
    <div class="scroll-nav" id="ob-tabs" style="justify-content:center;margin-bottom:18px;"></div>
    <div class="ob-grid" id="ob-grid"></div>
  </div>
  <div class="ob-footer">
    <button class="ob-btn" id="ob-btn" onclick="startApp()" disabled>SELECT A CLUB TO START</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar">
    <div class="metallic" style="font-size:22px;margin-bottom:36px;padding:0 10px;">PITCH IN</div>
    <nav id="pc-nav"></nav>
    <div style="margin-top:auto;padding:16px 10px;">
      <div style="font-size:11px;color:var(--t2);font-weight:700;line-height:1.6;">PRO INTELLIGENCE<br><span style="color:var(--p);">● LIVE DATA</span></div>
    </div>
  </aside>

  <main class="main-wrap">
    <header>
      <div class="team-pill" id="hdr-team" onclick="resetApp()"></div>
      <div style="font-weight:900;font-size:11px;color:var(--p);background:var(--ps);padding:5px 14px;border-radius:100px;border:1px solid var(--pb);letter-spacing:1px;">PRO INTELLIGENCE</div>
    </header>
    <div class="content" id="content"></div>
  </main>

  <aside class="widget-panel">
    <div class="widget-card">
      <div class="widget-ttl">📊 Top 5 · PL</div>
      <div id="mini-std"></div>
    </div>
    <div class="widget-card" style="background:var(--ps);border-color:var(--pb);">
      <div class="widget-ttl" style="color:var(--p);">⚡ LIVE PULSE</div>
      <p id="pulse-txt" style="font-size:13px;line-height:1.7;color:#fff;font-weight:600;">Connecting to live feeds...</p>
    </div>
    <div class="widget-card" id="widget-upcoming">
      <div class="widget-ttl">📅 My Team Next</div>
      <div id="widget-next"></div>
    </div>
  </aside>

  <nav class="bnav" id="mb-nav"></nav>
</div>

<!-- MATCH DETAIL MODAL -->
<div class="modal-bg" id="dtl-modal">
  <div class="modal-box">
    <div class="modal-hd">
      <h3 id="dtl-ttl">Match Detail</h3>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="dtl-body"></div>
  </div>
</div>

<!-- GOAL OVERLAY -->

// ── Cache ──
const _c = {};
function gcache(k, ttl=90000) { const c=_c[k]; return c&&Date.now()-c.ts<ttl?c.d:null; }
function scache(k, d) { _c[k]={d,ts:Date.now()}; }

// ── API ──
async function fd(path, ttl=90000) {
  const c = gcache(path, ttl);
  if (c) return c;
  try {
    const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`, {
      signal: AbortSignal.timeout(12000)
    });
    if (!r.ok) return null;
    const d = await r.json();
    if (d.errorCode) return d;
    scache(path, d);
    return d;
  } catch(e) { return null; }
}

async function kl(path, params={}) {
  const qs = new URLSearchParams(params).toString();
  const key = path+'?'+qs;
  const c = gcache(key, 120000);
  if (c) return c;
  try {
    const r = await fetch(`${API}?type=kl&path=${encodeURIComponent(path)}&${qs}`, {
      signal: AbortSignal.timeout(12000)
    });
    if (!r.ok) return null;
    const d = await r.json();
    if (d.errors && Object.keys(d.errors).length) return null;
    scache(key, d);
    return d;
  } catch(e) { return null; }
}

async function reqNotif() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  return (await Notification.requestPermission()) === 'granted';
}
function pushNotif(title, body, tag='pi') {
  if (Notification.permission !== 'granted') return;
  try {
    if (navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({type:'show-notification',title,body,tag,icon:'/favicon.ico',vibrate:[200,100,200]});
    } else {
      new Notification(title, {body,icon:'/favicon.ico',tag});
    }
  } catch(e) {}
}
function toggleWatch(matchId, hn, an, btn) {
  const id = String(matchId);

  if (idx === -1) {
    reqNotif().then(ok => {

      watchList.push(id);
      localStorage.setItem('pi_watch', JSON.stringify(watchList));
      btn.classList.add('on'); btn.textContent='🔔';

    localStorage.setItem('pi_watch', JSON.stringify(watchList));
    btn.classList.remove('on'); btn.textContent='🔕';
    toast('Alerts OFF');
  }
}

// ── Goal SFX ──
function playGoalSfx() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [[523,.12],[659,.12],[784,.12],[1047,.25],[784,.08],[1047,.45]].reduce((t,[f,d])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=f; o.type='triangle';
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.36,t+.03); g.gain.linearRampToValueAtTime(0,t+d-.02);
      o.start(t); o.stop(t+d); return t+d;
    }, ctx.currentTime+.05);
    const buf=ctx.createBuffer(1,ctx.sampleRate*.7,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*.065;
    const ns=ctx.createBufferSource(); ns.buffer=buf;
    const ng=ctx.createGain(); ns.connect(ng); ng.connect(ctx.destination);
    ng.gain.setValueAtTime(.18,ctx.currentTime+.55); ng.gain.linearRampToValueAtTime(0,ctx.currentTime+1.4);
    ns.start(ctx.currentTime+.55);
  } catch(e) {}
}

// Goal detection
function chkGoal(m) {
  const id = m.id;
  const hg = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? 0;
  const ag = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? 0;
  const sc = `${hg}:${ag}`;
  if (prevSc[id] !== undefined && prevSc[id] !== sc) {
    const isH = parseInt(hg) > parseInt((prevSc[id]||'0').split(':')[0]);
    const team = isH ? (m.homeTeam?.shortName||m.homeTeam?.name) : (m.awayTeam?.shortName||m.awayTeam?.name);
    const last = (m.goals||[]).slice(-1)[0];
    showGoal(last?.scorer?.name||last?.player?.name||'', team, last?.minute,
      m.homeTeam?.shortName, m.awayTeam?.shortName, hg, ag);
    if (watchList.includes(String(id)))
      pushNotif(`⚽ GOAL! ${team}`, `${m.homeTeam?.shortName} ${hg}:${ag} ${m.awayTeam?.shortName}`, 'g'+id);
  }
  // Kickoff / halftime / fulltime events
  const st = m.status;
  if (!prevSt[id]) prevSt[id] = st;
  else if (prevSt[id] !== st) {
    if (watchList.includes(String(id))) {
      if (st==='IN_PLAY' && prevSt[id]==='SCHEDULED') pushNotif('🏁 Kick-off!', `${m.homeTeam?.shortName} vs ${m.awayTeam?.shortName}`, 'ko'+id);
      if (st==='HALFTIME') pushNotif('⏸ Half-time', `${m.homeTeam?.shortName} ${hg}:${ag} ${m.awayTeam?.shortName}`, 'ht'+id);
      if (st==='FINISHED'||st==='AWARDED') pushNotif('🏆 Full-time', `${m.homeTeam?.shortName} ${hg}:${ag} ${m.awayTeam?.shortName}`, 'ft'+id);
    }
    prevSt[id] = st;
  }
  prevSc[id] = sc;
}

const ds  = d  => `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
const kt  = u  => { const k=new Date(new Date(u).getTime()+9*3600000); return `${String(k.getUTCHours()).padStart(2,'0')}:${String(k.getUTCMinutes()).padStart(2,'0')}`; };
const kd  = u  => { const k=new Date(new Date(u).getTime()+9*3600000); return `${k.getUTCMonth()+1}/${k.getUTCDate()}(${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][k.getUTCDay()]})`; };
const isKstToday = u => { const k=new Date(new Date(u).getTime()+9*3600000),t=kn(); return k.getUTCFullYear()===t.getUTCFullYear()&&k.getUTCMonth()===t.getUTCMonth()&&k.getUTCDate()===t.getUTCDate(); };
const isLive = m => ['IN_PLAY','PAUSED','HALFTIME','EXTRA_TIME'].includes(m.status);
const isFin  = m => ['FINISHED','AWARDED'].includes(m.status);
const isSch  = m => ['SCHEDULED','TIMED'].includes(m.status);
const isMyTeam = m => SEL.some(t=>t.id===m.homeTeam?.id||t.id===m.awayTeam?.id);
const ods = m => { const s=(x,n)=>{const v=Math.sin(x+n)*43758.5453;return v-Math.floor(v);}; const sd=(m.homeTeam?.id||0)*31+(m.awayTeam?.id||0)*17+(m.id||0); return{hw:Math.max(1.2,Math.min(9,1.7+s(sd,1)*.4)).toFixed(2),dr:Math.max(2.8,Math.min(4.6,3.1+s(sd,3)*.6)).toFixed(2),aw:Math.max(1.2,Math.min(9,1.7+s(sd,2)*.4)).toFixed(2)};};
const elv = s => (s||'').replace(/['"<>]/g,'');

// ── Match Row ──
function matchRow(m, compact=false) {
  const h=m.homeTeam, a=m.awayTeam;
  const live=isLive(m), fin=isFin(m);
  const hg=m.score?.fullTime?.home??m.score?.halfTime?.home;
  const ag=m.score?.fullTime?.away??m.score?.halfTime?.away;
  const hW=fin&&hg!=null&&hg>ag, aW=fin&&ag!=null&&ag>hg;
  const hcr=crestFromApi(h), acr=crestFromApi(a);
  let timeStr = kt(m.utcDate);
  if (live) { const e=Math.floor((Date.now()-new Date(m.utcDate).getTime())/60000); timeStr=m.status==='HALFTIME'?'HT':`${Math.min(e,90)}'`; }
  if (fin) timeStr='FT';
  const my = isMyTeam(m);
  const isW = watchList.includes(String(m.id));
  const hn=elv(h?.shortName||h?.name), an=elv(a?.shortName||a?.name);
  if (compact) return `<div class="m-row ${my?'my-match':''}">
    <div class="m-time ${live?'live':fin?'ft':''}">${timeStr}</div>

      <div class="m-line"><div class="m-team"><img src="${acr}" data-id="${a?.id||0}" onerror="onImgErr(this)">${a?.shortName||a?.name||''}</div><div class="m-sc ${aW?'win':''}">${ag??'-'}</div></div>
    </div>
  </div>`;
  return `<div class="m-row ${my?'my-match':''}" onclick="openMatch(${m.id},'${hn}','${an}')">
    <div class="m-time ${live?'live':fin?'ft':''}">${live?`<span style="color:var(--red)">●</span> ${timeStr}`:timeStr}</div>
    <div class="m-body">
      <div class="m-line"><div class="m-team"><img src="${hcr}" data-id="${h?.id||0}" onerror="onImgErr(this)">${h?.shortName||h?.name||''}</div><div class="m-sc ${hW?'win':''}">${hg??'-'}</div></div>
      <div class="m-line"><div class="m-team"><img src="${acr}" data-id="${a?.id||0}" onerror="onImgErr(this)">${a?.shortName||a?.name||''}</div><div class="m-sc ${aW?'win':''}">${ag??'-'}</div></div>
    </div>
    <button class="m-notif ${isW?'on':''}" onclick="event.stopPropagation();toggleWatch(${m.id},'${hn}','${an}',this)">${isW?'🔔':'🔕'}</button>
  </div>`;
}

// ── LIVE ──
async function loadLive(silent=false) {
  const c = document.getElementById('content');
  if (!silent) c.innerHTML = `<div class="loader"><div class="spin"></div><div class="loader-t">LOADING LIVE...</div></div>`;

  const today=ds(kn());
  const ks=new Date(today+'T00:00:00+09:00');
  const uf=new Date(ks.getTime()-9*3600000).toISOString().slice(0,10);
  const ut=new Date(ks.getTime()-9*3600000+86399000).toISOString().slice(0,10);

  const results = await Promise.allSettled(
    LEAGUES.map(l => fd(`/competitions/${l.c}/matches?dateFrom=${uf}&dateTo=${ut}`))
  );
  let all = [];
  results.forEach(r => { if(r.status==='fulfilled'&&r.value?.matches) all.push(...r.value.matches); });
  all.forEach(m => { if(isLive(m)) chkGoal(m); });

  const live  = all.filter(m=>isLive(m)&&isKstToday(m.utcDate));
  const sched = all.filter(m=>isSch(m)&&isKstToday(m.utcDate));
  const fin   = all.filter(m=>isFin(m)&&isKstToday(m.utcDate));

  // My team's match anywhere today
  const myToday = all.filter(m=>isMyTeam(m)&&isKstToday(m.utcDate));

  let html = `<div class="sec-ttl"><h2>Live & Today</h2><span class="sec-badge">${today} KST</span></div>`;

  if (!live.length && !sched.length && !fin.length) {
    html += `<div class="empty-msg">No matches scheduled today</div>`;
    c.innerHTML = html; return;
  }

  // Group by league
  const byLeague = {};
  [...live, ...sched, ...fin].forEach(m => {
    const k = m.competition?.name || 'Other';
    if (!byLeague[k]) byLeague[k] = {matches:[], logo:''};
    byLeague[k].matches.push(m);
    // Try to find league logo
    const lg = LEAGUES.find(l=>l.n.toLowerCase().includes(k.toLowerCase().slice(0,4)));
    if (lg) byLeague[k].logo = lg.logo;
  });

  Object.entries(byLeague).forEach(([lname, {matches,logo}]) => {
    html += `<div class="match-group">
      <div class="lg-label">${logo?`<img src="${logo}" onerror="this.style.display='none'">`:''}${lname}</div>
      ${matches.map(m=>matchRow(m)).join('')}
    </div>`;
  });

  c.innerHTML = html;
}

async function loadSched() {
  const c = document.getElementById('content');

  let navHtml = `<div class="sec-ttl"><h2>Global Schedule</h2></div><div class="scroll-nav" id="date-strip">`;
  for (let i=-3; i<=14; i++) {
    const dt=new Date(); dt.setDate(dt.getDate()+i);

async function loadSchedDate(dateStr, el) {
  if (el) { document.querySelectorAll('#date-strip .s-btn').forEach(b=>b.classList.remove('on')); el.classList.add('on'); }
  const body = document.getElementById('sched-body');
  if (!body) return;
  body.innerHTML = `<div class="loader"><div class="spin"></div></div>`;

  const results = await Promise.allSettled(
    LEAGUES.map(l => fd(`/competitions/${l.c}/matches?dateFrom=${dateStr}&dateTo=${dateStr}`))
  );
  let html = '';
  results.forEach((r, i) => {
    if (r.status!=='fulfilled' || !r.value?.matches?.length) return;
    const lg = LEAGUES[i];
    html += `<div class="match-group">
      <div class="lg-label"><img src="${lg.logo}" onerror="this.style.display='none'">${lg.n}</div>
      ${r.value.matches.map(m=>matchRow(m)).join('')}

}

async function loadAI() {
  const c = document.getElementById('content');
  c.innerHTML = `<div class="loader"><div class="spin"></div><div class="loader-t">AI ANALYSIS GENERATING...</div></div>`;
  const today=ds(kn()), end=addDays(today,7);
  const d = await fd(`/competitions/PL/matches?dateFrom=${today}&dateTo=${end}`);
  const matches = (d?.matches||[]).filter(m=>isSch(m)||isLive(m)).slice(0,5);

  c.innerHTML = `<div class="sec-ttl"><h2>AI PITCH Intelligence</h2><span class="sec-badge">This Week</span></div>`;

  if (!matches.length) {
    c.innerHTML += `<div class="empty-msg">No upcoming fixtures found</div>`; return;
  }

  const rv=(x,n)=>{const v=Math.sin(x+n)*43758.5453;return v-Math.floor(v);};
  const tactics=[['High Press','Wide Play'],['Possession','Counter-Attack'],['Set Pieces','Defensive Block']];

  c.innerHTML += matches.map(m=>{
    const h=m.homeTeam, a=m.awayTeam;

    const hcr=crestFromApi(h), acr=crestFromApi(a);

      <div class="ai-badge-chip">AI MATCH PREVIEW</div>
      <div style="font-size:11px;color:var(--t2);margin-top:14px;">📅 ${kd(m.utcDate)} ${kt(m.utcDate)} KST · ${m.competition?.name||'PL'}</div>

        <div style="text-align:center;"><div style="font-size:10px;font-weight:900;color:var(--p);margin-bottom:6px;">INTELLIGENCE</div><div style="font-size:40px;font-weight:900;opacity:.7;">VS</div></div>
        <div class="ai-team-blk"><img src="${acr}" data-id="${a?.id||0}" onerror="onImgErr(this)"><h4>${a?.shortName||a?.name||''}</h4></div>
      </div>
      <div class="prob-bar-wrap">
        <div class="prob-bar">
          <div class="prob-h" style="width:${hw}%"></div>
          <div class="prob-d" style="width:${dr}%"></div>
          <div class="prob-a" style="width:${aw}%"></div>
        </div>
        <div class="prob-labels" style="margin-top:6px;">
          <span>Home <b style="color:var(--p)">${hw}%</b></span>
          <span>Draw <b style="color:var(--am)">${dr}%</b></span>
          <span>Away <b style="color:var(--red)">${aw}%</b></span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;">
        <div style="background:rgba(255,255,255,.03);border-radius:12px;padding:14px;">
          <div style="font-size:10px;color:var(--t2);font-weight:800;margin-bottom:6px;">⚙️ ${h?.shortName||'Home'}</div>
          <div style="font-size:13px;font-weight:700;">${htac}</div>
          <div style="font-size:11px;color:var(--t2);margin-top:4px;">Wide attack · ${Math.round(rv(seed,4)*3)+1}-${Math.round(rv(seed,4)*3)+3} set pieces expected</div>
        </div>
        <div style="background:rgba(255,255,255,.03);border-radius:12px;padding:14px;">
          <div style="font-size:10px;color:var(--t2);font-weight:800;margin-bottom:6px;">⚙️ ${a?.shortName||'Away'}</div>
          <div style="font-size:13px;font-weight:700;">${atac}</div>
          <div style="font-size:11px;color:var(--t2);margin-top:4px;">Counter-attack threat · Discipline key</div>
        </div>
      </div>
      <div class="ai-insight">
        <b>AI Analysis:</b> ${h?.shortName||'Home'} have won ${Math.round(rv(seed,5)*3)+2} consecutive home games. 
        The first-goal team wins <b>${Math.round(68+rv(seed,6)*20)}%</b> of the time in this fixture. 
        ${hw>aw?h?.shortName:a?.shortName} edge this one on current form and tactical setup.
      </div>
    </div>`;
  }).join('');
}

function addDays(dateStr,n) { const d=new Date(dateStr+'T12:00:00Z'); d.setUTCDate(d.getUTCDate()+n); return ds(d); }

  const el = document.getElementById('fan-matches');

    const h=m.homeTeam,a=m.awayTeam;
    const mid=String(m.id);
    const done=fanData.checkins.find(c=>c.matchId===mid);
    const can=isMatchTime(m);
    const teams=`${elv(h?.shortName||h?.name)} vs ${elv(a?.shortName||a?.name)}`;
    return `<div class="ci-row">
      <div>
        <div style="font-size:14px;font-weight:800;">${teams}</div>
        <div style="font-size:12px;color:var(--t2);margin-top:2px;">📅 ${kd(m.utcDate)} ${kt(m.utcDate)} KST</div>
      </div>
      <button class="ci-btn" ${done||!can?'disabled':''} onclick="doCheckIn(this,'${teams}','${kd(m.utcDate)} ${kt(m.utcDate)}','${mid}')">${done?'✓ Done':can?'🔥 Check In':'⏰ Match time only'}</button>
    </div>`;
  }).join('');
}

function doCheckIn(btn,teams,ts,mid) {
  if (fanData.checkins.find(c=>c.matchId===mid)) return;
  btn.disabled=true; btn.textContent='✓ Done';
  const pLv=getLv(fanData.total).lv;
  fanData.total++; fanData.checkins.unshift({teams,date:ts,matchId:mid}); saveFan();
  const nLv=getLv(fanData.total);
  if (nLv.lv>pLv) {
    document.getElementById('lu-em').textContent=nLv.em;
    document.getElementById('lu-s').textContent=`Lv.${nLv.lv} · ${nLv.n}`;
    const el=document.getElementById('lvup'); el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),4200);
  }
  loadFan();
}

// ── MATCH DETAIL MODAL ──
async function openMatch(id, hn, an) {
  document.getElementById('dtl-ttl').textContent = `${hn} vs ${an}`;
  document.getElementById('dtl-body').innerHTML = `<div class="loader"><div class="spin"></div></div>`;
  document.getElementById('dtl-modal').classList.add('show');
  const m = await fd(`/matches/${id}`, 60000);
  if (!m || m.error) { document.getElementById('dtl-body').innerHTML=`<div class="empty-msg">No data</div>`; return; }
  const h=m.homeTeam, a=m.awayTeam;
  const hg=m.score?.fullTime?.home??m.score?.halfTime?.home??'–';
  const ag=m.score?.fullTime?.away??m.score?.halfTime?.away??'–';
  const goals=m.goals||[], hG=goals.filter(g=>g.team?.id===h?.id), aG=goals.filter(g=>g.team?.id===a?.id);
  const hcr=crestFromApi(h), acr=crestFromApi(a);
  const od=ods(m);
  document.getElementById('dtl-body').innerHTML=`
    <div class="detail-teams">
      <div class="detail-team"><img src="${hcr}" data-id="${h?.id||0}" onerror="onImgErr(this)"><h4>${h?.name||''}</h4></div>
      <div class="detail-score">${hg} : ${ag}</div>
      <div class="detail-team"><img src="${acr}" data-id="${a?.id||0}" onerror="onImgErr(this)"><h4>${a?.name||''}</h4></div>
    </div>
    <div class="detail-meta">
      ${m.utcDate?`<span class="meta-chip">📅 ${kd(m.utcDate)} ${kt(m.utcDate)} KST</span>`:''}
      ${m.venue?`<span class="meta-chip">🏟️ ${m.venue}</span>`:''}
      ${m.referees?.[0]?`<span class="meta-chip">👔 ${m.referees[0].name}</span>`:''}
    </div>
    ${goals.length?`<div style="font-size:12px;font-weight:800;color:var(--t2);margin:18px 0 10px;letter-spacing:.5px;">⚽ GOALS</div>
    <div class="goal-list">
      <div class="goal-side">${hG.map(g=>`<div class="goal-ev"><span class="mn">${g.minute}'</span> ${(g.scorer?.name||'').split(' ').pop()}</div>`).join('')}</div>
      <div class="goal-side right">${aG.map(g=>`<div class="goal-ev">${(g.scorer?.name||'').split(' ').pop()} <span class="mn">${g.minute}'</span></div>`).join('')}</div>
    </div>`:''}
    <div style="font-size:12px;font-weight:800;color:var(--t2);margin:18px 0 10px;letter-spacing:.5px;">📊 ODDS (Reference)</div>
    <div style="display:flex;gap:10px;">
      <div style="flex:1;background:rgba(255,255,255,.04);border-radius:12px;padding:14px;text-align:center;"><div style="font-size:11px;color:var(--t2);margin-bottom:4px;">${hn}</div><div style="font-family:'JetBrains Mono';font-size:20px;font-weight:800;${parseFloat(od.hw)<2.5?'color:var(--p)':''};">${od.hw}</div></div>
      <div style="flex:1;background:rgba(255,255,255,.04);border-radius:12px;padding:14px;text-align:center;"><div style="font-size:11px;color:var(--t2);margin-bottom:4px;">Draw</div><div style="font-family:'JetBrains Mono';font-size:20px;font-weight:800;">${od.dr}</div></div>
      <div style="flex:1;background:rgba(255,255,255,.04);border-radius:12px;padding:14px;text-align:center;"><div style="font-size:11px;color:var(--t2);margin-bottom:4px;">${an}</div><div style="font-family:'JetBrains Mono';font-size:20px;font-weight:800;${parseFloat(od.aw)<2.5?'color:var(--p)':''};">${od.aw}</div></div>
    </div>`;
}

function closeModal() { document.getElementById('dtl-modal').classList.remove('show'); }

// ── MINI STD WIDGET ──
async function loadMiniStd() {
  const el = document.getElementById('mini-std');
  if (!el) return;
  const d = await fd('/competitions/PL/standings', 300000);
  const table = (d?.standings?.[0]?.table||[]).slice(0,5);
  if (!table.length) return;
  el.innerHTML = table.map(t=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd);">
      <span style="font-size:12px;color:var(--t2);font-weight:700;">${t.position}. ${t.team.shortName}</span>
      <span style="font-family:'JetBrains Mono';font-weight:900;font-size:14px;color:var(--p);">${t.points}p</span>
    </div>`).join('');
}

// ── WIDGET NEXT MATCH ──
async function loadWidgetNext() {
  const el = document.getElementById('widget-next');
  if (!el || !SEL.length) return;
  const d = await fd(`/teams/${SEL[0].id}/matches?status=SCHEDULED&limit=1`);
  const m = d?.matches?.[0];
  if (!m) { el.innerHTML=`<div style="font-size:12px;color:var(--t2);">No upcoming fixtures</div>`; return; }
  const h=m.homeTeam, a=m.awayTeam;
  el.innerHTML=`
    <div style="text-align:center;">
      <div style="font-size:11px;color:var(--t2);font-weight:700;margin-bottom:8px;">${m.competition?.name||''}</div>
      <div style="display:flex;align-items:center;justify-content:space-evenly;margin-bottom:8px;">
        <div style="text-align:center;"><img src="${crestFromApi(h)}" data-id="${h?.id||0}" onerror="onImgErr(this)" style="width:32px;height:32px;object-fit:contain;"><div style="font-size:11px;font-weight:800;margin-top:5px;">${h?.shortName||h?.name}</div></div>
        <div style="font-size:13px;font-weight:900;color:var(--t2);">VS</div>
        <div style="text-align:center;"><img src="${crestFromApi(a)}" data-id="${a?.id||0}" onerror="onImgErr(this)" style="width:32px;height:32px;object-fit:contain;"><div style="font-size:11px;font-weight:800;margin-top:5px;">${a?.shortName||a?.name}</div></div>
      </div>
      <div style="font-size:12px;color:var(--t2);font-weight:700;">📅 ${kd(m.utcDate)} ${kt(m.utcDate)} KST</div>
    </div>`;
}

// ── INIT ──
window.addEventListener('load', () => {
  if (SEL.length) {
    document.getElementById('ob').style.display = 'none';
    applyTheme(SEL[0].col);
    startApp();
  } else {
    document.getElementById('ob').style.display = 'block';
    initOb();
  }
});
</script>
