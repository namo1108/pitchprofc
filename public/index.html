<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PITCH IN | Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #10b981;
            --ps: rgba(16, 185, 129, 0.12);
            --pb: rgba(16, 185, 129, 0.25);
            --bg: #05070a;
            --card: rgba(22, 27, 34, 0.95);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --red: #ef4444;
            --blue: #3b82f6;
            --amber: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; overflow: hidden; height: 100vh; font-size: 14px; }

        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }

        /* --- 레이아웃 --- */
        #app { display: none; grid-template-columns: 240px 1fr 300px; height: 100vh; }
        #app.on { display: grid; }
        @media (max-width: 1200px) { #app { grid-template-columns: 80px 1fr; } .widget-area { display: none; } }
        @media (max-width: 768px) { #app { grid-template-columns: 1fr; } .sidebar { display: none; } .bnav { display: flex; } }

        /* --- 사이드바 --- */
        .sidebar { background: #080a0f; border-right: 1px solid var(--border); padding: 20px 12px; display: flex; flex-direction: column; gap: 4px; }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: -1px; margin-bottom: 24px; padding: 0 12px; color: var(--p); cursor: pointer; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 12px; cursor: pointer; color: var(--text-dim); font-weight: 600; transition: 0.2s; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-item.active { background: var(--ps); color: var(--p); border: 1px solid var(--pb); }
        .nav-icon { font-size: 18px; width: 22px; text-align: center; }

        /* --- 메인 컨테이너 --- */
        .main-container { overflow-y: auto; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at 10% 10%, var(--ps), transparent 35%); }
        header { position: sticky; top: 0; height: 64px; background: rgba(5,7,10,0.85); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border); z-index: 100; }
        .team-pill { display: flex; align-items: center; gap: 8px; background: var(--ps); padding: 5px 12px; border-radius: 100px; border: 1.5px solid var(--pb); cursor: pointer; }
        .team-pill img { width: 22px; height: 22px; object-fit: contain; }
        .team-pill span { font-weight: 700; font-size: 13px; color: var(--p); }

        .content { padding: 24px; max-width: 900px; margin: 0 auto; width: 100%; }
        @media (max-width: 768px) { .content { padding: 16px 16px 100px; } }

        /* --- 컴포넌트 디자인 --- */
        .stl { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .stl h2 { font-size: 18px; font-weight: 800; }
        .stl::before { content: ''; width: 3px; height: 18px; background: var(--p); border-radius: 2px; }

        .mc { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 14px; transition: 0.25s; cursor: pointer; }
        .mc:hover { border-color: var(--p); transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .mc-body { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; }
        .m-team { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
        .m-team img { width: 44px; height: 44px; object-fit: contain; }
        .m-name { font-weight: 700; font-size: 13px; color: #fff; }
        .m-score { background: #000; padding: 8px 18px; border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; border: 1px solid var(--border); min-width: 90px; text-align: center; }
        .m-score.live { color: var(--p); border-color: var(--pb); }
        .m-meta { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 8px; font-weight: 600; }

        /* --- 스케줄 날짜 피커 --- */
        .date-picker { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 20px; padding: 2px; }
        .date-picker::-webkit-scrollbar { display: none; }
        .d-btn { flex-shrink: 0; background: #0d1117; border: 1px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; min-width: 65px; cursor: pointer; transition: 0.2s; }
        .d-btn.on { background: var(--p); border-color: var(--p); }
        .d-btn span { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
        .d-btn.on span { color: rgba(255,255,255,0.7); }
        .d-btn b { font-size: 16px; font-weight: 800; color: #fff; }

        /* --- 리그 순위 / 선수 테이블 --- */
        .data-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
        .data-table th { padding: 12px; text-align: left; color: var(--text-dim); font-size: 11px; text-transform: uppercase; font-weight: 700; }
        .data-table td { padding: 12px; background: #0d1117; font-size: 13px; font-weight: 600; }
        .data-table tr td:first-child { border-radius: 10px 0 0 10px; }
        .data-table tr td:last-child { border-radius: 0 10px 10px 0; }
        .t-rank { font-weight: 900; color: var(--text-dim); width: 30px; }
        .t-name { display: flex; align-items: center; gap: 8px; }
        .t-name img { width: 20px; height: 20px; object-fit: contain; }
        .t-pts { font-weight: 800; color: var(--p); }

        /* --- 온보딩 리디자인 --- */
        #ob { position: fixed; inset: 0; background: var(--bg); z-index: 9999; overflow-y: auto; padding: 40px 20px 100px; display: none; }
        .ob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .ob-team { background: #0d1117; border: 1px solid var(--border); border-radius: 16px; padding: 14px 8px; cursor: pointer; transition: 0.2s; text-align: center; }
        .ob-team:hover { transform: translateY(-2px); border-color: var(--pb); }
        .ob-team.sel { background: var(--ps); border-color: var(--p); }
        .ob-crest { width: 40px; height: 40px; object-fit: contain; margin-bottom: 10px; }
        .ob-nm { font-size: 11px; font-weight: 700; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .ob-team.sel .ob-nm { color: #fff; }

        /* --- 모달 --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.on { display: flex; }
        .m-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; width: 100%; max-width: 500px; overflow: hidden; animation: zoom 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes zoom { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .m-head { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; }
        .m-body { padding: 20px; max-height: 60vh; overflow-y: auto; }

        /* --- 바텀 네비 --- */
        .bnav { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: rgba(8,10,15,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: none; justify-content: space-around; align-items: center; z-index: 500; }
        .bn-item { display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text-dim); text-decoration: none; font-size: 10px; font-weight: 700; }
        .bn-item.active { color: var(--p); }

        .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; gap: 12px; }
        .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.05); border-top-color: var(--p); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Onboarding -->
    <div id="ob">
        <div class="ob-wrap" style="max-width:850px; margin:0 auto;">
            <h1 style="font-size:32px; font-weight:900; margin-bottom:8px; text-align:center;">PITCH IN</h1>
            <p style="text-align:center; color:var(--text-dim); margin-bottom:32px;">최대 2개의 구단을 선택해 대시보드를 구성하세요.</p>
            <div id="ob-tabs" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:20px; padding-bottom:10px;"></div>
            <div id="ob-grid" class="ob-grid"></div>
        </div>
        <div style="position:fixed; bottom:0; left:0; right:0; padding:24px; background:linear-gradient(to top, var(--bg) 60%, transparent); text-align:center;">
            <button id="ob-start" onclick="startApp()" disabled style="background:var(--p); color:#000; border:none; padding:16px 60px; border-radius:100px; font-weight:800; font-size:16px; cursor:pointer;">팀을 선택하세요</button>
        </div>
    </div>

    <!-- App Content -->
    <div id="app">
        <aside class="sidebar">
            <div class="logo">PITCH IN</div>
            <nav id="nav-list"></nav>
        </aside>

        <main class="main-container">
            <header>
                <div class="team-pill" id="header-team" onclick="resetApp()"></div>
                <div class="lv-badge" id="lv-badge">Lv.1 Rookie</div>
            </header>
            <div class="content" id="main-content"></div>
        </main>

        <aside class="widget-area" style="padding:24px; border-left:1px solid var(--border);">
            <div style="background:var(--card); border:1px solid var(--border); border-radius:20px; padding:16px;">
                <h4 style="font-size:12px; color:var(--text-dim); margin-bottom:16px;">🔥 주요 리그 순위</h4>
                <div id="mini-std"></div>
            </div>
        </aside>

        <nav class="bnav" id="mobile-nav"></nav>
    </div>

    <div class="modal" id="modal" onclick="closeModal()"><div class="m-box" onclick="event.stopPropagation()"><div class="m-head" id="m-head"></div><div class="m-body" id="m-body"></div></div></div>

    <script>
        const API = '/api/football';
        let currentLang = 'ko', curPage = 'home', obLg = 'PL';
        let SEL = JSON.parse(localStorage.getItem('pi_sel') || '[]');
        let fanData = JSON.parse(localStorage.getItem('pi_fan') || '{"total":0}');
        const _cache = {};

        const LEAGUES = [
            { n:'프리미어리그', c:'PL', teams:[
                {ko:'노팅엄',id:351, col:'#DD0000'}, {ko:'뉴캐슬',id:67, col:'#241F20'}, {ko:'리버풀',id:64, col:'#C8102E'}, {ko:'리즈',id:341, col:'#FFCD00'},
                {ko:'맨시티',id:65, col:'#6CABDD'}, {ko:'맨유',id:66, col:'#DA291C'}, {ko:'번리',id:328, col:'#6C1D45'}, {ko:'본머스',id:1044, col:'#DA291C'},
                {ko:'브라이튼',id:397, col:'#0057B8'}, {ko:'브렌트포드',id:402, col:'#E30613'}, {ko:'선덜랜드',id:385, col:'#FF0000', src:'image_0aa60b.png'}, {ko:'아스날',id:57, col:'#EF0107'},
                {ko:'에버튼',id:62, col:'#003399'}, {ko:'울버햄튼',id:76, col:'#FDB913'}, {ko:'첼시',id:61, col:'#034694'}, {ko:'토트넘',id:73, col:'#132257'}, {ko:'풀럼',id:63, col:'#000000'}
            ]},
            { n:'라리가', c:'PD', teams:[
                {ko:'라요',id:726, src:'image_0b1247.png', col:'#E30613'}, {ko:'레반테',id:745, src:'image_0b1265.png', col:'#005DA9'}, {ko:'레알 마드리드',id:86, col:'#FFFFFF'}, {ko:'마요르카',id:279, src:'image_0b126d.png', col:'#E2001A'},
                {ko:'바르셀로나',id:81, col:'#004D98'}, {ko:'세비야',id:82, src:'image_0b160a.png', col:'#C4041C'}, {ko:'소시에다드',id:92, col:'#0067B1'}, {ko:'아틀레티코',id:78, col:'#CB3524'}
            ]}
        ];

        const getCrest = t => t.src || (t.id > 2000 ? `https://media.api-sports.io/football/teams/${t.id}.png` : `https://crests.football-data.org/${t.id}.png`);

        async function fetchFD(path, ttl = 60000) {
            if(_cache[path] && Date.now() - _cache[path].ts < ttl) return _cache[path].d;
            try {
                const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`);
                const d = await r.json();
                if(d.errorCode === 429) { await new Promise(r=>setTimeout(r,2000)); return fetchFD(path, ttl); }
                _cache[path] = {d, ts:Date.now()};
                return d;
            } catch(e) { return null; }
        }

        // --- 온보딩 ---
        function initOb() {
            const tabs = document.getElementById('ob-tabs');
            tabs.innerHTML = LEAGUES.map(l => `<button class="d-btn ${l.c===obLg?'on':''}" style="min-width:110px;" onclick="obLg='${l.c}';initOb()"><b>${l.n}</b></button>`).join('');
            const grid = document.getElementById('ob-grid');
            const lg = LEAGUES.find(l => l.c === obLg);
            grid.innerHTML = lg.teams.map(t => {
                const isSel = SEL.find(s => s.id === t.id);
                return `<div class="ob-team ${isSel?'sel':''}" onclick="toggleTeam(${t.id})">
                    <img class="ob-crest" src="${getCrest(t)}">
                    <div class="ob-nm">${t.ko}</div>
                </div>`;
            }).join('');
            const btn = document.getElementById('ob-start');
            btn.disabled = !SEL.length;
            btn.textContent = SEL.length ? `${SEL.map(s=>s.ko).join(' & ')} 시작하기 →` : '팀을 선택하세요';
        }

        function toggleTeam(id) {
            const t = LEAGUES.flatMap(l=>l.teams).find(x=>x.id===id);
            const idx = SEL.findIndex(s=>s.id===id);
            if(idx > -1) SEL.splice(idx,1);
            else if(SEL.length < 2) SEL.push(t);
            initOb();
        }

        function startApp() {
            localStorage.setItem('pi_sel', JSON.stringify(SEL));
            document.getElementById('ob').style.display = 'none';
            document.getElementById('app').classList.add('on');
            updateTheme();
            renderUI();
            swPage('home');
            loadMiniStd();
        }

        function resetApp() { if(confirm('팀 설정을 초기화하시겠습니까?')) { localStorage.removeItem('pi_sel'); location.reload(); } }

        function updateTheme() {
            if(!SEL.length) return;
            const c = SEL[0].col;
            const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
            document.documentElement.style.setProperty('--p', c);
            document.documentElement.style.setProperty('--ps', `rgba(${r},${g},${b},0.12)`);
            document.documentElement.style.setProperty('--pb', `rgba(${r},${g},${b},0.3)`);
            document.getElementById('header-team').innerHTML = SEL.map(t => `<img src="${getCrest(t)}"><span>${t.ko}</span>`).join('');
        }

        // --- 페이지 전환 및 데이터 로드 ---
        async function swPage(page) {
            curPage = page;
            document.querySelectorAll('.nav-item, .bn-item').forEach(i => i.classList.toggle('active', i.dataset.page === page));
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="loader"><div class="spinner"></div><div style="font-size:12px; color:var(--text-dim);">데이터를 불러오는 중...</div></div>`;

            if(page === 'home') loadLive();
            else if(page === 'sched') loadSched();
            else if(page === 'std') loadStandings();
            else if(page === 'player') loadPlayers();
            else if(page === 'ai') loadAI();
            else if(page === 'fan') loadFan();
        }

        async function loadLive() {
            const d = await fetchFD('/matches');
            const live = (d?.matches || []).filter(m => ['IN_PLAY','PAUSED','HALFTIME'].includes(m.status));
            let html = `<div class="stl"><h2>🔴 실시간 라이브</h2></div>`;
            if(!live.length) html += `<div style="padding:40px; text-align:center; color:var(--text-dim);">현재 진행 중인 경기가 없습니다.</div>`;
            else live.forEach(m => html += renderMC(m, true));
            document.getElementById('main-content').innerHTML = html;
        }

        async function loadSched() {
            const container = document.getElementById('main-content');
            let html = `<div class="stl"><h2>📅 경기 일정</h2></div><div class="date-picker">`;
            for(let i=-1; i<7; i++) {
                const dt = new Date(); dt.setDate(dt.getDate() + i);
                const ds = dt.toISOString().split('T')[0];
                html += `<div class="d-btn ${i===0?'on':''}" onclick="loadDaySched('${ds}', this)">
                    <span>${dt.toLocaleDateString('ko-KR',{weekday:'short'})}</span><b>${dt.getDate()}</b>
                </div>`;
            }
            html += `</div><div id="sched-list"></div>`;
            container.innerHTML = html;
            loadDaySched(new Date().toISOString().split('T')[0]);
        }

        async function loadDaySched(ds, el) {
            if(el) { document.querySelectorAll('.d-btn').forEach(b=>b.classList.remove('on')); el.classList.add('on'); }
            const list = document.getElementById('sched-list');
            list.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
            const d = await fetchFD(`/matches?dateFrom=${ds}&dateTo=${ds}`);
            list.innerHTML = d?.matches?.length ? d.matches.map(m=>renderMC(m)).join('') : `<div style="padding:40px; text-align:center; color:var(--text-dim);">해당 일자의 경기가 없습니다.</div>`;
        }

        async function loadStandings() {
            const d = await fetchFD('/competitions/PL/standings');
            const table = d?.standings?.[0]?.table || [];
            document.getElementById('main-content').innerHTML = `
                <div class="stl"><h2>📊 리그 순위 (Premier League)</h2></div>
                <table class="data-table">
                    <tr><th>#</th><th>팀</th><th>경기</th><th>승점</th><th>득실</th></tr>
                    ${table.map(t => `<tr>
                        <td class="t-rank">${t.position}</td>
                        <td class="t-name"><img src="${t.team.crest}"> ${t.team.shortName}</td>
                        <td>${t.playedGames}</td><td class="t-pts">${t.points}</td><td>${t.goalDifference}</td>
                    </tr>`).join('')}
                </table>
            `;
        }

        async function loadPlayers() {
            const d = await fetchFD('/competitions/PL/scorers');
            const scorers = d?.scorers || [];
            document.getElementById('main-content').innerHTML = `
                <div class="stl"><h2>👟 득점 순위 (Top Scorers)</h2></div>
                <table class="data-table">
                    <tr><th>#</th><th>선수</th><th>팀</th><th>골</th><th>어시스트</th></tr>
                    ${scorers.map((s,i) => `<tr>
                        <td class="t-rank">${i+1}</td>
                        <td><b>${s.player.name}</b></td>
                        <td class="t-name"><img src="${s.team.crest}"> ${s.team.shortName}</td>
                        <td class="t-pts">${s.goals}</td><td>${s.assists || 0}</td>
                    </tr>`).join('')}
                </table>
            `;
        }

        function loadAI() {
            document.getElementById('main-content').innerHTML = `
                <div class="stl"><h2>🧠 AI PITCH 전술 분석</h2></div>
                <div class="mc" style="background:linear-gradient(135deg, var(--ps), transparent); border-color:var(--pb);">
                    <div style="font-size:18px; font-weight:900; margin-bottom:12px;">MAN CITY vs ARSENAL</div>
                    <p style="line-height:1.7; color:var(--text-dim);">AI 엔진이 분석한 결과, 맨시티는 로드리를 필두로 한 <b>3-2-4-1 반전 빌드업</b>을 활용할 것으로 보입니다. 아스날은 외데고르를 중심으로 한 <b>박스형 4-4-2 압박</b>으로 대응할 확률이 82%에 달합니다. 예상 골 점유 구역은 아스날의 왼쪽 하프 스페이스입니다.</p>
                </div>
            `;
        }

        function loadFan() {
            const lv = Math.floor(fanData.total / 5) + 1;
            document.getElementById('main-content').innerHTML = `
                <div class="stl"><h2>⭐ FAN ZONE</h2></div>
                <div class="mc" style="text-align:center; padding:40px;">
                    <div style="font-size:40px; margin-bottom:15px;">🏅</div>
                    <h3 style="font-size:22px;">등급: ${lv===1?'Rookie':lv===2?'Casual':'Veteran'}</h3>
                    <p style="color:var(--text-dim); margin:10px 0 24px;">지금까지 총 ${fanData.total}경기를 함께했습니다.</p>
                    <button onclick="fanData.total++;localStorage.setItem('pi_fan',JSON.stringify(fanData));swPage('fan')" style="background:var(--p); color:#000; border:none; padding:15px 40px; border-radius:100px; font-weight:800; cursor:pointer;">경기 인증하기 (30분 전 활성화)</button>
                </div>
            `;
        }

        // --- 유틸리티 렌더링 ---
        function renderMC(m, live=false) {
            const h = m.homeTeam, a = m.awayTeam;
            return `<div class="mc fade-in" onclick="openDetail(${m.id})">
                <div class="mc-body">
                    <div class="m-team"><img src="${h.crest}"><div class="m-name">${h.shortName || h.name}</div></div>
                    <div class="m-score ${live?'live':''}">${m.score.fullTime.home??'-'} : ${m.score.fullTime.away??'-'}</div>
                    <div class="m-team"><img src="${a.crest}"><div class="m-name">${a.shortName || a.name}</div></div>
                </div>
                <div class="m-meta">${m.competition.name} • ${live?'경기 중':m.status}</div>
            </div>`;
        }

        async function openDetail(id) {
            const m = await fetchFD(`/matches/${id}`);
            if(!m) return;
            document.getElementById('m-head').innerHTML = `<h3 style="font-size:20px; font-weight:800;">${m.homeTeam.name} vs ${m.awayTeam.name}</h3><p style="font-size:12px; color:var(--text-dim); margin-top:8px;">🏟️ ${m.venue || 'Unknown'} | 👔 ${m.referees?.[0]?.name || 'Unknown'}</p>`;
            document.getElementById('m-body').innerHTML = `
                <div style="background:rgba(255,255,255,0.03); border-radius:16px; padding:20px;">
                    <h5 style="margin-bottom:15px; color:var(--p);">📊 매치 스탯</h5>
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>65%</span><span>점유율</span><span>35%</span></div>
                    <div style="height:4px; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden; display:flex; margin-bottom:15px;"><div style="width:65%; background:var(--p);"></div></div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>14</span><span>슈팅</span><span>8</span></div>
                    <div style="height:4px; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden; display:flex;"><div style="width:58%; background:var(--p);"></div></div>
                </div>
            `;
            document.getElementById('modal').classList.add('on');
        }

        function closeModal() { document.getElementById('modal').classList.remove('on'); }

        async function loadMiniStd() {
            const d = await fetchFD('/competitions/PL/standings');
            const table = (d?.standings?.[0]?.table || []).slice(0, 6);
            document.getElementById('mini-std').innerHTML = table.map(t => `
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.03); font-size:12px;">
                    <span><b>${t.position}</b> ${t.team.shortName}</span><span style="font-weight:900; color:var(--p);">${t.points}</span>
                </div>
            `).join('');
        }

        function renderUI() {
            const navs = [
                {p:'home', i:'⚡', n:'라이브'}, {p:'sched', i:'📅', n:'일정'}, {p:'std', i:'📊', n:'순위'}, 
                {p:'player', i:'👟', n:'선수'}, {p:'ai', i:'🧠', n:'AI'}, {p:'fan', i:'⭐', n:'팬존'}
            ];
            document.getElementById('nav-list').innerHTML = navs.map(n => `<div class="nav-item" data-page="${n.p}" onclick="swPage('${n.p}')"><span class="nav-icon">${n.i}</span> ${n.n}</div>`).join('');
            document.getElementById('mobile-nav').innerHTML = navs.map(n => `<div class="bn-item" data-page="${n.p}" onclick="swPage('${n.p}')"><span class="bn-icon">${n.i}</span><span>${n.n}</span></div>`).join('');
        }

        window.onload = () => {
            if(SEL.length) startApp(); else { document.getElementById('ob').style.display='block'; initOb(); }
        };
    </script>
</body>
</html>
