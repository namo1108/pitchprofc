<style>
:root {
    --bg: #05070a; --bg2: #0d1117; --cd: #161b22;
    --p: #10b981; --ps: rgba(16, 185, 129, 0.15); --pb: rgba(16, 185, 129, 0.3);
    --s: #3b82f6; --t: #ffffff; --t2: #a1a1aa; --t3: #3f3f46;
    --red: #ef4444; --br: 20px; --sh: 0 15px 35px rgba(0,0,0,0.5);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
    background: var(--bg); color: var(--t); font-family: 'Inter', sans-serif;
    overflow: hidden; height: 100vh;
}
/* ONBOARDING */
#ob { position: fixed; inset: 0; background: var(--bg); z-index: 9999; overflow-y: auto; padding: 60px 20px; }
.ob-container { max-width: 1000px; margin: 0 auto; }
.ob-header { text-align: center; margin-bottom: 50px; }
.ob-header h1 { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; }
.league-section { margin-bottom: 40px; }
.league-title { font-size: 18px; font-weight: 800; color: var(--p); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.league-title img { width: 24px; height: 24px; object-fit: contain; }
.ob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
.ob-team { background: var(--bg2); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
.ob-team img { width: 44px; height: 44px; object-fit: contain; margin-bottom: 8px; }
.ob-team span { font-size: 11px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ob-team.sel { border-color: var(--p); background: var(--ps); transform: translateY(-3px); }
.ob-team.sel::after { content: '✓'; position: absolute; top: 5px; right: 8px; color: var(--p); font-weight: 900; font-size: 10px; }
.ob-footer { position: sticky; bottom: 0; background: linear-gradient(to top, var(--bg) 70%, transparent); padding: 20px 0; text-align: center; }
.start-btn { width: 220px; padding: 14px; border-radius: 100px; border: none; background: var(--p); color: #000; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s; }

/* APP LAYOUT */
#app { display: none; height: 100vh; flex-direction: column; }
.hdr { height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
.hdr-logo { font-size: 20px; font-weight: 900; color: var(--p); }
.main-body { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 240px; background: var(--bg); padding: 20px 10px; border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; }
.si { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; cursor: pointer; color: var(--t2); font-weight: 600; margin-bottom: 5px; font-size: 14px; }
.si.on { background: var(--bg2); color: var(--t); }
.pages { flex: 1; overflow-y: auto; padding: 20px; position: relative; }
.page { display: none; } .page.on { display: block; }

/* MATCH CARD (FotMob Style) */
.mc { background: var(--bg2); border-radius: 15px; margin-bottom: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.03); }
.mc:hover { background: #1c2128; }
.mc-top { padding: 8px 15px; background: rgba(255,255,255,0.02); font-size: 10px; font-weight: 700; color: var(--t2); display: flex; justify-content: space-between; }
.mc-body { padding: 15px; display: flex; align-items: center; }
.mc-time { width: 60px; font-size: 11px; font-weight: 700; color: var(--p); text-align: center; border-right: 1px solid rgba(255,255,255,0.05); margin-right: 15px; }
.mc-teams { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.mc-team-row { display: flex; align-items: center; justify-content: space-between; }
.mc-team-info { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; }
.mc-team-info img { width: 22px; height: 22px; object-fit: contain; }
.mc-score { font-weight: 800; font-size: 15px; font-variant-numeric: tabular-nums; }

/* MODAL / DETAILS */
.modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-hdr { height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
.modal-body { flex: 1; overflow-y: auto; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
.close-btn { font-size: 24px; cursor: pointer; }

/* MATCH DETAILS UI */
.dt-score-card { text-align: center; padding: 30px 0; background: linear-gradient(to bottom, var(--bg2), var(--bg)); border-radius: 20px; margin-bottom: 20px; }
.dt-teams-flex { display: flex; align-items: center; justify-content: center; gap: 40px; margin-bottom: 15px; }
.dt-team-box { width: 100px; cursor: pointer; }
.dt-team-box img { width: 60px; height: 60px; margin-bottom: 10px; }
.dt-team-box h3 { font-size: 14px; font-weight: 700; }
.dt-score-big { font-size: 42px; font-weight: 900; letter-spacing: 5px; }
.dt-meta { font-size: 12px; color: var(--t2); margin-top: 10px; display: flex; justify-content: center; gap: 20px; }
.dt-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
.dt-tab { flex: 1; text-align: center; padding: 12px; font-size: 13px; font-weight: 700; color: var(--t2); cursor: pointer; }
.dt-tab.on { color: var(--p); border-bottom: 2px solid var(--p); }
.stat-row { margin-bottom: 15px; }
.stat-labels { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.stat-bar-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; display: flex; }
.stat-bar-fill { height: 100%; background: var(--p); transition: 0.5s; }

/* SQUAD UI */
.squad-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
.player-card { background: var(--bg2); padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 12px; }
.player-num { font-size: 18px; font-weight: 900; color: var(--p); width: 25px; }
.player-info h4 { font-size: 13px; font-weight: 700; }
.player-info p { font-size: 11px; color: var(--t2); }

/* PILLS */
.pills { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
.pill { padding: 8px 16px; border-radius: 100px; background: var(--bg2); border: 1px solid rgba(255,255,255,0.05); color: var(--t2); font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.pill.on { background: var(--p); color: #000; border-color: var(--p); }

.loading-state { text-align: center; padding: 40px; color: var(--t2); font-size: 13px; }
.spinner { width: 30px; height: 30px; border: 2px solid var(--t3); border-top-color: var(--p); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

</div>

<!-- APP -->

            <div class="page" id="pg-std">

    <div class="modal-body" id="md-body"></div>
</div>

        <span></span>

    <div class="modal-body" id="td-body"></div>
</div>

        {img:'Jeonbuk_Hyundai_Motors_FC_logo.svg', n:'Jeonbuk', col:'#006738'}, {img:'Pohang_Steelers_logo.svg', n:'Pohang', col:'#C8102E'}
    ]},
    { n: 'La Liga', c: 'PD', icon: 'LaLiga_logo_2023.svg', teams: [
        {img:'Real_Madrid_CF.svg', n:'Real Madrid', col:'#FEBE10', id:86}, {img:'FC_Barcelona_(crest).svg', n:'Barcelona', col:'#A50044', id:81}
    ]}
];

let SELECTED_TEAMS = [];
const memCache = {};

async function fetchData(path, ttl=60000) {
    if (memCache[path] && (Date.now() - memCache[path].ts < ttl)) return memCache[path].data;
    try {
        const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`);
        const d = await r.json();
        memCache[path] = { data: d, ts: Date.now() };
        return d;
    } catch(e) { return null; }
}

function initOb() {
    const list = document.getElementById('ob-list');
    list.innerHTML = LEAGUES.map(lg => `
        <div class="league-section">
            <div class="league-title"><img src="${wm(lg.icon, 48)}"> ${lg.n}</div>
            <div class="ob-grid">
                ${lg.teams.map(t => `<div class="ob-team" data-id="${t.n}" onclick="toggleTeam(this, ${JSON.stringify(t).replace(/"/g, '&quot;')})"><img src="${wm(t.img, 80)}"><span>${t.n}</span></div>`).join('')}
            </div>
        </div>`).join('');
}

function toggleTeam(el, team) {
    const idx = SELECTED_TEAMS.findIndex(t => t.n === team.n);
    if (idx > -1) { SELECTED_TEAMS.splice(idx, 1); el.classList.remove('sel'); }
    else { if (SELECTED_TEAMS.length >= 2) return; SELECTED_TEAMS.push(team); el.classList.add('sel'); }
    document.getElementById('ob-sel-count').textContent = `${SELECTED_TEAMS.length} / 2 selected`;
}

function startApp() {
    if (SELECTED_TEAMS.length === 0) return;
    document.getElementById('ob').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('selected-team-display').innerHTML = SELECTED_TEAMS.map(t => `<img src="${wm(t.img, 48)}" style="width:28px; height:28px; object-fit:contain;">`).join('');
    
    // Init Tabs
    const stdPills = document.getElementById('std-pills');
    stdPills.innerHTML = LEAGUES.map(l => `<button class="pill" data-code="${l.c}" onclick="loadStd('${l.c}')">${l.n}</button>`).join('');
    
    const dnav = document.getElementById('date-nav');
    for (let i = -1; i < 6; i++) {
        const d = new Date(); d.setDate(d.getDate() + i); const ds = d.toISOString().split('T')[0];
        const btn = document.createElement('button'); btn.className = 'pill' + (i === 0 ? ' on' : '');
        btn.textContent = i === 0 ? 'TODAY' : (i === -1 ? 'YESTERDAY' : `${d.getMonth()+1}/${d.getDate()}`);
        btn.onclick = () => { document.querySelectorAll('#date-nav .pill').forEach(p => p.classList.remove('on')); btn.classList.add('on'); loadMatches(ds); };
        dnav.appendChild(btn);
    }
    loadMatches(new Date().toISOString().split('T')[0]);
}

async function loadMatches(date) {
    const bd = document.getElementById('home-bd');
    bd.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
    const d = await fetchData(`/matches?dateFrom=${date}&dateTo=${date}`);
    if (!d?.matches?.length) { bd.innerHTML = '<div class="loading-state">No matches scheduled</div>'; return; }
    
    bd.innerHTML = d.matches.map(m => `
        <div class="mc" onclick="openMatch(${m.id})">
            <div class="mc-top"><span>${m.competition.name}</span><span>${m.status}</span></div>
            <div class="mc-body">
                <div class="mc-time">${m.status === 'TIMED' ? m.utcDate.slice(11,16) : (m.status === 'IN_PLAY' ? 'LIVE' : 'FT')}</div>
                <div class="mc-teams">
                    <div class="mc-team-row"><div class="mc-team-info"><img src="${m.homeTeam.crest}">${m.homeTeam.name}</div><div class="mc-score">${m.score.fullTime.home ?? 0}</div></div>
                    <div class="mc-team-row"><div class="mc-team-info"><img src="${m.awayTeam.crest}">${m.awayTeam.name}</div><div class="mc-score">${m.score.fullTime.away ?? 0}</div></div>
                </div>
            </div>
        </div>`).join('');
}

async function openMatch(id) {
    const modal = document.getElementById('match-modal');
    const body = document.getElementById('md-body');
    modal.style.display = 'flex';
    body.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
    
    const m = await fetchData(`/matches/${id}`);
    if (!m) return;
    
    body.innerHTML = `
        <div class="dt-score-card">
            <div class="dt-teams-flex">
                <div class="dt-team-box" onclick="openTeam(${m.homeTeam.id})"><img src="${m.homeTeam.crest}"><h3>${m.homeTeam.shortName || m.homeTeam.name}</h3></div>
                <div class="dt-score-big">${m.score.fullTime.home ?? 0} : ${m.score.fullTime.away ?? 0}</div>
                <div class="dt-team-box" onclick="openTeam(${m.awayTeam.id})"><img src="${m.awayTeam.crest}"><h3>${m.awayTeam.shortName || m.awayTeam.name}</h3></div>
            </div>
            <div class="dt-meta"><span>${m.venue || 'Stadium N/A'}</span><span>Ref: ${m.referees?.[0]?.name || 'N/A'}</span></div>
        </div>
        <div class="dt-tabs">
            <div class="dt-tab on">INFO</div><div class="dt-tab">LINEUP</div><div class="dt-tab">STATS</div>
        </div>
        <div id="md-content">
            <div class="stat-row">
                <div class="stat-labels"><span>Possession</span><span>50% - 50%</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:50%"></div></div>
            </div>
            <div class="stat-row">
                <div class="stat-labels"><span>Shots</span><span>12 - 8</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:60%"></div></div>
            </div>
            <p style="color:var(--t2); font-size:12px; text-align:center; margin-top:20px;">Detailed stats available for premium API tiers.</p>
        </div>`;
}

async function openTeam(id) {
    const modal = document.getElementById('team-modal');
    const body = document.getElementById('td-body');
    modal.style.display = 'flex';
    body.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
    
    const t = await fetchData(`/teams/${id}`);
    if (!t) return;
    
    document.getElementById('td-name').textContent = t.name;
    body.innerHTML = `
        <div style="text-align:center; margin-bottom:30px;">
            <img src="${t.crest}" style="width:80px; margin-bottom:15px;">
            <h2>${t.name}</h2>
            <p style="color:var(--t2); font-size:13px;">Founded: ${t.founded} | ${t.venue}</p>
        </div>
        <h3 style="margin-bottom:15px; font-size:16px;">SQUAD</h3>
        <div class="squad-grid">
            ${t.squad.map(p => `
                <div class="player-card">
                    <div class="player-num">${p.shirtNumber || '-'}</div>
                    <div class="player-info"><h4>${p.name}</h4><p>${p.position}</p></div>
                </div>`).join('')}
        </div>`;
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function swP(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.getElementById('pg-' + id).classList.add('on');
    document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
    el.classList.add('on');
}
window.onload = initOb;
</script>
</body>
</html>
