<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>PITCH Pro — Live Tactical Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #010406; --bg2: #060e12; --card: rgba(16, 26, 33, 0.98);
            --p-color: #00ff87; --p-glow: rgba(0, 255, 135, 0.4);
            --t: #d0ffe8; --t2: #5a8870; --t3: #1e3d2e;
            --accent: #ffb800; --red: #ff3b5c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; overflow: hidden; height: 100vh; position: relative; }

        /* [Header & Nav] */
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(1,4,6,0.9); border-bottom: 1px solid rgba(0,255,135,0.1); z-index: 100; }
        .container { flex: 1; overflow-y: auto; padding: 15px; display: none; padding-bottom: 90px; height: calc(100vh - 135px); }
        .container.active { display: block; animation: slideUp 0.4s ease; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: 75px; background: var(--bg2); display: flex; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--t3); gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--p-color); }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 8px; font-weight: 700; font-family: 'Orbitron'; }

        /* [Live Match Card] */
        .match-card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .match-card.live::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--p-color); box-shadow: 0 0 10px var(--p-glow); }
        .m-league { font-family: 'Orbitron'; font-size: 9px; color: var(--p-color); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .m-row { display: flex; align-items: center; justify-content: space-between; text-align: center; }
        .m-team { flex: 1; }
        .m-team img { width: 40px; height: 40px; margin-bottom: 8px; }
        .m-score { font-family: 'Orbitron'; font-size: 32px; font-weight: 900; width: 100px; }

        /* [Goal Overlay] */
        #goal-overlay { position: fixed; inset: 0; z-index: 9999; display: none; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; pointer-events: none; text-align: center; }
        .goal-text { font-family: 'Orbitron'; font-size: 80px; font-weight: 900; color: var(--p-color); text-shadow: 0 0 30px var(--p-glow); animation: goalZoom 0.5s infinite alternate; }

        /* [Onboarding] */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; transition: 0.8s; }
        .ob-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; flex: 1; overflow-y: auto; }
        .t-card { background: var(--bg2); padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }

        /* Animations */
        @keyframes goalZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .shake { animation: shake 0.5s both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 70% { transform: translate3d(-4px, 0, 0); } }
        .loading-spin { width: 30px; height: 30px; border: 3px solid var(--t3); border-top-color: var(--p-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="goal-overlay">
        <div class="goal-text">GOAL!!</div>
        <div id="scorer-name" style="font-size: 20px; font-weight: 700; color: #fff; margin-top: 10px;">MATCH UPDATE</div>
    </div>

    <div id="onboarding">
        <div style="text-align:center; padding:50px 20px;">
            <h1 style="font-family:'Orbitron'; color:var(--p-color);">PITCH PRO</h1>
            <p style="color:var(--t2); font-size:12px; margin-top:10px;">응원하는 팀을 선택하여 데이터를 동기화하세요.</p>
        </div>
        <div class="ob-grid" id="ob-grid">
            <div class="t-card" onclick="selectTeam(73, 'Tottenham', '#ffffff')"><img src="https://crests.football-data.org/73.svg"><div>Tottenham</div></div>
            <div class="t-card" onclick="selectTeam(65, 'Man City', '#6caddf')"><img src="https://crests.football-data.org/65.svg"><div>Man City</div></div>
            <div class="t-card" onclick="selectTeam(64, 'Liverpool', '#e31b23')"><img src="https://crests.football-data.org/64.svg"><div>Liverpool</div></div>
            <div class="t-card" onclick="selectTeam(86, 'Real Madrid', '#ffffff')"><img src="https://crests.football-data.org/86.svg"><div>Real Madrid</div></div>
            <div class="t-card" onclick="selectTeam(81, 'Barcelona', '#a50044')"><img src="https://crests.football-data.org/81.svg"><div>Barcelona</div></div>
            <div class="t-card" onclick="selectTeam(503, 'Bayern', '#dc052d')"><img src="https://crests.football-data.org/503.svg"><div>Bayern</div></div>
        </div>
    </div>

    <div id="app">
        <header class="header">
            <div style="font-family:'Orbitron'; font-weight:900; color:var(--p-color);">PITCH PRO</div>
            <div id="user-club-logo"></div>
        </header>

        <main id="view-lives" class="container active">
            <div id="live-feed"><div class="loading-spin"></div></div>
        </main>

        <main id="view-schedule" class="container">
            <div id="my-next-match"></div>
            <div id="schedule-feed"></div>
        </main>

        <main id="view-stadium" class="container">
            <div class="match-card" style="background:linear-gradient(135deg, var(--card), var(--bg2));">
                <div style="font-family:'Orbitron'; font-size:20px; color:var(--p-color);" id="user-rank">방구석 퍼거슨</div>
                <div style="font-size:12px; color:var(--accent); margin-bottom:15px;" id="user-meme">"입축구는 이미 챔스 우승급"</div>
                <button onclick="checkIn()" style="width:100%; padding:15px; background:var(--p-color); border:none; border-radius:12px; font-weight:900; font-family:'Orbitron';">STADIUM CHECK-IN</button>
            </div>
            <div id="checkin-list"></div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="sw('lives', this)"><i class="fa-solid fa-bolt"></i><span>LIVES</span></div>
            <div class="nav-item" onclick="sw('schedule', this)"><i class="fa-solid fa-calendar"></i><span>SCHEDULE</span></div>
            <div class="nav-item" onclick="sw('stadium', this)"><i class="fa-solid fa-stadium"></i><span>STADIUM</span></div>
        </nav>
    </div>

    <script>
        const API_KEY = 'b00e3059f51741b7add3fcaab7eaadf0';
        const BASE_URL = 'https://api.football-data.org/v4';
        let myTeamId = null;
        let lastScores = {}; // 이전 점수 저장 (골 감지용)

        async function fetchAPI(path) {
            try {
                const res = await fetch(BASE_URL + path, { headers: { 'X-Auth-Token': API_KEY } });
                return await res.json();
            } catch (e) { return null; }
        }

        function selectTeam(id, name, color) {
            myTeamId = id;
            document.documentElement.style.setProperty('--p-color', color);
            document.getElementById('user-club-logo').innerHTML = `<img src="https://crests.football-data.org/${id}.svg" width="25">`;
            document.getElementById('onboarding').style.transform = 'translateY(-100%)';
            setTimeout(() => { 
                document.getElementById('app').style.display = 'flex'; 
                loadLive();
                loadSchedule();
            }, 600);
            
            // 30초마다 라이브 데이터 갱신
            setInterval(loadLive, 30000);
        }

        async function loadLive() {
            const data = await fetchAPI('/matches?status=IN_PLAY');
            const feed = document.getElementById('live-feed');
            if (!data || !data.matches.length) {
                feed.innerHTML = `<div style="text-align:center; padding:50px; color:var(--t3); font-family:'Orbitron';">NO LIVE OPERATIONS</div>`;
                return;
            }

            feed.innerHTML = data.matches.map(m => {
                // 골 감지 로직
                const matchId = m.id;
                const currentScore = `${m.score.fullTime.home}:${m.score.fullTime.away}`;
                if (lastScores[matchId] && lastScores[matchId] !== currentScore) {
                    triggerGoalAnimation(m.homeTeam.shortName + " vs " + m.awayTeam.shortName);
                }
                lastScores[matchId] = currentScore;

                return `
                    <div class="match-card live">
                        <div class="m-league">⚡ ${m.competition.name}</div>
                        <div class="m-row">
                            <div class="m-team"><img src="${m.homeTeam.crest}"><div>${m.homeTeam.shortName}</div></div>
                            <div class="m-score">${m.score.fullTime.home} : ${m.score.fullTime.away}</div>
                            <div class="m-team"><img src="${m.awayTeam.crest}"><div>${m.awayTeam.shortName}</div></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function loadSchedule() {
            const data = await fetchAPI(`/teams/${myTeamId}/matches?status=SCHEDULED&limit=5`);
            const nextMatch = data.matches[0];
            if (nextMatch) {
                document.getElementById('my-next-match').innerHTML = `
                    <div class="match-card" style="border:1px solid var(--p-color); background:var(--p-glow);">
                        <div style="font-size:9px; color:var(--p-color); margin-bottom:10px; font-family:'Orbitron';">MY NEXT MATCH</div>
                        <div class="m-row">
                            <div class="m-team"><img src="${nextMatch.homeTeam.crest}"><div>${nextMatch.homeTeam.shortName}</div></div>
                            <div style="font-family:'Orbitron'; font-size:14px; color:var(--accent);">VS</div>
                            <div class="m-team"><img src="${nextMatch.awayTeam.crest}"><div>${nextMatch.awayTeam.shortName}</div></div>
                        </div>
                        <div style="text-align:center; font-size:11px; margin-top:10px; font-family:'Share Tech Mono';">${new Date(nextMatch.utcDate).toLocaleString()}</div>
                    </div>
                `;
            }
        }

        function triggerGoalAnimation(matchNames) {
            const overlay = document.getElementById('goal-overlay');
            overlay.style.display = 'flex';
            document.body.classList.add('shake');
            setTimeout(() => {
                overlay.style.display = 'none';
                document.body.classList.remove('shake');
            }, 4000);
        }

        function sw(id, btn) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            btn.classList.add('active');
        }

        let checkCount = 0;
        function checkIn() {
            checkCount++;
            const list = document.getElementById('checkin-list');
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<div><div style="font-size:10px; color:var(--t2);">${new Date().toLocaleDateString()}</div><div style="font-size:13px; font-weight:700;">직관 인증 성공</div></div><div style="color:var(--p-color); font-family:'Orbitron'; font-size:10px;">STAMP #${checkCount}</div>`;
            list.prepend(div);
            if(checkCount >= 3) document.getElementById('user-rank').innerText = "잔디 감별사";
        }
    </script>
</body>
</html>
