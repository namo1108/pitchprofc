<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH Pro: Cinematic Neon</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2310b981'/%3E%3Cstop offset='100%25' stop-color='%233b82f6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M20 10h16a12 12 0 0 1 0 24H20v18h-6V10zm6 6v12h10a6 6 0 1 0 0-12H26z' fill='url(%23g)'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── [시네마틱 디자인 시스템] ── */
:root{
  --f-h:'Poppins', sans-serif; --f-b:'Noto Sans KR', sans-serif;
  --bg:#05070a; --bg2:#0d1117; --cd:rgba(20, 24, 31, 0.9);
  --p:#10b981; --ps:rgba(16, 185, 129, 0.15); --pb:rgba(16, 185, 129, 0.3);
  --s:#3b82f6; --ss:rgba(59, 130, 246, 0.15);
  --t:#ffffff; --t2:#a1a1aa; --t3:#3f3f46;
  --red:#ef4444; --br:24px; --sh:0 20px 40px rgba(0,0,0,0.6);
}
*,*::before,*::after{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{background:var(--bg); color:var(--t); font-family:var(--f-b); overflow:hidden; height:100vh;}

/* ── [레이아웃] ── */
#app{display:flex; height:100vh; flex-direction:column;}
.hdr{height:72px; display:flex; align-items:center; justify-content:space-between; padding:0 32px; background:rgba(13, 17, 23, 0.85); backdrop-filter:blur(25px); border-bottom:1px solid rgba(255,255,255,0.04); z-index:1000;}
.hdr-logo{font-family:var(--f-h); font-size:22px; font-weight:900; background: linear-gradient(135deg, var(--p) 0%, var(--s) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
.main-body{flex:1; display:flex; overflow:hidden;}
.sidebar{width:260px; background:var(--bg2); padding:30px 16px; border-right:1px solid rgba(255,255,255,0.03); display:flex; flex-direction:column;}
.si{display:flex; align-items:center; gap:14px; padding:16px 20px; border-radius:16px; cursor:pointer; color:var(--t2); font-weight:700; transition:0.3s; margin-bottom:8px;}
.si.on{background:var(--ps); color:var(--p); border:1px solid rgba(16, 185, 129, 0.1);}
.pages{flex:1; overflow-y:auto; padding:40px;}
.page{display:none;} .page.on{display:block;}

/* ── [컴포넌트] ── */
.mc{background:var(--cd); border:1px solid rgba(255,255,255,0.05); border-radius:var(--br); margin-bottom:20px; overflow:hidden; transition:0.3s; box-shadow:var(--sh);}
.mc:hover{border-color:var(--p); transform:translateY(-4px);}
.mc-top{padding:12px 20px; background:rgba(255,255,255,0.02); display:flex; justify-content:space-between; font-size:11px; font-weight:800; color:var(--t3); letter-spacing:1px;}
.mc-body{padding:30px 20px; display:flex; align-items:center; justify-content:center; gap:15px;}
.mc-tm{flex:1; text-align:center; font-family:var(--f-h); font-weight:900; font-size:18px;}
.mc-sc-box{background:rgba(0,0,0,0.6); padding:10px 20px; border-radius:14px; border:1px solid var(--pb);}
.mc-sc{font-family:var(--f-h); font-size:36px; font-weight:900; letter-spacing:4px;}

.lg-hd{display:flex; align-items:center; gap:12px; padding:18px 24px; background:var(--bg2); border-radius:18px; cursor:pointer; margin-top:15px; border:1px solid rgba(255,255,255,0.03); font-weight:800;}
.stt{width:100%; border-collapse:separate; border-spacing:0 8px;}
.stt th{padding:12px; color:var(--t3); font-size:11px; font-weight:800; text-align:center;}
.stt td{padding:16px 12px; background:rgba(255,255,255,0.02); text-align:center;}
.nm-cell{display:flex; align-items:center; gap:12px; text-align:left; font-weight:700;}
.nm-cell img{width:24px; height:24px; object-fit:contain;}

.pills{display:flex; gap:10px; overflow-x:auto; padding-bottom:15px; margin-bottom:20px;}
.pill{padding:10px 20px; border-radius:100px; border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.02); color:var(--t2); cursor:pointer; font-weight:700; white-space:nowrap;}
.pill.on{background:var(--p); color:var(--bg); border-color:var(--p); box-shadow:0 0 15px var(--p);}

/* AI PITCH */
.ai-card{background:linear-gradient(165deg, #0d1117 0%, #05070a 100%); border:1px solid var(--pb); border-radius:25px; padding:30px; margin-bottom:24px; position:relative;}
.prob-bar-wrap{height:14px; background:rgba(255,255,255,0.04); border-radius:100px; margin:20px 0; overflow:hidden; display:flex;}
.prob-h{background:linear-gradient(90deg, #059669, var(--p)); box-shadow:0 0 20px var(--p);}
.prob-a{background:linear-gradient(90deg, #dc2626, var(--red)); box-shadow:0 0 20px var(--red);}

/* GOAL OVERLAY */
#gt{position:fixed; inset:0; z-index:9999; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); backdrop-filter:blur(20px); pointer-events:none;}
.gt-box{text-align:center;}
.gt-word{font-family:var(--f-h); font-size:100px; font-weight:900; color:var(--p); filter:drop-shadow(0 0 30px var(--p)); animation: gtCinema 0.8s cubic-bezier(0.17,0.89,0.32,1.2) forwards;}
@keyframes gtCinema{0%{transform:scale(2); opacity:0} 100%{transform:scale(1); opacity:1}}
</style>
</head>
<body>

<div id="app">
  <header class="hdr">
    <div class="hdr-logo">PITCH PRO</div>
    <div class="hdr-r" style="display:flex; align-items:center; gap:12px;">
      <div id="lpill" style="display:none; color:var(--red); font-weight:900; font-size:12px; text-shadow:0 0 10px var(--red);">● LIVE</div>
      <div id="hdr-lv" style="font-family:var(--f-h); font-size:11px; background:var(--ps); color:var(--p); padding:6px 16px; border-radius:100px; border:1px solid var(--pb);">LV.3 MASTER</div>
    </div>
  </header>

  <div class="main-body">
    <aside class="sidebar">
      <div class="si on" onclick="swP('home',this)">⚡ LIVE MATCH</div>
      <div class="si" onclick="swP('sched',this)">📅 SCHEDULE</div>
      <div class="si" onclick="swP('ai',this)">🤖 AI PITCH</div>
      <div class="si" onclick="swP('std',this)">📊 STANDINGS</div>
      <div class="si" onclick="swP('player',this)">👟 PLAYER STATS</div>
      <div class="si" onclick="swP('fan',this)">⭐ FAN ZONE</div>
    </aside>

    <main class="pages">
      <div class="page on" id="pg-home">
        <h1 style="font-family:var(--f-h); font-weight:900; font-size:28px; margin-bottom:24px;">실시간 중계</h1>
        <div id="home-bd"></div>
      </div>
      <div class="page" id="pg-sched">
        <div id="date-nav" class="pills"></div>
        <div id="sched-bd"></div>
      </div>
      <div class="page" id="pg-ai">
        <h1 style="font-family:var(--f-h); font-weight:900; font-size:28px; margin-bottom:24px;">AI 전술 분석</h1>
        <div id="ai-bd"></div>
      </div>
      <div class="page" id="pg-std">
        <div id="std-pills" class="pills"></div>
        <div id="std-bd"></div>
      </div>
      <div class="page" id="pg-player">
        <div id="pl-pills" class="pills"></div>
        <div id="pl-bd"></div>
      </div>
      <div class="page" id="pg-fan">
        <div style="background:linear-gradient(135deg, var(--ps), transparent); padding:40px; border-radius:24px; border:1px solid var(--pb); text-align:center; margin-bottom:24px;">
           <div style="font-size:12px; font-weight:800; color:var(--p); letter-spacing:2px; margin-bottom:10px;">CURRENT RANK</div>
           <div style="font-family:var(--f-h); font-size:64px; font-weight:900; color:var(--p);">LV.3</div>
           <p style="margin-top:10px; font-weight:700;">집관 마스터</p>
        </div>
        <div id="fan-bd"></div>
      </div>
    </main>
  </div>
</div>

<div id="gt"><div class="gt-box"><div class="gt-word">GOAL!</div><div id="gt-team" style="font-size:24px; font-weight:800; color:#fff; text-align:center; margin-top:20px; letter-spacing:1px;"></div></div></div>

<script>
// ── [JS ENGINE: FULL DEPLOYMENT] ──

const API = '/api/football';
const LGS = [
  {code:'PL', name:'EPL', emblem:'https://crests.football-data.org/PL.png'},
  {code:'LA', name:'라리가', emblem:'https://crests.football-data.org/LA.png'},
  {code:'BL1',name:'분데스', emblem:'https://crests.football-data.org/BL1.png'},
  {code:'SA', name:'세리에', emblem:'https://crests.football-data.org/SA.png'},
  {code:'KL1',name:'K리그', emblem:'https://media.api-sports.io/football/leagues/292.png'}
];

const cache = {};
let prevScores = {};
let curPLg = 'PL';

// [1] API 로직
async function fetchData(path, isStatic = false) {
  const ttl = isStatic ? 1800000 : 90000;
  if(cache[path] && (Date.now() - cache[path].ts < ttl)) return cache[path].data;
  try {
    const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`);
    const d = await r.json();
    if(d.errorCode === 429) return cache[path]?.data || d;
    cache[path] = { data: d, ts: Date.now() };
    return d;
  } catch(e) { return null; }
}

// [2] 라이브 모니터링 & 골 선수 감지
async function loadHome() {
  const c = document.getElementById('home-bd');
  const d = await fetchData('/matches');
  if(!d?.matches) return;

  const live = d.matches.filter(m => ['IN_PLAY','HALFTIME'].includes(m.status));
  document.getElementById('lpill').style.display = live.length ? 'block' : 'none';

  live.forEach(m => {
    const currentScore = `${m.score.fullTime.home}-${m.score.fullTime.away}`;
    if(prevScores[m.id] && prevScores[m.id] !== currentScore) {
      // 득점 팀 및 선수 정보 추적
      const homeGoal = m.score.fullTime.home > prevScores[m.id].split('-')[0];
      const goalTeam = homeGoal ? m.homeTeam.shortName : m.awayTeam.shortName;
      
      // 상세 데이터 재조회로 득점자 이름 추출 시도 (API 제공 시)
      triggerGoalAnimation(goalTeam);
    }
    prevScores[m.id] = currentScore;
  });

  let html = '';
  live.forEach(m => {
    html += `
      <div class="mc">
        <div class="mc-top"><span>${m.competition.name}</span><span style="color:var(--red);">● LIVE</span></div>
        <div class="mc-body">
          <div class="mc-tm"><span>${m.homeTeam.shortName}</span></div>
          <div class="mc-sc-box"><div class="mc-sc">${m.score.fullTime.home} : ${m.score.fullTime.away}</div></div>
          <div class="mc-tm"><span>${m.awayTeam.shortName}</span></div>
        </div>
      </div>`;
  });
  c.innerHTML = html || '<div style="text-align:center; padding:100px; color:var(--t3);">현재 진행 중인 경기가 없습니다.</div>';
}

function triggerGoalAnimation(teamName) {
  const gt = document.getElementById('gt');
  const gtTeam = document.getElementById('gt-team');
  gtTeam.textContent = `${teamName} SCORED!`;
  gt.style.display = 'flex';
  
  // 골 소리 재생 (고음의 벨소리)
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine'; osc.frequency.value = 880;
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
  osc.start(); osc.stop(audioCtx.currentTime + 1);

  setTimeout(() => { gt.style.display = 'none'; }, 4000);
}

// [3] 일정 - 리그별 아코디언
async function loadSched(date = new Date().toISOString().split('T')[0]) {
  const c = document.getElementById('sched-bd');
  c.innerHTML = '<div style="text-align:center; padding:50px;">로딩 중...</div>';
  const d = await fetchData(`/matches?dateFrom=${date}&dateTo=${date}`);
  if(!d.matches?.length) { c.innerHTML = '<div style="padding:100px; text-align:center;">경기가 없습니다.</div>'; return; }

  const groups = d.matches.reduce((acc, m) => {
    acc[m.competition.name] = acc[m.competition.name] || [];
    acc[m.competition.name].push(m);
    return acc;
  }, {});

  let html = '';
  Object.entries(groups).forEach(([name, matches], i) => {
    const id = `lg-${i}`;
    html += `
      <div class="lg-hd" onclick="document.getElementById('${id}').style.display = document.getElementById('${id}').style.display === 'none' ? 'flex' : 'none'">
        <span style="flex:1;">${name}</span>
        <span style="font-size:12px; color:var(--t2);">${matches.length} MATCHES</span>
      </div>
      <div class="lg-ms" id="${id}" style="display:flex; flex-direction:column;">
        ${matches.map(m => `
          <div class="mc" style="margin-top:10px;">
            <div style="display:flex; justify-content:space-between; align-items:center; padding:15px 25px;">
              <span style="font-size:12px; color:var(--t3);">${m.utcDate.slice(11,16)}</span>
              <span style="flex:1; text-align:center; font-weight:700;">${m.homeTeam.shortName} vs ${m.awayTeam.shortName}</span>
              <span style="font-weight:900; color:var(--p);">${m.score.fullTime.home??'-'} : ${m.score.fullTime.away??'-'}</span>
            </div>
          </div>`).join('')}
      </div>`;
  });
  c.innerHTML = html;
}

// [4] 순위 & 선수 스탯 (라리가 LA 적용)
async function loadStd(code) {
  curPLg = code; renderPills('std');
  const c = document.getElementById('std-bd');
  c.innerHTML = '<div style="text-align:center; padding:50px;">데이터 통합 중...</div>';
  const d = await fetchData(`/competitions/${code}/standings`, true);
  if(!d.standings) return;
  const rows = d.standings[0].table;
  let html = `<table class="stt"><tr><th>#</th><th>TEAM</th><th>P</th><th>W</th><th>D</th><th>L</th><th>PTS</th></tr>`;
  rows.forEach(r => {
    html += `<tr><td>${r.position}</td><td class="nm-cell"><img src="${r.team.crest}">${r.team.shortName}</td><td>${r.playedGames}</td><td>${r.won}</td><td>${r.draw}</td><td>${r.lost}</td><td style="font-weight:900; color:var(--p);">${r.points}</td></tr>`;
  });
  c.innerHTML = html + '</table>';
}

async function loadPlayers(lg) {
  curPLg = lg; renderPills('pl');
  const c = document.getElementById('pl-bd');
  c.innerHTML = '<div style="text-align:center; padding:50px;">기록 분석 중...</div>';
  const d = await fetchData(`/competitions/${lg}/scorers`, true);
  if(!d.scorers) return;
  let html = '';
  d.scorers.slice(0, 10).forEach((s, i) => {
    html += `
      <div style="display:flex; align-items:center; gap:20px; padding:20px; background:var(--bg2); border-radius:18px; margin-bottom:10px;">
        <span style="font-family:var(--f-h); font-size:22px; font-weight:900; color:var(--p); opacity:0.4;">${i+1}</span>
        <div style="flex:1;"><div style="font-weight:700;">${s.player.name}</div><div style="font-size:12px; color:var(--t3);">${s.team.name}</div></div>
        <div style="font-family:var(--f-h); font-size:20px; font-weight:900; color:var(--p);">${s.goals} GOALS</div>
      </div>`;
  });
  c.innerHTML = html;
}

// [5] AI PITCH & 팬존
async function loadAI() {
  const c = document.getElementById('ai-bd');
  const d = await fetchData('/matches');
  let html = '';
  d.matches?.slice(0, 5).forEach(m => {
    const h = 40 + (m.id % 25); const a = 100 - h - 10;
    html += `
      <div class="ai-card">
        <div style="font-size:11px; font-weight:800; color:var(--s); margin-bottom:15px; letter-spacing:1px;">AI TACTICAL ANALYSIS</div>
        <div style="display:flex; justify-content:space-between; font-family:var(--f-h); font-size:20px; font-weight:900;">
          <span>${m.homeTeam.shortName}</span><span>${m.awayTeam.shortName}</span>
        </div>
        <div class="prob-bar-wrap"><div class="prob-h" style="width:${h}%"></div><div style="width:10%; background:rgba(255,255,255,0.05);"></div><div class="prob-a" style="width:${a}%"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:13px; color:var(--t2);"><span>WIN ${h}%</span><span>WIN ${a}%</span></div>
      </div>`;
  });
  c.innerHTML = html;
}

function renderPills(type) {
  const target = document.getElementById(type === 'std' ? 'std-pills' : 'pl-pills');
  target.innerHTML = LGS.map(l => `<button class="pill ${l.code === curPLg ? 'on' : ''}" onclick="${type === 'std' ? 'loadStd' : 'loadPlayers'}('${l.code}')">${l.name}</button>`).join('');
}

function swP(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pg-' + name).classList.add('on');
  document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
  if(el) el.classList.add('on');
  if(name === 'home') loadHome();
  if(name === 'ai') loadAI();
  if(name === 'std') { curPLg = 'PL'; renderPills('std'); loadStd('PL'); }
  if(name === 'player') { curPLg = 'PL'; renderPills('pl'); loadPlayers('PL'); }
  if(name === 'sched') {
    const dnav = document.getElementById('date-nav');
    if(!dnav.innerHTML) {
      for(let i=-1; i<=3; i++) {
        const d = new Date(); d.setDate(d.getDate() + i);
        const ds = d.toISOString().split('T')[0];
        const btn = document.createElement('button');
        btn.className = i===0 ? 'pill on' : 'pill';
        btn.textContent = i===0 ? '오늘' : `${d.getMonth()+1}/${d.getDate()}`;
        btn.onclick = () => { document.querySelectorAll('#date-nav .pill').forEach(p => p.classList.remove('on')); btn.classList.add('on'); loadSched(ds); };
        dnav.appendChild(btn);
      }
    }
    loadSched();
  }
}

window.onload = () => { swP('home'); setInterval(loadHome, 30000); };
</script>
</body>
</html>
