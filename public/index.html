<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>PITCH Pro — Tactical Ops Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020608; --bg2: #040c10; --card: rgba(4, 12, 16, 0.95);
            --p-color: #00ff87; /* 기본 포인트 컬러 */
            --p-glow: rgba(0, 255, 135, 0.5);
            --t: #d0ffe8; --t2: #5a8870; --t3: #1e3d2e;
            --red: #ff3b5c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif;
            max-width: 480px; margin: 0 auto; overflow-x: hidden; height: 100vh;
        }

        /* --- 온보딩 화면 --- */
        #onboarding {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ob-title { font-family: 'Orbitron'; font-size: 24px; font-weight: 900; color: var(--p-color); letter-spacing: 4px; margin-bottom: 10px; text-shadow: 0 0 20px var(--p-glow); }
        .ob-sub { color: var(--t2); font-size: 13px; margin-bottom: 40px; text-align: center; }
        .team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; }
        .team-card { 
            background: var(--bg2); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px;
            padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .team-card:hover { border-color: var(--p-color); transform: translateY(-5px); background: rgba(255,255,255,0.02); }
        .team-card img { width: 50px; height: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .team-card span { display: block; font-family: 'Orbitron'; font-size: 10px; font-weight: 700; color: #fff; }

        /* --- 메인 레이아웃 --- */
        .topbar { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron'; font-size: 18px; font-weight: 900; color: var(--p-color); letter-spacing: 2px; }
        
        .nav { display: flex; overflow-x: auto; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item { padding: 15px 20px; font-family: 'Orbitron'; font-size: 11px; font-weight: 700; color: var(--t3); cursor: pointer; white-space: nowrap; }
        .nav-item.active { color: var(--p-color); border-bottom: 2px solid var(--p-color); }

        /* --- 아코디언 일정 --- */
        .league-wrap { margin: 15px 10px; }
        .league-header { 
            background: var(--bg2); padding: 12px 15px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 8px;
        }
        .league-title { display: flex; align-items: center; gap: 10px; font-family: 'Orbitron'; font-size: 12px; font-weight: 700; }
        .league-icon { width: 20px; height: 20px; }
        .league-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-in-out; }
        .league-content.open { max-height: 1000px; }

        .match-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.03); 
            border-radius: 12px; padding: 15px; margin-bottom: 8px; display: flex; align-items: center;
        }
        .m-time { font-family: 'Share Tech Mono'; font-size: 12px; color: var(--t2); width: 50px; }
        .m-teams { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .m-team { display: flex; align-items: center; gap: 10px; }
        .m-team img { width: 18px; height: 18px; }
        .m-team span { font-size: 13px; font-weight: 500; }
        .m-score { font-family: 'Orbitron'; font-size: 16px; font-weight: 900; margin-left: auto; color: var(--p-color); }

        /* --- 골 애니메이션 --- */
        #goal-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, var(--p-glow) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.3s;
        }
        #goal-overlay.active { opacity: 1; animation: flash 0.5s infinite; }
        @keyframes flash { 50% { background: radial-gradient(circle, var(--p-glow) 30%, transparent 80%); } }
        .goal-text { font-family: 'Orbitron'; font-size: 60px; font-weight: 900; color: #fff; text-shadow: 0 0 30px var(--p-color); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="ob-title">SELECT SQUAD</div>
        <div class="ob-sub">가장 좋아하는 팀을 선택해 보세요.<br>팀 컬러에 맞춰 인터페이스가 변합니다.</div>
        <div class="team-grid" id="team-list">
            </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="topbar">
            <div class="logo">PITCH PRO</div>
            <div id="my-team-badge" style="font-size: 20px;"></div>
        </div>

        <div class="nav">
            <div class="nav-item active">LIVE</div>
            <div class="nav-item">FIXTURES</div>
            <div class="nav-item">TABLES</div>
            <div class="nav-item">MY SQUAD</div>
        </div>

        <div id="content-area">
            <div class="league-wrap">
                <div class="league-header" onclick="toggleLeague('pl')">
                    <div class="league-title">
                        <img src="https://crests.football-data.org/PL.png" class="league-icon">
                        PREMIER LEAGUE
                    </div>
                    <span>▼</span>
                </div>
                <div id="league-pl" class="league-content open">
                    <div class="match-card" onclick="triggerGoal('TOTTENHAM')">
                        <div class="m-time">22:00</div>
                        <div class="m-teams">
                            <div class="m-team"><img src="https://crests.football-data.org/73.png"><span>Tottenham</span></div>
                            <div class="m-team"><img src="https://crests.football-data.org/65.png"><span>Man City</span></div>
                        </div>
                        <div class="m-score">2 : 1</div>
                    </div>
                </div>

                <div class="league-header" onclick="toggleLeague('ll')">
                    <div class="league-title">
                        <img src="https://crests.football-data.org/PD.png" class="league-icon">
                        LA LIGA
                    </div>
                    <span>▼</span>
                </div>
                <div id="league-ll" class="league-content">
                    <div class="match-card">
                        <div class="m-time">04:00</div>
                        <div class="m-teams">
                            <div class="m-team"><img src="https://crests.football-data.org/86.png"><span>Real Madrid</span></div>
                            <div class="m-team"><img src="https://crests.football-data.org/81.png"><span>Barcelona</span></div>
                        </div>
                        <div class="m-score">0 : 0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="goal-overlay">
        <div class="goal-text">GOAL!</div>
        <div id="goal-info" style="font-family:'Orbitron'; margin-top:10px; font-weight:700;"></div>
    </div>

    <script>
        const myTeams = [
            { id: 1, name: 'TOTTENHAM', color: '#ffffff', glow: 'rgba(255,255,255,0.4)', icon: '⚽', crest: 'https://crests.football-data.org/73.png' },
            { id: 2, name: 'MAN CITY', color: '#6caddf', glow: 'rgba(108,173,223,0.5)', icon: '💎', crest: 'https://crests.football-data.org/65.png' },
            { id: 3, name: 'ARSENAL', color: '#ef0107', glow: 'rgba(239,1,7,0.5)', icon: '🔫', crest: 'https://crests.football-data.org/57.png' },
            { id: 4, name: 'LIVERPOOL', color: '#e31b23', glow: 'rgba(227,27,35,0.5)', icon: '🔴', crest: 'https://crests.football-data.org/64.png' },
            { id: 5, name: 'MUNICH', color: '#dc052d', glow: 'rgba(220,5,45,0.5)', icon: '🍺', crest: 'https://crests.football-data.org/503.png' },
            { id: 6, name: 'PSG', color: '#004170', glow: 'rgba(0,65,112,0.5)', icon: '🗼', crest: 'https://crests.football-data.org/524.png' }
        ];

        // 온보딩 리스트 생성
        const teamList = document.getElementById('team-list');
        myTeams.forEach(team => {
            const card = document.createElement('div');
            card.className = 'team-card';
            card.innerHTML = `<img src="${team.crest}"><span>${team.name}</span>`;
            card.onclick = () => selectTeam(team);
            teamList.appendChild(card);
        });

        // 팀 선택 및 테마 적용
        function selectTeam(team) {
            document.documentElement.style.setProperty('--p-color', team.color);
            document.documentElement.style.setProperty('--p-glow', team.glow);
            document.getElementById('my-team-badge').innerText = team.icon;
            
            const ob = document.getElementById('onboarding');
            ob.style.opacity = '0';
            ob.style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                ob.classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            }, 600);
        }

        // 아코디언 토글
        function toggleLeague(id) {
            const content = document.getElementById('league-' + id);
            content.classList.toggle('open');
        }

        // 골 애니메이션 실행
        function triggerGoal(teamName) {
            const overlay = document.getElementById('goal-overlay');
            const info = document.getElementById('goal-info');
            info.innerText = teamName + ' SCORED!';
            
            overlay.classList.add('active');
            
            // 3초 후 제거
            setTimeout(() => {
                overlay.classList.remove('active');
            }, 3000);
        }

        // 테스트용: 5초 뒤에 자동으로 골 애니메이션 한 번 보여주기
        // setTimeout(() => triggerGoal('TOTTENHAM'), 8000);
    </script>
</body>
</html>
