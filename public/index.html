<html lang="ko">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #05070a; --bg2: #0d1117; --cd: rgba(22, 27, 34, 0.95);
    --p: #10b981; --ps: rgba(16, 185, 129, 0.15); --pb: rgba(16, 185, 129, 0.3);
    --s: #3b82f6; --t: #ffffff; --t2: #a1a1aa; --t3: #3f3f46;
    --red: #ef4444; --br: 24px; --sh: 0 20px 40px rgba(0,0,0,0.6);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Noto Sans KR', sans-serif; }
body { background: var(--bg); color: var(--t); overflow: hidden; height: 100vh; }

/* Onboarding */
#ob { position: fixed; inset: 0; background: var(--bg); z-index: 9999; overflow-y: auto; padding: 40px 20px; }
.ob-container { max-width: 1200px; margin: 0 auto; }
.ob-header { text-align: center; margin-bottom: 40px; }
.ob-header h1 { font-size: 40px; font-weight: 900; color: var(--p); letter-spacing: -1px; }
.league-section { margin-bottom: 30px; }
.league-title { font-size: 22px; font-weight: 800; margin-bottom: 15px; padding-left: 10px; border-left: 5px solid var(--p); color: var(--t); }
.ob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
.ob-team { background: var(--bg2); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
.ob-team:hover, .ob-team.sel { border-color: var(--p); background: var(--ps); transform: scale(1.05); }
.ob-team img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 10px; }
.ob-team span { font-size: 12px; font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Main App */
#app { display: none; height: 100vh; flex-direction: column; }
.hdr { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.05); }
.hdr-logo { font-size: 24px; font-weight: 900; color: var(--p); letter-spacing: 1px; }
.main-body { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 240px; background: #0a0d12; border-right: 1px solid rgba(255,255,255,0.05); padding: 20px; }
.si { padding: 15px; border-radius: 12px; cursor: pointer; color: var(--t2); font-weight: 700; margin-bottom: 5px; transition: 0.2s; }
.si:hover, .si.on { background: var(--ps); color: var(--p); }
.pages { flex: 1; overflow-y: auto; padding: 30px; }
.page { display: none; } .page.on { display: block; }

/* AI PITCH Style */
.ai-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(16, 185, 129, 0.2); }
.prob-bar { height: 12px; background: rgba(255,255,255,0.05); border-radius: 100px; margin: 20px 0; overflow: hidden; display: flex; }
.prob-h { background: var(--p); box-shadow: 0 0 15px var(--ps); }
.prob-a { background: var(--red); box-shadow: 0 0 15px rgba(239,68,68,0.3); }

/* MC Style */
.mc { background: var(--cd); border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
.mc-header { padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; font-size: 12px; color: var(--t2); font-weight: 800; }
.mc-content { padding: 25px; display: flex; align-items: center; justify-content: space-around; }
.mc-team { text-align: center; width: 120px; font-weight: 700; }
.mc-team img { width: 50px; height: 50px; margin-bottom: 10px; }
.mc-score { font-size: 40px; font-weight: 900; background: #000; padding: 10px 25px; border-radius: 15px; color: var(--p); letter-spacing: 2px; }
.mc-info { padding: 12px 20px; text-align: center; font-size: 13px; color: var(--t2); border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); }

/* Footer */
.ob-footer { position: sticky; bottom: 0; background: var(--bg); padding: 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); }
.btn { background: var(--p); color: #000; padding: 15px 45px; border-radius: 50px; font-weight: 900; cursor: pointer; border: none; font-size: 16px; box-shadow: 0 4px 15px var(--ps); }
</style>
</head>
<body>

<div id="ob">
    <div class="ob-container">
        <div class="ob-header">
            <h1>PITCH PRO 25/26</h1>
            <p>2026 시즌 참가 구단을 선택하세요 (최대 2개)</p>
        </div>
        <div id="ob-list"></div>
        <div class="ob-footer">
            <button class="btn" onclick="startApp()">분석 시작하기</button>
        </div>
    </div>
</div>

<div id="app">
    <header class="hdr">
        <div class="hdr-logo">PITCH PRO</div>
        <div id="hdr-teams" style="display:flex; gap:10px;"></div>
    </header>
    <div class="main-body">
        <aside class="sidebar">
            <div class="si on" onclick="swP('home',this)">⚡ 실시간 경기</div>
            <div class="si" onclick="swP('sched',this)">📅 전체 일정</div>
            <div class="si" onclick="swP('ai',this)">🤖 AI PITCH</div>
            <div class="si" onclick="swP('std',this)">📊 리그 순위</div>
            <div class="si" onclick="swP('fan',this)">⭐ 팬 존 (집관)</div>
        </aside>
        <main class="pages">
            <div class="page on" id="pg-home"></div>
            <div class="page" id="pg-sched">
                <div id="sched-nav" style="display:flex; gap:10px; margin-bottom:20px; overflow-x:auto; padding-bottom:10px;"></div>
                <div id="sched-list"></div>
            </div>
            <div class="page" id="pg-ai">
                <h2 style="margin-bottom:20px;">AI 승률 시뮬레이션</h2>
                <div id="ai-list"></div>
            </div>
            <div class="page" id="pg-std">
                <div id="std-tabs" style="display:flex; gap:10px; margin-bottom:20px; overflow-x:auto;"></div>
                <div id="std-table"></div>
            </div>
            <div class="page" id="pg-fan">
                <h2 style="margin-bottom:20px;">MY FAN ACTIVITY</h2>
                <div id="fan-list"></div>
            </div>
        </main>
    </div>
</div>

<script>
const API = '/api/football';
const LEAGUES = [
    { n: 'Premier League', c: 'PL', teams: ['Arsenal', 'Aston Villa', 'Bournemouth', 'Brentford', 'Brighton', 'Burnley', 'Chelsea', 'Crystal Palace', 'Everton', 'Fulham', 'Leeds United', 'Leicester City', 'Liverpool', 'Man City', 'Man Utd', 'Newcastle', 'Nottm Forest', 'Southampton', 'Tottenham', 'West Ham'] },
    { n: 'La Liga', c: 'PD', teams: ['Alaves', 'Athletic Club', 'Atletico Madrid', 'Barcelona', 'Celta Vigo', 'Espanyol', 'Getafe', 'Girona', 'Las Palmas', 'Leganes', 'Mallorca', 'Osasuna', 'Rayo Vallecano', 'Real Betis', 'Real Madrid', 'Real Sociedad', 'Sevilla', 'Valencia', 'Valladolid', 'Villarreal', 'Levante', 'Oviedo', 'Elche'] },
    { n: 'Bundesliga', c: 'BL1', teams: ['Augsburg', 'Bayer Leverkusen', 'Bayern Munich', 'Bochum', 'Dortmund', 'Eintracht Frankfurt', 'Freiburg', 'Heidenheim', 'Hoffenheim', 'Holstein Kiel', 'Mainz', "M'gladbach", 'RB Leipzig', 'St. Pauli', 'Stuttgart', 'Union Berlin', 'Werder Bremen', 'Wolfsburg', 'Köln', 'Hamburg'] },
    { n: 'Serie A', c: 'SA', teams: ['AC Milan', 'Atalanta', 'Bologna', 'Cagliari', 'Como', 'Empoli', 'Fiorentina', 'Genoa', 'Inter Milan', 'Juventus', 'Lazio', 'Lecce', 'Monza', 'Napoli', 'Parma', 'AS Roma', 'Torino', 'Udinese', 'Venezia', 'Verona', 'Pisa', 'Cremonese', 'Sassuolo'] },
    { n: 'Ligue 1', c: 'FL1', teams: ['PSG', 'Monaco', 'Marseille', 'Lille', 'Lens', 'Lyon', 'Nice', 'Rennes', 'Toulouse', 'Reims', 'Lorient', 'Brest', 'Nantes', 'Strasbourg', 'Montpellier', 'Le Havre', 'Auxerre', 'Angers', 'Saint-Etienne', 'Paris FC'] },
    { n: 'K League 1', c: 'KL1', teams: ['강원', '광주', '김천', '대전', '대구', '서울', '울산', '인천', '전북', '제주', '포항', '수원FC'] },
    { n: 'K League 2', c: 'KL2', teams: ['경남', '김포', '김해', '대구(B)', '부산', '서울E', '성남', '수원삼성', '아산', '안산', '용인', '전남', '천안', '청주', '파주', '화성 FC', '안양'] }
];

let SELECTED_TEAMS = [];

function initOb() {
    const list = document.getElementById('ob-list');
    list.innerHTML = LEAGUES.map(lg => `
        <div class="league-section">
            <div class="league-title">${lg.n}</div>
            <div class="ob-grid">
                ${lg.teams.map(t => `
                    <div class="ob-team" onclick="toggleTeam(this, '${t}')">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(t)}&background=161b22&color=fff&bold=true">
                        <span>${t}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function toggleTeam(el, team) {
    if (SELECTED_TEAMS.includes(team)) {
        SELECTED_TEAMS = SELECTED_TEAMS.filter(t => t !== team);
        el.classList.remove('sel');
    } else {
        if (SELECTED_TEAMS.length >= 2) return alert('최대 2개 팀만 선택 가능합니다.');
        SELECTED_TEAMS.push(team);
        el.classList.add('sel');
    }
}

async function startApp() {
    if (SELECTED_TEAMS.length === 0) return alert('최소 1개 팀을 선택해 주세요.');
    document.getElementById('ob').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('hdr-teams').innerHTML = SELECTED_TEAMS.map(t => `<img src="https://ui-avatars.com/api/?name=${encodeURIComponent(t)}&size=30&background=10b981&color=000&bold=true" style="border-radius:50%">`).join('');
    loadHome();
    initSchedNav();
    initStdTabs();
}

async function loadHome() {
    const bd = document.getElementById('pg-home');
    bd.innerHTML = '<div style="text-align:center; padding:50px;">라이브 데이터를 동기화 중입니다...</div>';
    try {
        const d = await fetch(`${API}?type=fd&path=/matches`).then(res => res.json());
        const liveMatches = d.matches ? d.matches.filter(m => ['IN_PLAY', 'PAUSED', 'HALFTIME'].includes(m.status)) : [];
        bd.innerHTML = liveMatches.length > 0 ? liveMatches.map(m => mkCard(m)).join('') : '<div style="text-align:center; padding:100px; color:var(--t2);">현재 라이브 중인 주요 경기가 없습니다.</div>';
    } catch(e) { bd.innerHTML = '데이터 로드 실패'; }
}

function mkCard(m) {
    const time = new Date(m.utcDate).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    return `
        <div class="mc">
            <div class="mc-header">
                <span>${m.competition.name}</span>
                <span style="color:var(--p)">LIVE MATCH</span>
            </div>
            <div class="mc-content">
                <div class="mc-team"><img src="${m.homeTeam.crest}"><div>${m.homeTeam.shortName || m.homeTeam.name}</div></div>
                <div class="mc-score">${m.score.fullTime.home ?? 0} : ${m.score.fullTime.away ?? 0}</div>
                <div class="mc-team"><img src="${m.awayTeam.crest}"><div>${m.awayTeam.shortName || m.awayTeam.name}</div></div>
            </div>
            <div class="mc-info">⏰ KST ${time} 시작 | 🏟️ ${m.venue || '경기장 정보 준비 중'}</div>
        </div>
    `;
}

async function loadAI() {
    const bd = document.getElementById('ai-list');
    bd.innerHTML = '<p>AI 시뮬레이션 가동 중...</p>';
    const d = await fetch(`${API}?type=fd&path=/matches`).then(res => res.json());
    const matches = d.matches ? d.matches.slice(0, 10) : [];
    bd.innerHTML = matches.map(m => {
        const hProb = 30 + Math.floor(Math.random() * 40);
        const aProb = 100 - hProb - 5; // 무승부 확률 5% 제외
        return `
            <div class="ai-card">
                <div style="display:flex; justify-content:space-between; font-weight:900;">
                    <span>${m.homeTeam.name}</span>
                    <span>${m.awayTeam.name}</span>
                </div>
                <div class="prob-bar">
                    <div class="prob-h" style="width:${hProb}%"></div>
                    <div class="prob-a" style="width:${aProb}%"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--t2);">
                    <span>WIN ${hProb}%</span>
                    <span>WIN ${aProb}%</span>
                </div>
                <p style="margin-top:10px; font-size:11px; color:var(--p);">* 실시간 경기 스탯 및 과거 전적 데이터 기반 AI 예측값입니다.</p>
            </div>
        `;
    }).join('');
}

function swP(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.getElementById('pg-' + id).classList.add('on');
    document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
    el.classList.add('on');
    if(id === 'home') loadHome();
    if(id === 'ai') loadAI();
    if(id === 'fan') loadFan();
}

async function loadFan() {
    const bd = document.getElementById('fan-list');
    bd.innerHTML = SELECTED_TEAMS.map(team => `
        <div class="mc" style="padding:25px; text-align:center;">
            <h3 style="color:var(--p); font-size:20px;">${team}</h3>
            <p style="margin:15px 0; color:var(--t2);">팬 활동을 위해 오늘의 경기를 집관해 보세요!</p>
            <button class="btn" onclick="alert('${team} 집관 인증 완료! 🔥 정성이 담긴 응원이 팀에 전달됩니다.')">오늘 경기 집관 인증</button>
        </div>
    `).join('');
}

function initSchedNav() {
    const nav = document.getElementById('sched-nav');
    for (let i = 0; i < 7; i++) {
        const d = new Date(); d.setDate(d.getDate() + i);
        const day = d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
        nav.innerHTML += `<button class="si" style="white-space:nowrap" onclick="loadSched('${d.toISOString().split('T')[0]}')">${day}</button>`;
    }
}

async function loadSched(date) {
    const bd = document.getElementById('sched-list');
    bd.innerHTML = '<p>날짜별 일정을 불러오는 중...</p>';
    const d = await fetch(`${API}?type=fd&path=/matches?dateFrom=${date}&dateTo=${date}`).then(res => res.json());
    bd.innerHTML = d.matches.length > 0 ? d.matches.map(m => mkCard(m)).join('') : '<div style="text-align:center; padding:50px; color:var(--t2);">해당 날짜에 경기가 없습니다.</div>';
}

function initStdTabs() {
    const nav = document.getElementById('std-tabs');
    nav.innerHTML = LEAGUES.map(lg => `<button class="si" style="white-space:nowrap" onclick="loadStd('${lg.c}')">${lg.n}</button>`).join('');
}

async function loadStd(code) {
    const bd = document.getElementById('std-table');
    bd.innerHTML = '<p>순위표 데이터를 동기화 중입니다...</p>';
    const d = await fetch(`${API}?type=fd&path=/competitions/${code}/standings`).then(res => res.json());
    const table = d.standings ? d.standings[0].table : [];
    bd.innerHTML = `
        <table style="width:100%; border-collapse:collapse;">
            <tr style="color:var(--t2); font-size:12px; border-bottom:2px solid var(--t3);">
                <th style="padding:10px;">순위</th><th style="padding:10px;">구단</th><th style="padding:10px;">경</th><th style="padding:10px;">승점</th>
            </tr>
            ${table.map(r => `
                <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
                    <td style="padding:10px; text-align:center;">${r.position}</td>
                    <td style="padding:10px; display:flex; align-items:center; gap:10px;"><img src="${r.team.crest}" width="24">${r.team.name}</td>
                    <td style="padding:10px; text-align:center;">${r.playedGames}</td>
                    <td style="padding:10px; text-align:center; color:var(--p); font-weight:800;">${r.points}</td>
                </tr>
            `).join('')}
        </table>
    `;
}

initOb();
</script>
</body>
</html>
