<!DOCTYPE html>
<html lang="en" id="HR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH IN · Football Intelligence</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/favicon.ico">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2303050a'/%3E%3Ccircle cx='32' cy='32' r='24' fill='none' stroke='%2310b981' stroke-width='2.5'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial Black' font-weight='900' font-size='22' fill='%2310b981'%3EP%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PITCH IN v5 — Design System
   Fonts: Syne (display) · DM Sans (body)
          JetBrains Mono (numbers)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root{
  --p:#10b981;--p2:#059669;--ps:rgba(16,185,129,.09);--pb:rgba(16,185,129,.24);
  --bg:#03050a;--bg2:#07091200;--bg3:#0c1020;
  --card:rgba(255,255,255,.032);--card2:rgba(255,255,255,.06);
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);
  --t:#f1f5f9;--t2:#94a3b8;--t3:#475569;
  --red:#f43f5e;--am:#f59e0b;--blue:#3b82f6;--purp:#a78bfa;
  --F:'Syne',sans-serif;--B:'DM Sans',sans-serif;--M:'JetBrains Mono',monospace;
  --nav:66px;--r:16px;--r2:22px;--r3:28px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--B);overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
img{display:block}

/* ── ONBOARDING ── */
#ob{position:fixed;inset:0;background:var(--bg);z-index:9999;overflow-y:auto;
  background-image:radial-gradient(ellipse 90% 50% at 50% -5%,rgba(16,185,129,.13),transparent 70%),
    radial-gradient(ellipse 50% 35% at 95% 95%,rgba(59,130,246,.08),transparent)}
.ob-wrap{max-width:1100px;margin:0 auto;padding:56px 20px 130px}
.ob-hero{text-align:center;margin-bottom:44px}
.ob-ring{width:68px;height:68px;border:2px solid rgba(16,185,129,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;animation:ringPulse 3s ease infinite}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.25)}60%{box-shadow:0 0 0 14px rgba(16,185,129,0)}}
.ob-ring span{font-family:var(--F);font-size:30px;font-weight:800;color:var(--p)}
.ob-title{font-family:var(--F);font-size:clamp(44px,8vw,64px);font-weight:800;letter-spacing:-3px;line-height:.95;
  background:linear-gradient(150deg,#fff 30%,rgba(255,255,255,.38));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.ob-kicker{font-size:11px;font-weight:700;letter-spacing:5px;color:var(--p);text-transform:uppercase;margin-bottom:12px}
.ob-sub{font-size:15px;color:var(--t2);font-weight:500;line-height:1.65;max-width:420px;margin:0 auto 22px}
.ob-sel{display:inline-flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--bd2);border-radius:100px;padding:8px 18px}
.ob-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--bd2);transition:.3s}
.ob-dot.on{background:var(--p);border-color:var(--p);box-shadow:0 0 10px rgba(16,185,129,.5)}
.ob-cnt{font-size:13px;font-weight:800;color:var(--p)}

.ob-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;justify-content:center;flex-wrap:wrap;margin-bottom:26px}
.ob-tabs::-webkit-scrollbar{display:none}
.ob-tab{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;border:1.5px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--B);font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:.2s}
.ob-tab img{width:16px;height:16px;object-fit:contain}
.ob-tab:hover{border-color:var(--bd2);color:var(--t)}
.ob-tab.on{background:rgba(255,255,255,.07);color:var(--t);border-color:var(--bd2)}

.ob-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px}
@media(min-width:600px){.ob-grid{grid-template-columns:repeat(auto-fill,minmax(115px,1fr))}}
.ob-card{position:relative;border-radius:20px;border:1.5px solid var(--bd);background:var(--card);padding:18px 8px 13px;text-align:center;cursor:pointer;transition:all .2s;overflow:hidden;--tc:var(--p)}
.ob-card::before{content:'';position:absolute;inset:0;background:var(--tc);opacity:0;transition:.2s}
.ob-card:hover{border-color:rgba(255,255,255,.18);transform:translateY(-2px)}
.ob-card:hover::before{opacity:.05}
.ob-card.sel{border-color:var(--tc);transform:translateY(-5px);box-shadow:0 12px 28px rgba(0,0,0,.4),0 0 0 1px var(--tc)}
.ob-card.sel::before{opacity:.09}
.ob-card.sel .ob-ck{opacity:1;transform:scale(1)}
.ob-ck{position:absolute;top:7px;right:7px;width:19px;height:19px;border-radius:50%;background:var(--tc);display:flex;align-items:center;justify-content:center;font-size:10px;color:#000;font-weight:900;opacity:0;transform:scale(0);transition:.2s;z-index:2}
.ob-img{width:48px;height:48px;margin:0 auto 10px;position:relative;z-index:1}
.ob-img img{width:100%;height:100%;object-fit:contain}
.ob-nm{font-size:11px;font-weight:700;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;position:relative;z-index:1}
.ob-card.sel .ob-nm{color:var(--t);font-weight:800}
.ob-foot{position:fixed;bottom:0;left:0;right:0;padding:18px 20px max(18px,env(safe-area-inset-bottom));
  background:linear-gradient(to top,var(--bg) 70%,transparent);text-align:center;z-index:10}
.ob-btn{display:inline-flex;align-items:center;justify-content:center;padding:16px 44px;border-radius:100px;border:none;
  background:linear-gradient(135deg,var(--p),var(--p2));color:#000;font-family:var(--F);font-weight:800;font-size:15px;letter-spacing:.5px;
  cursor:pointer;box-shadow:0 6px 26px rgba(16,185,129,.38);transition:all .22s;max-width:460px;width:100%}
.ob-btn:hover{transform:translateY(-2px);box-shadow:0 10px 34px rgba(16,185,129,.46)}
.ob-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

/* ── APP SHELL ── */
#app{display:none;height:100vh;height:100dvh}
#app.on{display:flex}

.sidebar{width:248px;flex-shrink:0;background:rgba(7,9,18,.97);border-right:1px solid var(--bd);
  padding:22px 11px;display:flex;flex-direction:column;overflow-y:auto}
@media(max-width:1260px){.sidebar{width:68px}.nav-lbl,.sl-full,.nav-sec{display:none!important}.sl-sm{display:flex!important}}
@media(max-width:768px){.sidebar{display:none!important}.bnav{display:flex!important}}

.sl-full{font-family:var(--F);font-size:19px;font-weight:800;color:var(--t);padding:0 8px;margin-bottom:34px;cursor:pointer;display:flex;align-items:center;gap:7px;flex-shrink:0}
.sl-dot{width:7px;height:7px;border-radius:50%;background:var(--p);box-shadow:0 0 8px var(--p);flex-shrink:0}
.sl-sm{font-family:var(--F);font-size:20px;font-weight:800;color:var(--p);padding:0 8px;margin-bottom:30px;cursor:pointer;display:none;align-items:center;justify-content:center}
.nav-sec{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:2.5px;text-transform:uppercase;padding:0 10px;margin:14px 0 4px}
.nav-it{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:13px;cursor:pointer;color:var(--t2);font-weight:600;font-size:14px;transition:.16s;margin-bottom:1px;border:1px solid transparent}
.nav-it:hover{color:var(--t);background:rgba(255,255,255,.04)}
.nav-it.on{background:var(--ps);color:var(--p);border-color:var(--pb)}
.nav-it.on .n-ico svg{stroke:var(--p)}
.n-ico{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nav-pip{width:5px;height:5px;border-radius:50%;background:var(--red);margin-left:auto;animation:pip 1.2s infinite;display:none}
.nav-pip.on{display:block}
@keyframes pip{0%,100%{opacity:1}50%{opacity:.15}}

/* Sidebar bottom */
.sb-bot{margin-top:auto;padding-top:14px;border-top:1px solid var(--bd)}
.sb-lang{width:100%;padding:9px 12px;border-radius:11px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--B);transition:.15s;text-align:left;display:flex;align-items:center;gap:7px;white-space:nowrap;overflow:hidden}
.sb-lang:hover{border-color:var(--bd2);color:var(--t)}
.sb-tm{display:flex;align-items:center;gap:8px;padding:9px 4px;cursor:pointer;border-radius:11px;transition:.14s;margin-top:8px}
.sb-tm:hover{background:rgba(255,255,255,.04)}
.sb-tm img{width:26px;height:26px;object-fit:contain}
.sb-tn{font-size:13px;font-weight:800;color:var(--t)}
.sb-tl{font-size:11px;color:var(--t2)}
.sb-chg{width:100%;margin-top:7px;padding:8px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--B);transition:.14s;text-align:center}
.sb-chg:hover{border-color:var(--bd2);color:var(--t)}

/* ── MAIN ── */
.main-col{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;
  background:radial-gradient(ellipse 80% 40% at 0% -10%,rgba(16,185,129,.07),transparent 60%)}
.hdr{height:60px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;background:rgba(3,5,10,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--bd);z-index:100}
@media(max-width:768px){.hdr{padding:0 14px;height:54px}}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-logo{font-family:var(--F);font-size:17px;font-weight:800;color:var(--t);display:none}
@media(max-width:768px){.hdr-logo{display:block}}
.live-pip{display:none;align-items:center;gap:5px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);border-radius:100px;padding:4px 10px}
.live-pip.on{display:flex}
.lp-d{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pip 1s infinite}
.live-pip span{font-size:10px;font-weight:800;color:var(--red);letter-spacing:.5px}
.hdr-r{display:flex;align-items:center;gap:7px}
.hdr-lang{padding:5px 9px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--B);transition:.14s;white-space:nowrap;letter-spacing:0}
.hdr-lang:hover{border-color:var(--bd2);color:var(--t)}
.hdr-tp{display:flex;align-items:center;gap:6px;background:var(--ps);border:1.5px solid var(--pb);border-radius:100px;padding:5px 11px 5px 6px;cursor:pointer;transition:.14s}
.hdr-tp:hover{background:var(--pb)}
.hdr-tp img{width:20px;height:20px;object-fit:contain}
.hdr-tp span{font-size:12px;font-weight:800;color:var(--p)}
.hdr-pro{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--p);background:var(--ps);border:1px solid var(--pb);border-radius:100px;padding:5px 10px}

.pg-wrap{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pg{padding:24px 28px;max-width:960px;margin:0 auto;animation:pgIn .18s ease;will-change:opacity}
@keyframes pgIn{from{opacity:0}to{opacity:1}}
@media(max-width:768px){.pg{padding:14px 13px 86px}}
@media(min-width:1500px){.pg{max-width:1080px}}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(3,5,10,.97);backdrop-filter:blur(24px);
  border-top:1px solid var(--bd);display:none;justify-content:space-around;align-items:center;
  z-index:1000;padding:7px 0 max(7px,env(safe-area-inset-bottom,7px))}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;font-family:var(--B);padding:5px 2px}
.bn-i{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.bn-i svg{transition:transform .15s}
.bn-l{font-size:10px;font-weight:700;color:var(--t2)}
.bn.on .bn-l{color:var(--p)}
.bn.on .bn-i svg{stroke:var(--p);transform:scale(1.1)}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sh::before{content:'';width:3px;height:20px;background:linear-gradient(var(--p),rgba(16,185,129,.2));border-radius:2px;flex-shrink:0}
.sh h2{font-family:var(--F);font-size:20px;font-weight:800;letter-spacing:-.4px}
.sh-b{font-size:11px;font-weight:700;color:var(--t2);background:rgba(255,255,255,.05);border:1px solid var(--bd);padding:4px 11px;border-radius:100px;margin-left:auto;white-space:nowrap}

/* ── PILLS ── */
.ptabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:16px;padding:1px 0}
.ptabs::-webkit-scrollbar{display:none}
.ptab{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--B);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;transition:.16s}
.ptab img{width:14px;height:14px;object-fit:contain}
.ptab:hover{border-color:var(--bd2);color:var(--t)}
.ptab.on{background:rgba(255,255,255,.07);color:var(--t);border-color:var(--bd2)}
.ptab.on-p{background:var(--p);color:#000;border-color:var(--p)}

/* ── DATE STRIP ── */
.date-nav{display:flex;align-items:center;gap:7px;margin-bottom:16px}
.d-arr{width:32px;height:32px;border-radius:9px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-size:14px;transition:.14s;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--B)}
.d-arr:hover{border-color:var(--bd2);color:var(--t)}
.d-strip{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1}
.d-strip::-webkit-scrollbar{display:none}
.d-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 10px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--B);transition:.14s;min-width:46px}
.d-dow{font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.d-day{font-family:var(--M);font-size:14px;font-weight:800;color:var(--t)}
.d-btn:hover{border-color:var(--bd2)}
.d-btn.on{background:var(--ps);border-color:var(--pb)}
.d-btn.on .d-dow{color:var(--p)}
.d-btn.on .d-day{color:var(--p)}
.d-btn.today .d-dow{color:var(--p);font-weight:800}

/* ── MATCH CARDS ── */
.mg{background:var(--card2);border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden;margin-bottom:12px}
.mg-hd{display:flex;align-items:center;gap:8px;padding:9px 16px;border-bottom:1px solid var(--bd);background:rgba(255,255,255,.02)}
.mg-hd img{width:15px;height:15px;object-fit:contain;opacity:.7}
.mg-hd .lgn{font-size:10px;font-weight:800;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;flex:1}
.mg-hd .livc{font-size:9px;font-weight:900;color:var(--red);background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.2);padding:2px 7px;border-radius:100px}

.mr{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .14s;gap:9px}
.mr:last-child{border-bottom:none}
.mr:hover{background:rgba(255,255,255,.022)}
.mr.my{border-left:2.5px solid var(--p);padding-left:13.5px}
.mr.lv-r{background:rgba(244,63,94,.022)}

/* Time */
.mt{width:40px;flex-shrink:0}
.mt-t{font-size:11px;font-weight:800;color:var(--t2);line-height:1.3}
.mt-t.lv{color:var(--p)}
.mt-t.ft{color:var(--t3)}

/* Teams */
.mb2{flex:1;min-width:0}
.ml{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.ml:last-child{margin-bottom:0}
.mc{display:flex;align-items:center;gap:7px;min-width:0;flex:1}
.mc img{width:17px;height:17px;object-fit:contain;flex-shrink:0}
.mn2{font-size:13.5px;font-weight:700;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mn2.d{color:var(--t2)}
.mn2.w{color:var(--t);font-weight:800}
.msv{font-family:var(--M);font-weight:800;font-size:14px;color:var(--t);flex-shrink:0;margin-left:7px;min-width:14px;text-align:center}
.msv.w{color:var(--p)}

.ma{flex-shrink:0;display:flex;align-items:center;gap:5px;margin-left:4px}
.nb{padding:4px 8px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:11px;cursor:pointer;font-family:var(--B);font-weight:700;transition:.14s}
.nb.on{background:var(--ps);border-color:var(--pb);color:var(--p)}
.nb:hover:not(.on){border-color:var(--bd2);color:var(--t2)}

/* Goal events */
.mr-ev{padding:6px 16px 9px;border-top:1px solid rgba(255,255,255,.04);display:flex;gap:14px}
.ev-side{flex:1;display:flex;flex-direction:column;gap:2px}
.ev-side.r{align-items:flex-end}
.ev-it{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2)}
.ev-mn{font-family:var(--M);font-size:10px;color:var(--p);font-weight:800}

/* Odds */
.odds-row{display:flex;gap:3px;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.04)}
.oc{flex:1;text-align:center;background:rgba(255,255,255,.03);border-radius:7px;padding:4px 2px}
.oc-l{font-size:9px;color:var(--t3);font-weight:700;margin-bottom:1px}
.oc-v{font-family:var(--M);font-size:12px;font-weight:800;color:var(--t)}
.oc-v.f{color:var(--p)}

/* ── STANDINGS ── */
.std-scroll{overflow-x:auto}
.std-tbl{width:100%;border-collapse:separate;border-spacing:0 4px;min-width:540px}
.std-tbl th{padding:8px 12px;text-align:center;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;font-weight:800}
.std-tbl th:nth-child(2){text-align:left;min-width:140px}
.std-tbl td{padding:11px 12px;background:rgba(255,255,255,.025);text-align:center;font-size:13px;font-weight:700}
.std-tbl td:nth-child(2){text-align:left}
.std-tbl td:first-child{border-radius:12px 0 0 12px}
.std-tbl td:last-child{border-radius:0 12px 12px 0}
.std-tbl tr:hover td{background:rgba(255,255,255,.04)}
.std-tbl tr.my td{background:rgba(16,185,129,.06)!important}
.zone-cl td:first-child{border-left:2.5px solid var(--blue)!important}
.zone-el td:first-child{border-left:2.5px solid var(--am)!important}
.zone-ecl td:first-child{border-left:2.5px solid var(--purp)!important}
.zone-rel td:first-child{border-left:2.5px solid var(--red)!important}
.pos-n{font-weight:900;font-size:13px}
.pos-n.cl{color:var(--blue)}.pos-n.el{color:var(--am)}.pos-n.rel{color:var(--red)}
.cc{display:flex;align-items:center;gap:8px}
.cc img{width:20px;height:20px;object-fit:contain}
.pts{font-family:var(--M);font-size:15px;font-weight:900;color:var(--p)}
.gd{color:var(--t2);font-size:12px}
.frm{display:flex;gap:2px;justify-content:center}
.fd{width:6px;height:6px;border-radius:50%}
.std-leg{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.leg-it{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);font-weight:600}
.leg-dot{width:3px;height:12px;border-radius:2px}

/* ── PLAYERS ── */
.pr{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:7px;transition:.14s}
.pr:hover{border-color:var(--bd2)}
.pr.my{border-color:var(--pb);background:var(--ps)}
.prk{font-family:var(--F);font-size:18px;font-weight:800;color:var(--t3);width:28px;text-align:center}
.prk.g{color:#fbbf24}.prk.s{color:#94a3b8}.prk.b{color:#cd7c3e}
.pr-ci{width:32px;height:32px;object-fit:contain;border-radius:7px}
.pr-info{flex:1;min-width:0}
.pr-name{font-size:14px;font-weight:800;margin-bottom:2px}
.pr-club{font-size:11px;color:var(--t2)}
.pr-val{font-family:var(--M);font-size:26px;font-weight:900;color:var(--p)}
.pr-lbl{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:1px;text-align:right;margin-top:2px}

/* ── TEAM PAGE ── */
.team-hero{background:linear-gradient(145deg,rgba(255,255,255,.03),transparent);border:1px solid var(--bd);border-radius:var(--r3);padding:24px;margin-bottom:18px;display:flex;align-items:center;gap:20px}
.team-hero img{width:72px;height:72px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.th-info h2{font-family:var(--F);font-size:22px;font-weight:800;margin-bottom:4px}
.th-info p{font-size:13px;color:var(--t2)}
.squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sq-card{background:var(--card2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 12px;transition:.14s}
.sq-card:hover{border-color:var(--bd2)}
.sq-pos{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.sq-pos.gk{color:var(--am)}.sq-pos.df{color:var(--blue)}.sq-pos.mf{color:var(--p)}.sq-pos.fw{color:var(--red)}
.sq-name{font-size:13px;font-weight:800;color:var(--t);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sq-nat{font-size:11px;color:var(--t2)}
.coach-card{background:var(--card2);border:1px solid var(--pb);border-radius:var(--r2);padding:16px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.coach-ico{font-size:32px}
.coach-nm{font-size:15px;font-weight:800}
.coach-nat{font-size:12px;color:var(--t2);margin-top:2px}

/* ── AI PITCH ── */
.ai-wrap{position:relative;border-radius:32px;overflow:hidden;margin-bottom:20px}
.ai-bg{position:absolute;inset:0;background:
  radial-gradient(ellipse 130% 70% at 50% 120%,rgba(16,185,129,.4),transparent 55%),
  radial-gradient(ellipse 60% 60% at 10% 0%,rgba(59,130,246,.2),transparent 45%),
  radial-gradient(ellipse 60% 60% at 90% 0%,rgba(244,63,94,.18),transparent 45%),
  #050c0f}
.ai-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:38px 38px;
  mask-image:radial-gradient(ellipse at center,black 20%,transparent 75%)}
.ai-glow{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(var(--p),transparent 70%);opacity:.12;top:50%;left:50%;transform:translate(-50%,-60%);animation:aiGlow 6s ease infinite alternate;pointer-events:none}
@keyframes aiGlow{from{transform:translate(-50%,-60%) scale(1);opacity:.10}to{transform:translate(-50%,-55%) scale(1.15);opacity:.18}}
.ai-cnt{position:relative;z-index:2;padding:28px 24px}
@media(max-width:480px){.ai-cnt{padding:20px 16px}}
.ai-chip{display:inline-flex;align-items:center;gap:6px;background:var(--p);color:#000;padding:5px 14px;border-radius:100px;font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.ai-meta{font-size:11px;color:rgba(255,255,255,.45);font-weight:600;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:10px}
.ai-meta span{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:3px 10px;border-radius:100px}
.ai-fixture{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px}
.ai-club{text-align:center;flex:1;min-width:0}
.ai-club img{width:clamp(52px,10vw,72px);height:clamp(52px,10vw,72px);object-fit:contain;margin:0 auto 10px;filter:drop-shadow(0 6px 20px rgba(0,0,0,.5));transition:transform .3s}
.ai-wrap:hover .ai-club img{transform:scale(1.05)}
.ai-club h4{font-family:var(--F);font-size:clamp(12px,2.5vw,14px);font-weight:800;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ai-vs{text-align:center;flex-shrink:0;padding:0 8px}
.ai-vs-t{font-family:var(--F);font-size:clamp(28px,6vw,44px);font-weight:800;color:rgba(255,255,255,.1);line-height:1;letter-spacing:-2px}
.ai-vs-d{font-size:10px;color:rgba(255,255,255,.45);font-weight:600;margin-top:6px;line-height:1.5}

/* Prob bar */
.prob-bar{height:9px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden;display:flex;gap:2px;margin:14px 0 8px}
.ph{background:var(--p)}.pd2{background:var(--am)}.pa{background:var(--red)}
.prob-lbl{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.6)}
.prob-lbl .pv{font-family:var(--M);font-weight:900;color:#fff}

/* AI stats */
.ai-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:16px 0}
@media(max-width:420px){.ai-stats{grid-template-columns:repeat(2,1fr)}}
.as{background:rgba(0,0,0,.35);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:14px 8px;text-align:center}
.as span{font-family:var(--M);font-size:20px;font-weight:900;color:var(--p);display:block;margin-bottom:4px}
.as label{font-size:9px;color:rgba(255,255,255,.45);font-weight:800;text-transform:uppercase;letter-spacing:.8px}

/* Tactic */
.tac-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.tc{background:rgba(0,0,0,.3);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:13px}
.tc-lbl{font-size:9px;color:rgba(255,255,255,.4);font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.tc-val{font-size:13px;font-weight:800;color:#fff;margin-bottom:3px}
.tc-note{font-size:11px;color:rgba(255,255,255,.45);line-height:1.5}

/* Key players */
.ai-kp{margin:16px 0}
.ai-kp-title{font-size:10px;font-weight:800;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px}
.kp-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.kp-row::-webkit-scrollbar{display:none}
.kp-card{flex-shrink:0;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 13px;min-width:110px}
.kp-name{font-size:12px;font-weight:800;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kp-stat{font-size:10px;color:rgba(255,255,255,.45);white-space:nowrap}
.kp-val{font-family:var(--M);font-size:16px;font-weight:900;color:var(--p)}

/* AI insight */
.ai-insight{background:rgba(0,0,0,.3);border-left:3px solid var(--p);border-radius:0 13px 13px 0;padding:15px 17px;margin-top:14px;font-size:13.5px;line-height:1.8;color:rgba(255,255,255,.82);backdrop-filter:blur(6px)}

/* ── FAN ZONE ── */
.fz-hero{background:linear-gradient(145deg,rgba(16,185,129,.08),rgba(3,5,10,0));border:1px solid var(--pb);border-radius:var(--r3);padding:32px 24px;text-align:center;margin-bottom:18px;position:relative;overflow:hidden}
.fz-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:radial-gradient(var(--p),transparent 70%);opacity:.07}
.fz-em{font-size:52px;display:block;margin-bottom:8px}
.fz-lv{font-family:var(--F);font-size:24px;font-weight:800;color:var(--p);margin-bottom:4px}
.fz-desc{font-size:13px;color:var(--t2);font-weight:600;margin-bottom:18px}
.fz-prog{max-width:300px;margin:0 auto}
.fz-bg{height:6px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden;margin-bottom:5px}
.fz-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--p),#34d399);transition:width .9s cubic-bezier(.4,0,.2,1)}
.fz-bml{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);font-weight:700}
.fz-sg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:18px}
.fzs{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:14px;padding:14px 8px;text-align:center}
.fzs-v{font-family:var(--M);font-size:20px;font-weight:900;color:var(--t)}
.fzs-l{font-size:10px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.ci{display:flex;align-items:center;gap:11px;padding:13px 16px;background:var(--card2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:7px}
.ci-main{flex:1;min-width:0}
.ci-teams{font-size:13px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.ci-meta{font-size:11px;color:var(--t2);font-weight:600}
.ci-btn{flex-shrink:0;padding:8px 14px;border-radius:9px;border:1px solid var(--pb);background:var(--ps);color:var(--p);font-size:12px;font-weight:800;cursor:pointer;font-family:var(--B);transition:.16s;white-space:nowrap}
.ci-btn:hover{background:var(--p);color:#000}
.ci-btn:disabled{opacity:.36;cursor:not-allowed;border-color:var(--bd);background:transparent;color:var(--t3)}
.ci-done{font-size:11px;font-weight:800;color:var(--p);background:var(--ps);border:1px solid var(--pb);padding:4px 11px;border-radius:100px;flex-shrink:0}
.lv-guide{background:var(--card2);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:16px}
.lv-it{display:flex;align-items:center;gap:10px;padding:8px 3px;border-bottom:1px solid rgba(255,255,255,.04)}
.lv-it:last-child{border-bottom:none}
.lv-it:not(.cur){opacity:.38}
.lv-ico{font-size:20px;width:26px}
.lv-nm{font-size:13px;font-weight:800;flex:1}
.lv-req{font-size:11px;color:var(--t2);font-weight:700}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);z-index:500;display:none;overflow-y:auto;padding:16px}
.modal-ov.show{display:block}
.modal-box{background:#0c1020;border:1px solid var(--bd2);border-radius:var(--r3);max-width:500px;margin:0 auto;overflow:hidden;box-shadow:0 36px 72px rgba(0,0,0,.85)}
.modal-hd{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.modal-hd h3{font-family:var(--F);font-size:16px;font-weight:800}
.modal-x{background:none;border:none;color:var(--t2);font-size:26px;cursor:pointer;line-height:1;padding:0;transition:.14s}
.modal-x:hover{color:var(--t)}
.modal-bd{padding:20px}
.dtl-sc-blk{text-align:center;padding:12px 0;border-bottom:1px solid var(--bd);margin-bottom:16px}
.dtl-clubs{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dtl-club{flex:1;text-align:center}
.dtl-club img{width:48px;height:48px;object-fit:contain;margin:0 auto 7px}
.dtl-club h4{font-size:12px;font-weight:800}
.dtl-score{font-family:var(--M);font-size:40px;font-weight:900;flex-shrink:0;padding:0 12px}
.dtl-chips{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.dtl-chip{font-size:10px;background:rgba(255,255,255,.05);border:1px solid var(--bd);padding:4px 10px;border-radius:100px;color:var(--t2)}
.sec-sm{font-size:10px;font-weight:800;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin:15px 0 8px}
.ev-row{display:flex;gap:9px;margin-bottom:4px}
.es{flex:1;display:flex;flex-direction:column;gap:3px}
.es.r{align-items:flex-end}
.evl{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:3px}
.gm2{font-family:var(--M);color:var(--p);font-weight:800;font-size:10px}
.sbar{margin-bottom:8px}
.sbar-h{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.sbar-h .sv{font-weight:800}.sbar-h .sl{color:var(--t2)}
.sbar-tr{height:4px;background:rgba(255,255,255,.06);border-radius:2px;display:flex;overflow:hidden}
.sh2{background:var(--p)}.sa2{background:var(--red)}
.h2h-row{display:flex;gap:7px;margin-bottom:4px}
.h2h-stat{flex:1;text-align:center;background:rgba(255,255,255,.04);border-radius:11px;padding:11px 6px}
.h2h-v{font-family:var(--M);font-size:20px;font-weight:900}
.h2h-l{font-size:10px;color:var(--t2);font-weight:700;margin-top:3px}
.h2h-match{display:flex;align-items:center;justify-content:space-between;padding:7px 3px;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;color:var(--t2)}
.h2h-match:last-child{border-bottom:none}

/* ── LOADERS ── */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 0;gap:12px}
.spin{width:26px;height:26px;border:2px solid rgba(255,255,255,.05);border-top-color:var(--p);border-right-color:rgba(16,185,129,.35);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-t{font-family:var(--F);font-size:10px;font-weight:700;color:var(--t3);letter-spacing:3px}
.sk{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:11px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-m{height:72px;margin-bottom:5px}
.sk-r{height:14px;margin-bottom:7px;border-radius:5px}
.empty{text-align:center;padding:60px 18px}
.empty .ei{font-size:40px;margin-bottom:12px}
.empty h3{font-size:17px;font-weight:800;margin-bottom:7px}
.empty p{font-size:13px;color:var(--t2);line-height:1.6}
.retry{margin-top:13px;padding:9px 22px;border-radius:100px;border:1px solid var(--pb);background:var(--ps);color:var(--p);font-size:13px;font-weight:800;cursor:pointer;font-family:var(--B);transition:.14s}
.retry:hover{background:var(--p);color:#000}
.err-ban{background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.2);border-radius:13px;padding:13px 16px;font-size:13px;color:rgba(244,63,94,.9);margin-bottom:14px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.err-ban button{background:transparent;border:1px solid rgba(244,63,94,.3);color:rgba(244,63,94,.9);padding:4px 11px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--B);margin-left:auto;white-space:nowrap}

/* ── TOAST ── */
#toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--pb);border-radius:100px;padding:10px 20px;font-size:13px;font-weight:700;z-index:8000;display:none;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.5);pointer-events:none}

/* ── GOAL FLASH ── */
#gf{position:fixed;inset:0;background:rgba(0,0,0,.93);backdrop-filter:blur(28px);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;cursor:pointer}
#gf.show{display:flex;animation:pop .55s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{from{opacity:0;transform:scale(.35) rotate(-5deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.gf-net{animation:nw .5s ease .25s 4}
@keyframes nw{0%,100%{transform:scaleY(1)}40%{transform:scaleY(1.12)}70%{transform:scaleY(.95)}}
.gf-word{font-family:var(--F);font-size:clamp(56px,14vw,88px);font-weight:800;color:#fff;letter-spacing:8px;animation:ggl 1.2s ease infinite alternate}
@keyframes ggl{from{text-shadow:0 0 28px var(--p),0 0 56px rgba(16,185,129,.3)}to{text-shadow:0 0 56px var(--p),0 0 110px rgba(16,185,129,.5)}}
.gf-scorer{font-size:clamp(16px,4vw,22px);font-weight:800;color:var(--p)}
.gf-info{font-size:13px;color:rgba(255,255,255,.38)}

/* ── LEVEL UP ── */
#lvup{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:11px;cursor:pointer}
#lvup.show{display:flex;animation:pop .5s ease}
.lu-em{font-size:82px}.lu-t{font-family:var(--F);font-size:34px;font-weight:800;color:var(--p)}.lu-s{font-size:14px;color:var(--t2)}
</style>
</head>
<body>

<div id="ob">

      <div class="ob-ring"><span>P</span></div>

<div id="app">
  <aside class="sidebar">

    <div class="sl-sm" onclick="resetApp()">P</div>
    <nav id="pc-nav"></nav>
    <div class="sb-bot">

      </div>

</div>

<div class="modal-ov" id="t-modal">
  <div class="modal-box" style="max-width:560px">
    <div class="modal-hd"><h3 id="t-ttl">Team</h3><button class="modal-x" onclick="closeT()">×</button></div>
    <div class="modal-bd" id="t-body"></div>
  </div>
</div>

<!-- ═══ GOAL FLASH ═══ -->
<div id="gf" onclick="this.classList.remove('show')">
  <svg class="gf-net" width="220" height="90" viewBox="0 0 220 90">
    <line x1="14" y1="10" x2="14" y2="83" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"/>

// ── API ────────────────────────────────────
async function fd(path,ttl=90000){
  const cached=gc(path,ttl);if(cached)return cached;
  if(fd._inf&&fd._inf[path])return fd._inf[path];
  if(!fd._inf)fd._inf={};
  const promise=(async()=>{
    try{
      let r;
      if(ON_NETLIFY){
        r=await fetch(`/api/football?type=fd&path=${encodeURIComponent(path)}`,{signal:AbortSignal.timeout(12000)});
      } else if(WORKER_URL){
        // Via Cloudflare Worker
        r=await fetch(`${WORKER_URL}?type=fd&path=${encodeURIComponent(path)}`,{signal:AbortSignal.timeout(12000)});
      } else {
        // Direct call to football-data.org
        r=await fetch(FD_BASE+path,{headers:{'X-Auth-Token':FD_KEY},signal:AbortSignal.timeout(12000)});
      }
      if(!r.ok)return null;
      const d=await r.json();
      if(!d.errorCode||d.errorCode===200){sc(path,d);}
      return d;
    }catch(e){console.warn('[fd]',e.message,path);return null;}
    finally{if(fd._inf)delete fd._inf[path];}
  })();
  fd._inf[path]=promise;
  return promise;
}
const fdAll=(paths,ttl)=>Promise.all(paths.map(p=>fd(p,ttl)));
async function klAPI(path,params={}){
  const qs=new URLSearchParams(params).toString();
  const key=path+'?'+qs;const c=gc(key,120000);if(c)return c;
  try{
    let r;
    if(ON_NETLIFY){
      r=await fetch(`/api/football?type=kl&path=${encodeURIComponent(path)}&${qs}`,{signal:AbortSignal.timeout(12000)});
    } else if(WORKER_URL){
      r=await fetch(`${WORKER_URL}?type=kl&path=${encodeURIComponent(path)}&${qs}`,{signal:AbortSignal.timeout(12000)});
    } else {
      // Direct call to api-sports.io
      r=await fetch(`${KL_BASE}${path}${qs?'?'+qs:''}`,{
        headers:{'x-apisports-key':KL_KEY},
        signal:AbortSignal.timeout(12000)
      });
    }
    if(!r.ok)return null;
    const d=await r.json();
    if(d.errors&&Object.keys(d.errors).length)return null;
    sc(key,d);return d;
  }catch{return null;}
}

function goalSfx(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,.12],[659,.12],[784,.12],[1047,.26],[784,.09],[1047,.45]].reduce((ts,[f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='triangle';
      g.gain.setValueAtTime(0,ts);g.gain.linearRampToValueAtTime(.4,ts+.04);g.gain.linearRampToValueAtTime(0,ts+d-.02);
      o.start(ts);o.stop(ts+d);return ts+d;
    },ctx.currentTime+.05);
    const buf=ctx.createBuffer(1,ctx.sampleRate*.8,ctx.sampleRate);
    const da=buf.getChannelData(0);for(let i=0;i<da.length;i++)da[i]=(Math.random()*2-1)*.07;
    const ns=ctx.createBufferSource();ns.buffer=buf;
    const ng=ctx.createGain();ns.connect(ng);ng.connect(ctx.destination);
    ng.gain.setValueAtTime(.2,ctx.currentTime+.55);ng.gain.linearRampToValueAtTime(0,ctx.currentTime+1.6);
    ns.start(ctx.currentTime+.55);
  }catch{}
}
function showGoal(scorer,team,min,hn,an,hg,ag){
  document.getElementById('gf-sc').textContent=scorer?`⚽ ${scorer}`:team||'';
  document.getElementById('gf-inf').textContent=(hn&&an)?`${hn} ${hg}:${ag} ${an}${min?' · '+min+"'":''}` :'';
  const el=document.getElementById('gf');el.classList.add('show');goalSfx();
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),5500);
}
function chkGoal(m){
  const id=m.id;
  const hg=m.score?.fullTime?.home??m.score?.halfTime?.home??0;
  const ag=m.score?.fullTime?.away??m.score?.halfTime?.away??0;
  const sc2=`${hg}:${ag}`;
  if(prevSc[id]!==undefined&&prevSc[id]!==sc2){
    const isH=parseInt(hg)>parseInt((prevSc[id]||'0').split(':')[0]);
    const team=isH?(m.homeTeam?.shortName||m.homeTeam?.name):(m.awayTeam?.shortName||m.awayTeam?.name);
    const last=(m.goals||[]).slice(-1)[0];
    showGoal(last?.scorer?.name||last?.player?.name,team,last?.minute,
      m.homeTeam?.shortName,m.awayTeam?.shortName,hg,ag);
    if(watchList.includes(String(id)))push(`⚽ GOAL! ${team}`,`${m.homeTeam?.shortName} ${hg}:${ag} ${m.awayTeam?.shortName}${last?.scorer?.name?' · '+last.scorer.name:''}`,'g'+id);
  }
  if(!prevSt[id])prevSt[id]=m.status;
  else if(prevSt[id]!==m.status){
    if(watchList.includes(String(id))){
      const hn=m.homeTeam?.shortName||'',an=m.awayTeam?.shortName||'';
      if(m.status==='IN_PLAY'&&prevSt[id]==='SCHEDULED')push(`🏁 킥오프!`,`${hn} vs ${an}`,'ko'+id);
      if(m.status==='HALFTIME')push(`⏸ 하프타임`,`${hn} ${hg}:${ag} ${an}`,'ht'+id);
      if(isFin(m))push(`🏆 종료`,`${hn} ${hg}:${ag} ${an}`,'ft'+id);
    }
    prevSt[id]=m.status;
  }
  prevSc[id]=sc2;
}

async function loadLive(silent=false){
  const c=document.getElementById('content');if(!c)return;
  if(!silent)c.innerHTML=sk(4);
  const today=ds(kn()),ks=new Date(today+'T00:00:00+09:00');
  const uf=new Date(ks.getTime()-9*3600000).toISOString().slice(0,10);
  const ut=new Date(ks.getTime()-9*3600000+86399000).toISOString().slice(0,10);
  const results=await fdAll([
    `/competitions/PL/matches?dateFrom=${uf}&dateTo=${ut}`,
    `/competitions/PD/matches?dateFrom=${uf}&dateTo=${ut}`,
    `/competitions/BL1/matches?dateFrom=${uf}&dateTo=${ut}`,
    `/competitions/SA/matches?dateFrom=${uf}&dateTo=${ut}`,
    `/competitions/FL1/matches?dateFrom=${uf}&dateTo=${ut}`,
  ]);
  let all=[];results.forEach(d=>{if(d?.matches)all.push(...d.matches);});
  if(SEL.some(s=>s.league==='KL1'||s.league==='KL2')){
    const kd2=await klAPI('/fixtures',{league:KL_LG,season:KL_SZ,date:uf});
    (kd2?.response||[]).forEach(f=>all.push(klFd(f)));
  }
  all.forEach(m=>{if(isLive(m))chkGoal(m);});
  const live=all.filter(m=>isLive(m)&&isKstToday(m.utcDate));
  const sched=all.filter(m=>isSch(m)&&isKstToday(m.utcDate));
  const fin=all.filter(m=>isFin(m)&&isKstToday(m.utcDate));
  document.getElementById('live-badge')?.classList.toggle('on',live.length>0);
  if(!live.length&&!sched.length&&!fin.length){
    c.innerHTML=`<div class="empty"><div class="ei">📅</div><h3>${t('noMatches')}</h3><p>${t('checkSched')}</p></div>`;return;
  }
  let html='';
  if(live.length)html+=`<div class="sh"><h2 style="color:var(--red)">🔴 LIVE</h2><span class="sh-b">${live.length}</span></div>${grp(live)}<div style="height:16px"></div>`;
  if(sched.length)html+=`<div class="sh"><h2>${t('sched')}</h2><span class="sh-b">${today} KST</span></div>${grp(sched)}<div style="height:16px"></div>`;
  if(fin.length)html+=`<div class="sh"><h2>Final</h2><span class="sh-b">${fin.length}</span></div>${grp(fin)}`;
  c.innerHTML=html;
}
function grp(matches){
  const g={};
  matches.forEach(m=>{const k=m.competition?.name||'Other';if(!g[k])g[k]={ms:[],logo:''};g[k].ms.push(m);const l=LEAGUES.find(x=>x.n===k||k.includes(x.n.slice(0,5)));if(l)g[k].logo=l.logo;});
  return Object.entries(g).map(([n,{ms,logo}])=>{
    const lc=ms.filter(m=>isLive(m)).length;
    return`<div class="mg"><div class="mg-hd">${logo?`<img src="${logo}" onerror="this.style.opacity='.2'">`:''}
      <span class="lgn">${n}</span>
      ${lc?`<span class="livc">● LIVE ${lc}</span>`:`<span style="font-size:10px;color:var(--t3);font-weight:700;">${ms.length}</span>`}
    </div>${ms.map(mRow).join('')}</div>`;
  }).join('');
}
function mRow(m){
  const h=m.homeTeam,a=m.awayTeam;
  const live=isLive(m),fin=isFin(m);
  const hg=m.score?.fullTime?.home??m.score?.halfTime?.home;
  const ag=m.score?.fullTime?.away??m.score?.halfTime?.away;
  const hW=fin&&hg!=null&&hg>ag,aW=fin&&ag!=null&&ag>hg;
  const hn=ev(h?.shortName||h?.name||''),an=ev(a?.shortName||a?.name||'');
  const my=isMyMatch(m),isWa=watchList.includes(String(m.id));
  const od=ods(m),showOdds=!fin&&!live;

  // ── Accurate match time ──
  let tStr=kt(m.utcDate);
  if(live){
    if(m.status==='HALFTIME')tStr='HT';
    else if(m.status==='EXTRA_TIME')tStr='ET';
    else if(m.status==='PENALTY_SHOOTOUT')tStr='PEN';
    else{
      // Use API minute field if present
      const apiMin=m.minute;
      if(apiMin!=null){tStr=`${apiMin}'`;}
      else{
        // Estimate: kickoff=0, ~57min elapsed = start of 2nd half (45+12min break)
        const e=Math.floor((Date.now()-new Date(m.utcDate).getTime())/60000);
        tStr=e>57?`${Math.min(45+(e-57),90)}'`:`${Math.min(e,45)}'`;
      }
    }
  }
  if(fin)tStr='FT';

  // Goals for finished matches
  const goals=m.goals||[];
  const hG=goals.filter(g=>g.team?.id===h?.id);
  const aG=goals.filter(g=>g.team?.id===a?.id);
  const showGoals=fin&&goals.length>0;

  return`<div class="mr ${my?'my':''} ${live?'lv-r':''}" onclick="openMatch(${m.id},'${hn}','${an}',${!!m._kl})">
    <div class="mt"><div class="mt-t ${live?'lv':fin?'ft':''}">${live?`<span style="font-size:9px;color:var(--red)">●</span> ${tStr}`:tStr}</div></div>
    <div class="mb2">
      <div class="ml"><div class="mc"><img src="${crestOf(h)}" alt="${hn}" data-id="${h?.id||0}" onerror="imgE(this)" width="17" height="17"><span class="mn2 ${hW?'w':'d'}">${h?.shortName||h?.name||''}</span></div><span class="msv ${hW?'w':''}">${hg??'–'}</span></div>
      <div class="ml"><div class="mc"><img src="${crestOf(a)}" alt="${an}" data-id="${a?.id||0}" onerror="imgE(this)" width="17" height="17"><span class="mn2 ${aW?'w':'d'}">${a?.shortName||a?.name||''}</span></div><span class="msv ${aW?'w':''}">${ag??'–'}</span></div>
      ${showOdds?`<div class="odds-row"><div class="oc"><div class="oc-l">${hn.slice(0,6)}</div><div class="oc-v ${parseFloat(od.hw)<2.1?'f':''}">${od.hw}</div></div><div class="oc"><div class="oc-l">Draw</div><div class="oc-v">${od.dr}</div></div><div class="oc"><div class="oc-l">${an.slice(0,6)}</div><div class="oc-v ${parseFloat(od.aw)<2.1?'f':''}">${od.aw}</div></div></div>`:''}
    </div>
    <div class="ma"><button class="nb ${isWa?'on':''}" onclick="event.stopPropagation();toggleWatch(${m.id},'${hn}','${an}',this)">${isWa?'🔔':'🔕'}</button></div>
  </div>${showGoals?`<div class="mr-ev">
    <div class="ev-side">${hG.map(g=>`<div class="ev-it"><span class="ev-mn">${g.minute||'?'}'</span><span>⚽</span><span>${(g.scorer?.name||g.player?.name||'').split(' ').pop()}</span></div>`).join('')}</div>
    <div class="ev-side r">${aG.map(g=>`<div class="ev-it"><span>${(g.scorer?.name||g.player?.name||'').split(' ').pop()}</span><span>⚽</span><span class="ev-mn">${g.minute||'?'}'</span></div>`).join('')}</div>
  </div>`:''}`;
}

  const body=document.getElementById('std-body');

  if(curLg==='KL1'||curLg==='KL2'){
    await renderKLStd(body,curLg==='KL1'?KL_LG:KL2_LG);

  }

  // Build the URL to call
  const encPath=encodeURIComponent('/competitions/'+curLg+'/standings');
  const testURL=ON_NETLIFY
    ? `/api/football?type=fd&path=${encPath}`
    : WORKER_URL
    ? `${WORKER_URL}?type=fd&path=${encPath}`
    : `${FD_BASE}/competitions/${curLg}/standings`;
  console.log('[Standings] Calling:', testURL);

  let data=null;
  // Try current season first, then 2024, then 2025
  // Build attempts list
  let attempts;
  if(ON_NETLIFY){
    attempts=[testURL, testURL+'&season=2024', testURL+'&season=2025'];
  } else if(WORKER_URL){
    // Via Cloudflare Worker
    const ep=encodeURIComponent('/competitions/'+curLg+'/standings');
    attempts=[
      `${WORKER_URL}?type=fd&path=${ep}`,
      `${WORKER_URL}?type=fd&path=${ep}&season=2024`,
      `${WORKER_URL}?type=fd&path=${ep}&season=2025`,
    ];
  } else {
    // Direct to football-data.org
    attempts=[
      {url:`${FD_BASE}/competitions/${curLg}/standings`,          headers:{'X-Auth-Token':FD_KEY}},
      {url:`${FD_BASE}/competitions/${curLg}/standings?season=2024`, headers:{'X-Auth-Token':FD_KEY}},
      {url:`${FD_BASE}/competitions/${curLg}/standings?season=2025`, headers:{'X-Auth-Token':FD_KEY}},
    ];
  }

  for(const attempt of attempts){
    const url=typeof attempt==='string'?attempt:attempt.url;
    const headers=typeof attempt==='object'&&attempt.headers?attempt.headers:{};
    try{
      console.log('[Standings] Attempt:', url);
      const r=await fetch(url,{headers,signal:AbortSignal.timeout(15000)});
      console.log('[Standings] HTTP', r.status, url);
      if(!r.ok){
        body.innerHTML=`<div class="err-ban">
          ⚠ Netlify Function returned HTTP ${r.status}<br>
          <small style="opacity:.6">URL: ${url}</small>
          <div style="margin-top:8px;display:flex;gap:8px">
            <button onclick="renderStd()">🔄 Retry</button>
          </div>
        </div>`;
        return;
      }
      const d=await r.json();
      console.log('[Standings] Response keys:', Object.keys(d||{}).join(','), '| errorCode:', d?.errorCode, '| message:', d?.message);
      if(d?.standings?.[0]?.table?.length){
        data=d;
        break;
      }
      if(d?.errorCode){
        console.warn('[Standings] API error:', d.errorCode, d.message);
        const isRL=d.errorCode===429||(d.message||'').toLowerCase().includes('rate');
        if(isRL){
          body.innerHTML=`<div class="err-ban">
            ⏳ Rate limited (429) — auto-retry
            <button onclick="renderStd()">🔄 Retry (13s)</button>
          </div>`;
          let n=13;
          const ti=setInterval(()=>{n--;const b=body.querySelector('button');if(b)b.textContent=`🔄 Retry (${n}s)`;if(n<=0){clearInterval(ti);renderStd();}},1000);
          return;
        }
        body.innerHTML=`<div class="err-ban">
          ⚠ API Error ${d.errorCode}: ${d.message||'Unknown'}
          <div style="margin-top:8px"><button onclick="renderStd()">🔄 Retry</button></div>
        </div>`;
        return;
      }
    }catch(e){
      console.error('[Standings] Fetch error:', e.message, url);
    }
  }

  if(!data){
    body.innerHTML=`<div class="err-ban" style="flex-direction:column;align-items:flex-start">
      <span>⚠ Could not load standings</span>
      <small style="opacity:.6;margin-top:4px">Check browser console (F12) for details</small>
      <small style="opacity:.6">Direct: ${FD_BASE}/competitions/${curLg}/standings</small>
      <div style="margin-top:8px;display:flex;gap:8px">
        <button onclick="renderStd()">🔄 Retry</button>
        <button onclick="navigator.clipboard.writeText('${testURL}').then(()=>alert('Copied! Paste in browser to test'))">📋 Copy URL</button>
      </div>
    </div>`;
    return;
  }

  sc('/competitions/'+curLg+'/standings',data);
  const rows=data.standings[0].table, tot=rows.length;
  const lg=LEAGUES.find(l=>l.c===curLg);
  const fc={W:'var(--p)',D:'var(--am)',L:'var(--red)'};
  const zM=tot===20?{cl:[1,2,3,4],el:[5],ecl:[6],rel:[18,19,20]}
            :tot===18?{cl:[1,2,3,4],el:[5],rel:[16,17,18]}
            :{cl:[1,2,3,4],el:[5],rel:[]};
  const zc=p=>zM.cl?.includes(p)?'zone-cl':zM.el?.includes(p)?'zone-el':zM.ecl?.includes(p)?'zone-ecl':zM.rel?.includes(p)?'zone-rel':'';
  const pc=p=>zM.cl?.includes(p)?'cl':zM.el?.includes(p)?'el':zM.rel?.includes(p)?'rel':'';

  body.innerHTML=`
    ${lg?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:11px 15px;background:var(--card2);border:1px solid var(--bd);border-radius:14px;">
      <img src="${lg.logo}" style="width:22px;height:22px;object-fit:contain;" onerror="this.style.opacity='.3'">
      <span style="font-family:var(--F);font-size:14px;font-weight:800;">${lg.n}</span>
      <span style="margin-left:auto;font-size:11px;color:var(--t2);">Season ${data.filters?.season||'current'}</span>
    </div>`:''}
    <div class="std-scroll"><table class="std-tbl">
      <thead><tr><th>#</th><th>Club</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th><th>Form</th></tr></thead>
      <tbody>${rows.map(row=>{
        const my=SEL.some(s=>s.id===row.team.id);
        const gd=row.goalsDiff>=0?'+'+row.goalsDiff:row.goalsDiff;
        const fm=(row.form||'').split('').slice(-5);
        return`<tr class="${my?'my':''} ${zc(row.position)}" style="cursor:pointer" onclick="openTeam(${row.team.id},'${ev(row.team.shortName||row.team.name)}')">
          <td><span class="pos-n ${pc(row.position)}">${row.position}</span></td>
          <td><div class="cc">
            <img src="${row.team.crest||`https://crests.football-data.org/${row.team.id}.png`}" data-id="${row.team.id}" onerror="imgE(this)" width="20" height="20" style="object-fit:contain">
            ${row.team.shortName||row.team.name}
          </div></td>
          <td>${row.all.played}</td><td>${row.all.win}</td><td>${row.all.draw}</td><td>${row.all.lose}</td>
          <td><span class="gd">${gd}</span></td>
          <td><span class="pts">${row.points}</span></td>
          <td><div class="frm">${fm.map(f=>`<div class="fd" style="background:${fc[f]||'rgba(255,255,255,.1)'}"></div>`).join('')}</div></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
    <div class="std-leg">
      ${zM.cl?.length?`<div class="leg-it"><div class="leg-dot" style="background:var(--blue)"></div>Champions League</div>`:''}
      ${zM.el?.length?`<div class="leg-it"><div class="leg-dot" style="background:var(--am)"></div>Europa League</div>`:''}
      ${zM.ecl?.length?`<div class="leg-it"><div class="leg-dot" style="background:var(--purp)"></div>Conference</div>`:''}
      ${zM.rel?.length?`<div class="leg-it"><div class="leg-dot" style="background:var(--red)"></div>Relegation</div>`:''}
    </div>`;
}

  let sc2=[...data.scorers];if(curPt==='assists')sc2.sort((a,b)=>(b.assists||0)-(a.assists||0));

async function openTeam(teamId,name){
  if(!teamId||teamId===0)return;
  document.getElementById('t-ttl').textContent=name;
  document.getElementById('t-body').innerHTML=`<div class="ld"><div class="spin"></div></div>`;
  document.getElementById('t-modal').classList.add('show');

  const [teamData,matchData]=await Promise.all([
    fd(`/teams/${teamId}`,1800000),
    fd(`/teams/${teamId}/matches?status=FINISHED&limit=5`,1800000),
  ]);

  if(!teamData){document.getElementById('t-body').innerHTML=`<div class="empty"><div class="ei">⚠</div><h3>${t('noData')}</h3></div>`;return;}

  const squad=teamData.squad||[];
  const coach=teamData.coach;
  const crest=teamData.crest||`https://crests.football-data.org/${teamId}.png`;
  const recentMatches=matchData?.matches||[];

  // Group squad by position
  const pos={Goalkeeper:[],Defence:[],Midfield:[],Offence:[]};
  squad.forEach(p=>{const g=pos[p.position]||pos.Offence;g.push(p);});
  const posLabel={Goalkeeper:LANG==='ko'?'골키퍼':'GK',Defence:LANG==='ko'?'수비':'DF',Midfield:LANG==='ko'?'미드필더':'MF',Offence:LANG==='ko'?'공격':'FW'};
  const posClass={Goalkeeper:'gk',Defence:'df',Midfield:'mf',Offence:'fw'};

  let squadHtml='';
  Object.entries(pos).forEach(([grp,players])=>{
    if(!players.length)return;
    squadHtml+=`<div style="margin-bottom:14px;">
      <div style="font-size:10px;font-weight:800;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;">${posLabel[grp]} (${players.length})</div>
      <div class="squad-grid">${players.map(p=>`<div class="sq-card">
        <div class="sq-pos ${posClass[grp]}">${posLabel[grp]}</div>
        <div class="sq-name" title="${p.name}">${p.name}</div>
        <div class="sq-nat">${p.nationality||''} · #${p.shirtNumber||'–'}</div>
      </div>`).join('')}</div>
    </div>`;
  });

  // Recent form
  const formHtml=recentMatches.length?`<div class="sh" style="margin-top:18px;"><h2>${t('recentForm')}</h2></div>${recentMatches.slice().reverse().map(m=>{
    const h=m.homeTeam,a=m.awayTeam,hg=m.score?.fullTime?.home,ag=m.score?.fullTime?.away;
    const iH=h.id===teamId,gf=iH?hg:ag,ga=iH?ag:hg;
    const res=gf>ga?'W':gf<ga?'L':'D';const resCol=res==='W'?'var(--p)':res==='L'?'var(--red)':'var(--am)';
    return`<div style="display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid rgba(255,255,255,.04);">
      <span style="font-family:var(--M);font-size:13px;font-weight:900;color:${resCol};width:20px;">${res}</span>
      <span style="font-size:12px;color:var(--t2);flex:1;">${h.shortName||h.name} ${hg}:${ag} ${a.shortName||a.name}</span>
      <span style="font-size:11px;color:var(--t3);">${kd(m.utcDate)}</span>
    </div>`;
  }).join('')}`:'' ;

  document.getElementById('t-body').innerHTML=`
    <div class="team-hero">
      <img src="${crest}" data-id="${teamId}" onerror="imgE(this)" style="width:68px;height:68px;object-fit:contain;">
      <div class="th-info">
        <h2>${teamData.name||name}</h2>
        <p>${teamData.area?.name||''} · ${teamData.venue||''}</p>
      </div>
    </div>
    ${coach?`<div class="coach-card"><span class="coach-ico">🧑‍💼</span><div><div class="coach-nm">${coach.name}</div><div class="coach-nat">${LANG==='ko'?'감독':'Manager'} · ${coach.nationality||''}</div></div></div>`:''}
    <div class="sh"><h2>${t('squad')}</h2><span class="sh-b">${squad.length} players</span></div>
    ${squadHtml||`<div style="color:var(--t2);font-size:13px;padding:12px 0;">${t('noData')}</div>`}
    ${formHtml}`;
}

function pitchSvg(hForm,aForm,hn,an,seed){
  const pf=f=>f.split('-').map(Number);
  const hL=pf(hForm),aL=pf(aForm);
  const W=300,H=170;
  function dots(lines,isH){
    const d=[];
    const gkX=isH?20:W-20;d.push({x:gkX,y:H/2});
    const n=lines.length,span=isH?(W/2-50)/Math.max(n,1):(-(W/2-50))/Math.max(n,1);
    let cx=isH?48:W-48;
    lines.forEach(cnt=>{
      for(let i=0;i<cnt;i++)d.push({x:cx,y:(H/(cnt+1))*(i+1)});
      cx+=span;
    });
    return d;
  }
  const hD=dots(hL,true),aD=dots(aL,false);
  const circ=(d,col)=>d.map(p=>`<circle cx="${p.x.toFixed(0)}" cy="${p.y.toFixed(0)}" r="5.5" fill="${col}" opacity=".85"/>`).join('');
  return`<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:380px;display:block;margin:0 auto">
    <rect width="${W}" height="${H}" rx="8" fill="rgba(0,50,15,.7)"/>
    <rect x="2" y="2" width="${W-4}" height="${H-4}" rx="7" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="1.2"/>
    <line x1="${W/2}" y1="4" x2="${W/2}" y2="${H-4}" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
    <circle cx="${W/2}" cy="${H/2}" r="24" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
    <rect x="2" y="${H/2-26}" width="36" height="52" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="1"/>
    <rect x="${W-38}" y="${H/2-26}" width="36" height="52" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="1"/>
    ${circ(hD,'var(--p)')}${circ(aD,'var(--red)')}
    <text x="12" y="${H-6}" font-size="9" fill="rgba(255,255,255,.3)" font-family="monospace">${hForm}</text>
    <text x="${W-12}" y="${H-6}" font-size="9" fill="rgba(255,255,255,.3)" font-family="monospace" text-anchor="end">${aForm}</text>
  </svg>
  <div style="display:flex;justify-content:center;gap:14px;margin-top:7px;font-size:10px;color:rgba(255,255,255,.45)">
    <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--p);margin-right:4px;vertical-align:middle"></span>${hn}</span>
    <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);margin-right:4px;vertical-align:middle"></span>${an}</span>
  </div>`;
}

async function aiInsight(sd,hn,an,hTac,aTac,hw,aw,xgH,xgA){

    :`Football analysis (160 chars max, plain text): ${hn}(${hTac}, ${hw}% win, xG${xgH}) vs ${an}(${aTac}, ${aw}% win, xG${xgA}). Key tactical factors and predicted score.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{

    const d=await r.json();

    const html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span>🤖</span><strong style="color:var(--p)">Claude AI ${LANG==='ko'?'심층 분석':'Analysis'}</strong></div><div style="font-size:13.5px;line-height:1.8;color:rgba(255,255,255,.88)">${txt}</div>`;
    _aiIns[key]=html;el.innerHTML=html;
  }catch{
    const fb=LANG==='ko'

  }
}

  const el=document.getElementById('fan-fix');if(!el||!SEL.length){if(el)el.innerHTML=`<div style="text-align:center;padding:16px;color:var(--t2);">Select a club</div>`;return;}
  const s=SEL[0],isKL=s.league==='KL1'||s.league==='KL2';let ms=[];
  if(isKL){const lg=s.league==='KL1'?KL_LG:KL2_LG;const d=await klAPI('/fixtures',{team:s.id,league:lg,season:KL_SZ,next:5});ms=(d?.response||[]).map(f=>({_kl:true,id:f.fixture.id,utcDate:f.fixture.date,status:mapKL(f.fixture.status.short),homeTeam:{id:f.teams.home.id,name:f.teams.home.name},awayTeam:{id:f.teams.away.id,name:f.teams.away.name}}));}
  else{const d=await fd(`/teams/${s.id}/matches?status=SCHEDULED&limit=5`);ms=d?.matches||[];}
  if(!ms.length){el.innerHTML=`<div style="text-align:center;padding:16px;color:var(--t2);">${t('noFixtures')}</div>`;return;}
  el.innerHTML=ms.map(m=>{const h=m.homeTeam,a=m.awayTeam,mid=String(m.id);const done=fanData.checkins.find(c=>c.matchId===mid);const can=isMT(m);const teams=`${ev(h?.shortName||h?.name)} vs ${ev(a?.shortName||a?.name)}`;
    return`<div class="ci"><div class="ci-main"><div class="ci-teams">${teams}</div><div class="ci-meta">📅 ${kd(m.utcDate)} · ${kt(m.utcDate)} KST</div></div><button class="ci-btn" ${done||!can?'disabled':''} onclick="doCI(this,'${teams}','${kd(m.utcDate)} ${kt(m.utcDate)}','${mid}')">${done?t('done'):can?`🔥 ${t('checkIn')}`:t('notYet')}</button></div>`;
  }).join('');
}
function doCI(btn,teams,ts,mid){if(fanData.checkins.find(c=>c.matchId===mid))return;btn.disabled=true;btn.textContent=t('done');const pLv=getLv(fanData.total).lv;fanData.total++;fanData.checkins.unshift({teams,date:ts,matchId:mid});saveFan();const nLv=getLv(fanData.total);if(nLv.lv>pLv){document.getElementById('lu-em').textContent=nLv.em;document.getElementById('lu-s').textContent=`Lv.${nLv.lv} · ${nLv.n}`;const el=document.getElementById('lvup');el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),4500);}toast(`✓ ${teams} — ${t('done')}`,'var(--p)');loadFan();}

window.addEventListener('load',()=>{
  try{SEL=JSON.parse(localStorage.getItem('pi_sel')||'[]');}catch{SEL=[];}
  try{fanData=JSON.parse(localStorage.getItem('pi_fan')||'{"checkins":[],"total":0}');}catch{}
  try{watchList=JSON.parse(localStorage.getItem('pi_watch')||'[]');}catch{}
  LANG=localStorage.getItem('pi_lang')||'en';
  const label=LANG==='en'?'🇰🇷 한국어':'🇬🇧 English';
  document.getElementById('sb-lang').textContent=label;
  document.getElementById('hdr-lang').textContent=label;
  if(SEL.length){
    applyTheme(SEL[0].col);
    document.getElementById('ob').style.display='none';
    document.getElementById('app').classList.add('on');
    updateHdr();updateSbTeam();renderNav();swPage('home');
    liveTimer=setInterval(()=>{if(curPage==='home')loadLive(true);},30000);
  }else{
    document.getElementById('ob').style.display='block';
    initOb();
  }
});
