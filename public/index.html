<style>
.goal {
  animation: flash 1s ease;
}

@keyframes flash {
  0% { background: #00ff9f; }
  100% { background: #111; }
}

.popup {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:60%;
  background:#111;
  border-top:2px solid #00ff9f;
  padding:15px;
  overflow:auto;
}
</style>

<script>
let lastScores = {}; // 골 변화 감지용

async function loadLive(el) {
  setActive(el);
  const content = document.getElementById("content");
  content.innerHTML = "LIVE 불러오는중...";

  try {
    const res = await fetch(BASE + "/fixtures?live=all", {
      headers: { "x-apisports-key": API_KEY }
    });

    const data = await res.json();
    const matches = data.response;

    if (!matches.length) {
      content.innerHTML = "오늘 진행중인 경기 없음";
      return;
    }

    content.innerHTML = "";

    matches.forEach(m => {
      const id = m.fixture.id;
      const home = m.teams.home.name;
      const away = m.teams.away.name;
      const score = `${m.goals.home} : ${m.goals.away}`;
      const minute = m.fixture.status.elapsed || "진행중";
      const league = m.league.name;

      const key = id;
      const prev = lastScores[key];

      let className = "match";

      if (prev && prev !== score) {
        className += " goal"; // 골 애니메이션
      }

      lastScores[key] = score;

      content.innerHTML += `
        <div class="${className}" onclick="openMatch(${id})">
          <b>${league}</b><br>
          ${home} vs ${away}<br>
          ⏱ ${minute}분<br>
          🔴 ${score}
        </div>
      `;
    });

  } catch(e) {
    content.innerHTML = "에러 발생";
  }
}

// 🔥 상세 팝업
async function openMatch(id) {
  const popup = document.createElement("div");
  popup.className = "popup";
  popup.innerHTML = "불러오는중...";
  document.body.appendChild(popup);

  try {
    // 이벤트 (골/어시스트)
    const eventsRes = await fetch(BASE + `/fixtures/events?fixture=${id}`, {
      headers: { "x-apisports-key": API_KEY }
    });

    const eventsData = await eventsRes.json();

    // 스탯
    const statRes = await fetch(BASE + `/fixtures/statistics?fixture=${id}`, {
      headers: { "x-apisports-key": API_KEY }
    });

    const statData = await statRes.json();

    // 배당률
    const oddsRes = await fetch(BASE + `/odds?fixture=${id}`, {
      headers: { "x-apisports-key": API_KEY }
    });

    const oddsData = await oddsRes.json();

    // 🔥 AI 승부예측 (간단 로직)
    const homeGoals = statData.response?.[0]?.statistics?.[0]?.value || 0;
    const awayGoals = statData.response?.[1]?.statistics?.[0]?.value || 0;

    let prediction = "비등";
    if (homeGoals > awayGoals) prediction = "홈 우세";
    if (awayGoals > homeGoals) prediction = "원정 우세";

    // 골 이벤트
    let goals = "";
    eventsData.response.forEach(e => {
      if (e.type === "Goal") {
        goals += `
          ⚽ ${e.player.name} (${e.team.name})
          ${e.assist.name ? "🅰️ " + e.assist.name : ""}
          <br>
        `;
      }
    });

    popup.innerHTML = `
      <h3>경기 상세</h3>
      <button onclick="this.parentElement.remove()">닫기</button>
      <hr>

      <b>⚽ 득점</b><br>
      ${goals || "없음"}

      <hr>
      <b>📊 AI 예측</b><br>
      ${prediction}

      <hr>
      <b>💰 배당률</b><br>
      ${JSON.stringify(oddsData.response?.[0]?.bookmakers?.[0]?.bets?.[0]?.values || "없음")}

      <hr>
      <b>📈 스탯</b><br>
      ${JSON.stringify(statData.response || "없음")}
    `;

  } catch(e) {
    popup.innerHTML = "데이터 불러오기 실패";
  }
}
</script>
