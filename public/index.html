<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>PITCH Pro — Tactical Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010406; --bg2: #060e12; --card: rgba(10, 24, 32, 0.94);
            --p-color: #00ff87; --p-glow: rgba(0, 255, 135, 0.3);
            --t: #d0ffe8; --t2: #5a8870; --t3: #1e3d2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; overflow: hidden; height: 100vh; }
        
        /* [1] 온보딩: 팀 선택 */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .ob-header { text-align: center; padding: 30px 20px 10px; flex-shrink: 0; }
        .ob-title { font-family: 'Orbitron'; font-size: 20px; font-weight: 900; color: var(--p-color); letter-spacing: 3px; text-shadow: 0 0 15px var(--p-glow); }
        .lg-nav-ob { display: flex; overflow-x: auto; padding: 10px 15px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.03); flex-shrink: 0; gap: 8px; scrollbar-width: none; }
        .ob-tab { padding: 8px 16px; background: rgba(255,255,255,0.02); border-radius: 20px; font-family: 'Orbitron'; font-size: 10px; font-weight: 700; color: var(--t3); white-space: nowrap; cursor: pointer; }
        .ob-tab.active { background: var(--p-glow); color: var(--p-color); border: 1px solid rgba(0,255,135,0.2); }
        .ob-grid-area { flex: 1; overflow-y: auto; padding: 15px; display: none; padding-bottom: 40px; }
        .ob-grid-area.active { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; animation: fadeIn 0.4s; }
        .t-item { background: var(--bg2); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 10px 5px; text-align: center; cursor: pointer; }
        .t-item img { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; }
        .t-item div { font-size: 9px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* [2] 메인 레이아웃 */
        #main-app { display: flex; flex-direction: column; height: 100vh; }
        .topbar { height: 55px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,255,135,0.1); background: rgba(1,4,6,0.8); backdrop-filter: blur(10px); }
        .logo { font-family: 'Orbitron'; font-size: 18px; font-weight: 900; color: var(--p-color); letter-spacing: 2px; }
        
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; display: none; }
        .content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* [3] 컴포넌트 */
        .sec-ttl { font-family: 'Orbitron'; font-size: 11px; color: var(--p-color); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .sec-ttl::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--p-glow), transparent); }
        
        .acc { background: var(--bg2); border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .acc-h { padding: 12px 15px; display: flex; justify-content: space-between; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; font-weight: 700; color: var(--t2); }
        .acc-b { max-height: 0; overflow: hidden; transition: 0.3s; background: rgba(0,0,0,0.1); }
        .acc-b.open { max-height: 1000px; padding: 10px; }
        
        .m-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .m-info { flex: 1; }
        .m-team { display: flex; align-items: center; gap: 10px; font-size: 12px; margin: 4px 0; }
        .m-team img { width: 18px; height: 18px; object-fit: contain; }
        .m-score { font-family: 'Orbitron'; font-size: 16px; font-weight: 900; color: var(--p-color); margin-left: auto; }

        /* 하단 네비게이션 */
        .b-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: 75px; background: var(--bg2); display: flex; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .n-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; color: var(--t3); transition: 0.3s; }
        .n-btn.active { color: var(--p-color); text-shadow: 0 0 10px var(--p-glow); }
        .n-btn span { font-size: 8px; font-family: 'Orbitron'; font-weight: 700; }

        .hidden { display: none !important; }
        .loader { text-align: center; padding: 40px; color: var(--t3); font-family: 'Share Tech Mono'; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="ob-header">
            <div class="ob-title">SELECT CLUB</div>
            <p style="font-size:11px; color:var(--t2); margin-top:5px;">5대 리그 전체 98개 팀 중 하나를 선택하세요.</p>
        </div>
        <div class="lg-nav-ob" id="lg-nav-ob"></div>
        <div id="ob-grid-container" style="flex:1; overflow:hidden; position:relative;"></div>
    </div>

    <div id="main-app" class="hidden">
        <div class="topbar">
            <div class="logo">PITCH PRO</div>
            <div id="user-badge">⚽</div>
        </div>

        <div id="p-live" class="content active">
            <div class="sec-ttl">LIVE OPS</div>
            <div id="live-list"><div class="loader">SCANNING LIVE MATCHES...</div></div>
        </div>

        <div id="p-fix" class="content">
            <div class="sec-ttl">FIXTURES</div>
            <div id="fixture-list"></div>
        </div>

        <div id="p-tab" class="content">
            <div class="sec-ttl">LEAGUE TABLE</div>
            <div id="table-tabs" style="display:flex; overflow-x:auto; gap:8px; margin-bottom:15px; scrollbar-width:none;">
                <button class="ob-tab active" onclick="loadTable('PL', this)">EPL</button>
                <button class="ob-tab" onclick="loadTable('PD', this)">LALIGA</button>
                <button class="ob-tab" onclick="loadTable('BL1', this)">BUNDES</button>
                <button class="ob-tab" onclick="loadTable('SA', this)">SERIE A</button>
                <button class="ob-tab" onclick="loadTable('FL1', this)">LIGUE 1</button>
            </div>
            <div id="table-content"></div>
        </div>

        <div id="p-news" class="content">
            <div class="sec-ttl">NEWS FEED</div>
            <div id="news-list"></div>
        </div>

        <div class="b-nav">
            <div class="n-btn active" onclick="sw('live', this)"><i>⚡</i><span>LIVE</span></div>
            <div class="n-btn" onclick="sw('fix', this)"><i>📅</i><span>FIXTURES</span></div>
            <div class="n-btn" onclick="sw('tab', this)"><i>📊</i><span>TABLE</span></div>
            <div class="n-btn" onclick="sw('news', this)"><i>📰</i><span>NEWS</span></div>
        </div>
    </div>

    <script>
        // --- [설정] API 및 데이터 ---
        const API_KEY = '여기에_발급받은_API_KEY_입력'; 
        const BASE_URL = 'https://api.football-data.org/v4';

        const leagues = [
            { id: "PL", sn: "EPL", teams: [
                { id: 73, n: "Tottenham", c: "#ffffff" }, { id: 65, n: "Man City", c: "#6caddf" }, { id: 57, n: "Arsenal", c: "#ef0107" }, { id: 64, n: "Liverpool", c: "#e31b23" },
                { id: 66, n: "Man Utd", c: "#da291c" }, { id: 61, n: "Chelsea", c: "#034694" }, { id: 67, n: "Newcastle", c: "#ffffff" }, { id: 58, n: "Aston Villa", c: "#95bfe5" }
            ]},
            { id: "PD", sn: "LALIGA", teams: [
                { id: 86, n: "Real Madrid", c: "#ffffff" }, { id: 81, n: "Barcelona", c: "#a50044" }, { id: 78, n: "Atletico", c: "#cb3524" }, { id: 92, n: "Real Sociedad", c: "#0067b1" }
            ]},
            { id: "BL1", sn: "BUNDES", teams: [
                { id: 503, n: "FC Bayern", c: "#dc052d" }, { id: 4, n: "Dortmund", c: "#fde100" }, { id: 3, n: "Leverkusen", c: "#e32221" }, { id: 28, n: "RB Leipzig", c: "#dd013f" }
            ]}
            // ... 나머지 팀 추가 가능
        ];

        // --- [API 연동 로직] ---
        async function fetchAPI(path) {
            try {
                const response = await fetch(BASE_URL + path, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                return await response.json();
            } catch (e) { console.error("데이터 로드 실패", e); return null; }
        }

        // --- [UI 로직] ---
        const obNav = document.getElementById('lg-nav-ob');
        const obGrid = document.getElementById('ob-grid-container');

        leagues.forEach((lg, idx) => {
            const btn = document.createElement('div');
            btn.className = `ob-tab ${idx===0?'active':''}`;
            btn.innerText = lg.sn;
            btn.onclick = () => {
                document.querySelectorAll('#lg-nav-ob .ob-tab').forEach(t=>t.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.ob-grid-area').forEach(g=>g.classList.remove('active'));
                document.getElementById(`ob-g-${idx}`).classList.add('active');
            };
            obNav.appendChild(btn);

            const grid = document.createElement('div');
            grid.id = `ob-g-${idx}`;
            grid.className = `ob-grid-area ${idx===0?'active':''}`;
            lg.teams.forEach(t => {
                const item = document.createElement('div');
                item.className = 't-item';
                item.innerHTML = `<img src="https://crests.football-data.org/${t.id}.svg" onerror="this.src='https://crests.football-data.org/${t.id}.png'"><div>${t.n}</div>`;
                item.onclick = () => selectTeam(t);
                grid.appendChild(item);
            });
            obGrid.appendChild(grid);
        });

        function selectTeam(t) {
            document.documentElement.style.setProperty('--p-color', t.c);
            document.documentElement.style.setProperty('--p-glow', t.c + '44');
            document.getElementById('onboarding').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('onboarding').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                loadLiveData();
            }, 600);
        }

        function sw(p, b) {
            document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
            document.querySelectorAll('.n-btn').forEach(n=>n.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            b.classList.add('active');
            if(p === 'fix') loadFixtures();
        }

        // 라이브 데이터 호출
        async function loadLiveData() {
            const container = document.getElementById('live-list');
            const data = await fetchAPI('/matches?status=IN_PLAY');
            if(!data || !data.matches.length) {
                container.innerHTML = `<div class="loader">진행 중인 경기가 없습니다.</div>`;
                return;
            }
            container.innerHTML = data.matches.map(m => `
                <div class="acc" style="border-color: var(--p-color);">
                    <div style="padding:15px; text-align:center;">
                        <div style="font-family:'Orbitron'; font-size:10px; color:var(--p-color); margin-bottom:12px;">${m.competition.name}</div>
                        <div style="display:flex; justify-content:space-around; align-items:center;">
                            <div><img src="${m.homeTeam.crest}" width="40"><p style="font-size:10px; margin-top:5px;">${m.homeTeam.shortName}</p></div>
                            <div style="font-family:'Orbitron'; font-size:24px; font-weight:900;">${m.score.fullTime.home} : ${m.score.fullTime.away}</div>
                            <div><img src="${m.awayTeam.crest}" width="40"><p style="font-size:10px; margin-top:5px;">${m.awayTeam.shortName}</p></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 리그 순위 호출
        async function loadTable(leagueCode, btn) {
            if(btn) {
                document.querySelectorAll('#table-tabs .ob-tab').forEach(t=>t.classList.remove('active'));
                btn.classList.add('active');
            }
            const container = document.getElementById('table-content');
            container.innerHTML = `<div class="loader">LOADING STANDINGS...</div>`;
            const data = await fetchAPI(`/competitions/${leagueCode}/standings`);
            if(!data) return;
            const table = data.standings[0].table;
            container.innerHTML = `<div style="background:var(--bg2); border-radius:12px; padding:15px; font-family:'Share Tech Mono'; font-size:11px; border:1px solid rgba(255,255,255,0.05);">
                <div style="display:flex; color:var(--t2); margin-bottom:10px;"><span style="width:30px;">#</span><span style="flex:1;">CLUB</span><span>PTS</span></div>
                ${table.map(row => `
                    <div style="display:flex; margin-bottom:8px; align-items:center;">
                        <span style="width:30px; color:${row.position<=4?'var(--p-color)':'var(--t3)'}">${row.position}</span>
                        <span style="flex:1; display:flex; align-items:center; gap:8px;"><img src="${row.team.crest}" width="14">${row.team.shortName}</span>
                        <span>${row.points}</span>
                    </div>
                `).join('')}
            </div>`;
        }

        async function loadFixtures() {
            const container = document.getElementById('fixture-list');
            container.innerHTML = `<div class="loader">LOADING FIXTURES...</div>`;
            const data = await fetchAPI('/matches'); // 오늘자 일정
            // ... 일정 렌더링 로직 추가
        }
    </script>
</body>
</html>
