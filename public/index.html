<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>PITCH Pro — Tactical Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #010406; --bg2: #060e12; --card: rgba(16, 26, 33, 0.98);
            --p-color: #00ff87; --p-glow: rgba(0, 255, 135, 0.4);
            --t: #d0ffe8; --t2: #5a8870; --t3: #1e3d2e;
            --accent: #ffb800; --red: #ff3b5c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; overflow: hidden; height: 100vh; position: relative; }

        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(1,4,6,0.9); border-bottom: 1px solid rgba(0,255,135,0.1); z-index: 100; }
        .container { flex: 1; overflow-y: auto; padding: 15px; display: none; padding-bottom: 100px; height: calc(100vh - 135px); }
        .container.active { display: block; animation: slideUp 0.4s ease; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: 75px; background: var(--bg2); display: flex; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--t3); gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--p-color); }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 8px; font-weight: 700; font-family: 'Orbitron'; }

        .card { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .match-card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .m-row { display: flex; align-items: center; justify-content: space-between; text-align: center; }
        .m-team img { width: 35px; height: 35px; margin-bottom: 8px; }
        .m-score { font-family: 'Orbitron'; font-size: 28px; font-weight: 900; width: 80px; }

        /* Standing Table */
        .std-table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono'; font-size: 11px; margin-top: 10px; }
        .std-table th { background: var(--t3); color: var(--p-color); padding: 8px; text-align: left; }
        .std-table td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .my-team-row { background: var(--p-glow); color: #fff; font-weight: 900; }

        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; transition: 0.8s; }
        .ob-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; flex: 1; overflow-y: auto; }
        .t-card { background: var(--bg2); padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loading-spin { width: 30px; height: 30px; border: 3px solid var(--t3); border-top-color: var(--p-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="onboarding">
        <div style="text-align:center; padding:50px 20px;">
            <h1 style="font-family:'Orbitron'; color:var(--p-color); letter-spacing:3px;">PITCH PRO</h1>
            <p style="color:var(--t2); font-size:11px; margin-top:10px;">팀을 선택하면 CORS 프록시를 통해 데이터를 동기화합니다.</p>
        </div>
        <div class="ob-grid">
            <div class="t-card" onclick="selectTeam(73, 'PL', '#ffffff')"><img src="https://crests.football-data.org/73.svg"><div>Tottenham</div></div>
            <div class="t-card" onclick="selectTeam(86, 'PD', '#ffffff')"><img src="https://crests.football-data.org/86.svg"><div>Real Madrid</div></div>
            <div class="t-card" onclick="selectTeam(65, 'PL', '#6caddf')"><img src="https://crests.football-data.org/65.svg"><div>Man City</div></div>
            <div class="t-card" onclick="selectTeam(503, 'BL1', '#dc052d')"><img src="https://crests.football-data.org/503.svg"><div>Bayern</div></div>
            <div class="t-card" onclick="selectTeam(524, 'FL1', '#004170')"><img src="https://crests.football-data.org/524.svg"><div>PSG</div></div>
            <div class="t-card" onclick="selectTeam(108, 'SA', '#0066b2')"><img src="https://crests.football-data.org/108.svg"><div>Inter Milan</div></div>
        </div>
    </div>

    <div id="app" style="display:none; flex-direction:column; height:100vh;">
        <header class="header">
            <div style="font-family:'Orbitron'; font-weight:900; color:var(--p-color); letter-spacing:1px;">PITCH PRO</div>
            <div id="user-club-logo"></div>
        </header>

        <main id="view-lives" class="container active"><div id="live-feed"></div></main>
        <main id="view-schedule" class="container"><div id="schedule-feed"></div></main>
        <main id="view-data" class="container">
            <div style="font-family:'Orbitron'; font-size:11px; color:var(--p-color); margin-bottom:12px;">LEAGUE STANDINGS</div>
            <div id="standing-feed"></div>
        </main>
        <main id="view-stadium" class="container">
            <div class="card" style="background:linear-gradient(135deg, var(--card), var(--bg2));">
                <div style="font-family:'Orbitron'; font-size:20px; color:var(--p-color);" id="user-rank">방구석 퍼거슨</div>
                <button onclick="checkIn()" style="width:100%; padding:15px; background:var(--p-color); border:none; border-radius:12px; font-weight:900; font-family:'Orbitron'; margin-top:15px;">STADIUM CHECK-IN</button>
            </div>
            <div id="stadium-list"></div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="sw('lives', this)"><i class="fa-solid fa-bolt"></i><span>LIVES</span></div>
            <div class="nav-item" onclick="sw('schedule', this)"><i class="fa-solid fa-calendar"></i><span>SCHEDULE</span></div>
            <div class="nav-item" onclick="sw('data', this)"><i class="fa-solid fa-table-list"></i><span>TABLE</span></div>
            <div class="nav-item" onclick="sw('stadium', this)"><i class="fa-solid fa-stadium"></i><span>STADIUM</span></div>
        </nav>
    </div>

    <script>
        const API_KEY = 'b00e3059f51741b7add3fcaab7eaadf0';
        let myTeamId = null;
        let myLeagueCode = '';

        // CORS 우회 함수
        async function fetchProxy(path) {
            const targetUrl = `https://api.football-data.org/v4${path}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
            
            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                // allorigins는 결과값을 문자열로 반환하므로 JSON.parse 필요
                return JSON.parse(data.contents);
            } catch (e) {
                console.error("CORS Proxy Error:", e);
                return null;
            }
        }

        function selectTeam(id, league, color) {
            myTeamId = id;
            myLeagueCode = league;
            document.documentElement.style.setProperty('--p-color', color);
            document.getElementById('user-club-logo').innerHTML = `<img src="https://crests.football-data.org/${id}.svg" width="25">`;
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            
            loadLives();
            loadStandings();
            loadSchedule();
        }

        async function loadLives() {
            const feed = document.getElementById('live-feed');
            feed.innerHTML = '<div class="loading-spin"></div>';
            const res = await fetchProxy('/matches?status=IN_PLAY');
            
            if (!res || !res.matches || res.matches.length === 0) {
                feed.innerHTML = '<div style="text-align:center; padding:50px; color:var(--t3);">NO LIVE MATCHES</div>';
                return;
            }

            feed.innerHTML = res.matches.map(m => `
                <div class="match-card">
                    <div style="font-size:9px; color:var(--p-color); font-family:'Orbitron'; margin-bottom:10px;">⚡ ${m.competition.name}</div>
                    <div class="m-row">
                        <div class="m-team"><img src="${m.homeTeam.crest}"><div>${m.homeTeam.shortName}</div></div>
                        <div class="m-score">${m.score.fullTime.home} : ${m.score.fullTime.away}</div>
                        <div class="m-team"><img src="${m.awayTeam.crest}"><div>${m.awayTeam.shortName}</div></div>
                    </div>
                </div>
            `).join('');
        }

        async function loadStandings() {
            const feed = document.getElementById('standing-feed');
            feed.innerHTML = '<div class="loading-spin"></div>';
            const res = await fetchProxy(`/competitions/${myLeagueCode}/standings`);
            
            if (!res || !res.standings) return;
            const table = res.standings[0].table;

            feed.innerHTML = `
                <table class="std-table">
                    <tr><th>#</th><th>CLUB</th><th>MP</th><th>GD</th><th>PTS</th></tr>
                    ${table.map(r => `
                        <tr class="${r.team.id === myTeamId ? 'my-team-row' : ''}">
                            <td>${r.position}</td>
                            <td style="display:flex; align-items:center; gap:8px;"><img src="${r.team.crest}" width="15">${r.team.shortName}</td>
                            <td>${r.playedGames}</td>
                            <td>${r.goalDifference}</td>
                            <td style="color:var(--p-color); font-weight:900;">${r.points}</td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }

        async function loadSchedule() {
            const feed = document.getElementById('schedule-feed');
            const res = await fetchProxy(`/teams/${myTeamId}/matches?status=SCHEDULED&limit=3`);
            if (res && res.matches) {
                feed.innerHTML = res.matches.map(m => `
                    <div class="card">
                        <div style="font-size:9px; color:var(--t2); margin-bottom:10px;">${new Date(m.utcDate).toLocaleDateString()}</div>
                        <div class="m-row">
                            <div class="m-team"><div>${m.homeTeam.shortName}</div></div>
                            <div style="font-family:'Orbitron'; font-size:12px; color:var(--p-color);">VS</div>
                            <div class="m-team"><div>${m.awayTeam.shortName}</div></div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function sw(id, btn) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            btn.classList.add('active');
        }

        function checkIn() {
            const list = document.getElementById('stadium-list');
            const div = document.createElement('div');
            div.style.cssText = "background:var(--bg2); padding:12px; border-radius:12px; margin-bottom:10px; border-left:3px solid var(--p-color); display:flex; justify-content:space-between; align-items:center;";
            div.innerHTML = `<div><div style="font-size:10px; color:var(--t2);">${new Date().toLocaleDateString()}</div><div style="font-size:13px; font-weight:700;">직관 인증 성공</div></div><div style="color:var(--p-color); font-family:'Orbitron'; font-size:9px;">VERIFIED</div>`;
            list.prepend(div);
        }
    </script>
</body>
</html>
