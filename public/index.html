<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>PITCH Pro — Club Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010406; --bg2: #060e12; --card: rgba(10, 24, 32, 0.8);
            --p-color: #00ff87; /* 기본 그린, 선택 시 변경 */
            --p-glow: rgba(0, 255, 135, 0.3);
            --t: #d0ffe8; --t2: #5a8870; --t3: #1e3d2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); font-family: 'Noto Sans KR', sans-serif; max-width: 480px; margin: 0 auto; overflow: hidden; height: 100vh; position: relative; }
        
        /* --- [1] 온보딩: 전체 화면 --- */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .ob-header { text-align: center; padding: 30px 20px 10px 20px; flex-shrink: 0; }
        .ob-title { font-family: 'Orbitron'; font-size: 20px; font-weight: 900; color: var(--p-color); letter-spacing: 3px; text-shadow: 0 0 15px var(--p-glow); }
        .ob-sub { color: var(--t2); font-size: 11px; margin-top: 5px; }

        /* --- [2] 리그 선택 탭 --- */
        .lg-nav { display: flex; overflow-x: auto; padding: 10px 15px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.03); flex-shrink: 0; gap: 5px; }
        .lg-tab { padding: 8px 15px; background: rgba(255,255,255,0.02); border-radius: 20px; font-family: 'Orbitron'; font-size: 10px; font-weight: 700; color: var(--t3); white-space: nowrap; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .lg-tab.active { background: var(--p-glow); color: var(--p-color); border-color: rgba(0,255,135,0.2); box-shadow: 0 0 10px var(--p-glow); }

        /* --- [3] 팀 그리드 영역 (스크롤) --- */
        .team-content-clip { flex: 1; overflow: hidden; position: relative; }
        .team-grid-container { position: absolute; inset: 0; overflow-y: auto; padding: 15px; padding-bottom: 40px; display: none; opacity: 0; transition: opacity 0.3s; }
        .team-grid-container.active { display: block; opacity: 1; }
        .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        /* --- [4] 고화질 팀 카드 디자인 --- */
        .t-item { 
            background: var(--bg2); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; 
            padding: 12px 5px; text-align: center; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            aspect-ratio: 1 / 1.1; transition: all 0.2s ease-out; 
        }
        /* 고화질 SVG 엠블럼을 위한 설정 */
        .t-item img { width: 100%; max-width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 0 4px rgba(0,0,0,0.3)); transition: 0.2s; }
        .t-item div { font-size: 9px; font-weight: 500; color: #fff; line-height: 1.2; word-break: keep-all; }
        
        /* 터치 피드백 강화 */
        .t-item:active { transform: scale(0.95); background: rgba(255,255,255,0.05); }
        .t-item.selected { border-color: var(--p-color); background: var(--p-bg); box-shadow: 0 0 15px var(--p-glow); }
        .t-item.selected img { transform: scale(1.1); filter: drop-shadow(0 0 8px var(--p-glow)); }

        /* 앱 메인 (숨김 처리) */
        #main-app { padding: 20px; text-align: center; padding-top: 100px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="ob-header">
            <div class="ob-title">SELECT YOUR CLUB</div>
            <p class="ob-sub">유럽 5대 리그 전체 98개 팀 중 하나를 선택하세요.<br>팀 컬러에 맞춰 앱 테마가 자동 적용됩니다.</p>
        </div>

        <div class="lg-nav" id="league-nav">
            </div>

        <div class="team-content-clip" id="team-content-area">
            </div>
    </div>

    <div id="main-app" class="hidden">
        <h1 style="color: var(--p-color); font-family: 'Orbitron';">PITCH PRO</h1>
        <p style="margin-top: 20px;">팀 선택 완료! 메인 화면이 여기에 구성됩니다.</p>
        <button onclick="location.reload()" style="margin-top: 30px; padding: 10px 20px; background: var(--p-color); border: none; border-radius: 8px; font-family:'Orbitron'; font-weight:900;">RESET</button>
    </div>

    <script src="https://fastly.jsdelivr.net/gh/bricu/football-data/teams_full.js"></script>
    <script>
        // 위 script에서 `teamsData` 변수를 가져옴 (98개 팀 데이터 포함)

        const navContainer = document.getElementById('league-nav');
        const contentArea = document.getElementById('team-content-area');

        // [1] 데이터 기반 UI 초기화
        function initUI() {
            teamsData.forEach((league, index) => {
                // 1. 탭 생성
                const tab = document.createElement('div');
                tab.className = `lg-tab ${index === 0 ? 'active' : ''}`;
                tab.innerText = league.sn; // 짧은 이름 (EPL, LALIGA 등)
                tab.onclick = () => switchLeague(index);
                navContainer.appendChild(tab);

                // 2. 팀 그리드 컨테이너 생성
                const gridCont = document.createElement('div');
                gridCont.id = `league-grid-${index}`;
                gridCont.className = `team-grid-container ${index === 0 ? 'active' : ''}`;
                
                const grid = document.createElement('div');
                grid.className = 'team-grid';

                // 3. 팀 아이템 생성 (고화질 SVG 링크 사용)
                league.teams.forEach(team => {
                    const item = document.createElement('div');
                    item.className = 't-item';
                    item.innerHTML = `
                        <img src="https://crests.football-data.org/${team.id}.svg" loading="lazy" alt="${team.n}">
                        <div>${team.n}</div>
                    `;
                    item.onclick = () => finalizeSelection(team, item);
                    grid.appendChild(item);
                });

                gridCont.appendChild(grid);
                contentArea.appendChild(gridCont);
            });
        }

        // [2] 리그 탭 전환 로직
        function switchLeague(index) {
            // 탭 활성화 변경
            document.querySelectorAll('.lg-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.lg-tab')[index].classList.add('active');

            // 그리드 콘텐츠 변경
            document.querySelectorAll('.team-grid-container').forEach(c => c.classList.remove('active'));
            document.getElementById(`league-grid-${index}`).classList.add('active');
            
            // 스크롤 맨 위로
            document.getElementById(`league-grid-${index}`).scrollTop = 0;
        }

        // [3] 최종 팀 선택 및 테마 적용
        function finalizeSelection(team, itemElement) {
            // 선택 시각 효과
            itemElement.classList.add('selected');

            // 팀 컬러 테마 적용 (팀 데이터에 c: 컬러 포함됨)
            const teamColor = team.c || '#00ff87'; // 컬러 데이터가 없으면 기본 그린
            document.documentElement.style.setProperty('--p-color', teamColor);
            document.documentElement.style.setProperty('--p-glow', teamColor + '33');
            document.documentElement.style.setProperty('--p-bg', teamColor + '11');

            // 온보딩 종료 애니메이션 및 메인 앱 노출
            const ob = document.getElementById('onboarding');
            ob.style.transform = 'translateY(-100%)';
            
            setTimeout(() => {
                ob.classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            }, 600);
        }

        // 앱 시작
        initUI();
    </script>
</body>
</html>
