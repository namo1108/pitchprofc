<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PITCH IN · Live Football Intelligence</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2303050a'/%3E%3Ccircle cx='32' cy='32' r='24' fill='none' stroke='%2310b981' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='32' r='8' fill='none' stroke='%2310b981' stroke-width='1.5' opacity='.5'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial Black' font-weight='900' font-size='22' fill='%2310b981'%3EP%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --p:#10b981;--p2:#059669;--ps:rgba(16,185,129,.09);--pb:rgba(16,185,129,.24);
  --bg:#03050a;--bg2:#070a12;--bg3:#0c1020;--card:rgba(255,255,255,.032);--card2:rgba(255,255,255,.058);
  --bd:rgba(255,255,255,.068);--bd2:rgba(255,255,255,.14);
  --t:#f1f5f9;--t2:#94a3b8;--t3:#475569;
  --red:#f43f5e;--am:#f59e0b;--blue:#3b82f6;--purp:#a78bfa;--cyan:#22d3ee;
  --r:16px;--r2:22px;--r3:28px;
  --nav:66px;
  --F:'Syne',sans-serif;--B:'DM Sans',sans-serif;--M:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--B);overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ══ ONBOARDING ══ */
#ob{position:fixed;inset:0;background:var(--bg);z-index:9999;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background-image:radial-gradient(ellipse 90% 50% at 50% -5%,rgba(16,185,129,.13),transparent 70%),
    radial-gradient(ellipse 50% 35% at 95% 95%,rgba(59,130,246,.08),transparent)}
.ob-wrap{max-width:1140px;margin:0 auto;padding:68px 24px 160px}

/* Hero */
.ob-hero{text-align:center;margin-bottom:56px}
.ob-logo-mark{position:relative;display:inline-block;margin-bottom:28px}
.ob-logo-ring{width:80px;height:80px;border:2px solid rgba(16,185,129,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;position:relative}
.ob-logo-ring::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(16,185,129,.12)}
.ob-logo-ring::after{content:'';position:absolute;inset:6px;border-radius:50%;border:1px dashed rgba(16,185,129,.2);animation:obSpin 20s linear infinite}
@keyframes obSpin{to{transform:rotate(360deg)}}
.ob-logo-p{font-family:var(--F);font-size:36px;font-weight:800;color:var(--p);line-height:1}
.ob-title{font-family:var(--F);font-size:64px;font-weight:800;letter-spacing:-3px;line-height:.95;
  background:linear-gradient(150deg,#fff 30%,rgba(255,255,255,.4) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px}
.ob-kicker{font-size:12px;font-weight:700;letter-spacing:5px;color:var(--p);text-transform:uppercase;margin-bottom:18px}
.ob-sub{font-size:15px;color:var(--t2);font-weight:500;line-height:1.65;max-width:460px;margin:0 auto 28px}
.ob-sel-row{display:inline-flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--bd2);border-radius:100px;padding:9px 20px}
.ob-sel-label{font-size:12px;font-weight:700;color:var(--t2)}
.ob-sel-dots{display:flex;gap:5px}
.ob-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--bd2);transition:.3s}
.ob-dot.on{background:var(--p);border-color:var(--p);box-shadow:0 0 10px rgba(16,185,129,.6)}
.ob-count{font-size:13px;font-weight:800;color:var(--p);min-width:26px;text-align:center}

/* League tabs */
.ob-tabs{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;justify-content:center;flex-wrap:wrap;margin-bottom:32px;padding:2px 0}
.ob-tabs::-webkit-scrollbar{display:none}
.ob-tab{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:100px;border:1.5px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--B);font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:.2s;flex-shrink:0}
.ob-tab img{width:17px;height:17px;object-fit:contain}
.ob-tab:hover{border-color:var(--bd2);color:var(--t)}
.ob-tab.on{background:rgba(255,255,255,.07);color:var(--t);border-color:var(--bd2)}

/* Team grid */
.ob-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:9px}
@media(min-width:640px){.ob-grid{grid-template-columns:repeat(auto-fill,minmax(118px,1fr))}}
@media(max-width:420px){.ob-grid{grid-template-columns:repeat(4,1fr)}}

.ob-card{position:relative;border-radius:var(--r2);border:1.5px solid var(--bd);background:var(--card);padding:20px 8px 14px;text-align:center;cursor:pointer;transition:all .22s;overflow:hidden;--tc:var(--p)}
.ob-card::before{content:'';position:absolute;inset:0;background:var(--tc);opacity:0;transition:opacity .22s}
.ob-card:hover{border-color:rgba(255,255,255,.18);transform:translateY(-3px)}
.ob-card:hover::before{opacity:.06}
.ob-card.sel{border-color:var(--tc);transform:translateY(-5px);box-shadow:0 14px 30px rgba(0,0,0,.45),0 0 0 1px var(--tc)}
.ob-card.sel::before{opacity:.1}
.ob-card.sel .ob-tick{opacity:1;transform:scale(1)}

.ob-tick{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;background:var(--tc);display:flex;align-items:center;justify-content:center;font-size:10px;color:#000;font-weight:900;opacity:0;transform:scale(0);transition:.22s;z-index:2}
.ob-crest{width:50px;height:50px;margin:0 auto 11px;position:relative;z-index:1}
.ob-crest img{width:100%;height:100%;object-fit:contain}
.ob-nm{font-size:11px;font-weight:700;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;position:relative;z-index:1;transition:color .2s}
.ob-card.sel .ob-nm{color:var(--t);font-weight:800}

/* Footer */
.ob-footer{position:fixed;bottom:0;left:0;right:0;padding:20px 24px max(20px,env(safe-area-inset-bottom));
  background:linear-gradient(to top,var(--bg) 72%,transparent);text-align:center;z-index:10}
.ob-start{display:inline-flex;align-items:center;justify-content:center;gap:10px;
  padding:17px 48px;border-radius:100px;border:none;
  background:linear-gradient(135deg,var(--p),var(--p2));color:#000;
  font-family:var(--F);font-weight:800;font-size:16px;letter-spacing:.5px;cursor:pointer;
  box-shadow:0 6px 28px rgba(16,185,129,.38);transition:all .22s;max-width:480px;width:100%}
.ob-start:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(16,185,129,.48)}
.ob-start:disabled{opacity:.32;cursor:not-allowed;transform:none;box-shadow:none}

/* ══ APP ══ */
#app{display:none;height:100vh;height:100dvh}
#app.on{display:flex}

/* Sidebar */
.sidebar{width:254px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);
  padding:26px 13px;display:flex;flex-direction:column;overflow-y:auto}
@media(max-width:1280px){.sidebar{width:72px}.nav-lbl{display:none}.sl-full{display:none!important}.sl-sm{display:flex!important}}
@media(max-width:768px){.sidebar{display:none!important}.bnav{display:flex!important}}

.sl-full{font-family:var(--F);font-size:20px;font-weight:800;color:var(--t);letter-spacing:-.3px;
  padding:0 9px;margin-bottom:38px;cursor:pointer;display:flex;align-items:center;gap:8px}
.sl-full-dot{width:8px;height:8px;border-radius:50%;background:var(--p);box-shadow:0 0 8px var(--p)}
.sl-sm{font-family:var(--F);font-size:20px;font-weight:800;color:var(--p);
  padding:0 9px;margin-bottom:34px;cursor:pointer;display:none;align-items:center;justify-content:center}
.nav-sect{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:2.5px;text-transform:uppercase;padding:0 10px;margin:18px 0 6px}
.nav-it{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:14px;cursor:pointer;
  color:var(--t2);font-weight:600;font-size:14px;transition:.18s;margin-bottom:2px;border:1px solid transparent;position:relative}
.nav-it:hover{color:var(--t);background:rgba(255,255,255,.04)}
.nav-it.on{background:var(--ps);color:var(--p);border-color:var(--pb)}
.nav-ico{font-size:17px;width:20px;text-align:center;flex-shrink:0}
.nav-live-pip{width:6px;height:6px;border-radius:50%;background:var(--red);margin-left:auto;animation:pip 1s infinite}
@keyframes pip{0%,100%{opacity:1}50%{opacity:.2}}
.nav-badge{font-size:10px;background:rgba(244,63,94,.15);color:var(--red);border:1px solid rgba(244,63,94,.25);padding:2px 7px;border-radius:100px;margin-left:auto;font-weight:800}

/* Sidebar bottom team */
.sb-team-area{margin-top:auto;padding-top:16px;border-top:1px solid var(--bd)}
.sb-team-row{display:flex;align-items:center;gap:10px;padding:10px 6px;cursor:pointer;border-radius:12px;transition:background .15s}
.sb-team-row:hover{background:rgba(255,255,255,.04)}
.sb-team-row img{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.sb-team-info .tn{font-size:13px;font-weight:800;color:var(--t)}
.sb-team-info .tl{font-size:11px;color:var(--t2)}
.sb-change{width:100%;margin-top:8px;padding:9px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--B);transition:.15s;text-align:center}
.sb-change:hover{border-color:var(--bd2);color:var(--t)}

/* Main */
.main-col{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;
  background:radial-gradient(ellipse 80% 40% at 0% -10%,rgba(16,185,129,.07),transparent 60%)}

/* Header */
.hdr{height:64px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;background:rgba(3,5,10,.88);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bd);z-index:100}
@media(max-width:768px){.hdr{padding:0 16px;height:56px}}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-logo{font-family:var(--F);font-size:18px;font-weight:800;color:var(--t);letter-spacing:-.3px;display:none}
@media(max-width:768px){.hdr-logo{display:block}}
.live-pill{display:none;align-items:center;gap:6px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);border-radius:100px;padding:5px 12px}
.live-pill.show{display:flex}
.l-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pip 1s infinite}
.live-pill span{font-size:11px;font-weight:800;color:var(--red);letter-spacing:.5px}
.hdr-r{display:flex;align-items:center;gap:9px}
.hdr-teams{display:flex;gap:7px}
.hdr-team-pill{display:flex;align-items:center;gap:7px;background:var(--ps);border:1.5px solid var(--pb);border-radius:100px;padding:6px 14px 6px 7px;cursor:pointer;transition:all .15s}
.hdr-team-pill:hover{background:var(--pb)}
.hdr-team-pill img{width:20px;height:20px;object-fit:contain}
.hdr-team-pill span{font-size:12px;font-weight:800;color:var(--p)}
.hdr-pro{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--p);background:var(--ps);border:1px solid var(--pb);border-radius:100px;padding:5px 12px}

/* Scroll wrap */
.pg-wrap{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pg{padding:28px 30px;max-width:1000px;margin:0 auto;animation:pgIn .2s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.pg{padding:18px 16px 88px}}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(3,5,10,.95);
  backdrop-filter:blur(24px);border-top:1px solid var(--bd);
  display:none;justify-content:space-around;align-items:center;z-index:1000;
  padding-bottom:env(safe-area-inset-bottom,0)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  border:none;background:none;cursor:pointer;font-family:var(--B);padding:8px 4px}
.bn-i{font-size:21px;line-height:1;transition:transform .15s}
.bn-l{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.3px}
.bn.on .bn-l{color:var(--p)}
.bn.on .bn-i{transform:scale(1.12)}

/* ══ COMPONENTS ══ */

/* Section header */
.sh{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.sh::before{content:'';width:3px;height:22px;background:linear-gradient(var(--p),rgba(16,185,129,.3));border-radius:2px;flex-shrink:0}
.sh h2{font-family:var(--F);font-size:21px;font-weight:800;letter-spacing:-.4px}
.sh-badge{font-size:11px;font-weight:700;color:var(--t2);background:rgba(255,255,255,.05);border:1px solid var(--bd);padding:4px 12px;border-radius:100px;margin-left:auto;white-space:nowrap}

/* Pill tabs */
.ptabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:20px;padding:2px 0}
.ptabs::-webkit-scrollbar{display:none}
.ptab{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--B);font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:.18s}
.ptab img{width:15px;height:15px;object-fit:contain}
.ptab:hover{border-color:var(--bd2);color:var(--t)}
.ptab.on{background:rgba(255,255,255,.07);color:var(--t);border-color:var(--bd2)}
.ptab.on-g{background:var(--p);color:#000;border-color:var(--p)}

/* Match group */
.mg{background:var(--card2);border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden;margin-bottom:14px;transition:border-color .15s}
.mg:hover{border-color:var(--bd2)}
.mg-head{display:flex;align-items:center;gap:9px;padding:10px 18px;border-bottom:1px solid var(--bd);background:rgba(255,255,255,.02)}
.mg-head img{width:16px;height:16px;object-fit:contain;opacity:.75}
.mg-head .lg-name{font-size:11px;font-weight:800;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;flex:1}
.mg-head .live-cnt{font-size:10px;font-weight:900;color:var(--red);background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.2);padding:2px 8px;border-radius:100px}

.mr{display:flex;align-items:center;padding:13px 18px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s;gap:10px;position:relative}
.mr:last-child{border-bottom:none}
.mr:hover{background:rgba(255,255,255,.024)}
.mr.my{border-left:2.5px solid var(--p);padding-left:15.5px}
.mr.live-row{background:rgba(244,63,94,.025)}

/* Time col */
.mt{width:42px;flex-shrink:0}
.mt-time{font-size:12px;font-weight:800;color:var(--t2);line-height:1.3}
.mt-time.live{color:var(--p)}
.mt-time.ft{color:var(--t3)}
.mt-min{font-size:10px;color:var(--t3);margin-top:2px}

/* Teams */
.mb{flex:1;min-width:0}
.ml{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ml:last-child{margin-bottom:0}
.mc2{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.mc2 img{width:18px;height:18px;object-fit:contain;flex-shrink:0}
.mn{font-size:14px;font-weight:700;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mn.d{color:var(--t2)}
.msv{font-family:var(--M);font-weight:800;font-size:15px;color:var(--t);flex-shrink:0;margin-left:8px}
.msv.w{color:var(--p)}

/* Actions */
.ma{flex-shrink:0;display:flex;align-items:center;gap:7px;margin-left:6px}
.nb{padding:5px 9px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:11px;cursor:pointer;font-family:var(--B);font-weight:700;transition:.15s}
.nb.on{background:var(--ps);border-color:var(--pb);color:var(--p)}
.nb:hover:not(.on){border-color:var(--bd2);color:var(--t2)}

/* Odds bar */
.odds-bar{display:flex;gap:4px;margin-top:8px;padding-top:7px;border-top:1px solid rgba(255,255,255,.045)}
.ob2{flex:1;text-align:center;background:rgba(255,255,255,.03);border-radius:8px;padding:5px 3px}
.ob-l{font-size:9px;color:var(--t3);font-weight:700;margin-bottom:2px}
.ob-v{font-family:var(--M);font-size:13px;font-weight:800;color:var(--t)}
.ob-v.fav{color:var(--p)}

/* Standings */
.std-scroll{overflow-x:auto}
.std-tbl{width:100%;border-collapse:separate;border-spacing:0 5px;min-width:580px}
.std-tbl th{padding:9px 13px;text-align:center;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;font-weight:800}
.std-tbl th:nth-child(2){text-align:left;min-width:160px}
.std-tbl td{padding:12px 13px;background:rgba(255,255,255,.025);text-align:center;font-size:13.5px;font-weight:700;transition:background .15s}
.std-tbl td:nth-child(2){text-align:left}
.std-tbl td:first-child{border-radius:14px 0 0 14px}
.std-tbl td:last-child{border-radius:0 14px 14px 0}
.std-tbl tr:hover td{background:rgba(255,255,255,.04)}
.std-tbl tr.my td{background:rgba(16,185,129,.06)!important}
.zone-cl td:first-child{border-left:2.5px solid var(--blue)}
.zone-el td:first-child{border-left:2.5px solid var(--am)}
.zone-ecl td:first-child{border-left:2.5px solid var(--purp)}
.zone-rel td:first-child{border-left:2.5px solid var(--red)}
.pos{font-weight:900;font-size:14px}
.pos.cl{color:var(--blue)}.pos.el{color:var(--am)}.pos.rel{color:var(--red)}
.cc{display:flex;align-items:center;gap:9px}
.cc img{width:22px;height:22px;object-fit:contain;flex-shrink:0}
.pts{font-family:var(--M);font-size:16px;font-weight:900;color:var(--p)}
.gd{color:var(--t2);font-size:13px}
.frm{display:flex;gap:3px;justify-content:center}
.fd{width:7px;height:7px;border-radius:50%}

/* Standings legend */
.std-legend{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap}
.std-leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);font-weight:600}
.leg-dot{width:3px;height:14px;border-radius:2px}

/* Players */
.pr{display:flex;align-items:center;gap:13px;padding:15px 18px;background:var(--card2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:8px;transition:border-color .15s}
.pr:hover{border-color:var(--bd2)}
.pr.my{border-color:var(--pb);background:var(--ps)}
.prk{font-family:var(--F);font-size:19px;font-weight:800;color:var(--t3);width:30px;text-align:center;flex-shrink:0}
.prk.g{color:#fbbf24}.prk.s{color:#94a3b8}.prk.b{color:#cd7c3e}
.pr-ci{width:34px;height:34px;object-fit:contain;flex-shrink:0;border-radius:8px}
.pr-info{flex:1;min-width:0}
.pr-name{font-size:15px;font-weight:800;color:var(--t);margin-bottom:2px}
.pr-club{font-size:12px;color:var(--t2)}
.pr-val{font-family:var(--M);font-size:28px;font-weight:900;color:var(--p);line-height:1}
.pr-lbl{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:1px;text-align:right;margin-top:2px}

/* AI Cards */
.ai-card{background:linear-gradient(155deg,#0d1a14 0%,#060c11 100%);border:1px solid var(--pb);border-radius:var(--r3);padding:28px;margin-bottom:18px;position:relative;overflow:hidden}
.ai-card::after{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(var(--p),transparent 70%);opacity:.06;pointer-events:none}
.ai-chip{display:inline-flex;align-items:center;gap:6px;background:var(--p);color:#000;padding:5px 13px;border-radius:100px;font-size:10px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px}
.ai-match-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:24px}
.ai-club{text-align:center;flex:1}

.as label{font-size:10px;color:var(--t2);font-weight:800;text-transform:uppercase;letter-spacing:1px}

.tac-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:16px 0}
.tc{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:14px;padding:15px}

.tc-note{font-size:12px;color:var(--t2);line-height:1.5}
.ai-insight{background:rgba(255,255,255,.03);border-left:3px solid var(--p);border-radius:0 14px 14px 0;padding:17px 18px;margin-top:18px;font-size:14px;line-height:1.8;color:rgba(255,255,255,.82)}

.fz-em{font-size:56px;display:block;margin-bottom:10px}
.fz-lv{font-family:var(--F);font-size:26px;font-weight:800;color:var(--p);margin-bottom:5px}
.fz-desc{font-size:14px;color:var(--t2);font-weight:600;margin-bottom:22px}

function gc(k, ttl=90000) { const c=_cache[k]; return c && Date.now()-c.ts<ttl ? c.d : null; }
function sc(k, d) { _cache[k]={d,ts:Date.now()}; }

const kn  = () => new Date(Date.now() + 9*3600000);
const ds  = d  => `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
const pad = n  => String(n).padStart(2,'0');
const kt  = u  => { if(!u) return '--:--'; const k=new Date(new Date(u).getTime()+9*3600000); return `${pad(k.getUTCHours())}:${pad(k.getUTCMinutes())}`; };
const kd  = u  => { if(!u) return ''; const k=new Date(new Date(u).getTime()+9*3600000); return `${k.getUTCMonth()+1}/${k.getUTCDate()}(${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][k.getUTCDay()]})`; };
const addDays = (s,n) => { const d=new Date(s+'T12:00:00Z'); d.setUTCDate(d.getUTCDate()+n); return ds(d); };
const isKstDate = (u,s) => { if(!u||!s) return false; const k=new Date(new Date(u).getTime()+9*3600000); return ds(k)===s; };
const isKstToday = u => isKstDate(u, ds(kn()));
const isLive = m => ['IN_PLAY','PAUSED','HALFTIME','EXTRA_TIME','PENALTY_SHOOTOUT'].includes(m.status);

// ── API ──
let _fdQ = Promise.resolve(), _fdLast = 0;
async function fd(path, ttl=90000) {
  const c = gc(path, ttl);
  if (c) return c;
  const result = await (_fdQ = _fdQ.then(async () => {
    const wait = _fdLast + 700 - Date.now();
    if (wait > 0) await new Promise(r=>setTimeout(r,wait));
    _fdLast = Date.now();
    try {
      const r = await fetch(`${API}?type=fd&path=${encodeURIComponent(path)}`, {signal: AbortSignal.timeout(12000)});
      if (!r.ok) return null;
      const d = await r.json();
      if (d.errorCode===429 || (d.message||'').includes('limit')) {
        await new Promise(r=>setTimeout(r,13000));
        return null;
      }
      if (d.errorCode || d.error) return d;
      sc(path, d);
      return d;
    } catch { return null; }
  }));
  return result;
}

async function klAPI(path, params={}) {
  const qs = new URLSearchParams(params).toString();
  const key = path+'?'+qs;
  const c = gc(key, 120000);
  if (c) return c;
  try {
    const r = await fetch(`${API}?type=kl&path=${encodeURIComponent(path)}&${qs}`, {signal: AbortSignal.timeout(12000)});
    if (!r.ok) return null;
    const d = await r.json();
    if (d.errors && Object.keys(d.errors).length) return null;
    sc(key, d); return d;
  } catch { return null; }
}

// KL fixture → FD format
function klToFd(f) {
  return {
    _kl:true, id:f.fixture.id, status:mapKL(f.fixture.status.short),

    awayTeam:{id:f.teams.away.id,name:f.teams.away.name,shortName:f.teams.away.name,crest:f.teams.away.logo},
    score:{fullTime:{home:f.goals.home,away:f.goals.away}},
    goals:(f.events||[]).filter(e=>e.type==='Goal').map(e=>({minute:e.time.elapsed,team:{id:e.team.id},scorer:{name:e.player.name}}))

}

async function reqNotif() {
  if (!('Notification' in window)) return false;
  if (Notification.permission==='granted') return true;
  if (Notification.permission==='denied') return false;
  return (await Notification.requestPermission())==='granted';
}
function pushNotif(title, body, tag='pi') {
  if (Notification.permission!=='granted') return;
  try {
    if (navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({type:'show-notification',title,body,tag,icon:'/favicon.ico',vibrate:[200,100,200]});
    } else {
      new Notification(title,{body,icon:'/favicon.ico',tag});
    }
  } catch {}
}

// ── Goal SFX ──
function playGoalSfx() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [[523,.12],[659,.12],[784,.12],[1047,.26],[784,.09],[1047,.44]].reduce((t,[f,d])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=f; o.type='triangle';
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.38,t+.04); g.gain.linearRampToValueAtTime(0,t+d-.02);
      o.start(t); o.stop(t+d); return t+d;
    }, ctx.currentTime+.05);
    const buf=ctx.createBuffer(1,ctx.sampleRate*.75,ctx.sampleRate);
    const da=buf.getChannelData(0); for(let i=0;i<da.length;i++) da[i]=(Math.random()*2-1)*.07;
    const ns=ctx.createBufferSource(); ns.buffer=buf;
    const ng=ctx.createGain(); ns.connect(ng); ng.connect(ctx.destination);
    ng.gain.setValueAtTime(.18,ctx.currentTime+.55); ng.gain.linearRampToValueAtTime(0,ctx.currentTime+1.5);
    ns.start(ctx.currentTime+.55);
  } catch {}
}

function showGoal(scorer, team, min, hn, an, hg, ag) {
  document.getElementById('g-scorer').textContent = scorer ? `⚽ ${scorer}` : team||'';
  document.getElementById('g-detail').textContent = (hn&&an) ? `${hn} ${hg}:${ag} ${an}${min?' · '+min+"'":''}` : '';
  const el = document.getElementById('gf');

  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove('show'), 5500);
}

function chkGoal(m) {
  const id = m.id;
  const hg = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? 0;
  const ag = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? 0;
  const sc2 = `${hg}:${ag}`;
  if (prevSc[id] !== undefined && prevSc[id] !== sc2) {
    const isH = parseInt(hg) > parseInt((prevSc[id]||'0').split(':')[0]);
    const team = isH ? (m.homeTeam?.shortName||m.homeTeam?.name) : (m.awayTeam?.shortName||m.awayTeam?.name);
    const goals = m.goals||[];
    const last = goals[goals.length-1];
    showGoal(last?.scorer?.name||last?.player?.name||'', team, last?.minute,
      m.homeTeam?.shortName, m.awayTeam?.shortName, hg, ag);
    if (watchList.includes(String(id)))
      pushNotif(`⚽ GOAL! ${team}`,`${m.homeTeam?.shortName} ${hg}:${ag} ${m.awayTeam?.shortName}${last?.scorer?.name?' · '+last.scorer.name:''}`, 'g'+id);
  }
  if (!prevSt[id]) prevSt[id] = m.status;
  else if (prevSt[id] !== m.status) {
    if (watchList.includes(String(id))) {
      const hn=m.homeTeam?.shortName||m.homeTeam?.name, an=m.awayTeam?.shortName||m.awayTeam?.name;
      if (m.status==='IN_PLAY'&&prevSt[id]==='SCHEDULED') pushNotif(`🏁 Kick-off!`,`${hn} vs ${an}`,'ko'+id);
      if (m.status==='HALFTIME') pushNotif(`⏸ Half-time`,`${hn} ${hg}:${ag} ${an}`,'ht'+id);
      if (m.status==='FINISHED'||m.status==='AWARDED') pushNotif(`🏆 Full-time`,`${hn} ${hg}:${ag} ${an}`,'ft'+id);
    }
    prevSt[id] = m.status;
  }
  prevSc[id] = sc2;
}

async function loadLive(silent=false) {
  const c = document.getElementById('content');
  if (!silent) c.innerHTML = `<div class="ld"><div class="spin"></div><div class="ld-t">LOADING LIVE DATA</div></div>`;

  const today = ds(kn());
  const ksStart = new Date(today+'T00:00:00+09:00');
  const uf = new Date(ksStart.getTime()-9*3600000).toISOString().slice(0,10);
  const ut = new Date(ksStart.getTime()-9*3600000+86399000).toISOString().slice(0,10);

  const [plR, pdR, bl1R, saR, fl1R] = await Promise.allSettled([
    fd(`/competitions/PL/matches?dateFrom=${uf}&dateTo=${ut}`),
    fd(`/competitions/PD/matches?dateFrom=${uf}&dateTo=${ut}`),
    fd(`/competitions/BL1/matches?dateFrom=${uf}&dateTo=${ut}`),
    fd(`/competitions/SA/matches?dateFrom=${uf}&dateTo=${ut}`),
    fd(`/competitions/FL1/matches?dateFrom=${uf}&dateTo=${ut}`),
  ]);

  let all = [];
  [plR, pdR, bl1R, saR, fl1R].forEach(r => {
    if (r.status==='fulfilled' && r.value?.matches) all.push(...r.value.matches);
  });

  // K League if selected
  const hasKL = SEL.some(t=>t.league==='KL1'||t.league==='KL2');
  if (hasKL) {
    const klD = await klAPI('/fixtures', {league:KL_LEAGUE, season:KL_SEASON, date:uf});
    (klD?.response||[]).forEach(f => all.push(klToFd(f)));
  }

  // Goal/event detection
  all.forEach(m => { if (isLive(m)) chkGoal(m); });

  const live  = all.filter(m => isLive(m) && isKstToday(m.utcDate));
  const sched = all.filter(m => isSch(m)  && isKstToday(m.utcDate));
  const fin   = all.filter(m => isFin(m)  && isKstToday(m.utcDate));

  // Live badge in header
  document.getElementById('live-badge')?.classList.toggle('show', live.length>0);

  if (!live.length && !sched.length && !fin.length) {
    c.innerHTML = `<div class="empty"><div class="ei">📅</div><h3>No Matches Today</h3><p>Check the Schedule tab for upcoming fixtures</p></div>`;
    return;
  }

  let html = '';

  if (live.length) {
    html += buildSection('🔴 LIVE', `${live.length} matches`, live, true);
  }
  if (sched.length) {
    html += buildSection('TODAY\'S FIXTURES', today+' KST', sched.slice(0,15), false);
  }
  if (fin.length) {
    html += buildSection('FINAL SCORES', `${fin.length} played`, fin.slice(0,10), false);
  }

  c.innerHTML = html;
}

function buildSection(title, badge, matches, liveSection) {
  // Group by league
  const groups = {};
  matches.forEach(m => {
    const k = m.competition?.name || 'Other';
    if (!groups[k]) groups[k] = {matches:[], logo:''};
    groups[k].matches.push(m);
    const lg = LEAGUES.find(l => l.n.includes(k.slice(0,5)) || k.includes(l.n.slice(0,5)));
    if (lg) groups[k].logo = lg.logo;
  });

  const groupHtml = Object.entries(groups).map(([lgName, {matches:ms,logo}]) => {
    const liveCnt = ms.filter(m=>isLive(m)).length;
    return `<div class="mg">
      <div class="mg-head">
        ${logo ? `<img src="${logo}" alt="${lgName}" onerror="this.style.opacity='.2'">` : ''}
        <span class="lg-name">${lgName}</span>
        ${liveCnt ? `<span class="live-cnt">● LIVE ${liveCnt}</span>` : `<span style="margin-left:auto;font-size:11px;color:var(--t3);font-weight:700;">${ms.length}</span>`}
      </div>
      ${ms.map(m => buildMatchRow(m)).join('')}
    </div>`;
  }).join('');

  return `<div class="sh" style="margin-bottom:16px;">
    <h2 style="color:${liveSection?'var(--red)':'var(--t)'}">${title}</h2>
    <span class="sh-badge">${badge}</span>
  </div>${groupHtml}<div style="height:20px"></div>`;
}

function buildMatchRow(m) {
  const h=m.homeTeam, a=m.awayTeam;
  const live=isLive(m), fin=isFin(m);
  const hg=m.score?.fullTime?.home??m.score?.halfTime?.home;
  const ag=m.score?.fullTime?.away??m.score?.halfTime?.away;
  const hW=fin&&hg!=null&&hg>ag, aW=fin&&ag!=null&&ag>hg;
  const hcr=crestOf(h), acr=crestOf(a);
  const hn=elv(h?.shortName||h?.name||''), an=elv(a?.shortName||a?.name||'');
  const my = isMyMatch(m);
  const isW = watchList.includes(String(m.id));

  let timeStr = kt(m.utcDate);
  if (live) {
    const e = Math.floor((Date.now()-new Date(m.utcDate).getTime())/60000);
    timeStr = m.status==='HALFTIME' ? 'HT' : e>0&&e<=95 ? `${Math.min(e,90)}'` : 'LIVE';
  }
  if (fin) timeStr = 'FT';

  const od = ods(m);
  const showOdds = !fin && !live;

  return `<div class="mr ${my?'my':''} ${live?'live-row':''}" onclick="openMatch(${m.id},'${hn}','${an}',${!!m._kl})">
    <div class="mt">
      <div class="mt-time ${live?'live':fin?'ft':''}">${live?`<span style="color:var(--red);font-size:10px;">●</span> ${timeStr}`:timeStr}</div>
    </div>
    <div class="mb">
      <div class="ml">
        <div class="mc2">
          <img src="${hcr}" alt="${hn}" data-id="${h?.id||0}" onerror="imgErr(this)" width="18" height="18">
          <span class="mn ${hW?'':'d'}" style="${hW?'color:var(--t);font-weight:800;':''}">${h?.shortName||h?.name||''}</span>
        </div>
        <span class="msv ${hW?'w':''}">${hg??'–'}</span>
      </div>
      <div class="ml">
        <div class="mc2">
          <img src="${acr}" alt="${an}" data-id="${a?.id||0}" onerror="imgErr(this)" width="18" height="18">
          <span class="mn ${aW?'':'d'}" style="${aW?'color:var(--t);font-weight:800;':''}">${a?.shortName||a?.name||''}</span>
        </div>
        <span class="msv ${aW?'w':''}">${ag??'–'}</span>
      </div>
      ${showOdds ? `<div class="odds-bar">
        <div class="ob2"><div class="ob-l">${hn.slice(0,8)}</div><div class="ob-v ${parseFloat(od.hw)<2?'fav':''}">${od.hw}</div></div>
        <div class="ob2"><div class="ob-l">Draw</div><div class="ob-v">${od.dr}</div></div>
        <div class="ob2"><div class="ob-l">${an.slice(0,8)}</div><div class="ob-v ${parseFloat(od.aw)<2?'fav':''}">${od.aw}</div></div>
      </div>` : ''}
    </div>
    <div class="ma">
      <button class="nb ${isW?'on':''}" onclick="event.stopPropagation();toggleWatch(${m.id},'${hn}','${an}',this)">${isW?'🔔':'🔕'}</button>
    </div>
  </div>`;
}

  const ut=new Date(ks.getTime()-9*3600000+86399000).toISOString().slice(0,10);

    LEAGUES.filter(l=>!l.kl).map(l=>fd(`/competitions/${l.c}/matches?dateFrom=${uf}&dateTo=${ut}`))
  );

async function loadAI() {

  const ut=new Date(new Date(end+'T00:00:00+09:00').getTime()-9*3600000+6*86400000).toISOString().slice(0,10);
  const d = await fd(`/competitions/PL/matches?dateFrom=${uf}&dateTo=${ut}`);
  const matches=(d?.matches||[]).filter(m=>isSch(m)||isLive(m)).slice(0,6);

  c.innerHTML = `<div class="sh"><h2>AI PITCH Intelligence</h2><span class="sh-badge">This Week</span></div>`;

  if (!matches.length) {
    c.innerHTML += `<div class="empty"><div class="ei">🧠</div><h3>No Upcoming Fixtures</h3><p>Check back closer to the next matchday</p></div>`;
    return;
  }

  const tactics=[
    ['High Pressure','Gegenpressing, 7+ line breaks/90','Counter press triggers'],
    ['Possession',   'Deep buildup, 65%+ pass share','Vulnerability on transitions'],
    ['Direct Play',  'Long ball frequency, set pieces','Aerial dominance battles'],
    ['Wide Overload','3-2-5 shape, full-back pushes','Central blocking risk'],
    ['Low Block',    '5-4-1 compact shape','Set-piece exploitation focus'],
  ];

  c.innerHTML += matches.map(m=>{
    const h=m.homeTeam, a=m.awayTeam;
    const sd=seed(m);
    const hw=Math.round(36+rnv(sd,1)*26), dr=Math.round(17+rnv(sd,2)*14), aw=100-hw-dr;
    const [ht,hd,hk]=tactics[Math.floor(rnv(sd,3)*5)];
    const [at,ad,ak]=tactics[Math.floor(rnv(sd,4)*5)];
    const hcr=crestOf(h), acr=crestOf(a);
    const hn=h?.shortName||h?.name||'', an=a?.shortName||a?.name||'';
    const xgH=(1.2+rnv(sd,5)*1.4).toFixed(2), xgA=(0.8+rnv(sd,6)*1.2).toFixed(2);
    const winner=hw>aw?hn:aw>hw?an:'Balanced';

    return `<div class="ai-card">
      <div class="ai-chip">🧠 AI MATCH PREVIEW</div>
      <div style="font-size:11px;color:var(--t2);font-weight:600;margin-bottom:20px;">📅 ${kd(m.utcDate)} ${kt(m.utcDate)} KST · ${m.competition?.name||'PL'} · ${m.matchday?'Round '+m.matchday:''}</div>
      <div class="ai-match-row">
        <div class="ai-club">
          <img src="${hcr}" alt="${hn}" data-id="${h?.id||0}" onerror="imgErr(this)">
          <h4>${hn}</h4>
        </div>
        <div class="ai-vs">
          <div class="ai-vs-txt">VS</div>
          <div class="ai-vs-date">${kd(m.utcDate)}<br>${kt(m.utcDate)} KST</div>
        </div>
        <div class="ai-club">
          <img src="${acr}" alt="${an}" data-id="${a?.id||0}" onerror="imgErr(this)">
          <h4>${an}</h4>
        </div>
      </div>
      <div class="prob-row">
        <div class="prob-track">
          <div class="ph" style="width:${hw}%"></div>
          <div class="pd2" style="width:${dr}%"></div>
          <div class="pa" style="width:${aw}%"></div>
        </div>
        <div class="prob-lbls">
          <span class="pl-txt">Home Win <span style="color:var(--p)">${hw}%</span></span>
          <span class="pl-txt">Draw <span style="color:var(--am)">${dr}%</span></span>
          <span class="pl-txt">Away Win <span style="color:var(--red)">${aw}%</span></span>
        </div>
      </div>
      <div class="ai-stats">
        <div class="as"><span>${xgH}</span><label>Home xG</label></div>
        <div class="as"><span>${xgA}</span><label>Away xG</label></div>
        <div class="as"><span>${Math.round(55+rnv(sd,7)*20)}%</span><label>Pass Acc.</label></div>
      </div>
      <div class="tac-grid">
        <div class="tc">
          <div class="tc-lbl">⚙️ ${hn} — Tactic</div>
          <div class="tc-val">${ht}</div>
          <div class="tc-note">${hd}. Key: ${hk}.</div>
        </div>
        <div class="tc">
          <div class="tc-lbl">⚙️ ${an} — Tactic</div>
          <div class="tc-val">${at}</div>
          <div class="tc-note">${ad}. Key: ${ak}.</div>
        </div>
      </div>
      <div class="ai-insight">
        <strong>🔍 AI Analysis:</strong> ${hn} enter this fixture with <strong>${ht}</strong> tendencies that could expose ${an}'s ${ak.toLowerCase()}. 
        Whoever scores first wins <strong>${Math.round(65+rnv(sd,8)*20)}%</strong> of the time in this fixture type.
        AI edge: <strong style="color:var(--p)">${winner}</strong> — ${hw>aw?'home advantage and form':'superior away record and depth'} the decisive factor.
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════
// FAN ZONE
// ══════════════════════════════════════
const LEVELS=[
  {lv:1,em:'⚽',n:'Rookie',min:0,max:4},
  {lv:2,em:'📱',n:'Casual Viewer',min:5,max:9},
  {lv:3,em:'📺',n:'Home Viewer',min:10,max:19},
  {lv:4,em:'🧠',n:'Tactician',min:20,max:39},
  {lv:5,em:'🗣️',n:'Armchair Manager',min:40,max:79},
  {lv:6,em:'🔥',n:'Die-hard Fan',min:80,max:149},
  {lv:7,em:'👑',n:'Club Owner',min:150,max:Infinity},
];
const getLv = n => LEVELS.find(l=>n>=l.min&&n<=l.max)||LEVELS[0];
const saveFan = () => localStorage.setItem('pi_fan',JSON.stringify(fanData));
const isMatchTime = m => { if(!m.utcDate) return false; const s=new Date(m.utcDate).getTime(),n=Date.now(); return n>=s-30*60000&&n<=s+120*60000; };

async function loadFan() {
  const c = document.getElementById('content');
  const lv=getLv(fanData.total), nxt=LEVELS.find(l=>l.lv===lv.lv+1);
  const prog=nxt?Math.round((fanData.total-lv.min)/(nxt.min-lv.min)*100):100;

  c.innerHTML = `
    <div class="sh"><h2>Fan Zone</h2></div>
    <div class="fz-hero">
      <span class="fz-em">${lv.em}</span>
      <div class="fz-lv">Lv.${lv.lv} · ${lv.n}</div>
      <div class="fz-desc">${fanData.total} matches watched${SEL.length?' · '+SEL.map(s=>s.name).join(' & '):''}</div>
      <div class="fz-prog">
        <div class="fz-bar-bg"><div class="fz-bar" style="width:${prog}%"></div></div>
        <div class="fz-bar-lbl"><span>${lv.min}</span><span>${prog}%</span><span>${nxt?nxt.min+'+ matches':'MAX'}</span></div>
      </div>
      <div class="fz-sg">
        <div class="fzs"><div class="fzs-v">${fanData.total}</div><div class="fzs-l">Watched</div></div>
        <div class="fzs"><div class="fzs-v">${lv.lv}</div><div class="fzs-l">Level</div></div>
        <div class="fzs"><div class="fzs-v">${fanData.checkins.length}</div><div class="fzs-l">Check-ins</div></div>
      </div>
    </div>

    <div class="sh"><h2>Level Guide</h2></div>
    <div class="lv-guide">
      ${LEVELS.map(l=>`<div class="lv-it ${l.lv===lv.lv?'cur':''}">
        <span class="lv-ico">${l.em}</span>
        <span class="lv-nm">Lv.${l.lv} · ${l.n}</span>
        <span class="lv-req">${l.min}${l.max===Infinity?'+ matches':'-'+l.max+' matches'}</span>
      </div>`).join('')}
    </div>

    <div class="sh"><h2>Match Check-in</h2><span class="sh-badge">30 min before kick-off</span></div>
    <div id="fan-fixtures"><div class="ld" style="padding:30px 0;"><div class="spin"></div></div></div>

    <div class="sh" style="margin-top:24px;"><h2>History</h2></div>
    ${fanData.checkins.length
      ? fanData.checkins.slice(0,10).map(ci=>`
        <div class="ci">
          <div class="ci-main"><div class="ci-teams">${ci.teams}</div><div class="ci-meta">📅 ${ci.date}</div></div>
          <span class="ci-done">✓ Certified</span>
        </div>`).join('')
      : `<div class="empty" style="padding:32px;"><div class="ei" style="font-size:36px;">📋</div><h3>No check-ins yet</h3><p>Check in during match time to earn points!</p></div>`
    }`;

  loadFanFixtures();
}

async function loadFanFixtures() {
  const el = document.getElementById('fan-fixtures');
  if (!el || !SEL.length) { if(el) el.innerHTML=`<div style="text-align:center;padding:20px;color:var(--t2);">Select a club to see fixtures</div>`; return; }
  const main = SEL[0];
  const isKL = main.league==='KL1'||main.league==='KL2';
  let ms=[];
  if (isKL) {
    const lgId = main.league==='KL1'?KL_LEAGUE:KL2_LEAGUE;
    const d = await klAPI('/fixtures',{team:main.id,league:lgId,season:KL_SEASON,next:5});
    ms=(d?.response||[]).map(f=>({
      _kl:true, id:f.fixture.id, utcDate:f.fixture.date,
      status:mapKL(f.fixture.status.short),
      homeTeam:{id:f.teams.home.id,name:f.teams.home.name,crest:f.teams.home.logo},
      awayTeam:{id:f.teams.away.id,name:f.teams.away.name,crest:f.teams.away.logo},
    }));
  } else {
    const d = await fd(`/teams/${main.id}/matches?status=SCHEDULED&limit=5`);
    ms=d?.matches||[];
  }
  if (!ms.length) { el.innerHTML=`<div style="text-align:center;padding:20px;color:var(--t2);">No upcoming fixtures</div>`; return; }
  el.innerHTML=ms.map(m=>{
    const h=m.homeTeam,a=m.awayTeam;
    const mid=String(m.id);
    const done=fanData.checkins.find(c=>c.matchId===mid);
    const can=isMatchTime(m);
    const teams=`${elv(h?.shortName||h?.name)} vs ${elv(a?.shortName||a?.name)}`;
    return `<div class="ci">
      <div class="ci-main">
        <div class="ci-teams">${teams}</div>
        <div class="ci-meta">📅 ${kd(m.utcDate)} · ${kt(m.utcDate)} KST</div>
      </div>
      <button class="ci-btn" ${done||!can?'disabled':''} onclick="doCI(this,'${teams}','${kd(m.utcDate)} ${kt(m.utcDate)}','${mid}')">${done?'✓ Done':can?'🔥 Check In':'⏰ Not yet'}</button>
    </div>`;
  }).join('');
}

function doCI(btn,teams,ts,mid) {
  if (fanData.checkins.find(c=>c.matchId===mid)) return;
  btn.disabled=true; btn.textContent='✓ Done';
  const pLv=getLv(fanData.total).lv;
  fanData.total++; fanData.checkins.unshift({teams,date:ts,matchId:mid}); saveFan();
  const nLv=getLv(fanData.total);
  if (nLv.lv>pLv) {
    document.getElementById('lu-em').textContent=nLv.em;
    document.getElementById('lu-s').textContent=`Lv.${nLv.lv} · ${nLv.n}`;
    const el=document.getElementById('lvup'); el.classList.add('show');
    clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),4500);
  }
  toast(`✓ ${teams} — Check-in complete!`, 'var(--p)');
  loadFan();
}

// ══════════════════════════════════════
// MATCH DETAIL MODAL
// ══════════════════════════════════════
async function openMatch(id, hn, an, isKL) {
  document.getElementById('dtl-ttl').textContent = `${hn} vs ${an}`;
  document.getElementById('dtl-body').innerHTML = `<div class="ld"><div class="spin"></div></div>`;
  document.getElementById('dtl-modal').classList.add('show');

  if (isKL) { await openKLMatch(id,hn,an); return; }
  const m = await fd(`/matches/${id}`,60000);
  if (!m||m.error) { document.getElementById('dtl-body').innerHTML=`<div class="empty"><div class="ei">⚠</div><h3>No data</h3></div>`; return; }

  const h=m.homeTeam, a=m.awayTeam;
  const hg=m.score?.fullTime?.home??m.score?.halfTime?.home??'–';
  const ag=m.score?.fullTime?.away??m.score?.halfTime?.away??'–';
  const goals=m.goals||[], hG=goals.filter(g=>g.team?.id===h?.id), aG=goals.filter(g=>g.team?.id===a?.id);
  const od=ods(m);

  document.getElementById('dtl-body').innerHTML=`
    <div class="dtl-score-blk">
      <div class="dtl-clubs">
        <div class="dtl-club"><img src="${crestOf(h)}" data-id="${h?.id||0}" onerror="imgErr(this)" style="width:52px;height:52px;object-fit:contain"><h4>${h?.name||''}</h4></div>
        <div class="dtl-score">${hg} : ${ag}</div>
        <div class="dtl-club"><img src="${crestOf(a)}" data-id="${a?.id||0}" onerror="imgErr(this)" style="width:52px;height:52px;object-fit:contain"><h4>${a?.name||''}</h4></div>
      </div>
      <div class="dtl-chips">
        ${m.utcDate?`<span class="dtl-chip">📅 ${kd(m.utcDate)} ${kt(m.utcDate)} KST</span>`:''}
        ${m.venue?`<span class="dtl-chip">🏟 ${m.venue}</span>`:''}
        ${m.referees?.[0]?`<span class="dtl-chip">👔 ${m.referees[0].name}</span>`:''}
        ${m.competition?.name?`<span class="dtl-chip">${m.competition.name}</span>`:''}
      </div>
    </div>
    ${goals.length?`<div class="sec-mini">⚽ GOALS</div>
    <div class="goal-row2">
      <div class="gs">${hG.map(g=>`<div class="gev"><span class="gm">${g.minute}'</span> ${(g.scorer?.name||g.player?.name||'').split(' ').pop()}</div>`).join('')}</div>
      <div class="gs r">${aG.map(g=>`<div class="gev">${(g.scorer?.name||g.player?.name||'').split(' ').pop()} <span class="gm">${g.minute}'</span></div>`).join('')}</div>
    </div>`:''}
    <div class="sec-mini">📊 ODDS (Reference)</div>
    <div style="display:flex;gap:8px">
      ${[{l:hn.slice(0,10),v:od.hw},{l:'Draw',v:od.dr},{l:an.slice(0,10),v:od.aw}].map(o=>`<div style="flex:1;background:rgba(255,255,255,.04);border-radius:12px;padding:14px;text-align:center;"><div style="font-size:11px;color:var(--t3);margin-bottom:5px;">${o.l}</div><div style="font-family:var(--M);font-size:20px;font-weight:900;${parseFloat(o.v)<2.2?'color:var(--p)':''}">${o.v}</div></div>`).join('')}
    </div>`;
}

async function openKLMatch(id, hn, an) {
  const d = await klAPI('/fixtures',{id});
  const f = d?.response?.[0];
  if (!f) { document.getElementById('dtl-body').innerHTML=`<div class="empty"><div class="ei">⚠</div><h3>No data</h3></div>`; return; }
  const h=f.teams.home, a=f.teams.away;
  const hg=f.goals.home??'–', ag=f.goals.away??'–';
  const goals=(f.events||[]).filter(e=>e.type==='Goal');
  const hG=goals.filter(g=>g.team.id===h.id), aG=goals.filter(g=>g.team.id===a.id);
  const stats=f.statistics||[], hS=stats[0]?.statistics||[], aS=stats[1]?.statistics||[];
  const STAT_KEYS=[['Shots on Goal','Shots on Target'],['Ball Possession','Possession'],['Total passes','Passes'],['Fouls','Fouls'],['Yellow Cards','Yellow Cards']];
  document.getElementById('dtl-body').innerHTML=`
    <div class="dtl-score-blk">
      <div class="dtl-clubs">
        <div class="dtl-club"><img src="${h.logo||''}" onerror="this.style.opacity='.2'" style="width:52px;height:52px;object-fit:contain"><h4>${h.name}</h4></div>
        <div class="dtl-score">${hg} : ${ag}</div>
        <div class="dtl-club"><img src="${a.logo||''}" onerror="this.style.opacity='.2'" style="width:52px;height:52px;object-fit:contain"><h4>${a.name}</h4></div>
      </div>
      <div class="dtl-chips">
        ${f.fixture.venue?.name?`<span class="dtl-chip">🏟 ${f.fixture.venue.name}</span>`:''}
        ${f.fixture.referee?`<span class="dtl-chip">👔 ${f.fixture.referee}</span>`:''}
        <span class="dtl-chip">⏰ ${kt(f.fixture.date)} KST</span>
      </div>
    </div>
    ${goals.length?`<div class="sec-mini">⚽ GOALS</div>
    <div class="goal-row2">
      <div class="gs">${hG.map(g=>`<div class="gev"><span class="gm">${g.time.elapsed}'</span> ${g.player.name.split(' ').pop()}</div>`).join('')}</div>
      <div class="gs r">${aG.map(g=>`<div class="gev">${g.player.name.split(' ').pop()} <span class="gm">${g.time.elapsed}'</span></div>`).join('')}</div>
    </div>`:''}
    ${hS.length?`<div class="sec-mini">📊 MATCH STATS</div><div class="sbar2">${STAT_KEYS.map(([key,lbl])=>{
      const hv=hS.find(s=>s.type===key)?.value??0, av=aS.find(s=>s.type===key)?.value??0;
      const tot=(typeof hv==='number'&&typeof av==='number')?hv+av||100:100;
      const hp=Math.round((typeof hv==='string'?parseInt(hv):hv)/tot*100);
      return `<div class="sbar2"><div class="sbar-hd"><span class="sv">${hv}</span><span class="sl">${lbl}</span><span class="sv">${av}</span></div><div class="sbar-tr"><div class="sh2" style="width:${hp}%"></div><div class="sa2" style="width:${100-hp}%"></div></div></div>`;
    }).join('')}</div>`:''}`;
}

function closeModal() { document.getElementById('dtl-modal').classList.remove('show'); }

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
window.addEventListener('load', () => {
  // Load persisted data
  try { SEL = JSON.parse(localStorage.getItem('pi_sel')||'[]'); } catch { SEL=[]; }
  try { fanData = JSON.parse(localStorage.getItem('pi_fan')||'{"checkins":[],"total":0}'); } catch {}
  try { watchList = JSON.parse(localStorage.getItem('pi_watch')||'[]'); } catch {}

  if (SEL.length) {
    applyTheme(SEL[0].col);
    document.getElementById('ob').style.display = 'none';
    document.getElementById('app').classList.add('on');
    updateHdr();
    updateSidebarTeam();
    renderNav();
    swPage('home');
    if (liveTimer) clearInterval(liveTimer);
    liveTimer = setInterval(()=>{ if(curPage==='home') loadLive(true); }, 60000);
  } else {
    document.getElementById('ob').style.display = 'block';
    initOb();
  }
});
