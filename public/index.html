<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --p: #10b981; --bg: #05070a; --bg2: #0d1117; --cd: rgba(22, 27, 34, 0.95);
    --t: #ffffff; --t2: #a1a1aa; --red: #ef4444; --sh: 0 20px 40px rgba(0,0,0,0.6);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
body { background: var(--bg); color: var(--t); overflow: hidden; height: 100vh; }

/* 온보딩 - 이미지 가독성 및 디자인 개선 */
#ob { position: fixed; inset: 0; background: var(--bg); z-index: 9999; overflow-y: auto; padding-bottom: 120px; }
.ob-header { text-align: center; padding: 60px 20px; }
.ob-header h1 { font-size: 48px; font-weight: 900; color: var(--p); letter-spacing: -2px; }
.ob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.ob-team { background: #161b22; border: 2px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.ob-team:hover, .ob-team.sel { border-color: var(--p); background: rgba(16, 185, 129, 0.1); transform: translateY(-5px); }
.ob-team .crest-box { width: 60px; height: 60px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; border: 1px solid rgba(255,255,255,0.1); }
.ob-team img { width: 40px; height: 40px; object-fit: contain; }
.ob-team span { font-size: 13px; font-weight: 700; color: var(--t); }
.ob-footer { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--bg) 80%, transparent); padding: 30px; text-align: center; }
.btn-main { background: var(--p); color: #000; padding: 18px 60px; border-radius: 100px; font-weight: 900; font-size: 18px; cursor: pointer; border: none; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4); }

/* 앱 메인 레이아웃 */
#app { display: none; height: 100vh; flex-direction: column; }
.hdr { height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.05); }
.hdr-logo { font-size: 26px; font-weight: 900; color: var(--p); letter-spacing: 1px; }
.main-body { flex: 1; display: flex; overflow: hidden; }
.sidebar { width: 260px; background: #080a0f; border-right: 1px solid rgba(255,255,255,0.05); padding: 25px; }
.si { padding: 16px 20px; border-radius: 15px; cursor: pointer; color: var(--t2); font-weight: 700; margin-bottom: 8px; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
.si:hover, .si.on { background: rgba(16, 185, 129, 0.15); color: var(--p); }
.pages { flex: 1; overflow-y: auto; padding: 40px; background: #05070a; }
.page { display: none; } .page.on { display: block; }

/* 경기 카드 및 상세 정보 */
.mc { background: var(--cd); border-radius: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; transition: 0.3s; }
.mc-header { padding: 15px 25px; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; font-size: 12px; font-weight: 800; color: var(--t2); }
.mc-content { padding: 30px; display: flex; align-items: center; justify-content: space-around; }
.mc-team { text-align: center; width: 140px; font-weight: 800; }
.mc-team img { width: 64px; height: 64px; margin-bottom: 15px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
.mc-score { font-size: 48px; font-weight: 900; background: #000; padding: 10px 30px; border-radius: 20px; color: var(--p); box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.2); }
.mc-stats { padding: 20px 40px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.05); }
.stat-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; font-weight: 600; }
.stat-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; display: flex; }
.stat-fill { background: var(--p); height: 100%; transition: 0.5s; }

/* 골 애니메이션 */
#gt { position: fixed; inset: 0; z-index: 10000; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
.gt-box { text-align: center; animation: goal-pop 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
.gt-box h1 { font-size: 120px; font-weight: 900; color: var(--p); text-shadow: 0 0 50px var(--p); letter-spacing: 10px; }
@keyframes goal-pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* 로딩 애니메이션 */
.loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px; gap: 20px; }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(16, 185, 129, 0.1); border-top-color: var(--p); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="ob">
    <div class="ob-header">
        <h1>PITCH IN 25/26</h1>
        <p>글로벌 축구 데이터를 실시간으로 동기화합니다. 응원팀을 선택하세요.</p>
    </div>
    <div id="ob-list" class="ob-grid"></div>
    <div class="ob-footer">
        <button class="btn-main" onclick="startApp()">PITCH IN 시작</button>
    </div>
</div>

<div id="app">
    <header class="hdr">
        <div class="hdr-logo">PITCH IN</div>
        <div id="hdr-selected" style="display:flex; gap:12px;"></div>
    </header>
    <div class="main-body">
        <aside class="sidebar">
            <div class="si on" onclick="swP('home',this)"><span>⚡</span> LIVE</div>
            <div class="si" onclick="swP('sched',this)"><span>📅</span> SCHEDULE</div>
            <div class="si" onclick="swP('std',this)"><span>📊</span> STANDINGS</div>
            <div class="si" onclick="swP('player',this)"><span>👟</span> PLAYERS</div>
            <div class="si" onclick="swP('fan',this)"><span>⭐</span> FAN ZONE</div>
        </aside>
        <main class="pages">
            <div class="page on" id="pg-home"></div>
            <div class="page" id="pg-sched">
                <div id="sched-nav" style="display:flex; gap:12px; margin-bottom:30px; overflow-x:auto; padding-bottom:10px;"></div>
                <div id="sched-list"></div>
            </div>
            <div class="page" id="pg-std">
                <div id="std-tabs" style="display:flex; gap:10px; margin-bottom:25px; overflow-x:auto;"></div>
                <div id="std-bd"></div>
            </div>
            <div class="page" id="pg-player">
                <div id="pl-tabs" style="display:flex; gap:10px; margin-bottom:25px; overflow-x:auto;"></div>
                <div id="pl-bd"></div>
            </div>
            <div class="page" id="pg-fan">
                <div id="fan-bd" class="mc" style="padding:40px; text-align:center;">
                    <h2 id="fan-team-name" style="color:var(--p); margin-bottom:15px;">나의 팀</h2>
                    <p style="color:var(--t2); margin-bottom:30px;">경기 시간에 맞춰 집관 인증을 활성화하세요!</p>
                    <button class="btn-main" style="padding:15px 40px;" onclick="alert('집관 포인트가 적립되었습니다! 🔥')">집관 인증하기</button>
                </div>
            </div>
        </main>
    </div>
</div>

<div id="gt"><div class="gt-box"><h1>GOAL!</h1><div id="gt-team-nm" style="font-size:32px; font-weight:800;"></div></div></div>

<audio id="audio-goal" src="https://assets.mixkit.co/active_storage/sfx/2047/2047-preview.mp3"></audio>

<script>
const API = '/api/football';
const LEAGUES = [
    { n: 'Premier League', c: 'PL', teams: ['Arsenal', 'Aston Villa', 'Man City', 'Liverpool', 'Tottenham', 'Chelsea', 'Man Utd', 'Newcastle'] },
    { n: 'La Liga', c: 'PD', teams: ['Real Madrid', 'Barcelona', 'Atletico Madrid', 'Girona', 'Real Sociedad'] },
    { n: 'K League 1', c: 'KL1', teams: ['울산', '포항', '서울', '전북', '광주', '강원', '대전', '제주'] },
    { n: 'K League 2', c: 'KL2', teams: ['수원삼성', '부산', '경남', '화성 FC', '안양', '전남', '김포'] }
];

let SELECTED_TEAMS = [];
let prevScores = {};

// 온보딩 초기화
function initOb() {
    const list = document.getElementById('ob-list');
    list.innerHTML = LEAGUES.flatMap(lg => lg.teams.map(t => `
        <div class="ob-team" onclick="toggleTeam(this, '${t}')">
            <div class="crest-box"><img src="https://ui-avatars.com/api/?name=${encodeURIComponent(t)}&background=000&color=fff&bold=true"></div>
            <span>${t}</span>
        </div>
    `)).join('');
}

function toggleTeam(el, team) {
    if (SELECTED_TEAMS.includes(team)) {
        SELECTED_TEAMS = SELECTED_TEAMS.filter(t => t !== team);
        el.classList.remove('sel');
    } else {
        if (SELECTED_TEAMS.length >= 2) return;
        SELECTED_TEAMS.push(team);
        el.classList.add('sel');
    }
}

async function startApp() {
    if (SELECTED_TEAMS.length === 0) return alert('팀을 선택해주세요.');
    document.getElementById('ob').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('hdr-selected').innerHTML = SELECTED_TEAMS.map(t => `<img src="https://ui-avatars.com/api/?name=${encodeURIComponent(t)}&size=32&background=10b981&color=000&bold=true" style="border-radius:50%">`).join('');
    loadHome();
    initTabs();
}

// 라이브 경기 및 스탯 로드
async function loadHome() {
    const bd = document.getElementById('pg-home');
    bd.innerHTML = '<div class="loader"><div class="spinner"></div>데이터 동기화 중...</div>';
    
    const d = await fetch(`${API}?type=fd&path=/matches`).then(r => r.json());
    if (!d.matches || d.matches.length === 0) {
        bd.innerHTML = '<div style="text-align:center; padding:100px; color:var(--t2);">현재 진행 중인 라이브 경기가 없습니다.</div>';
        return;
    }

    bd.innerHTML = d.matches.filter(m => ['IN_PLAY', 'PAUSED', 'HALFTIME'].includes(m.status)).map(m => {
        // 골 감지
        const currentScore = `${m.score.fullTime.home}-${m.score.fullTime.away}`;
        if (prevScores[m.id] && prevScores[m.id] !== currentScore) {
            triggerGoal(m.homeTeam.shortName || m.homeTeam.name);
        }
        prevScores[m.id] = currentScore;

        return `
            <div class="mc">
                <div class="mc-header"><span>${m.competition.name}</span><span style="color:var(--p)">LIVE ${m.utcDate.slice(11,16)}</span></div>
                <div class="mc-content">
                    <div class="mc-team"><img src="${m.homeTeam.crest}"><div>${m.homeTeam.name}</div></div>
                    <div class="mc-score">${m.score.fullTime.home ?? 0} : ${m.score.fullTime.away ?? 0}</div>
                    <div class="mc-team"><img src="${m.awayTeam.crest}"><div>${m.awayTeam.name}</div></div>
                </div>
                <div class="mc-stats">
                    <div class="stat-row"><span>점유율</span><span>50% : 50%</span></div>
                    <div class="stat-bar"><div class="stat-fill" style="width:50%"></div></div>
                    <div style="display:flex; justify-content:space-between; margin-top:15px; font-size:11px; color:var(--t2);">
                        <span>🚩 코너킥 4</span><span>🏟️ ${m.venue || 'Stadium'}</span><span>🟨 경고 2</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

// 선수 스탯 로드 (복구됨)
async function loadPlayers(lg) {
    const bd = document.getElementById('pl-bd');
    bd.innerHTML = '<div class="loader"><div class="spinner"></div>득점 순위 로드 중...</div>';
    const d = await fetch(`${API}?type=fd&path=/competitions/${lg}/scorers`).then(r => r.json());
    if (!d.scorers) { bd.innerHTML = '데이터가 없습니다.'; return; }
    
    bd.innerHTML = `
        <table style="width:100%; border-collapse:collapse; text-align:left;">
            <tr style="color:var(--t2); font-size:12px; border-bottom:1px solid var(--t2);">
                <th style="padding:15px;">RANK</th><th style="padding:15px;">PLAYER</th><th style="padding:15px;">TEAM</th><th style="padding:15px;">GOALS</th>
            </tr>
            ${d.scorers.map((s, i) => `
                <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
                    <td style="padding:15px; font-weight:800; color:var(--p);">${i+1}</td>
                    <td style="padding:15px; font-weight:700;">${s.player.name}</td>
                    <td style="padding:15px; color:var(--t2);">${s.team.name}</td>
                    <td style="padding:15px; font-weight:900; color:var(--p);">${s.goals}</td>
                </tr>
            `).join('')}
        </table>
    `;
}

function triggerGoal(team) {
    const gt = document.getElementById('gt');
    const audio = document.getElementById('audio-goal');
    document.getElementById('gt-team-nm').textContent = team + " SCORE!";
    gt.style.display = 'flex';
    audio.play().catch(() => {});
    setTimeout(() => gt.style.display = 'none', 3000);
}

function initTabs() {
    const stdTabs = document.getElementById('std-tabs');
    const plTabs = document.getElementById('pl-tabs');
    const schedNav = document.getElementById('sched-nav');
    
    const tabsHtml = LEAGUES.map(lg => `<button class="si" style="white-space:nowrap" onclick="loadStd('${lg.c}')">${lg.n}</button>`).join('');
    stdTabs.innerHTML = tabsHtml;
    plTabs.innerHTML = LEAGUES.map(lg => `<button class="si" style="white-space:nowrap" onclick="loadPlayers('${lg.c}')">${lg.n}</button>`).join('');
    
    for (let i = 0; i < 7; i++) {
        const d = new Date(); d.setDate(d.getDate() + i);
        const day = d.toISOString().split('T')[0];
        schedNav.innerHTML += `<button class="si" style="white-space:nowrap" onclick="loadSched('${day}')">${day.slice(5)}</button>`;
    }
}

async function loadStd(code) {
    const bd = document.getElementById('std-bd');
    bd.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    const d = await fetch(`${API}?type=fd&path=/competitions/${code}/standings`).then(res => res.json());
    const table = d.standings[0].table;
    bd.innerHTML = `<table style="width:100%; border-collapse:collapse;">
        <tr style="color:var(--t2); font-size:12px; border-bottom:1px solid var(--t2);"><th style="padding:10px;">POS</th><th style="padding:10px;">CLUB</th><th style="padding:10px;">MP</th><th style="padding:10px;">PTS</th></tr>
        ${table.map(r => `
            <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
                <td style="padding:12px; font-weight:800;">${r.position}</td>
                <td style="padding:12px; display:flex; align-items:center; gap:10px;"><img src="${r.team.crest}" width="24">${r.team.name}</td>
                <td style="padding:12px; text-align:center;">${r.playedGames}</td>
                <td style="padding:12px; text-align:center; color:var(--p); font-weight:900;">${r.points}</td>
            </tr>
        `).join('')}
    </table>`;
}

async function loadSched(date) {
    const bd = document.getElementById('sched-list');
    bd.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    const d = await fetch(`${API}?type=fd&path=/matches?dateFrom=${date}&dateTo=${date}`).then(res => res.json());
    bd.innerHTML = d.matches.map(m => `
        <div class="mc">
            <div class="mc-header"><span>${m.competition.name}</span><span>${m.utcDate.slice(11,16)} KST</span></div>
            <div class="mc-content" style="padding:15px;">
                <span style="flex:1; text-align:right; font-weight:700;">${m.homeTeam.name}</span>
                <span style="margin:0 20px; font-weight:900; color:var(--p);">${m.score.fullTime.home ?? '-'} : ${m.score.fullTime.away ?? '-'}</span>
                <span style="flex:1; text-align:left; font-weight:700;">${m.awayTeam.name}</span>
            </div>
        </div>
    `).join('') || '<p style="text-align:center;">경기가 없습니다.</p>';
}

function swP(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.getElementById('pg-' + id).classList.add('on');
    document.querySelectorAll('.si').forEach(s => s.classList.remove('on'));
    el.classList.add('on');
    if(id === 'std') loadStd('PL');
    if(id === 'player') loadPlayers('PL');
}

initOb();
</script>
</body>
</html>
